<style>
/* ═══════════════════════════════════════════════════════════════════
   Lifeguard Rotation Scheduler — Design System
   A premium, modern dark-mode interface with glassmorphism effects
   ═══════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

/* ─── Design Tokens ───────────────────────────────────────────── */
:root {
  /* Primary palette — ocean blues */
  --primary-50: #e8f4fd;
  --primary-100: #b8ddf7;
  --primary-200: #89c7f1;
  --primary-300: #5ab0eb;
  --primary-400: #2b9ae5;
  --primary-500: #0d84d0;
  --primary-600: #0a6aa8;
  --primary-700: #074f7e;
  --primary-800: #043555;
  --primary-900: #021a2b;

  /* Accent — warm sunset coral */
  --accent-400: #ff7b72;
  --accent-500: #f85149;
  --accent-600: #da3633;

  /* AM crew — sunrise gold */
  --am-50: #fef9e7;
  --am-100: #fcefc3;
  --am-200: #f9e08e;
  --am-300: #f6d055;
  --am-400: #f2c029;
  --am-500: #e6a817;
  --am-600: #c28512;
  --am-700: #9a630e;

  /* PM crew — twilight purple */
  --pm-50: #f3e8ff;
  --pm-100: #e4ccff;
  --pm-200: #c99eff;
  --pm-300: #b07aff;
  --pm-400: #9656ff;
  --pm-500: #7c3aed;
  --pm-600: #6326c9;
  --pm-700: #4b1d97;

  /* Status colors */
  --status-green: #2dd4a8;
  --status-green-bg: rgba(45, 212, 168, 0.12);
  --status-amber: #f59e0b;
  --status-amber-bg: rgba(245, 158, 11, 0.12);
  --status-blue: #38bdf8;
  --status-blue-bg: rgba(56, 189, 248, 0.12);
  --status-red: #f87171;
  --status-red-bg: rgba(248, 113, 113, 0.12);
  --status-purple: #c084fc;
  --status-purple-bg: rgba(192, 132, 252, 0.12);

  /* Neutral — slate */
  --bg-primary: #0f1117;
  --bg-secondary: #161822;
  --bg-tertiary: #1e2030;
  --bg-elevated: #252840;
  --bg-hover: #2a2d45;
  --bg-active: #32365a;

  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-default: rgba(255, 255, 255, 0.1);
  --border-strong: rgba(255, 255, 255, 0.18);

  --text-primary: #e8eaf0;
  --text-secondary: #9ba1b0;
  --text-tertiary: #6b7185;
  --text-inverse: #0f1117;

  /* Glass */
  --glass-bg: rgba(30, 32, 48, 0.75);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Typography */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-xs: 0.7rem;
  --font-sm: 0.8rem;
  --font-base: 0.9rem;
  --font-lg: 1.05rem;
  --font-xl: 1.25rem;
  --font-2xl: 1.5rem;
  --font-3xl: 1.875rem;

  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Universal emoji mode: redefining --font-family on <body> cascades to every
   element that uses var(--font-family). 'Noto Color Emoji' sits after 'Inter'
   so Latin text still uses Inter while emoji codepoints (absent from Inter)
   render from the bundled webfont — consistent on any OS, incl. Windows 7. */
body.universal-emoji {
  --font-family: 'Inter', 'Noto Color Emoji', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* Subtle background gradient */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(13, 132, 208, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(45, 212, 168, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
}

/* ─── Nav Bar ──────────────────────────────────────────── */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.nav-brand .logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary-500), var(--pm-500));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 2px 12px rgba(13, 132, 208, 0.3);
}

.nav-brand h1 {
  font-size: var(--font-lg);
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-300), var(--pm-300));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-tabs {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: var(--space-1);
  border-radius: var(--radius-lg);
}

.nav-tab {
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-md);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.nav-tab:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}

.nav-tab.active {
  color: var(--text-primary);
  background: var(--primary-600);
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.3);
}

.nav-tab .tab-icon {
  font-size: var(--font-base);
}

.nav-meta {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  color: var(--text-tertiary);
  font-size: var(--font-xs);
}

/* ─── Sub Nav (Day Selector + Crew Toggle) ───────────────── */
.sub-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
}

.day-selector {
  display: flex;
  gap: var(--space-1);
}

.day-chip {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 52px;
}

.day-chip:hover {
  border-color: var(--primary-500);
  color: var(--text-primary);
  background: var(--bg-hover);
}

.day-chip.active {
  background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
  border-color: var(--primary-500);
  color: white;
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.25);
}

.day-chip .day-badge {
  font-size: 0.6rem;
  background: rgba(255, 255, 255, 0.15);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-weight: 600;
}

.day-chip.active .day-badge {
  background: rgba(255, 255, 255, 0.25);
}

.day-badges-container {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}

.day-chip .day-badge.am {
  font-size: 0.6rem;
  background: rgba(230, 168, 23, 0.15);
  color: var(--am-300);
  border: 1px solid rgba(230, 168, 23, 0.3);
  padding: 0px 4px;
  border-radius: var(--radius-full);
  font-weight: 600;
  min-width: 14px;
  text-align: center;
}

.day-chip .day-badge.pm {
  font-size: 0.6rem;
  background: rgba(124, 58, 237, 0.15);
  color: var(--pm-300);
  border: 1px solid rgba(124, 58, 237, 0.3);
  padding: 0px 4px;
  border-radius: var(--radius-full);
  font-weight: 600;
  min-width: 14px;
  text-align: center;
}

.day-chip.active .day-badge.am {
  background: var(--am-300);
  color: var(--bg-primary);
  border-color: var(--am-300);
}

.day-chip.active .day-badge.pm {
  background: var(--pm-200);
  color: var(--bg-primary);
  border-color: var(--pm-200);
}

.crew-toggle {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: 3px;
  border-radius: var(--radius-md);
}

.crew-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.crew-btn:hover { color: var(--text-primary); }

.crew-btn.active.am {
  background: linear-gradient(135deg, var(--am-500), var(--am-600));
  color: white;
  box-shadow: 0 2px 8px rgba(230, 168, 23, 0.25);
}

.crew-btn.active.pm {
  background: linear-gradient(135deg, var(--pm-500), var(--pm-600));
  color: white;
  box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
}

.crew-btn.active.both {
  background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
  color: white;
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.25);
}

/* ─── Main Content ──────────────────────────────────────── */
.main-content {
  padding: var(--space-6);
  max-width: 1400px;
  margin: 0 auto;
}

.page-title {
  font-size: var(--font-2xl);
  font-weight: 700;
  margin-bottom: var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

/* ─── Cards ────────────────────────────────────────────── */
.card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--glass-shadow);
  overflow: hidden;
}

.card-header {
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-header h2 {
  font-size: var(--font-lg);
  font-weight: 600;
}

.card-header h3 {
  font-size: var(--font-base);
  font-weight: 600;
}

.card-body {
  padding: var(--space-5);
}

.card-footer {
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: flex-end;
  gap: var(--space-3);
}

/* ─── Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  font-family: var(--font-family);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
  color: white;
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.3);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-400), var(--primary-500));
  box-shadow: 0 4px 12px rgba(13, 132, 208, 0.4);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-tertiary);
  border-color: var(--border-default);
  color: var(--text-primary);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--border-strong);
}

.btn-danger {
  background: rgba(248, 113, 113, 0.1);
  border-color: rgba(248, 113, 113, 0.2);
  color: var(--status-red);
}

.btn-danger:hover {
  background: rgba(248, 113, 113, 0.2);
  border-color: rgba(248, 113, 113, 0.4);
}

.btn-warning {
  background: rgba(245, 158, 11, 0.1);
  border-color: rgba(245, 158, 11, 0.2);
  color: var(--status-amber);
}

.btn-warning:hover {
  background: rgba(245, 158, 11, 0.2);
  border-color: rgba(245, 158, 11, 0.4);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn-sm {
  padding: var(--space-1) var(--space-3);
  font-size: var(--font-xs);
}

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}

.btn-am {
  background: linear-gradient(135deg, var(--am-500), var(--am-600));
  color: white;
}

.btn-pm {
  background: linear-gradient(135deg, var(--pm-500), var(--pm-600));
  color: white;
}

.btn-success {
  background: linear-gradient(135deg, var(--status-green), #1ba885);
  color: white;
}

.btn:disabled, button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}


/* ─── Form Controls ────────────────────────────────────── */
.form-group {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.form-label {
  font-size: var(--font-sm);
  font-weight: 500;
  color: var(--text-secondary);
}

.form-input,
.form-select {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--font-sm);
  transition: all var(--transition-fast);
  outline: none;
}

.form-input:focus,
.form-select:focus {
  border-color: var(--primary-500);
  box-shadow: 0 0 0 3px rgba(13, 132, 208, 0.15);
}

.form-input::placeholder {
  color: var(--text-tertiary);
}

.form-row {
  display: flex;
  gap: var(--space-3);
  align-items: flex-end;
}

.form-inline {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

/* ─── Radio/Toggle group ─────────────────────────────── */
.radio-group {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: 3px;
  border-radius: var(--radius-sm);
}

.radio-option {
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.radio-option:hover { color: var(--text-primary); }

.radio-option.active {
  background: var(--primary-600);
  color: white;
}

.radio-option.active.am {
  background: var(--am-600);
}

.radio-option.active.pm {
  background: var(--pm-600);
}

/* ─── Weekly Grid (Schedule Tab) ───────────────────────── */
.schedule-layout {
  display: flex;
  gap: var(--space-6);
}

.schedule-grid-container {
  flex: 1;
  overflow-x: auto;
}

.guard-roster-panel {
  width: 180px;
  flex-shrink: 0;
}

.weekly-grid {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
}

.weekly-grid th:first-child {
  width: 118px;
}

.weekly-grid th {
  padding: var(--space-3);
  font-size: var(--font-xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-align: center;
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 2;
}

.weekly-grid td {
  padding: var(--space-1);
  vertical-align: top;
}

.weekly-grid .guard-name-cell {
  padding: var(--space-2) var(--space-3);
  font-size: var(--font-sm);
  font-weight: 500;
  white-space: nowrap;
  position: sticky;
  left: 0;
  background: var(--bg-secondary);
  z-index: 1;
  width: 118px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.crew-section-header {
  padding: var(--space-2) var(--space-3);
  font-size: var(--font-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 2px solid;
}

.crew-section-header.am {
  color: var(--am-400);
  border-color: var(--am-500);
  background: rgba(230, 168, 23, 0.05);
}

.crew-section-header.pm {
  color: var(--pm-400);
  border-color: var(--pm-500);
  background: rgba(124, 58, 237, 0.05);
}

.shift-cell {
  min-width: 90px;
  min-height: 88px;
  box-sizing: border-box;
  padding: var(--space-2);
  border: 1px dashed var(--border-subtle);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: var(--font-xs);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.shift-cell:hover {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.05);
}

.shift-cell.has-shift {
  border-style: solid;
  border-color: var(--border-default);
  background: var(--bg-tertiary);
}

.shift-cell .shift-time {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 0.82rem;
}

.shift-duration {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: rgba(125, 211, 252, 0.12);
  color: #7dd3fc;
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 600;
}

.shift-cell .lesson-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--status-amber-bg);
  color: var(--status-amber);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 600;
}

.shift-cell .break-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--status-blue-bg);
  color: var(--status-blue);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 600;
}

/* ─── Guard Roster ─────────────────────────────────────── */
.guard-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-2);
  transition: all var(--transition-fast);
}

.guard-chip:hover {
  border-color: var(--border-default);
  background: var(--bg-hover);
}

.guard-chip .guard-info {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  /* Allow this section to shrink so a long name wraps instead of pushing
     the action buttons off the edge of the chip. */
  flex: 1 1 auto;
  min-width: 0;
}

/* The text column grows to fill the space left of the action buttons (so
   short names never collapse) while min-width:0 lets it stay within bounds so
   a very long name wraps instead of overflowing. */
.guard-chip .guard-chip-text {
  flex: 1;
  min-width: 0;
}

.guard-chip .guard-chip-name-row {
  min-width: 0;
}

/* Keep the crew badge intact next to a wrapping name. */
.guard-chip .guard-name + .crew-badge {
  flex-shrink: 0;
}

.guard-chip .guard-avatar {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-xs);
  font-weight: 700;
  color: white;
  /* Never let the avatar collapse when the name is long. */
  flex-shrink: 0;
}

.guard-chip .guard-avatar.am {
  background: linear-gradient(135deg, var(--am-500), var(--am-600));
}

.guard-chip .guard-avatar.pm {
  background: linear-gradient(135deg, var(--pm-500), var(--pm-600));
}

.guard-chip .guard-name {
  font-size: var(--font-sm);
  font-weight: 500;
  /* Keep the name on a single line; if it's too long (including a pasted
     payload) it truncates with an ellipsis rather than wrapping vertically
     or pushing the action buttons out of reach. */
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.guard-chip 
.total-hours-badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  font-size: 0.65rem;
  font-weight: 600;
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border-default);
  width: fit-content;
  white-space: nowrap;
}

.total-hours-badge.empty {
  background: transparent;
  color: var(--text-tertiary);
  border: 1px dashed var(--border-subtle);
}

.crew-badge {
  font-size: 0.55rem;
  font-weight: 700;
  padding: 1px 4px;
  border-radius: var(--radius-full);
  text-transform: uppercase;
}

.crew-badge.am {
  background: var(--am-600);
  color: white;
}

.crew-badge.pm {
  background: var(--pm-600);
  color: white;
}

.guard-chip .guard-actions {
  display: flex;
  /* Stack the two action buttons vertically and keep them compact so the
     name has as much horizontal room as possible. */
  flex-direction: column;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition-fast);
  flex-shrink: 0;
  margin-left: var(--space-2);
}

/* Compact, square action buttons. */
.guard-chip .guard-actions .btn {
  width: 20px;
  height: 20px;
  min-width: 20px;
  min-height: 20px;
  padding: 0;
  font-size: 0.65rem;
  line-height: 1;
}

.guard-chip:hover .guard-actions {
  opacity: 1;
}

/* Drag and Drop Roster Ordering Styles */
.guard-chip {
  cursor: grab;
  user-select: none;
}

.guard-chip:active {
  cursor: grabbing;
}

.guard-chip.dragging-guard {
  opacity: 0.4;
  border: 1px dashed var(--primary-500);
  background: var(--bg-secondary);
}

.guard-chip.drag-over-above {
  border-top: 2px solid var(--primary-500) !important;
  transform: translateY(2px);
}

.guard-chip.drag-over-below {
  border-bottom: 2px solid var(--primary-500) !important;
  transform: translateY(-2px);
}

/* ─── Rotation Block Grid ──────────────────────────────── */
.rotation-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: var(--space-6);
}

.block-grid {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.block-row {
  display: grid;
  grid-template-columns: 28px 120px 1fr auto;
  gap: var(--space-3);
  align-items: center;
  padding: var(--space-3) var(--space-4);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
}

.block-row:hover {
  border-color: var(--border-default);
}

.block-row.selected-row {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.06);
}

.block-select-cell {
  display: flex;
  align-items: center;
  justify-content: center;
}

.block-select-checkbox {
  width: 16px;
  height: 16px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-color: transparent;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.block-select-checkbox:checked {
  background-color: var(--primary-500);
  border-color: var(--primary-500);
}

.block-select-checkbox:checked::after {
  content: "✓";
  color: var(--text-primary);
  font-size: 10px;
  font-weight: bold;
}

.block-select-checkbox:hover {
  border-color: var(--primary-400);
  background-color: rgba(255, 255, 255, 0.05);
}

.block-row.closed {
  opacity: 0.4;
  background: var(--bg-secondary);
}

.block-row.double {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.05);
}

.block-time-label {
  font-size: var(--font-xs);
  font-weight: 600;
  color: var(--text-secondary);
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
}

.block-time-label .time-range {
  color: var(--text-primary);
  font-size: var(--font-sm);
}

.block-time-label .interval-tag {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 0.6rem;
  color: var(--primary-400);
}

.block-assignments {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.assignment-slot {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2px;
  padding: 6px 4px;
  background: var(--bg-elevated);
  border: 1px dashed var(--border-default);
  border-radius: var(--radius-sm);
  min-width: 100px;
  min-height: 48px;
  font-size: var(--font-xs);
  position: relative;
  text-align: center;
}

.assignment-slot:hover {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.08);
}

.assignment-slot.filled {
  border-style: solid;
  background: var(--bg-elevated);
}

.assignment-slot .position-label {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-tertiary);
  /* min-width removed */
}

.assignment-slot .assigned-guard {
  font-weight: 500;
  color: var(--text-primary);
}

.assignment-slot.stand .position-label { color: var(--status-green); }
.assignment-slot.door .position-label { color: var(--status-amber); }
.assignment-slot.break-slot .position-label { color: var(--text-tertiary); }

.block-controls {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.guard-count-stepper {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  padding: 2px;
}

.guard-count-stepper button {
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 4px;
  font-size: var(--font-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.guard-count-stepper button:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.guard-count-stepper .count {
  min-width: 20px;
  text-align: center;
  font-size: var(--font-sm);
  font-weight: 700;
}

.block-note {
  padding: var(--space-1) var(--space-2);
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
  font-family: var(--font-family);
  font-size: 0.7rem;
  font-style: italic;
  outline: none;
  width: 100%;
  transition: all var(--transition-fast);
}

.block-note:focus {
  background: var(--bg-tertiary);
  border-color: var(--border-default);
  color: var(--text-primary);
}

/* ─── Stand Time Tracker ───────────────────────────────── */
.tracker-panel {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.stand-time-bar-container {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
}

/* Let credit tooltips/popovers escape the card (which is overflow:hidden). */
.daily-tracker-card { overflow: visible; }

/* Daily tracker sort chips */
.tracker-sort {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.tracker-sort-btn {
  font-size: 0.7rem;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-subtle);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.tracker-sort-btn:hover {
  border-color: var(--border-default);
  color: var(--text-primary);
}
.tracker-sort-btn.active {
  background: var(--accent-primary, #3b82f6);
  color: #fff;
  border-color: transparent;
}

/* ── Credit hover tooltip ───────────────────────────────── */
.credit-tip { position: relative; display: inline-flex; align-items: center; cursor: help; }
.credit-tip > .credit-pop {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 6px);
  transform: translateX(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.12s ease;
  z-index: 100;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}
.credit-tip:hover > .credit-pop,
.credit-tip:focus-within > .credit-pop { opacity: 1; visibility: visible; }
/* Right-anchored, multi-line variant for the overall percentage breakdown. */
.credit-tip.credit-tip-right > .credit-pop {
  left: auto;
  right: 0;
  bottom: auto;
  top: calc(100% + 6px);
  transform: none;
  white-space: normal;
  width: max-content;
  max-width: 300px;
  text-align: left;
  line-height: 1.55;
}
.credit-pop .credit-pop-total {
  border-top: 1px solid var(--border-subtle);
  margin-top: 5px;
  padding-top: 5px;
  font-weight: 600;
  color: var(--text-primary);
}

.stand-time-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stand-time-header .guard-label {
  font-size: var(--font-sm);
  font-weight: 500;
}

.percentage-label {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.1;
}

.stand-time-track {
  height: 8px;
  background: var(--bg-elevated);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.stand-time-fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width var(--transition-slow);
  min-width: 2px;
}

.stand-time-fill.green {
  background: linear-gradient(90deg, var(--status-green), #1ba885);
}

.stand-time-fill.amber {
  background: linear-gradient(90deg, var(--status-amber), #d97706);
}

.stand-time-fill.blue {
  background: linear-gradient(90deg, var(--status-blue), #0ea5e9);
}

.stand-time-detail {
  font-size: 0.65rem;
  color: var(--text-tertiary);
}

/* ─── Weekly Tracker Table ─────────────────────────────── */
.weekly-tracker-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: var(--font-xs);
}

.weekly-tracker-table th {
  padding: var(--space-2) var(--space-3);
  text-align: center;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-subtle);
}

.weekly-tracker-table td {
  padding: var(--space-2) var(--space-3);
  text-align: center;
  border-bottom: 1px solid var(--border-subtle);
}

.weekly-tracker-table td.guard-name {
  text-align: left;
  font-weight: 500;
}

.percentage-cell {
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.7rem;
}

.percentage-cell.green { background: var(--status-green-bg); color: var(--status-green); }
.percentage-cell.amber { background: var(--status-amber-bg); color: var(--status-amber); }
.percentage-cell.blue { background: var(--status-blue-bg); color: var(--status-blue); }
.percentage-cell.red { background: var(--status-red-bg); color: var(--status-red); }
.percentage-cell.none { color: var(--text-tertiary); }

/* ─── Weekly Raw Time Table ────────────────────────────── */
.weekly-raw-tracker-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: var(--font-xs);
}

.weekly-raw-tracker-table th {
  padding: var(--space-2) var(--space-3);
  text-align: center;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-subtle);
}

.weekly-raw-tracker-table td {
  padding: var(--space-2) var(--space-3);
  text-align: center;
  border-bottom: 1px solid var(--border-subtle);
}

.weekly-raw-tracker-table td.guard-name {
  text-align: left;
  font-weight: 500;
}

.raw-time-grid {
  display: inline-flex;
  flex-direction: column;
  gap: 2px;
  align-items: flex-start;
  padding: 4px var(--space-3);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border-subtle);
  min-width: 80px;
}

.raw-time-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--text-secondary);
  line-height: 1.2;
}

.raw-time-item.faded {
  opacity: 0.3;
}

.raw-time-item .icon {
  font-size: 0.75rem;
  width: 14px;
  text-align: center;
}

.raw-time-item.stand .icon {
  color: var(--primary-300);
}

.raw-time-item.door .icon {
  color: var(--pm-300);
}

.raw-time-item.lessons .icon {
  color: var(--status-amber);
}

.raw-time-item .value {
  font-weight: 600;
  color: var(--text-primary);
}

.raw-time-item.faded .value {
  color: var(--text-tertiary);
}

/* ─── Settings Panel ───────────────────────────────────── */
.settings-grid {
  column-count: 2;
  column-gap: var(--space-6);
}

/* Sections are transparent wrappers so every card shares ONE balanced column
   flow — cards pack into both columns instead of one column running long while
   the other sits empty. */
.settings-section {
  display: contents;
}

.settings-grid .card {
  break-inside: avoid;
  -webkit-column-break-inside: avoid;
  page-break-inside: avoid;
  margin: 0 0 var(--space-4) 0;
}

.setting-item {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.setting-item label {
  font-size: var(--font-sm);
  font-weight: 500;
  color: var(--text-secondary);
}

.setting-item .setting-description {
  font-size: var(--font-xs);
  color: var(--text-tertiary);
}

.segmented-control {
  display: flex;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}

.segmented-control button {
  flex: 1;
  padding: var(--space-2);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  border-radius: 4px;
  transition: all var(--transition-fast);
}

.segmented-control button:hover { color: var(--text-primary); }

.segmented-control button.active {
  background: var(--primary-600);
  color: white;
}

.note-template-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.note-template-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  font-size: var(--font-xs);
  color: var(--text-secondary);
}

.note-template-chip .remove-btn {
  width: 16px;
  height: 16px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  transition: all var(--transition-fast);
}

.note-template-chip .remove-btn:hover {
  background: var(--status-red-bg);
  color: var(--status-red);
}

/* ─── Modal ────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  min-width: 380px;
  max-width: 500px;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-header {
  padding: var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 {
  font-size: var(--font-lg);
  font-weight: 600;
}

.modal-body {
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.modal-footer {
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: flex-end;
  gap: var(--space-3);
}

/* ─── Toast ────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: var(--space-6);
  right: var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  z-index: 300;
}

.toast {
  padding: var(--space-3) var(--space-5);
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  font-size: var(--font-sm);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  max-width: 400px;
}

.toast.success { border-left: 3px solid var(--status-green); }
.toast.warning { border-left: 3px solid var(--status-amber); }
.toast.error { border-left: 3px solid var(--status-red); }
.toast.info { border-left: 3px solid var(--primary-400); }

.toast.exiting {
  animation: slideOutRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* ─── Closed/Break pill ────────────────────────────────── */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 0.65rem;
  font-weight: 600;
}

.status-pill.closed {
  background: var(--status-red-bg);
  color: var(--status-red);
}

.status-pill.double {
  background: var(--status-blue-bg);
  color: var(--status-blue);
}

.status-pill.break {
  background: var(--bg-elevated);
  color: var(--text-tertiary);
}

/* ─── Empty States ────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-12);
  text-align: center;
  color: var(--text-tertiary);
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: var(--space-4);
  opacity: 0.5;
}

.empty-state h3 {
  font-size: var(--font-lg);
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
}

.empty-state p {
  font-size: var(--font-sm);
  max-width: 400px;
}

/* ─── Animations ───────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(100px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideOutRight {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(100px); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ─── Drag and Drop ────────────────────────────────────── */
.dragging {
  opacity: 0.5;
  cursor: grabbing;
}

.drop-target {
  outline: 2px dashed var(--primary-500);
  outline-offset: 2px;
}

.drop-target.over {
  background: rgba(13, 132, 208, 0.1);
}

/* ─── Print Styles ─────────────────────────────────────── */
@media print {
  body::before { display: none; }
  .nav-bar, .sub-nav, .toast-container, .btn, .form-input { display: none !important; }

  body {
    background: white;
    color: black;
    font-size: 10pt;
  }

  .card {
    background: white;
    border: 1px solid #ccc;
    box-shadow: none;
    backdrop-filter: none;
  }

  .block-row {
    background: white;
    border: 1px solid #ddd;
  }

  .main-content {
    padding: 0;
    max-width: none;
  }
}

/* ─── Responsive ───────────────────────────────────────── */
@media (max-width: 1023px) {
  .rotation-layout {
    grid-template-columns: 1fr;
  }

  .schedule-layout {
    flex-direction: column-reverse;
  }

  .guard-roster-panel {
    width: 100%;
  }

  .settings-grid {
    column-count: 1;
  }
}

@media (max-width: 767px) {
  .nav-bar {
    flex-wrap: wrap;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
  }

  .nav-tabs {
    order: 3;
    width: 100%;
    overflow-x: auto;
  }

  .nav-meta { display: none; }

  .sub-nav {
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-3);
  }

  .day-selector {
    width: 100%;
    overflow-x: auto;
  }

  .main-content {
    padding: var(--space-3);
  }

  .modal {
    min-width: auto;
    margin: var(--space-3);
    max-width: calc(100vw - var(--space-6));
  }

  .schedule-grid-container {
    overflow-x: auto;
  }

  .block-row {
    grid-template-columns: 1fr;
    gap: var(--space-2);
  }
}

/* ─── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--bg-hover);
  border-radius: var(--radius-full);
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}

/* ─── Utility Classes ──────────────────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: var(--space-1); }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.gap-4 { gap: var(--space-4); }
.gap-6 { gap: var(--space-6); }
.mt-2 { margin-top: var(--space-2); }
.mt-4 { margin-top: var(--space-4); }
.mt-6 { margin-top: var(--space-6); }
.mb-2 { margin-bottom: var(--space-2); }
.mb-4 { margin-bottom: var(--space-4); }
.text-sm { font-size: var(--font-sm); }
.text-xs { font-size: var(--font-xs); }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.font-semibold { font-weight: 600; }
.w-full { width: 100%; }
.hidden { display: none !important; }

/* --- LESSONS CALENDAR ------------------------------------------ */

.lessons-calendar-wrapper {
  display: flex;
  overflow-x: auto;
  min-height: 400px;
  background: var(--surface-200);
}

.lesson-time-axis {
  width: 60px;
  flex-shrink: 0;
  border-right: 1px solid var(--border-light);
  background: var(--surface-100);
  display: flex;
  flex-direction: column;
}

.lesson-time-header {
  height: 40px;
  border-bottom: 1px solid var(--border-light);
}

.time-axis-slot {
  height: 48px;
  box-sizing: border-box;
  text-align: right;
  padding-right: 8px;
  font-size: 0.75rem;
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.lesson-days-container {
  display: flex;
  flex: 1;
}

.lesson-day-col {
  flex: 1;
  min-width: 120px;
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
}

.lesson-day-header {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  border-bottom: 1px solid var(--border-light);
  background: var(--surface-100);
  position: sticky;
  top: 0;
  z-index: 10;
}

.lesson-day-grid {
  position: relative;
  flex: 1;
}

.lesson-grid-slot {
  height: 48px;
  box-sizing: border-box;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.2s;
}
.lesson-grid-slot:hover {
  background: rgba(255,255,255,0.05);
}

.lesson-card {
  position: absolute;
  left: 4px;
  right: 4px;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.75rem;
  color: #000;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  z-index: 5;
}

.lesson-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  margin-bottom: 2px;
}

.lesson-sync-status {
  font-size: 10px;
}

.lesson-card-time {
  opacity: 0.8;
}

.lesson-card-notes {
  margin-top: 4px;
  font-style: italic;
  opacity: 0.8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}


/* --- PRINT / PDF EXPORT ------------------------------------------ */
@media print {
  @page {
    size: landscape;
    margin: 8pt;
  }
  body {
    background: #fff !important;
    color: #000 !important;
  }
  .nav-tabs, .btn, .card-header span, .card-header button, .guard-roster-panel {
    display: none !important;
  }
  .main-content {
    padding: 0 !important;
    margin: 0 !important;
  }
  .card {
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    margin: 0 !important;
    padding: 0 !important;
  }
  .schedule-layout {
    display: block !important;
  }
  .weekly-grid-table {
    width: 100% !important;
    border-collapse: collapse !important;
    table-layout: fixed !important;
  }
  .weekly-grid-table th, .weekly-grid-table td {
    border: 1px solid #000 !important;
    padding: 4px !important;
    background: transparent !important;
    color: #000 !important;
  }
  .weekly-grid-table th {
    font-size: 10pt !important;
    font-weight: bold !important;
    background: #f0f0f0 !important;
  }
  /* The first column is Guard Name */
  .weekly-grid-table th:first-child,
  .weekly-grid-table td:first-child {
    width: 25mm !important;
  }
  /* The rest 6 day columns */
  .weekly-grid-table th:not(:first-child),
  .weekly-grid-table td:not(:first-child) {
    width: 44.4mm !important;
  }
  
  .guard-cell {
    font-size: 10pt !important;
    font-weight: bold !important;
    color: #000 !important;
  }
  .shift-cell {
    font-size: 8pt !important;
    color: #000 !important;
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    justify-content: center !important;
    min-height: auto !important;
  }
  .shift-time, .shift-duration, .lesson-badge, .break-badge {
    color: #000 !important;
  }
  .shift-cell .text-tertiary {
    display: none !important; /* Hide "+ Add" */
  }
}



/* Dropdown Styles for Assignment Slot */
.assignment-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  z-index: 1000;
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: var(--glass-shadow);
  min-width: 160px;
  max-height: 250px;
  overflow-y: auto;
  margin-top: 4px;
  padding: 4px 0;
}

.assignment-option {
  padding: 6px 12px;
  font-size: var(--font-sm);
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.assignment-option:not(.ineligible):not(.clear):hover {
  background: var(--primary-600);
}

.assignment-option.clear {
  color: var(--status-red);
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 4px;
}
.assignment-option.clear:hover {
  background: rgba(248, 113, 113, 0.1);
}

.assignment-option.ineligible {
  color: var(--text-tertiary);
  cursor: default;
}

.assignment-option .reason-label {
  font-size: 0.65rem;
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 12px;
  margin-left: 8px;
  white-space: nowrap;
}

.assignment-option .time-since-indicator {
  font-size: 0.65rem;
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.08);
  padding: 2px 6px;
  border-radius: 12px;
  margin-left: 8px;
  white-space: nowrap;
}

.assignment-option .shift-start-badge {
  font-size: 0.65rem;
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.08);
  padding: 2px 6px;
  border-radius: 12px;
  margin-left: 6px;
  white-space: nowrap;
}



/* ─── Mobile Read-Only Portal ───────────────────────────── */
.read-only-header {
  background: linear-gradient(135deg, rgba(30, 32, 48, 0.95), rgba(15, 17, 23, 0.95)) !important;
  padding: var(--space-4) var(--space-6) !important;
}

.read-only-header .view-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--status-blue);
  background: var(--status-blue-bg);
  border: 1px solid rgba(56, 189, 248, 0.2);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

.search-card {
  background: linear-gradient(135deg, rgba(22, 24, 34, 0.75), rgba(30, 32, 48, 0.75));
  border: 1px solid rgba(255, 255, 255, 0.06);
}

.block-grid.read-only .block-row {
  padding: var(--space-4);
  display: grid;
  grid-template-columns: 180px 1fr;
  align-items: center;
  border-bottom: 1px solid var(--border-subtle);
  gap: var(--space-4);
}

@media (max-width: 768px) {
  .block-grid.read-only .block-row {
    grid-template-columns: 1fr;
    gap: var(--space-2);
  }
}

.assignment-slot.read-only {
  cursor: default !important;
  pointer-events: none;
  box-shadow: none !important;
  transform: none !important;
}

.timeline-list {
  position: relative;
  padding-left: var(--space-4);
  margin-left: var(--space-2);
  border-left: 2px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  gap: var(--space-5);
}

.timeline-item {
  position: relative;
  display: grid;
  grid-template-columns: 150px 140px 1fr;
  align-items: center;
  gap: var(--space-4);
}

@media (max-width: 768px) {
  .timeline-item {
    grid-template-columns: 1fr;
    gap: 6px;
    padding-bottom: var(--space-4);
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }
  .timeline-item:last-child {
    border-bottom: none;
  }
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -25px; /* -16px padding + -9px offset */
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-tertiary);
  border: 2px solid var(--bg-primary);
  z-index: 2;
}

@media (max-width: 768px) {
  .timeline-item::before {
    top: 14px;
    transform: none;
  }
}

.timeline-item.stand::before {
  background: var(--primary-500);
  box-shadow: 0 0 8px var(--primary-500);
}

.timeline-item.door::before {
  background: var(--pm-500);
  box-shadow: 0 0 8px var(--pm-500);
}

.timeline-item.lessons::before {
  background: var(--status-amber);
  box-shadow: 0 0 8px var(--status-amber);
}

.timeline-item.break::before {
  background: var(--text-tertiary);
}

.timeline-time {
  font-size: var(--font-sm);
  font-weight: 700;
  color: var(--text-primary);
}

.timeline-badge-container {
  display: flex;
}

.timeline-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  min-width: 120px;
  text-align: center;
}

.timeline-badge.stand {
  background: rgba(13, 132, 208, 0.15);
  color: var(--primary-300);
  border: 1px solid rgba(13, 132, 208, 0.3);
}

.timeline-badge.door {
  background: rgba(124, 58, 237, 0.15);
  color: var(--pm-300);
  border: 1px solid rgba(124, 58, 237, 0.3);
}

.timeline-badge.lessons {
  background: var(--status-amber-bg);
  color: var(--status-amber);
  border: 1px solid rgba(245, 158, 11, 0.3);
}

.timeline-badge.break {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
}

.timeline-details {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.timeline-desc {
  font-size: var(--font-sm);
  color: var(--text-secondary);
}

.timeline-note {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  font-style: italic;
}

.read-only-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(0deg, rgba(15, 17, 23, 0.95) 0%, rgba(22, 24, 34, 0.9) 100%);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--glass-border);
  padding: var(--space-3) var(--space-6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
}

.read-only-content {
  margin-bottom: 72px; /* Avoid footer overlay */
}
.footer-actions {
  display: flex;
  gap: var(--space-3);
}

/* ─── Block Re-division Styles ───────────────────────── */

.selection-floating-bar {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 800px;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(22, 28, 45, 0.9);
  border: 1px solid var(--primary-500);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: slideUpFloatingBar 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.selection-info {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.selection-count {
  font-size: var(--font-sm);
  color: var(--text-primary);
}

.selection-details {
  font-size: var(--font-xs);
  color: var(--text-tertiary);
}

.selection-actions {
  display: flex;
  gap: var(--space-2);
}

@keyframes slideUpFloatingBar {
  from {
    opacity: 0;
    transform: translate(-50%, 20px);
  }
  to {
    opacity: 1;
    transform: translate(-50%, 0);
  }
}


.divide-preview-list {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: var(--space-2);
  margin-top: var(--space-2);
}

.divide-preview-item {
  font-size: var(--font-xs);
  color: var(--text-secondary);
}

/* ─── Lessons Tab Calendar Grid & Modal Styles ───────── */

.lessons-layout {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.lessons-header-bar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-strong);
  padding: var(--space-4) var(--space-6);
}

/* ── Lessons guard filter strip (replaces the Filter Guard dropdown) ── */
.lesson-guard-strip {
  display: flex;
  gap: 8px;
  align-items: stretch;
  overflow-x: auto;
  padding: 10px var(--space-6);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
}
.lesson-guard-chip {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  min-width: 64px;
  max-width: 130px;
  padding: 6px 10px 7px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.lesson-guard-chip:hover {
  border-color: var(--border-default);
  color: var(--text-primary);
}
.lesson-guard-chip.active {
  border-color: var(--accent-primary, #3b82f6);
  background: var(--bg-hover);
  color: var(--text-primary);
}
.lesson-guard-chip .lgc-name {
  font-size: 0.78rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 110px;
}
.lesson-guard-chip .lgc-pill {
  width: 100%;
  height: 6px;
  border-radius: var(--radius-full);
  background: var(--border-default);
}
.lesson-guard-chip .lgc-pill-all {
  background: linear-gradient(90deg, #3b82f6, #2dd4a8, #9a6a3a);
}

/* ── Lesson hover popup ── */
.lesson-hover-tip {
  position: fixed;
  display: none;
  z-index: 9999;
  min-width: 190px;
  max-width: 280px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.5;
  pointer-events: none;
}
.lesson-hover-tip .lht-head {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 5px;
}
.lesson-hover-tip .lht-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}
.lesson-hover-tip .lht-row { margin-top: 3px; }
.lesson-hover-tip .lht-dim { color: var(--text-tertiary); }

.week-navigator {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  padding: 2px 8px;
}

.week-label {
  font-weight: 600;
  font-size: var(--font-sm);
  color: var(--text-primary);
  min-width: 180px;
  text-align: center;
  user-select: none;
  cursor: pointer;
  transition: color var(--transition-fast);
}
.week-label:hover {
  color: var(--primary-400);
}

.calendar-container {
  background: var(--bg-primary);
}

.calendar-header-row {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-strong);
}

.time-axis-header {
  border-right: 1px solid var(--border-subtle);
}

.day-column-header {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-right: 1px solid var(--border-subtle);
}

.day-column {
  background: var(--bg-primary);
  border-right: 1px solid var(--border-subtle);
}

.calendar-grid-slot {
  height: 50px;
  border-bottom: 1px solid var(--border-subtle);
}

.calendar-grid-slot:hover {
  background: rgba(255, 255, 255, 0.02);
}

.calendar-grid-slot.drag-over {
  background: rgba(255, 255, 255, 0.08) !important;
  border: 1px dashed rgba(255, 255, 255, 0.3) !important;
}

/* Lesson Cards styling */
.lesson-card {
  transition: all var(--transition-fast);
}

.lesson-card.drag-over {
  border: 1px dashed rgba(255, 255, 255, 0.8) !important;
  box-shadow: 0 0 0 2px var(--accent-color, #3b82f6) !important;
}

.lesson-card.dragging {
  opacity: 0.4;
  transform: scale(0.98);
}

.lesson-card.am-lesson {
  background: linear-gradient(135deg, rgba(230, 168, 23, 0.35) 0%, rgba(230, 168, 23, 0.15) 100%);
  border-left: 3px solid var(--am-500) !important;
  color: var(--am-100);
}

.lesson-card.pm-lesson {
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.35) 0%, rgba(124, 58, 237, 0.15) 100%);
  border-left: 3px solid var(--pm-500) !important;
  color: var(--pm-100);
