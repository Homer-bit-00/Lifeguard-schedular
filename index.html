            </div>

            <!-- Body container -->
            <div class="calendar-body" style="display: flex; flex: 1; overflow-y: auto; position: relative;">
              
              <!-- Left side time axis -->
              <div class="time-axis-column" style="width: 80px; flex-shrink: 0; background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; position: relative; height: ${timeSlots.length * cellHeight}px;">
                ${timeSlots.map(time => `
                  <div class="time-axis-label" style="height: ${cellHeight}px; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; font-size: 0.75rem; color: var(--text-tertiary); border-bottom: 1px dashed rgba(255,255,255,0.03);">
                    ${formatTime(time)}
                  </div>
                `).join('')}
              </div>

              <!-- Day Columns -->
              <div class="day-columns-container" style="display: flex; flex: 1; position: relative; height: ${timeSlots.length * cellHeight}px;">
                ${days.map(day => {
                  const positioned = getPositionedLessons(lessonsToRender, day, earliest, latest);
                  
                  return `
                    <div class="day-column" style="flex: 1; min-width: 100px; position: relative; border-right: 1px solid var(--border-subtle); background: var(--bg-primary); display: flex; flex-direction: column; height: ${timeSlots.length * cellHeight}px;">
                      
                      <!-- Background Grid Slots -->
                      ${timeSlots.map(time => `
                        <div class="calendar-grid-slot" 
                             onclick="window.__openAddLessonModalAt('${day}', '${time}')"
                             ondragover="window.__onLessonDragOver(event)"
                             ondragleave="window.__onLessonDragLeave(event)"
                             ondrop="window.__onLessonDrop(event, '${day}', '${time}')"
                             style="height: ${cellHeight}px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; transition: background 0.15s;"
                             title="Click to add lesson at ${formatTime(time)} on ${day}">
                        </div>
                      `).join('')}

                      <!-- Lesson Cards Overlay -->
                      ${positioned.map(({ lesson, top, height, width, left }) => {
                        const guard = store.getGuardById(lesson.guardId);
                        const guardName = guard ? guard.name : 'Unknown Guard';
                        const crewClass = guard ? (guard.crewSection === 'AM' ? 'am-lesson' : 'pm-lesson') : 'neutral-lesson';
                        
                        return `
                          <div class="lesson-card ${crewClass}" 
                               draggable="true"
                               ondragstart="window.__onLessonDragStart(event, '${lesson.id}')"
                               ondragend="this.classList.remove('dragging')"
                               ondragover="window.__onLessonDragOver(event)"
                               ondragleave="window.__onLessonDragLeave(event)"
                               ondrop="window.__onLessonDrop(event, '${day}', '${lesson.startTime}')"
                               onclick="window.__openEditLessonModal('${lesson.id}', event)"
                               style="position: absolute; top: ${top}%; height: ${height}%; left: ${left}%; width: ${width}%; padding: 6px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; z-index: 10; pointer-events: auto;"
                               title="${guardName} - ${formatTime(lesson.startTime)} (${lesson.durationMinutes}m)\n${lesson.notes}">
                            <div class="lesson-card-header" style="font-weight: 700; font-size: var(--font-xs); line-height: 1.1; margin-bottom: 2px; color: var(--text-primary);">
                              ${guardName}
                            </div>
                            <div class="lesson-card-meta" style="font-size: 0.65rem; color: rgba(255,255,255,0.85); display: flex; justify-content: space-between; align-items: flex-end;">
                              <span>${formatTime(lesson.startTime)}</span>
                              <span>${lesson.durationMinutes}m</span>
                            </div>
                          </div>
                        `;
                      }).join('')}
                    </div>
                  `;
                }).join('')}
              </div>

            </div>

          </div>
        </div>
      </div>
    </div>
  `;
}

function showLessonModal(lessonToEditId = null, prefilledDay = null, prefilledTime = null) {
  const state = store.getState();
  const guards = state.guards;
  
  let lessonToEdit = null;
  if (lessonToEditId) {
    lessonToEdit = state.lessons.find(l => l.id === lessonToEditId);
  }

  const selectedGuardId = lessonToEdit ? lessonToEdit.guardId : '';
  const selectedGuard = selectedGuardId ? store.getGuardById(selectedGuardId) : null;
  const initialSearchVal = selectedGuard ? selectedGuard.name : '';
  
  const day = lessonToEdit ? lessonToEdit.day : (prefilledDay || 'Monday');
  const duration = lessonToEdit ? lessonToEdit.durationMinutes : 30;
  const notes = lessonToEdit ? lessonToEdit.notes : '';
  
  const modalDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
  if (!state.settings?.lessonsExcludeSaturday) {
    modalDays.push('Saturday');
  }
  
  let startTimeValue = '09:00';
  if (lessonToEdit) {
    startTimeValue = lessonToEdit.startTime;
  } else if (prefilledTime) {
    startTimeValue = prefilledTime;
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'lesson-modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${lessonToEdit ? '✏️ Edit Lesson' : '🎓 Add New Lesson'}</h3>
        <button class="btn btn-ghost btn-icon" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        
        <!-- Guard Dropdown Trigger -->
        <div class="form-group" style="position: relative;">
          <label class="form-label">Staff Member</label>
          <div class="form-input select-trigger" id="lesson-guard-select-trigger" 
               style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none;">
            <span id="lesson-guard-selected-name" style="color: ${selectedGuardId ? 'var(--text-primary)' : 'var(--text-tertiary)'};">
              ${initialSearchVal || 'Select staff member...'}
            </span>
            <span class="select-arrow" style="font-size: 0.7rem; opacity: 0.6; transition: transform var(--transition-fast);">▼</span>
          </div>
          <input type="hidden" id="modal-lesson-guard-id" value="${selectedGuardId}" />
          <div class="guard-dropdown-list" id="guard-dropdown-list" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 4px; box-shadow: var(--glass-shadow);"></div>
        </div>

        <div class="form-row" style="margin-top: 15px;">
          <!-- Day Dropdown -->
          <div class="form-group" style="flex: 1;">
            <label class="form-label">Day</label>
            <select class="form-input" id="modal-lesson-day">
              ${modalDays.map(d => `
                <option value="${d}" ${d === day ? 'selected' : ''}>${d}</option>
              `).join('')}
            </select>
          </div>
          
          <!-- Duration Select -->
          <div class="form-group" style="flex: 1;">
            <label class="form-label">Duration</label>
            <select class="form-input" id="modal-lesson-duration">
              <option value="30" ${duration == 30 ? 'selected' : ''}>30 min</option>
              <option value="45" ${duration == 45 ? 'selected' : ''}>45 min</option>
              <option value="60" ${duration == 60 ? 'selected' : ''}>1 hour</option>
            </select>
          </div>
        </div>

        <!-- Start Time Input -->
        <div class="form-group" style="margin-top: 15px;">
          <label class="form-label">Start Time</label>
          <input type="time" class="form-input" id="modal-lesson-start-time" value="${startTimeValue}" autocomplete="off" />
          <div class="validation-message" id="lesson-time-validation" style="font-size: var(--font-xs); margin-top: 4px;"></div>
        </div>

        <!-- Notes Input -->
        <div class="form-group" style="margin-top: 15px;">
          <label class="form-label">Notes (Optional)</label>
          <input type="text" class="form-input" id="modal-lesson-notes" value="${notes}" placeholder="e.g. Lane 4 - beginners" />
        </div>

        <!-- Copy Lesson to section -->
        <div style="margin-top: 15px; border-top: 1px solid var(--border-subtle); padding-top: 15px;">
          <label class="form-label" style="margin-bottom: 8px; display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);">Copy Lesson to:</label>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); width: 80px; flex-shrink: 0;">This Week:</span>
              <div style="display: flex; gap: 6px; flex-wrap: wrap;" id="modal-day-bubbles-this-week"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); width: 80px; flex-shrink: 0;">Next Week:</span>
              <div style="display: flex; gap: 6px; flex-wrap: wrap;" id="modal-day-bubbles-next-week"></div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 5px;">
              <button class="btn btn-secondary btn-sm" id="modal-lesson-copy-to-btn" style="padding: var(--space-1) var(--space-3); font-size: var(--font-xs);">Copy to Selected</button>
            </div>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        ${lessonToEdit ? `<button class="btn btn-danger btn-sm" id="modal-lesson-delete-btn">Delete Lesson</button>` : ''}
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="modal-lesson-save-btn" disabled>Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  const selectTrigger = document.getElementById('lesson-guard-select-trigger');
  const hiddenGuardId = document.getElementById('modal-lesson-guard-id');
  const dropdownList = document.getElementById('guard-dropdown-list');
  const daySelect = document.getElementById('modal-lesson-day');
  const durationSelect = document.getElementById('modal-lesson-duration');
  const startTimeInput = document.getElementById('modal-lesson-start-time');
  const validationDiv = document.getElementById('lesson-time-validation');
  const saveBtn = document.getElementById('modal-lesson-save-btn');
  const copyToBtn = document.getElementById('modal-lesson-copy-to-btn');

  const updateDayBubbles = () => {
    const currentDay = daySelect.value;
    const bubblesContainerThisWeek = document.getElementById('modal-day-bubbles-this-week');
    const bubblesContainerNextWeek = document.getElementById('modal-day-bubbles-next-week');
    if (!bubblesContainerThisWeek || !bubblesContainerNextWeek) return;

    const dayChars = {
      'Monday': 'M',
      'Tuesday': 'T',
      'Wednesday': 'W',
      'Thursday': 'TH',
      'Friday': 'F',
      'Saturday': 'S'
    };

    const thisWeekStr = getWeekStr(currentWeekStart);
    const nextWeekStart = new Date(currentWeekStart);
    nextWeekStart.setDate(currentWeekStart.getDate() + 7);
    const nextWeekStr = getWeekStr(nextWeekStart);

    const dayIndexMap = {
      'Monday': 0,
      'Tuesday': 1,
      'Wednesday': 2,
      'Thursday': 3,
      'Friday': 4,
      'Saturday': 5,
      'Sunday': 6
    };

    // Render This Week bubbles
    bubblesContainerThisWeek.innerHTML = modalDays.map(d => {
      const char = dayChars[d];
      const dayDate = new Date(currentWeekStart);
      dayDate.setDate(currentWeekStart.getDate() + dayIndexMap[d]);
      const dateNum = dayDate.getDate();
      const label = `${char} (${dateNum})`;
      const isCurrent = d === currentDay;

      if (isCurrent) {
        return `
          <button class="day-bubble current" disabled 
            style="padding: 0 8px; min-width: 44px; height: 32px; border-radius: 16px; border: 1px solid var(--primary-600); background: var(--primary-900); color: white; font-weight: bold; font-size: 0.7rem; cursor: not-allowed; display: flex; align-items: center; justify-content: center; opacity: 0.75;">
            ${label}
          </button>
        `;
      }
      return `
        <button class="day-bubble selectable" data-day="${d}" data-week="${thisWeekStr}"
          onclick="this.classList.toggle('selected'); this.style.background = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--bg-tertiary)'; this.style.color = this.classList.contains('selected') ? 'white' : 'var(--text-secondary)'; this.style.borderColor = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--border-default)';"
          style="padding: 0 8px; min-width: 44px; height: 32px; border-radius: 16px; border: 1px solid var(--border-default); background: var(--bg-tertiary); color: var(--text-secondary); font-weight: bold; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);">
          ${label}
        </button>
      `;
    }).join('');

    // Render Next Week bubbles
    bubblesContainerNextWeek.innerHTML = modalDays.map(d => {
      const char = dayChars[d];
      const dayDateNext = new Date(nextWeekStart);
      dayDateNext.setDate(nextWeekStart.getDate() + dayIndexMap[d]);
      const dateNumNext = dayDateNext.getDate();
      const labelNext = `${char} (${dateNumNext})`;

      return `
        <button class="day-bubble selectable" data-day="${d}" data-week="${nextWeekStr}"
          onclick="this.classList.toggle('selected'); this.style.background = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--bg-tertiary)'; this.style.color = this.classList.contains('selected') ? 'white' : 'var(--text-secondary)'; this.style.borderColor = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--border-default)';"
          style="padding: 0 8px; min-width: 44px; height: 32px; border-radius: 16px; border: 1px solid var(--border-default); background: var(--bg-tertiary); color: var(--text-secondary); font-weight: bold; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);">
          ${labelNext}
        </button>
      `;
    }).join('');
  };

  updateDayBubbles();

  const checkConflicts = (gId, currentDay, parsedStart24, durMins, w) => {
    if (!parsedStart24) return { hasConflict: false, reason: '' };

    const startMin = timeToMinutes(parsedStart24);
    const endMin = startMin + durMins;

    // 1. Shift check
    const shift = store.getShift(gId, currentDay, w);
    if (!shift) {
      return { hasConflict: true, reason: 'not on shift' };
    }
    const shiftStart = shift.startTime ? timeToMinutes(shift.startTime) : 0;
    const shiftEnd = shift.endTime ? timeToMinutes(shift.endTime) : 0;
    if (startMin < shiftStart || endMin > shiftEnd) {
      return { hasConflict: true, reason: 'exceeds shift' };
    }

    // 2. Lesson overlap check
    const hasLessonOverlap = (state.lessons || []).some(l => {
      if (lessonToEditId && l.id === lessonToEditId) return false;
      if (l.guardId !== gId || l.day !== currentDay || l.week !== w) return false;
      const lStart = timeToMinutes(l.startTime);
      const lEnd = timeToMinutes(l.endTime);
      return startMin < lEnd && endMin > lStart;
    });
    if (hasLessonOverlap) {
      return { hasConflict: true, reason: 'teaching' };
    }

    // 3. Rotation block assignment check
    const blocks = store.getBlocksForDay(currentDay, w);
    const overlappingBlocks = [];
    blocks.forEach(block => {
      const blockStart = timeToMinutes(block.startTime);
      const blockEnd = timeToMinutes(block.endTime);
      if (startMin < blockEnd && endMin > blockStart) {
        Object.entries(state.blockAssignments).forEach(([key, assignedGuardId]) => {
          if (assignedGuardId === gId) {
            const bId = extractBlockIdFromAssignmentKey(key);
            if (bId === block.id) {
              const hasWeekSuffix = /\d{4}-\d{2}-\d{2}$/.test(key);
              const matchesWeek = hasWeekSuffix ? key.endsWith(`-${w}`) : (w === getWeekStr(currentWeekStart));
              if (matchesWeek) {
                const parts = key.split('-');
                const position = hasWeekSuffix ? parts[parts.length - 4] : parts[parts.length - 1];
                const label = getPositionLabel(position) || position;
                overlappingBlocks.push(`${label} (${formatTime(block.startTime)}–${formatTime(block.endTime)})`);
              }
            }
          }
        });
      }
    });

    if (overlappingBlocks.length > 0) {
      return { hasConflict: true, reason: 'assigned', details: overlappingBlocks.join(', ') };
    }

    return { hasConflict: false, reason: '' };
  };

  const renderDropdown = () => {
    if (guards.length === 0) {
      dropdownList.innerHTML = `<div style="padding: 10px; font-size: var(--font-xs); color: var(--text-tertiary);">No staff found</div>`;
      return;
    }

    const currentDay = daySelect.value;
    const timeStr = startTimeInput.value;
    const durMins = parseInt(durationSelect.value);
    const parsedStart24 = parseTimeInput(timeStr);
    const w = getWeekStr(currentWeekStart);

    // Compute conflict info for all guards
    const guardsWithConflict = guards.map(g => {
      let hasConflict = false;
      let reason = '';
      let details = '';

      if (parsedStart24) {
        const res = checkConflicts(g.id, currentDay, parsedStart24, durMins, w);
        hasConflict = res.hasConflict;
        reason = res.reason;
        details = res.details || '';
      }

      return { g, hasConflict, reason, details };
    });

    // Sort guards with no conflicts to the top, and alphabetically within each group
    guardsWithConflict.sort((a, b) => {
      if (!a.hasConflict && b.hasConflict) return -1;
      if (a.hasConflict && !b.hasConflict) return 1;
      return a.g.name.localeCompare(b.g.name);
    });

    dropdownList.innerHTML = guardsWithConflict.map(({ g, hasConflict, reason, details }) => {
      const crewBadge = `<span class="badge" style="font-size: 0.6rem; padding: 2px 6px; border-radius: var(--radius-sm); font-weight: bold; background: ${g.crewSection === 'AM' ? 'rgba(230, 168, 23, 0.15)' : 'rgba(124, 58, 237, 0.15)'}; color: ${g.crewSection === 'AM' ? 'var(--am-300)' : 'var(--pm-300)'}; margin-left: 8px;">${g.crewSection}</span>`;

      const currentManualMode = store.getState().manualMode;
      if (currentManualMode) {
        if (hasConflict) {
          const displayLabel = reason === 'assigned' ? `${reason}: ${details}` : reason;
          return `
            <div class="dropdown-item conflict" 
                 onclick="window.__selectLessonGuard('${g.id}', '${g.name}')"
                 style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); transition: background 0.15s;"
                 title="${g.name} has conflict: ${displayLabel}">
              <span>${g.name} ${crewBadge}</span>
              <span class="reason-badge" style="font-size: 0.65rem; color: var(--status-amber); background: var(--status-amber-bg); padding: 2px 6px; border-radius: 12px; margin-left: 8px; font-weight: 500;">${reason}</span>
            </div>
          `;
        } else {
          return `
            <div class="dropdown-item" 
                 onclick="window.__selectLessonGuard('${g.id}', '${g.name}')"
                 style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); transition: background 0.15s;">
              <span>${g.name} ${crewBadge}</span>
            </div>
          `;
        }
      } else {
        if (hasConflict) {
          const displayLabel = reason === 'assigned' ? `${reason}: ${details}` : reason;
          return `
            <div class="dropdown-item ineligible" 
                 style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: not-allowed; border-bottom: 1px solid var(--border-subtle); color: var(--text-tertiary); opacity: 0.5; background: rgba(0,0,0,0.05);"
                 title="${g.name} has conflict: ${displayLabel}">
              <span>${g.name} ${crewBadge}</span>
              <span class="reason-badge" style="font-size: 0.65rem; color: var(--status-red); background: var(--status-red-bg); padding: 2px 6px; border-radius: 12px; margin-left: 8px; font-weight: 500;">${reason}</span>
            </div>
          `;
        } else {
          return `
            <div class="dropdown-item" 
                 onclick="window.__selectLessonGuard('${g.id}', '${g.name}')"
                 style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); transition: background 0.15s;">
              <span>${g.name} ${crewBadge}</span>
            </div>
          `;
        }
      }
    }).join('');
  };

  const closeDropdownOnOutsideClick = (e) => {
    if (!selectTrigger.contains(e.target) && !dropdownList.contains(e.target)) {
      dropdownList.style.display = 'none';
      selectTrigger.classList.remove('open');
      document.removeEventListener('click', closeDropdownOnOutsideClick);
    }
  };

  selectTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = dropdownList.style.display === 'block';
    if (isOpen) {
      dropdownList.style.display = 'none';
      selectTrigger.classList.remove('open');
      document.removeEventListener('click', closeDropdownOnOutsideClick);
    } else {
      dropdownList.style.display = 'block';
      selectTrigger.classList.add('open');
      renderDropdown();
      document.addEventListener('click', closeDropdownOnOutsideClick);
    }
  });

  window.__selectLessonGuard = (id, name) => {
    hiddenGuardId.value = id;
    const selectedNameSpan = document.getElementById('lesson-guard-selected-name');
    if (selectedNameSpan) {
      selectedNameSpan.innerText = name;
      selectedNameSpan.style.color = 'var(--text-primary)';
    }
    dropdownList.style.display = 'none';
    selectTrigger.classList.remove('open');
    document.removeEventListener('click', closeDropdownOnOutsideClick);
    validateShiftBounds();
  };

  const validateShiftBounds = () => {
    const guardId = hiddenGuardId.value;
    const currentDay = daySelect.value;
    const timeStr = startTimeInput.value;
    const durMins = parseInt(durationSelect.value);

    // If dropdown is open, re-render it to update conflict states
    if (dropdownList && dropdownList.style.display === 'block') {
      renderDropdown();
    }

    if (!guardId) {
      validationDiv.innerHTML = `<span style="color: var(--text-tertiary);">Select a staff member</span>`;
      saveBtn.disabled = true;
      if (copyToBtn) copyToBtn.disabled = true;
      return;
    }

    const guard = store.getGuardById(guardId);
    const guardName = guard ? guard.name : 'Unknown Guard';
    const parsedStart24 = parseTimeInput(timeStr);
    
    if (!parsedStart24) {
      validationDiv.innerHTML = `<span style="color: var(--status-red);">❌ Invalid time format</span>`;
      saveBtn.disabled = true;
      if (copyToBtn) copyToBtn.disabled = true;
      return;
    }

    const w = getWeekStr(currentWeekStart);
    const conflictRes = checkConflicts(guardId, currentDay, parsedStart24, durMins, w);
    
    const currentManualMode = store.getState().manualMode;
    if (conflictRes.hasConflict) {
      if (conflictRes.reason === 'not on shift') {
        if (currentManualMode) {
          validationDiv.innerHTML = `<span style="color: var(--status-amber); font-weight: 500;">⚠️ Manual Mode: ${guardName} is not scheduled on ${currentDay} (allowed).</span>`;
          saveBtn.disabled = false;
          if (copyToBtn) copyToBtn.disabled = false;
        } else {
          validationDiv.innerHTML = `<span style="color: var(--status-red);">❌ ${guardName} is not scheduled to work on ${currentDay}.</span>`;
          saveBtn.disabled = true;
          if (copyToBtn) copyToBtn.disabled = true;
        }
      } else if (conflictRes.reason === 'exceeds shift') {
        const shift = store.getShift(guardId, currentDay, w);
        const shiftHours = shift ? ` (${formatTime(shift.startTime || '00:00')} – ${formatTime(shift.endTime || '00:00')})` : '';
        if (currentManualMode) {
          validationDiv.innerHTML = `<span style="color: var(--status-amber); font-weight: 500;">⚠️ Manual Mode: Shift boundary conflict${shiftHours} (allowed).</span>`;
          saveBtn.disabled = false;
          if (copyToBtn) copyToBtn.disabled = false;
        } else {
          validationDiv.innerHTML = `<span style="color: var(--status-red);">❌ Shift boundary conflict. ${guardName}'s shift:${shiftHours}.</span>`;
          saveBtn.disabled = true;
          if (copyToBtn) copyToBtn.disabled = true;
        }
      } else if (conflictRes.reason === 'teaching') {
        if (currentManualMode) {
          validationDiv.innerHTML = `<span style="color: var(--status-amber); font-weight: 500;">⚠️ Manual Mode: Overlaps with another lesson for ${guardName} (allowed).</span>`;
          saveBtn.disabled = false;
          if (copyToBtn) copyToBtn.disabled = false;
        } else {
          validationDiv.innerHTML = `<span style="color: var(--status-red);">❌ Overlaps with another lesson for ${guardName}.</span>`;
          saveBtn.disabled = true;
          if (copyToBtn) copyToBtn.disabled = true;
        }
      } else if (conflictRes.reason === 'assigned') {
        if (currentManualMode) {
          validationDiv.innerHTML = `<span style="color: var(--status-amber); font-weight: 500;">⚠️ Manual Mode: Assigned to lifeguard rotation: ${conflictRes.details} (allowed).</span>`;
          saveBtn.disabled = false;
          if (copyToBtn) copyToBtn.disabled = false;
        } else {
          validationDiv.innerHTML = `<span style="color: var(--status-red);">❌ Assigned to lifeguard rotation: ${conflictRes.details}.</span>`;
          saveBtn.disabled = true;
          if (copyToBtn) copyToBtn.disabled = true;
        }
      }
      return;
    }

    const shift = store.getShift(guardId, currentDay, w);
    const shiftHours = shift ? ` (${formatTime(shift.startTime || '00:00')} – ${formatTime(shift.endTime || '00:00')})` : '';
    validationDiv.innerHTML = `<span style="color: var(--status-green);">✅ Fits inside ${guardName}'s shift${shiftHours}</span>`;
    saveBtn.disabled = false;
    if (copyToBtn) copyToBtn.disabled = false;
  };

  daySelect.addEventListener('change', () => {
    updateDayBubbles();
    validateShiftBounds();
  });
  durationSelect.addEventListener('change', validateShiftBounds);
  startTimeInput.addEventListener('input', validateShiftBounds);
  startTimeInput.addEventListener('change', validateShiftBounds);

  validateShiftBounds();

  const handleSaveOrCopyTo = () => {
    const guardId = hiddenGuardId.value;
    const currentDay = daySelect.value;
    const timeStr = startTimeInput.value;
    const durMins = parseInt(durationSelect.value);
    const notesVal = document.getElementById('modal-lesson-notes').value.trim();

    const parsedStart24 = parseTimeInput(timeStr);
    if (!parsedStart24) return;

    const weekStr = getWeekStr(currentWeekStart);

    // 1. Save/Update on current day
    if (lessonToEdit) {
      store.updateLesson(lessonToEdit.id, {
        guardId,
        day: currentDay,
        startTime: parsedStart24,
        durationMinutes: durMins,
        notes: notesVal
      });
      showToast('Lesson updated successfully', 'success');
    } else {
      store.addOrOverwriteLesson(guardId, currentDay, parsedStart24, durMins, notesVal, weekStr);
      showToast('Lesson added successfully', 'success');
    }

    // 2. Copy to selected days
    const selectedBubbles = overlay.querySelectorAll('.day-bubble.selected');
    const nextWeekStart = new Date(currentWeekStart);
    nextWeekStart.setDate(currentWeekStart.getDate() + 7);
    const nextWeekStr = getWeekStr(nextWeekStart);

    let copiedDays = [];
    let failedDays = [];

    selectedBubbles.forEach(bubble => {
      const targetDay = bubble.dataset.day;
      const targetWeek = bubble.dataset.week;
      const isNextWeek = targetWeek === nextWeekStr;
      const weekLabel = isNextWeek ? 'next week' : 'this week';

      const res = checkConflicts(guardId, targetDay, parsedStart24, durMins, targetWeek);
      const currentManualMode = store.getState().manualMode;
      if (!currentManualMode && res.hasConflict) {
        let displayReason = res.reason;
        if (res.reason === 'assigned') {
          displayReason = 'assigned to rotation';
        } else if (res.reason === 'exceeds shift') {
          displayReason = 'shift boundary conflict';
        }
        failedDays.push(`${targetDay} (${weekLabel} - ${displayReason})`);
        return;
      }

      store.addOrOverwriteLesson(guardId, targetDay, parsedStart24, durMins, notesVal, targetWeek);
      copiedDays.push(`${targetDay} (${weekLabel})`);
    });

    if (copiedDays.length > 0) {
      showToast(`Lesson copied to: ${copiedDays.join(', ')}`, 'success');
    }
    if (failedDays.length > 0) {
      showToast(`Could not copy to: ${failedDays.join(', ')}`, 'warning');
    }

    overlay.remove();
    render();
  };

  document.getElementById('modal-lesson-save-btn').addEventListener('click', handleSaveOrCopyTo);

  if (copyToBtn) {
    copyToBtn.addEventListener('click', () => {
      const selectedBubbles = overlay.querySelectorAll('.day-bubble.selected');
      if (selectedBubbles.length === 0) {
        showToast('Please select at least one day to copy to', 'warning');
        return;
      }
      handleSaveOrCopyTo();
    });
  }

  const deleteBtn = document.getElementById('modal-lesson-delete-btn');
  if (deleteBtn) {
    deleteBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to delete this lesson?')) {
        store.removeLesson(lessonToEdit.id);
        showToast('Lesson removed', 'info');
        overlay.remove();
        render();
      }
    });
  }

  // Expose local functions to window context for unit tests
  window.__validateShiftBounds = validateShiftBounds;
  window.__renderDropdown = renderDropdown;
}

window.__navigateWeek = (daysOffset) => {
  const state = store.getState();
  if (state.isReadOnly && state.sharedWeek) {
    const sharedWeekDate = new Date(state.sharedWeek + 'T00:00:00');
    const targetWeekDate = new Date(currentWeekStart);
    targetWeekDate.setDate(targetWeekDate.getDate() + daysOffset);
    const diffTime = Math.abs(targetWeekDate.getTime() - sharedWeekDate.getTime());
    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
    if (diffDays > 7) {
      return;
    }
  }
  currentWeekStart.setDate(currentWeekStart.getDate() + daysOffset);
  store.setSelectedWeek(getWeekStr(currentWeekStart));
  render();
};

window.__onLessonDrop = (event, targetDay, targetTime) => {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over');

  const lessonId = event.dataTransfer.getData('text/plain');
  if (!lessonId) return;

  const state = store.getState();
  const lesson = state.lessons.find(l => l.id === lessonId);
  if (!lesson) return;

  const guardId = lesson.guardId;
  const guard = store.getGuardById(guardId);
  const guardName = guard ? guard.name : 'Staff';

  const duration = parseInt(lesson.durationMinutes || 30);
  const startMin = timeToMinutes(targetTime);
  const endMin = startMin + duration;

  // Verify shift boundaries if not in manualMode
  if (!state.manualMode) {
    const shift = store.getShift(guardId, targetDay, state.selectedWeek);
    if (!shift) {
      showToast(`Cannot move lesson: ${guardName} does not have a shift on ${targetDay}`, 'error');
      return;
    }
    const shiftStart = shift.startTime ? timeToMinutes(shift.startTime) : 0;
    const shiftEnd = shift.endTime ? timeToMinutes(shift.endTime) : 0;
    if (startMin < shiftStart || endMin > shiftEnd) {
      showToast(`Cannot move lesson: Exceeds ${guardName}'s shift hours (${shift.startTime}-${shift.endTime})`, 'error');
      return;
    }

    // Also check for overlaps with other lessons of the SAME guard (excluding this lesson itself)
    const overlaps = state.lessons.some(l => {
      if (l.id === lessonId || l.guardId !== guardId || l.day !== targetDay || l.week !== state.selectedWeek) return false;
      const lStart = timeToMinutes(l.startTime);
      const lEnd = timeToMinutes(l.endTime);
      return startMin < lEnd && endMin > lStart;
    });

    if (overlaps) {
      showToast(`Cannot move lesson: Overlaps with another lesson for ${guardName}`, 'error');
      return;
    }
  }

  // Update store
  store.updateLesson(lessonId, {
    day: targetDay,
    startTime: targetTime
  });

  showToast(`Moved ${guardName}'s lesson to ${targetDay} ${formatTime(targetTime)}`, 'success');
};

window.__toggleAssignmentDropdown = (e, blockId, position) => {
  e.stopPropagation();
  // Close any existing dropdowns
  document.querySelectorAll('.assignment-dropdown').forEach(d => d.remove());

  const state = store.getState();
  const filteredLessons = getFilteredLessonsForWeek(state);
  const day = state.selectedDay;
  const blocks = store.getBlocksForDay(day);
  const block = blocks.find(b => b.id === blockId);
  if (!block) return;

  const currentAssignedGuardId = store.getAssignment(blockId, position, state.selectedWeek);
  
  // Get guards for the day (filtering by crew if not Both)
  const crew = state.selectedCrew === 'Both' ? null : state.selectedCrew;
  const guards = state.manualMode
    ? [...state.guards].sort((a, b) => a.name.localeCompare(b.name))
    : store.getGuardsWorkingDay(day, crew, state.selectedWeek);
  
  if (guards.length === 0) return;

  const dropdown = document.createElement('div');
  dropdown.className = 'assignment-dropdown';
  
  let html = '';
  
  if (currentAssignedGuardId) {
    html += `<div class="assignment-option clear" onclick="window.__assignGuard('${blockId}', '${position}', null, event)"><i>-- Clear --</i></div>`;
  }

  const guardsWithConflict = guards.map(g => {
    let hasConflict = false;
    let reason = '';

    if (!isGuardAvailableForBlock(g.id, block, state.shifts, day, state.selectedWeek)) {
      hasConflict = true;
      reason = 'not on shift';
    } else if (isGuardTeachingDuringBlock(g.id, block, day, filteredLessons)) {
      hasConflict = true;
      reason = 'teaching';
    } else {
      let assignedOtherPos = false;
      for (const [key, gId] of Object.entries(state.blockAssignments)) {
        if (key.startsWith(blockId + '-') && gId === g.id && key !== `${blockId}-${position}`) {
          assignedOtherPos = true;
          break;
        }
      }
      if (assignedOtherPos) {
        hasConflict = true;
        reason = 'assigned';
      }
    }

    const isCurrent = g.id === currentAssignedGuardId;
    return { g, hasConflict, reason, isCurrent };
  });

  // Sort guards with no conflicts to the top, sorting alphabetically within groups
  guardsWithConflict.sort((a, b) => {
    if (!a.hasConflict && b.hasConflict) return -1;
    if (a.hasConflict && !b.hasConflict) return 1;
    return a.g.name.localeCompare(b.g.name);
  });

  guardsWithConflict.forEach(({ g, hasConflict, reason, isCurrent }) => {
    if (state.manualMode) {
      if (isCurrent) {
        html += `<div class="assignment-option ineligible" onclick="event.stopPropagation()">
                   <span>${g.name}</span>
                   <span class="reason-label">current</span>
                 </div>`;
      } else if (hasConflict) {
        html += `<div class="assignment-option conflict" onclick="window.__assignGuard('${blockId}', '${position}', '${g.id}', event)" style="display: flex; justify-content: space-between; align-items: center;">
                   <span>${g.name}</span>
                   <span class="reason-label" style="font-size: 0.65rem; color: var(--status-amber); background: var(--status-amber-bg); padding: 2px 6px; border-radius: 12px; margin-left: 8px;">${reason}</span>
                 </div>`;
      } else {
        html += `<div class="assignment-option" onclick="window.__assignGuard('${blockId}', '${position}', '${g.id}', event)">${g.name}</div>`;
      }
    } else {
      let isEligible = !hasConflict && !isCurrent;
      let displayReason = isCurrent ? 'current' : reason;
      if (isEligible) {
        html += `<div class="assignment-option" onclick="window.__assignGuard('${blockId}', '${position}', '${g.id}', event)">${g.name}</div>`;
      } else {
        html += `<div class="assignment-option ineligible" onclick="event.stopPropagation()">
                   <span>${g.name}</span>
                   <span class="reason-label">${displayReason}</span>
                 </div>`;
      }
    }
  });

  dropdown.innerHTML = html;
  
  // Position above or below depending on space in viewport to prevent getting cut off
  const rect = e.currentTarget.getBoundingClientRect();
  const spaceBelow = window.innerHeight - rect.bottom;
  const spaceAbove = rect.top;
  
  if (spaceBelow < 260 && spaceAbove > spaceBelow) {
    dropdown.style.top = 'auto';
    dropdown.style.bottom = '100%';
    dropdown.style.marginTop = '0px';
    dropdown.style.marginBottom = '6px';
    dropdown.style.maxHeight = `${Math.max(150, spaceAbove - 20)}px`;
  } else {
    dropdown.style.top = '100%';
    dropdown.style.bottom = 'auto';
    dropdown.style.marginTop = '6px';
    dropdown.style.marginBottom = '0px';
    dropdown.style.maxHeight = `${Math.max(150, spaceBelow - 20)}px`;
  }

  // ensure container is relative so absolute pos works
  e.currentTarget.style.position = 'relative';
  e.currentTarget.appendChild(dropdown);

  const closeDropdown = () => {
    if (document.body.contains(dropdown)) {
      dropdown.remove();
    }
    document.removeEventListener('click', closeDropdown);
  };
  setTimeout(() => document.addEventListener('click', closeDropdown), 0);
};

let dragData = null;

function canAssignGuardToBlockPos(guardId, block, position, state, excludingPos = null) {
  if (!guardId) return { valid: true };
  const day = state.selectedDay;
  const filteredLessons = getFilteredLessonsForWeek(state);

  if (!isGuardAvailableForBlock(guardId, block, state.shifts, day, state.selectedWeek)) {
    return { valid: false, reason: `${store.getGuardById(guardId)?.name || 'Guard'} is not on shift at this time` };
  }
  if (isGuardTeachingDuringBlock(guardId, block, day, filteredLessons)) {
    return { valid: false, reason: `${store.getGuardById(guardId)?.name || 'Guard'} is teaching a swim lesson at this time` };
  }
  for (const [key, gId] of Object.entries(state.blockAssignments)) {
    if (key.startsWith(block.id + '-') && gId === guardId) {
      const parts = key.split('-');
      const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(key);
      const pos = isLegacy ? parts[parts.length - 1] : parts[parts.length - 4];
      if (pos !== position && pos !== excludingPos) {
        return { valid: false, reason: `${store.getGuardById(guardId)?.name || 'Guard'} is already assigned to ${getPositionLabel(pos)} in this block` };
      }
    }
  }
  return { valid: true };
}

window.__onDragStart = (e, blockId, position) => {
  dragData = { blockId, position };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
};

window.__onDragEnd = (e) => {
  if (e.target) {
    e.target.classList.remove('dragging');
  }
  document.querySelectorAll('.assignment-slot').forEach(slot => {
    slot.classList.remove('drop-target', 'over');
  });
  dragData = null;
};

window.__onDragOver = (e) => {
  e.preventDefault();
  e.currentTarget.classList.add('drop-target', 'over');
};

window.__onDragLeave = (e) => {
  e.currentTarget.classList.remove('drop-target', 'over');
};

window.__onDrop = (e, blockId, position) => {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target', 'over');

  if (!dragData) return;

  const state = store.getState();
  const day = state.selectedDay;
  const blocks = store.getBlocksForDay(day);

  const blockA = blocks.find(b => b.id === dragData.blockId);
  const blockB = blocks.find(b => b.id === blockId);
  if (!blockA || !blockB) {
    dragData = null;
    return;
  }

  const guardAId = store.getAssignment(dragData.blockId, dragData.position, state.selectedWeek);
  const guardBId = store.getAssignment(blockId, position, state.selectedWeek);

  // If not in manual mode, validate the assignment swaps
  if (!state.manualMode) {
    const checkA = canAssignGuardToBlockPos(guardAId, blockB, position, state, (dragData.blockId === blockId) ? dragData.position : null);
    if (!checkA.valid) {
      showToast(`❌ Cannot swap: ${checkA.reason}`, 'error');
      dragData = null;
      return;
    }

    const checkB = canAssignGuardToBlockPos(guardBId, blockA, dragData.position, state, (dragData.blockId === blockId) ? position : null);
    if (!checkB.valid) {
      showToast(`❌ Cannot swap: ${checkB.reason}`, 'error');
      dragData = null;
      return;
    }
  }

  if (dragData.blockId === blockId) {
    store.swapBlockAssignment(blockId, dragData.position, position);
    showToast('Positions swapped', 'success');
  } else {
    store.swapInterBlockAssignment(dragData.blockId, dragData.position, blockId, position);
    showToast('Assignments moved/swapped', 'success');
  }
  dragData = null;
};

function showDivideModal() {
  const state = store.getState();
  const day = state.selectedDay;
  const dayBlocks = store.getBlocksForDay(day);
  const selected = dayBlocks.filter(b => selectedBlockIds.has(b.id));

  if (selected.length === 0) {
    showToast('No blocks selected to divide.', 'warning');
    return;
  }

  // Sort selected blocks by startTime
  selected.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

  // Validate contiguity
  let isContiguous = true;
  for (let i = 0; i < selected.length - 1; i++) {
    const currentEnd = timeToMinutes(selected[i].endTime);
    const nextStart = timeToMinutes(selected[i + 1].startTime);
    if (currentEnd !== nextStart) {
      isContiguous = false;
      break;
    }
  }

  if (!isContiguous) {
    showToast('Selected blocks must be contiguous (no gaps in time).', 'error');
    return;
  }

  const startMin = timeToMinutes(selected[0].startTime);
  const endMin = timeToMinutes(selected[selected.length - 1].endTime);
  const totalDuration = endMin - startMin;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'divide-modal-overlay';

  // Default division is 15 minutes
  const defaultInterval = 15;

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>✂️ Re-divide Blocks — ${day}</h3>
        <button class="btn btn-ghost btn-icon" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="text-sm text-secondary" style="margin-bottom: 15px;">
          You are re-dividing the time window from <b>${formatTime(selected[0].startTime)}</b> to <b>${formatTime(selected[selected.length - 1].endTime)}</b> (${totalDuration} minutes total duration).
        </div>
        
        <div class="form-group">
          <label class="form-label">New Interval (minutes)</label>
          <input type="number" class="form-input" id="modal-divide-interval" value="${defaultInterval}" min="5" max="${totalDuration}" />
          <span class="setting-description">Minimum 5 minutes, maximum ${totalDuration} minutes.</span>
        </div>

        <div class="form-group" style="margin-top: 15px;">
          <label class="form-label flex items-center gap-2">
            <input type="checkbox" id="modal-divide-copy" checked />
            <b>Preserve and copy lifeguard assignments</b>
          </label>
          <span class="setting-description" style="display: block; margin-left: 20px;">
            Copy assignments from the original blocks based on greatest time overlap.
          </span>
        </div>

        <div class="divider" style="margin: 15px 0; border-top: 1px solid var(--border-color);"></div>

        <div class="preview-section">
          <label class="form-label" style="font-weight: 500; margin-bottom: 8px; display: block;">Resulting Blocks Preview:</label>
          <div id="divide-preview-list" class="divide-preview-list" style="max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="modal-divide-btn">Confirm Split</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  const intervalInput = document.getElementById('modal-divide-interval');
  const previewList = document.getElementById('divide-preview-list');

  const updatePreview = () => {
    const intervalVal = parseInt(intervalInput.value) || 0;
    if (intervalVal <= 0) {
      previewList.innerHTML = `<span class="text-danger text-xs">Interval must be greater than 0</span>`;
      return;
    }

    let html = '';
    let cursor = startMin;
    let count = 0;
    while (cursor < endMin) {
      const nextEnd = Math.min(cursor + intervalVal, endMin);
      const dur = nextEnd - cursor;
      html += `
        <div class="divide-preview-item" style="display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);">
          <span>Block ${++count}: <b>${formatTime(minutesToTime(cursor))} – ${formatTime(minutesToTime(nextEnd))}</b></span>
          <span class="text-xs text-tertiary">(${dur} min)</span>
        </div>
      `;
      cursor = nextEnd;
    }
    previewList.innerHTML = html;
  };

  intervalInput.addEventListener('input', updatePreview);
  updatePreview(); // Trigger initial preview

  // Confirm action
  document.getElementById('modal-divide-btn').addEventListener('click', () => {
    const intervalVal = parseInt(intervalInput.value) || 0;
    if (intervalVal <= 0 || intervalVal > totalDuration) {
      showToast(`Please enter a valid interval between 5 and ${totalDuration} minutes.`, 'warning');
      return;
    }

    const copyAssignments = document.getElementById('modal-divide-copy').checked;
    const blockIdsArray = selected.map(b => b.id);

    try {
      store.divideBlocks(day, blockIdsArray, intervalVal, copyAssignments);
      overlay.remove();
      selectedBlockIds.clear();
      showToast(`Successfully divided selected blocks into ${intervalVal}-minute intervals.`, 'success');
      render();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });
}

function formatDuration(minutes) {
  if (!minutes || minutes <= 0) return '0m';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

// --- PDF Export ---
window.exportSchedulePdf = function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({
    orientation: 'landscape',
    unit: 'pt',
    format: 'letter'
  });
  const s = store.getState();
  const days = store.getDays();
  
  const monday = s.selectedWeek ? new Date(s.selectedWeek + 'T00:00:00') : new Date(currentWeekStart);
  const saturday = new Date(monday);
  saturday.setDate(monday.getDate() + 5);

  const headers = ['Guard', ...days.map((dName, index) => {
    const currentDay = new Date(monday);
    currentDay.setDate(monday.getDate() + index);
    return `${dName.charAt(0).toUpperCase() + dName.slice(1)} (${currentDay.getDate()})`;
  })];
  
  const margin = 8;
  const pageWidth = doc.internal.pageSize.getWidth();
  const usableWidth = pageWidth - margin * 2;
  const guardColWidth = 110;
  const dayColWidth = (usableWidth - guardColWidth) / days.length;

  const sortedGuards = [...s.guards].sort((a, b) => {
    if (a.crewSection !== b.crewSection) {
      return a.crewSection.localeCompare(b.crewSection);
    }
    return a.name.localeCompare(b.name);
  });

  const guardsWithShifts = sortedGuards.filter(g => {
    return days.some(dName => !!store.getShift(g.id, dName, s.selectedWeek));
  });

  const bodyData = guardsWithShifts.map(g => {
    const row = [];
    let totalMinutes = 0;
    
    const dayCols = days.map(dName => {
      const sh = store.getShift(g.id, dName, s.selectedWeek);
      if (sh) {
        const dur = getTimeDuration(sh.startTime, sh.endTime) - (sh.breakMinutes || 0);
        totalMinutes += Math.max(0, dur);
        
        let timeStr = `${formatTime(sh.startTime)}-${formatTime(sh.endTime)}`.replace(/ /g, '');
        let breakStr = sh.breakMinutes > 0 ? `\n(Break: ${sh.breakMinutes}m)` : '';
        let lessonStr = sh.lessonMinutes > 0 ? `\n(Lesson: ${sh.lessonMinutes}m)` : '';
        return `${timeStr}${breakStr}${lessonStr}`;
      } else {
        return '—';
      }
    });

    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    const weeklyHours = totalMinutes === 0 ? '0h' : (m > 0 ? `${h}h ${m}m` : `${h}h`);

    row.push([
      { content: g.name, styles: { fontStyle: 'bold', fontSize: 10 } },
      { content: weeklyHours, styles: { fontStyle: 'normal', fontSize: 8, textColor: [100, 116, 139] } }
    ]);

    row.push(...dayCols);
    return row;
  });

  const monMonth = monday.toLocaleDateString('en-US', { month: 'long' });
  const monDate = monday.getDate();
  const satMonth = saturday.toLocaleDateString('en-US', { month: 'long' });
  const satDate = saturday.getDate();
  const year = monday.getFullYear();
  
  const monMonthShort = monday.toLocaleDateString('en-US', { month: 'short' });
  const satMonthShort = saturday.toLocaleDateString('en-US', { month: 'short' });

  const title = `Lifeguard Schedule: Week of ${monMonth} ${monDate} - ${satMonth} ${satDate}, ${year}`;
  const filename = `schedule-week-of-${monMonthShort} ${monDate}-${satMonthShort} ${satDate}.pdf`;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(15, 23, 42);
  doc.text(title, margin, 24);

  const columnStyles = {
    0: { cellWidth: guardColWidth, halign: 'left' }
  };
  days.forEach((_, idx) => {
    columnStyles[idx + 1] = { cellWidth: dayColWidth };
  });


  doc.autoTable({
    startY: 32,
    margin: { left: margin, right: margin },
    theme: 'plain',
    head: [headers],
    body: bodyData,
    styles: {
      fontSize: 8,
      cellPadding: 6,
      lineColor: [226, 232, 240],
      lineWidth: 0.5,
      halign: 'center',
      valign: 'middle',
      textColor: [30, 41, 59]
    },
    headStyles: {
      fontStyle: 'bold',
      fontSize: 10,
      textColor: [15, 23, 42],
      lineColor: [148, 163, 184],
      lineWidth: 1
    },
    columnStyles: columnStyles,
    didParseCell: function(data) {
      if (data.column.index === 0 && data.section === 'body') {
        const cellData = data.cell.raw;
        if (Array.isArray(cellData) && cellData.length === 2) {
          data.cell.text = [cellData[0].content, cellData[1].content];
        }
      }
    }
  });

  doc.save(filename);
};

function renderReadOnlyBlocksGrid(blocks, state) {
  if (blocks.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">🔄</div>
        <h3>No Rotation Blocks</h3>
        <p>There are no rotation blocks configured for ${state.selectedDay} yet.</p>
      </div>
    `;
  }

  return `
    <div class="card">
      <div class="card-header">
        <h3>🔄 All Rotation Blocks — ${state.selectedDay}</h3>
      </div>
      <div class="card-body">
        <div class="block-grid read-only">
          ${blocks.map(block => {
            const stands = block.guardCountOverride ?? state.settings.standCount;
            const isClosed = stands === 0;
            const intervalDisplay = block.interval !== state.settings.rotationIntervalMinutes
              ? `<span class="interval-tag">⏱ ${block.interval}m</span>` : '';

            return `
              <div class="block-row ${isClosed ? 'closed' : ''}">
                <div class="block-time-label">
                  <span class="time-range">${formatTime(block.startTime)} – ${formatTime(block.endTime)}</span>
                  ${intervalDisplay}
                  ${isClosed ? '<span class="status-pill closed">Closed</span>' : ''}
                </div>
                <div class="block-assignments read-only">
                  ${isClosed ? '<span class="text-tertiary text-xs">No guards needed</span>' : 
                    renderReadOnlyBlockAssignments(block, stands, state)}
                </div>
                ${block.note ? `
                  <div class="block-note-badge" title="Note" style="display: inline-block; font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                    📝 <i>${block.note}</i>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderReadOnlyBlockAssignments(block, standCount, state) {
  const positions = getPositions(standCount, state.settings?.excludeDoor);
  return positions.map(pos => {
    const guardId = store.getAssignment(block.id, pos, state.selectedWeek);
    const guard = guardId ? store.getGuardById(guardId) : null;
    const posType = isStandPosition(pos) ? 'stand' : 'door';
    return `
      <div class="assignment-slot ${posType} ${guard ? 'filled' : ''} read-only">
        <span class="position-label">${getPositionLabel(pos)}</span>
        <span class="assigned-guard">${guard ? guard.name : '- empty -'}</span>
      </div>
    `;
  }).join('');
}

function renderReadOnlyGuardTimeline(guardId, day, blocks, state) {
  const guard = store.getGuardById(guardId);
  if (!guard) {
    return `<div class="empty-state"><h3>Guard Not Found</h3></div>`;
  }

  const shift = store.getShift(guardId, day, state.selectedWeek);
  const filteredLessons = getFilteredLessonsForWeek(state);
  if (!shift) {
    return `
      <div class="card">
        <div class="card-body">
          <div class="empty-state">
            <div class="empty-icon">🏖️</div>
            <h3>Off Duty</h3>
            <p><strong>${guard.name}</strong> has no shift scheduled on ${day}.</p>
          </div>
        </div>
      </div>
    `;
  }

  const timelineEntries = [];
  const shiftStart = timeToMinutes(shift.startTime);
  const shiftEnd = timeToMinutes(shift.endTime);

  blocks.forEach(block => {
    const blockStart = timeToMinutes(block.startTime);
    const blockEnd = timeToMinutes(block.endTime);

    if (blockStart < shiftStart || blockEnd > shiftEnd) {
      return;
    }

    let assignedPos = null;
    const stands = block.guardCountOverride ?? state.settings.standCount;
    if (stands > 0) {
      const positions = getPositions(stands, state.settings?.excludeDoor);
      for (const pos of positions) {
        if (store.getAssignment(block.id, pos, state.selectedWeek) === guardId) {
          assignedPos = pos;
          break;
        }
      }
    }

    let statusLabel = 'Break';
    let statusDesc = 'Implicit break (not on stand or door duty)';
    let badgeClass = 'break';

    if (assignedPos) {
      statusLabel = getPositionLabel(assignedPos);
      statusDesc = isStandPosition(assignedPos) ? 'On active lifeguard stand duty' : 'On door / gate monitoring duty';
      badgeClass = isStandPosition(assignedPos) ? 'stand' : 'door';
    } else if (isGuardTeachingDuringBlock(guardId, block, day, filteredLessons)) {
      statusLabel = '📚 Swim Lessons';
      statusDesc = 'Teaching scheduled lessons';
      badgeClass = 'lessons';
    } else if (stands === 0) {
      statusLabel = 'Break (Facility Closed)';
      statusDesc = 'Time block is configured as closed';
    }

    timelineEntries.push({
      timeRange: `${formatTime(block.startTime)} – ${formatTime(block.endTime)}`,
      label: statusLabel,
      desc: statusDesc,
      badgeClass: badgeClass,
      note: block.note || ''
    });
  });

  const totalMin = getTimeDuration(shift.startTime, shift.endTime) - (shift.breakMinutes || 0);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const shiftDurationStr = m > 0 ? `${h}h ${m}m` : `${h}h`;

  return `
    <div class="card">
      <div class="card-header" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <div class="flex items-center gap-2">
          <div class="guard-avatar ${guard.crewSection.toLowerCase()}" style="width:28px;height:28px;font-size:0.8rem;">
            ${guard.name.charAt(0).toUpperCase()}
          </div>
          <h2 style="margin:0;">${guard.name}'s Timeline</h2>
        </div>
        <span class="text-xs text-tertiary">
          Shift: <b>${formatTime(shift.startTime)} – ${formatTime(shift.endTime)}</b> 
          (${shiftDurationStr} effective after ${shift.breakMinutes || 0}m break)
        </span>
      </div>
      <div class="card-body">
        ${timelineEntries.length === 0 ? `
          <div class="text-xs text-tertiary" style="text-align:center;padding:20px;">
            No rotation blocks available during this shift.
          </div>
        ` : `
          <div class="timeline-list">
            ${timelineEntries.map(entry => `
              <div class="timeline-item ${entry.badgeClass}">
                <div class="timeline-time">${entry.timeRange}</div>
                <div class="timeline-badge-container">
                  <span class="timeline-badge ${entry.badgeClass}">${entry.label}</span>
                </div>
                <div class="timeline-details">
                  <span class="timeline-desc">${entry.desc}</span>
                  ${entry.note ? `<span class="timeline-note">📝 Note: ${entry.note}</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function attachReadOnlyPortalEvents(state) {
  // Day chips
  document.querySelectorAll('.day-chip').forEach(btn => {
    btn.addEventListener('click', () => store.setSelectedDay(btn.dataset.day));
  });

  // Crew toggle buttons
  document.querySelectorAll('.crew-toggle .crew-btn').forEach(btn => {
    btn.addEventListener('click', () => store.setSelectedCrew(btn.dataset.crew));
  });

  // Guard select dropdown
  const select = document.getElementById('read-only-guard-select');
  if (select) {
    select.addEventListener('change', (e) => {
      selectedGuardId = e.target.value;
      render();
    });
  }

  // Import to Editor
  const importBtn = document.getElementById('ro-import-btn');
  if (importBtn) {
    importBtn.addEventListener('click', () => {
      if (confirm('Import this shared schedule into your editor? This will overwrite your currently saved local schedule.')) {
        store.setReadOnly(false);
        state.isReadOnly = false;
        state.lastSaved = new Date().toISOString();
        localStorage.setItem('lifeguard-rotation-store-v1', JSON.stringify(state));
        window.location.hash = '';
        showToast('Schedule successfully imported and saved!', 'success');
      }
    });
  }

  // Exit/Open Editor
  const exitBtn = document.getElementById('ro-exit-btn');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      window.location.hash = '';
      store.exitReadOnly();
      showToast('Loaded local editor schedule', 'info');
    });
  }
}

                          const crewClass = guard ? (guard.crewSection === 'AM' ? 'am-lesson' : 'pm-lesson') : 'neutral-lesson';
                          
                          return `
                            <div class="lesson-card ${crewClass} read-only" 
                                 onclick="window.__showReadOnlyLessonModal('${lesson.id}')"
                                 style="position: absolute; top: ${top}%; height: ${height}%; left: ${left}%; width: ${width}%; padding: 6px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.25); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; z-index: 10; pointer-events: auto; cursor: pointer;"
                                 title="${guardName} - ${formatTime(lesson.startTime)} (${lesson.durationMinutes}m)\n${lesson.notes}">
                              <div class="lesson-card-header" style="font-weight: 700; font-size: var(--font-xs); line-height: 1.1; margin-bottom: 2px; color: var(--text-primary);">
                                ${guardName}
                              </div>
                              <div class="lesson-card-meta" style="font-size: 0.65rem; color: rgba(255,255,255,0.85); display: flex; justify-content: space-between; align-items: flex-end;">
                                <span>${formatTime(lesson.startTime)}</span>
                                <span>${lesson.durationMinutes}m</span>
                              </div>
                            </div>
                          `;
                        }).join('')}
                      </div>
                    `;
                  }).join('')}
                </div>

              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="read-only-footer">
      <div class="footer-actions">
        <button class="btn btn-secondary btn-sm" id="ro-import-btn" title="Save this schedule to your local editor">
          📥 Import to Editor
        </button>
        <button class="btn btn-ghost btn-sm" id="ro-exit-btn" title="Open empty local editor">
          ⚙️ Open Editor
        </button>
      </div>
    </div>
  `;
}

function attachReadOnlyLessonsPortalEvents(state) {
  // 1. Guard filter change event
  const filterSelect = document.getElementById('read-only-lessons-guard-filter');
  if (filterSelect) {
    filterSelect.addEventListener('change', (e) => {
      store.setSelectedFilterGuardId(e.target.value);
    });
  }

  // 2. Import to Editor
  const importBtn = document.getElementById('ro-import-btn');
  if (importBtn) {
    importBtn.addEventListener('click', () => {
      if (confirm('Import this shared schedule into your editor? This will overwrite your currently saved local schedule.')) {
        store.setReadOnly(false);
        store.setLessonsOnly(false);
        state.isReadOnly = false;
        state.isLessonsOnly = false;
        state.lastSaved = new Date().toISOString();
        localStorage.setItem('lifeguard-rotation-store-v1', JSON.stringify(state));
        window.location.hash = '';
        showToast('Schedule successfully imported and saved!', 'success');
      }
    });
  }

  // 3. Exit/Open Editor
  const exitBtn = document.getElementById('ro-exit-btn');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      window.location.hash = '';
      store.exitReadOnly();
      store.setLessonsOnly(false);
      showToast('Loaded local editor schedule', 'info');
    });
  }
}


</script>
</body>
</html>
