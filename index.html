  if (typeof syncManager === 'undefined') return '';
  const status = syncManager.getStatus();
  const config = syncManager.getConfig();
  const error = syncManager.getLastError();

  let statusText = '';
  let color = 'var(--text-secondary)';

  if (status === 'disabled') {
    statusText = 'Local Storage Mode. No cloud sync connected.';
  } else if (status === 'unconfigured') {
    statusText = '⚠️ Setup incomplete: GitHub Gist is selected but the Personal Access Token and/or Gist ID are missing. Enter them below to start syncing.';
    color = '#f59e0b';
  } else if (status === 'synced') {
    statusText = 'Connected & Synced. Cloud and local state match.';
    color = 'var(--status-green, #10b981)';
  } else if (status === 'syncing') {
    statusText = 'Syncing data...';
    color = '#3b82f6';
  } else if (status === 'dirty') {
    statusText = `Local edits have not been pushed to GitHub yet (saving automatically after ${config.autoPushDelay ?? 25} seconds of inactivity).`;
    color = '#f59e0b';
  } else if (status === 'error') {
    statusText = `Sync Error: ${error || 'Unknown error occurred.'}`;
    color = '#ef4444';
  } else if (status === 'conflict') {
    statusText = '⚠️ Sync Conflict: Changes exist in the cloud and locally. Click Pull/Push below or use the conflict pop-up to resolve.';
    color = '#ef4444';
  }

  const lastSaved = config.lastSyncedAt
    ? new Date(config.lastSyncedAt).toLocaleString()
    : 'Never';

  return `
    <div><strong>Sync Status:</strong> <span style="color: ${color}; font-weight: 600;">${statusText}</span></div>
    <div><strong>Last Synced At:</strong> ${lastSaved}</div>
    ${status === 'conflict' ? `
      <div style="margin-top: 8px; display: flex; gap: 8px;">
        <button class="btn btn-secondary btn-sm" onclick="window.__resolveConflict('pull')">Overwrite Local (Pull)</button>
        <button class="btn btn-primary btn-sm" onclick="window.__resolveConflict('push')">Overwrite Cloud (Push)</button>
      </div>
    ` : ''}
  `;
}

function saveSyncSettingsFromDOM() {
  if (typeof syncManager === 'undefined') return;
  const providerEl = document.getElementById('sync-provider');
  if (!providerEl) return; // Not on the settings tab or DOM not rendered, do not overwrite settings

  const provider = providerEl.value;
  const token = document.getElementById('sync-github-token')?.value;
  const gistId = document.getElementById('sync-gist-id')?.value;
  const filename = document.getElementById('sync-gist-filename')?.value;
  const autoSync = document.getElementById('sync-auto-sync')?.checked;

  const current = syncManager.getConfig();
  if (
    current.provider !== provider ||
    current.githubToken !== token ||
    current.gistId !== gistId ||
    current.gistFilename !== filename ||
    current.autoSync !== autoSync
  ) {
    syncManager.updateConfig({
      provider: provider || 'none',
      githubToken: token || '',
      gistId: gistId || '',
      gistFilename: filename || 'lifeguard_schedule.json',
      autoSync: autoSync !== undefined ? autoSync : true
    });
  }
}

window.__updateSyncConfig = (key, value) => {
  if (typeof syncManager !== 'undefined') {
    // Special handling to show/hide sections instantly on dropdown change before user blurs
    if (key === 'provider') {
      const details = document.getElementById('sync-setup-fields');
      if (details) {
        details.style.display = value === 'github_gist' ? 'block' : 'none';
      }
    }
    syncManager.updateConfig({ [key]: value });
  }
};

window.__toggleTokenVisibility = () => {
  const input = document.getElementById('sync-github-token');
  const btn = document.getElementById('toggle-token-visibility');
  if (input) {
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  }
};

window.__testSyncConnection = async () => {
  if (typeof syncManager === 'undefined') return;
  saveSyncSettingsFromDOM();
  showToast('Testing cloud connection...', 'info');
  const res = await syncManager.testConnection();
  if (res.success) {
    if (res.warning) {
      showToast(res.warning, 'warning');
    } else {
      showToast(res.message, 'success');
    }
  } else {
    showToast(res.error, 'error');
  }
};

window.__pullSyncNow = async () => {
  if (typeof syncManager === 'undefined') return;
  const status = syncManager.getStatus();
  if (status === 'dirty' || status === 'conflict') {
    if (!confirm('You have unsaved local changes. Pulling will discard them and load the cloud version. Continue?')) {
      return;
    }
  }
  showToast('Fetching latest from cloud...', 'info');
  await syncManager.pull();
};

window.__pushSyncNow = async () => {
  if (typeof syncManager === 'undefined') return;
  saveSyncSettingsFromDOM();
  const status = syncManager.getStatus();
  if (status === 'conflict') {
    // During a conflict, confirm the user wants to force-overwrite the cloud
    if (!confirm('There is a sync conflict. Push will overwrite the cloud version with your local data. Continue?')) {
      return;
    }
    syncManager.setConflictResolved();
    showToast('Force-pushing local changes to cloud...', 'info');
    await syncManager.push(true);
  } else {
    showToast('Pushing local changes to cloud...', 'info');
    await syncManager.push(false);
  }
};

window.__createGistAutomatically = async () => {
  if (typeof syncManager === 'undefined') return;
  const tokenInput = document.getElementById('sync-github-token')?.value;
  if (!tokenInput) {
    showToast('Please enter your GitHub Personal Access Token first.', 'error');
    return;
  }
  if (!confirm('Create a new secret Gist on GitHub with your current schedule data?')) {
    return;
  }
  saveSyncSettingsFromDOM();
  showToast('Creating secret Gist...', 'info');
  await syncManager.createGistAutomatically();
};

window.__handleSyncBadgeClick = (event) => {
  event.stopPropagation();
  if (typeof syncManager === 'undefined') return;
  
  const status = syncManager.getStatus();
  if (status === 'conflict') {
    const config = syncManager.getConfig();
    const cloudTime = syncManager.getConflictCloudTime() || config.lastGistSyncTime || new Date().toISOString();
    const localTime = syncManager.getLastLocalEditTime();
    const lastSyncTime = config.lastGistSyncTime;
    window.__showConflictModal(cloudTime, localTime, lastSyncTime);
    return;
  }
  if (status === 'available') {
    // User explicitly asked to load the pending remote changes — pull now.
    showToast('Loading latest changes from cloud...', 'info');
    syncManager.pull();
    return;
  }

  // Toggle dropdown
  const existingDropdown = document.querySelector('.sync-dropdown');
  if (existingDropdown) {
    existingDropdown.remove();
    if (window.__closeSyncDropdown) {
      document.removeEventListener('click', window.__closeSyncDropdown);
      window.__closeSyncDropdown = null;
    }
    return;
  }

  const config = syncManager.getConfig();
  const lastError = syncManager.getLastError();

  let statusLabel = 'Sync Disabled';
  let statusIcon = '☁️';
  let statusDetail = 'Sync is not configured.';
  let badgeClass = 'sync-disabled';

  if (status === 'synced') {
    statusLabel = 'Synced';
    statusIcon = '🟢';
    statusDetail = `Last check: ${config.lastSyncedAt ? new Date(config.lastSyncedAt).toLocaleTimeString() : 'N/A'}`;
    badgeClass = 'sync-success';
  } else if (status === 'syncing') {
    statusLabel = 'Syncing...';
    statusIcon = '🔄';
    statusDetail = 'Syncing schedule with GitHub Gist...';
    badgeClass = 'sync-pending';
  } else if (status === 'dirty') {
    statusLabel = 'Unsaved Changes';
    statusIcon = '🔵';
    statusDetail = 'Local changes will sync automatically.';
    badgeClass = 'sync-dirty';
  } else if (status === 'error') {
    statusLabel = 'Sync Error';
    statusIcon = '🔴';
    statusDetail = lastError || 'Unknown error during sync.';
    badgeClass = 'sync-error';
  } else if (status === 'unconfigured') {
    statusLabel = 'Setup Incomplete';
    statusIcon = '⚠️';
    statusDetail = 'Enter your GitHub token and Gist ID in Sync Settings to start syncing.';
    badgeClass = 'sync-dirty';
  }

  const dropdown = document.createElement('div');
  dropdown.className = 'sync-dropdown';
  dropdown.innerHTML = `
    <div class="sync-dropdown-header">
      <span class="sync-dropdown-title">Cloud Sync</span>
      <span class="sync-dropdown-status ${badgeClass}">${statusIcon} ${statusLabel}</span>
    </div>
    
    <div class="sync-dropdown-info">
      ${statusDetail}
    </div>

    <div class="sync-dropdown-divider"></div>

    <div class="sync-dropdown-actions">
      <button class="btn btn-secondary btn-sm" onclick="window.__pullSyncNow(); event.stopPropagation();" ${status === 'syncing' ? 'disabled' : ''}>
        📥 Pull
      </button>
      <button class="btn btn-primary btn-sm" onclick="window.__pushSyncNow(); event.stopPropagation();" ${status === 'syncing' ? 'disabled' : ''}>
        📤 Push
      </button>
    </div>

    <div class="sync-dropdown-divider"></div>

    <button class="btn btn-ghost btn-sm sync-settings-btn" onclick="window.__openSyncSettings(); event.stopPropagation();" style="width: 100%; justify-content: center; font-size: 0.8rem; height: 32px;">
      ⚙️ Sync Settings
    </button>
  `;

  const container = event.currentTarget.closest('.sync-badge-container') || event.currentTarget.parentElement;
  container.appendChild(dropdown);

  const closeDropdown = (e) => {
    if (!dropdown.contains(e.target) && e.target !== event.currentTarget) {
      dropdown.remove();
      document.removeEventListener('click', closeDropdown);
      window.__closeSyncDropdown = null;
    }
  };
  window.__closeSyncDropdown = closeDropdown;
  setTimeout(() => document.addEventListener('click', closeDropdown), 0);
};

window.__openSyncSettings = () => {
  const existingDropdown = document.querySelector('.sync-dropdown');
  if (existingDropdown) existingDropdown.remove();
  if (window.__closeSyncDropdown) {
    document.removeEventListener('click', window.__closeSyncDropdown);
    window.__closeSyncDropdown = null;
  }
  
  store.setActiveTab('settings');
  setTimeout(() => {
    const el = document.getElementById('sync-provider');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
};

window.__showConflictModal = (cloudTimeStr, localTimeStr, lastSyncTimeStr) => {
  const existing = document.getElementById('sync-conflict-overlay');
  if (existing) return; // Don't stack conflict modals

  const formatTime = (str) => {
    if (!str) return 'Never';
    const date = new Date(str);
    if (isNaN(date.getTime())) return 'Never';
    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' });
  };

  const cloudTime = formatTime(cloudTimeStr);
  const localTime = formatTime(localTimeStr || new Date().toISOString());
  const lastSyncTime = formatTime(lastSyncTimeStr);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'sync-conflict-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width: 500px;">
      <div class="modal-header">
        <h3>⚠️ Sync Conflict Detected</h3>
        <button class="btn btn-ghost btn-icon" onclick="window.__dismissConflictModal()">✕</button>
      </div>
      <div class="modal-body" style="line-height: 1.5;">
        <p>The schedule has been modified in the cloud since you last synced.</p>
        <div style="margin: 12px 0; font-size: 0.85rem; color: var(--text-secondary); background: rgba(0,0,0,0.15); padding: 10px 14px; border-radius: 6px; border-left: 4px solid var(--status-amber); display: flex; flex-direction: column; gap: 6px;">
          <div style="display: flex; justify-content: space-between; gap: 8px;">
            <span>Last successful sync:</span>
            <strong>${lastSyncTime}</strong>
          </div>
          <div style="display: flex; justify-content: space-between; gap: 8px;">
            <span>Cloud version:</span>
            <strong>${cloudTime}</strong>
          </div>
          <div style="display: flex; justify-content: space-between; gap: 8px;">
            <span>Your local changes:</span>
            <strong>${localTime}</strong>
          </div>
        </div>
        <p style="font-size: 0.82rem; margin-top: 10px; color: var(--text-secondary); line-height: 1.4;">
          <strong>Why is this a conflict?</strong> Even though your local changes are newer than the cloud version, the cloud has updates from <strong>${cloudTime}</strong> that your local app doesn't have yet (since you last synced at <strong>${lastSyncTime}</strong>). Pushing would completely overwrite those cloud updates.
        </p>
        <p style="font-size: 0.85rem; margin-top: 12px;">Please select how you want to resolve this conflict:</p>
        
        <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
          <button class="btn btn-secondary" onclick="window.__resolveConflict('pull')" style="text-align: left; justify-content: flex-start; padding: 12px 16px; height: auto; white-space: normal; width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 4px;">
            <span style="font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 6px;">📥 Overwrite Local (Pull)</span>
            <span style="font-size: 0.8rem; opacity: 0.85; font-weight: 400; text-align: left;">Discard your local edits and load the cloud version.</span>
          </button>
          <button class="btn btn-primary" onclick="window.__resolveConflict('push')" style="text-align: left; justify-content: flex-start; padding: 12px 16px; height: auto; white-space: normal; width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 4px;">
            <span style="font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 6px;">📤 Overwrite Cloud (Push)</span>
            <span style="font-size: 0.8rem; opacity: 0.85; font-weight: 400; text-align: left;">Force your local edits to the cloud, overwriting their changes.</span>
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="window.__dismissConflictModal()">Resolve Later</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) window.__dismissConflictModal();
  });
};

window.__dismissConflictModal = () => {
  const overlay = document.getElementById('sync-conflict-overlay');
  if (overlay) overlay.remove();
  // Keep syncStatus as 'conflict' — user can reopen via the badge
};

window.__resolveConflict = (choice) => {
  if (typeof syncManager === 'undefined') return;

  if (choice === 'pull') {
    if (confirm('Are you sure you want to pull? This will discard your local unsaved edits.')) {
      const overlay = document.getElementById('sync-conflict-overlay');
      if (overlay) overlay.remove();
      syncManager.setConflictResolved();
      syncManager.pull();
    }
  } else if (choice === 'push') {
    if (confirm('Are you sure you want to push? This will overwrite the changes made in the cloud.')) {
      const overlay = document.getElementById('sync-conflict-overlay');
      if (overlay) overlay.remove();
      syncManager.setConflictResolved();
      syncManager.push(true);
    }
  }
};

let dragData = null;

function canAssignGuardToBlockPos(guardId, block, position, state, excludingPos = null) {
  if (!guardId) return { valid: true };
  const day = state.selectedDay;
  const filteredLessons = getFilteredLessonsForWeek(state);

  if (!isGuardAvailableForBlock(guardId, block, state.shifts, day, state.selectedWeek)) {
    return { valid: false, reason: `${store.getGuardById(guardId)?.name || 'Guard'} is not on shift at this time` };
  }
  if (isGuardTeachingDuringBlock(guardId, block, day, filteredLessons)) {
    return { valid: false, reason: `${store.getGuardById(guardId)?.name || 'Guard'} is teaching a swim lesson at this time` };
  }
  for (const [key, gId] of Object.entries(state.blockAssignments)) {
    if (key.startsWith(block.id + '-') && gId === guardId) {
      const parts = key.split('-');
      const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(key);
      const pos = isLegacy ? parts[parts.length - 1] : parts[parts.length - 4];
      if (pos !== position && pos !== excludingPos) {
        return { valid: false, reason: `${store.getGuardById(guardId)?.name || 'Guard'} is already assigned to ${getPositionLabel(pos)} in this block` };
      }
    }
  }
  return { valid: true };
}

window.__onDragStart = (e, blockId, position) => {
  dragData = { blockId, position };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
};

window.__onDragEnd = (e) => {
  if (e.target) {
    e.target.classList.remove('dragging');
  }
  document.querySelectorAll('.assignment-slot').forEach(slot => {
    slot.classList.remove('drop-target', 'over');
  });
  dragData = null;
};

window.__onDragOver = (e) => {
  e.preventDefault();
  e.currentTarget.classList.add('drop-target', 'over');
};

window.__onDragLeave = (e) => {
  e.currentTarget.classList.remove('drop-target', 'over');
};

window.__onDrop = (e, blockId, position) => {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target', 'over');

  if (!dragData) return;

  const state = store.getState();
  const day = state.selectedDay;
  const blocks = store.getBlocksForDay(day);

  const blockA = blocks.find(b => b.id === dragData.blockId);
  const blockB = blocks.find(b => b.id === blockId);
  if (!blockA || !blockB) {
    dragData = null;
    return;
  }

  const guardAId = store.getAssignment(dragData.blockId, dragData.position, state.selectedWeek);
  const guardBId = store.getAssignment(blockId, position, state.selectedWeek);

  // If not in manual mode, validate the assignment swaps
  if (!state.manualMode) {
    const checkA = canAssignGuardToBlockPos(guardAId, blockB, position, state, (dragData.blockId === blockId) ? dragData.position : null);
    if (!checkA.valid) {
      showToast(`❌ Cannot swap: ${checkA.reason}`, 'error');
      dragData = null;
      return;
    }

    const checkB = canAssignGuardToBlockPos(guardBId, blockA, dragData.position, state, (dragData.blockId === blockId) ? position : null);
    if (!checkB.valid) {
      showToast(`❌ Cannot swap: ${checkB.reason}`, 'error');
      dragData = null;
      return;
    }
  }

  if (dragData.blockId === blockId) {
    store.swapBlockAssignment(blockId, dragData.position, position);
    showToast('Positions swapped', 'success');
  } else {
    store.swapInterBlockAssignment(dragData.blockId, dragData.position, blockId, position);
    showToast('Assignments moved/swapped', 'success');
  }
  dragData = null;
};

// ─── Block Re-division Modal & Callbacks ─────────────────

function showDivideModal() {
  const state = store.getState();
  const day = state.selectedDay;
  const dayBlocks = store.getBlocksForDay(day);
  const selected = dayBlocks.filter(b => selectedBlockIds.has(b.id));

  if (selected.length === 0) {
    showToast('No blocks selected to divide.', 'warning');
    return;
  }

  // Sort selected blocks by startTime
  selected.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

  // Validate contiguity
  let isContiguous = true;
  for (let i = 0; i < selected.length - 1; i++) {
    const currentEnd = timeToMinutes(selected[i].endTime);
    const nextStart = timeToMinutes(selected[i + 1].startTime);
    if (currentEnd !== nextStart) {
      isContiguous = false;
      break;
    }
  }

  if (!isContiguous) {
    showToast('Selected blocks must be contiguous (no gaps in time).', 'error');
    return;
  }

  const startMin = timeToMinutes(selected[0].startTime);
  const endMin = timeToMinutes(selected[selected.length - 1].endTime);
  const totalDuration = endMin - startMin;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'divide-modal-overlay';

  // Default division is 15 minutes
  const defaultInterval = 15;

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>✂️ Re-divide Blocks — ${day}</h3>
        <button class="btn btn-ghost btn-icon" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="text-sm text-secondary" style="margin-bottom: 15px;">
          You are re-dividing the time window from <b>${formatTime(selected[0].startTime)}</b> to <b>${formatTime(selected[selected.length - 1].endTime)}</b> (${totalDuration} minutes total duration).
        </div>
        
        <div class="form-group">
          <label class="form-label">New Interval (minutes)</label>
          <input type="number" class="form-input" id="modal-divide-interval" value="${defaultInterval}" min="5" max="${totalDuration}" />
          <span class="setting-description">Minimum 5 minutes, maximum ${totalDuration} minutes.</span>
        </div>

        <div class="form-group" style="margin-top: 15px;">
          <label class="form-label flex items-center gap-2">
            <input type="checkbox" id="modal-divide-copy" checked />
            <b>Preserve and copy lifeguard assignments</b>
          </label>
          <span class="setting-description" style="display: block; margin-left: 20px;">
            Copy assignments from the original blocks based on greatest time overlap.
          </span>
        </div>

        <div class="divider" style="margin: 15px 0; border-top: 1px solid var(--border-color);"></div>

        <div class="preview-section">
          <label class="form-label" style="font-weight: 500; margin-bottom: 8px; display: block;">Resulting Blocks Preview:</label>
          <div id="divide-preview-list" class="divide-preview-list" style="max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="modal-divide-btn">Confirm Split</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  const intervalInput = document.getElementById('modal-divide-interval');
  const previewList = document.getElementById('divide-preview-list');

  const updatePreview = () => {
    const intervalVal = parseInt(intervalInput.value) || 0;
    if (intervalVal <= 0) {
      previewList.innerHTML = `<span class="text-danger text-xs">Interval must be greater than 0</span>`;
      return;
    }

    let html = '';
    let cursor = startMin;
    let count = 0;
    while (cursor < endMin) {
      const nextEnd = Math.min(cursor + intervalVal, endMin);
      const dur = nextEnd - cursor;
      html += `
        <div class="divide-preview-item" style="display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);">
          <span>Block ${++count}: <b>${formatTime(minutesToTime(cursor))} – ${formatTime(minutesToTime(nextEnd))}</b></span>
          <span class="text-xs text-tertiary">(${dur} min)</span>
        </div>
      `;
      cursor = nextEnd;
    }
    previewList.innerHTML = html;
  };

  intervalInput.addEventListener('input', updatePreview);
  updatePreview(); // Trigger initial preview

  // Confirm action
  document.getElementById('modal-divide-btn').addEventListener('click', () => {
    const intervalVal = parseInt(intervalInput.value) || 0;
    if (intervalVal <= 0 || intervalVal > totalDuration) {
      showToast(`Please enter a valid interval between 5 and ${totalDuration} minutes.`, 'warning');
      return;
    }

    const copyAssignments = document.getElementById('modal-divide-copy').checked;
    const blockIdsArray = selected.map(b => b.id);

    try {
      store.divideBlocks(day, blockIdsArray, intervalVal, copyAssignments);
      overlay.remove();
      selectedBlockIds.clear();
      showToast(`Successfully divided selected blocks into ${intervalVal}-minute intervals.`, 'success');
      render();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });
}

function attachGlobalEvents(state) {
  // Guard Roster drag and drop events
  if (!state.isReadOnly) {
    let draggedGuardId = null;

    document.querySelectorAll('.guard-chip').forEach(chip => {
      chip.addEventListener('dragstart', (e) => {
        draggedGuardId = chip.dataset.guardId;
        chip.classList.add('dragging-guard');
        e.dataTransfer.effectAllowed = 'move';
      });

      chip.addEventListener('dragend', (e) => {
        chip.classList.remove('dragging-guard');
        document.querySelectorAll('.guard-chip').forEach(c => {
          c.classList.remove('drag-over-above', 'drag-over-below');
        });
        draggedGuardId = null;
      });

      chip.addEventListener('dragover', (e) => {
        if (!draggedGuardId || draggedGuardId === chip.dataset.guardId) return;

        e.preventDefault();
        
        // Determine whether cursor is above or below middle of the card
        const rect = chip.getBoundingClientRect();
        const midpoint = (rect.bottom - rect.top) / 2;
        const relativeY = e.clientY - rect.top;

        if (relativeY < midpoint) {
          chip.classList.add('drag-over-above');
          chip.classList.remove('drag-over-below');
        } else {
          chip.classList.add('drag-over-below');
          chip.classList.remove('drag-over-above');
        }
      });

      chip.addEventListener('dragleave', (e) => {
        chip.classList.remove('drag-over-above', 'drag-over-below');
      });

      chip.addEventListener('drop', (e) => {
        e.preventDefault();
        chip.classList.remove('drag-over-above', 'drag-over-below');

        if (!draggedGuardId || draggedGuardId === chip.dataset.guardId) return;

        const rect = chip.getBoundingClientRect();
        const midpoint = (rect.bottom - rect.top) / 2;
        const relativeY = e.clientY - rect.top;
        const isAfter = relativeY >= midpoint;

        const targetGuardId = chip.dataset.guardId;
        const currentGuards = [...state.guards];
        const draggedIdx = currentGuards.findIndex(g => g.id === draggedGuardId);
        
        if (draggedIdx !== -1) {
          const [draggedGuard] = currentGuards.splice(draggedIdx, 1);
          let targetIdx = currentGuards.findIndex(g => g.id === targetGuardId);
          if (targetIdx !== -1) {
            if (isAfter) {
              targetIdx += 1;
            }
            currentGuards.splice(targetIdx, 0, draggedGuard);
            store.reorderGuards(currentGuards);
            showToast('Roster order updated', 'success');
          }
        }
      });
    });
  }

  // Tab navigation
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => store.setActiveTab(btn.dataset.tab));

  // Day selector
  document.querySelectorAll('.day-chip').forEach(btn => {

function formatDuration(minutes) {
  if (!minutes || minutes <= 0) return '0m';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

// --- Rotation Export (opens a printable sheet in a new browser tab) ---
window.exportRotationView = function() {
  const s = store.getState();
  const day = s.selectedDay;
  const week = s.selectedWeek;
  const rawBlocks = store.getBlocksForDay(day, week);
  const blocks = [...rawBlocks].sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
  if (blocks.length === 0) {
    showToast('No rotation blocks for this day to export.', 'info');
    return;
  }

  const excludeDoor = !!(s.settings && s.settings.excludeDoor);
  let maxStands = 0;
  blocks.forEach(b => {
    const st = b.guardCountOverride ?? s.settings.standCount;
    if (st > maxStands) maxStands = st;
  });
  if (maxStands < 1) maxStands = 1;
  const columns = getPositions(maxStands, excludeDoor);

  // Date label for the selected day.
  const monday = week ? new Date(week + 'T00:00:00') : new Date(currentWeekStart);
  const dayIndexMap = { Monday: 0, Tuesday: 1, Wednesday: 2, Thursday: 3, Friday: 4, Saturday: 5, Sunday: 6 };
  const dDate = new Date(monday);
  dDate.setDate(monday.getDate() + (dayIndexMap[day] || 0));
  const dateStr = dDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  const esc = (t) => String(t == null ? '' : t).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  const rowsHtml = blocks.map(b => {
    const stands = b.guardCountOverride ?? s.settings.standCount;
    const isClosed = stands === 0;
    const timeCell = `${formatTime(b.startTime)} – ${formatTime(b.endTime)}`;
    const noteHtml = b.note ? `<div class="note">${esc(b.note)}</div>` : '';
    if (isClosed) {
      return `<tr><td class="time">${timeCell}${noteHtml}</td><td class="closed" colspan="${columns.length}">Closed</td></tr>`;
    }
    const blockPositions = getPositions(stands, excludeDoor);

      return guard ? `<td class="filled">${esc(guard.name)}</td>` : `<td class="empty">—</td>`;
    }).join('');
    return `<tr><td class="time">${timeCell}${noteHtml}</td>${cells}</tr>`;
  }).join('');

  const html = `<!DOCTYPE html>

    <table>
      <thead><tr><th class="time-h">Time</th>${headCells}</tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div class="foot">Generated ${esc(new Date().toLocaleString())}</div>
    <button class="print-btn no-print" onclick="window.print()">🖨️ Print / Save as PDF</button>
  </div>
</body></html>`;

  const win = window.open('', '_blank');
  if (!win) {
    showToast('Please allow pop-ups to open the rotation sheet.', 'warning');
    return;
  }
  win.document.open();
  win.document.write(html);
  win.document.close();
};

// --- PDF Export ---
window.exportSchedulePdf = async function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({
    orientation: 'landscape',
    unit: 'pt',
    format: 'letter'
  });
  const s = store.getState();
  const days = store.getDays();
  
  const monday = s.selectedWeek ? new Date(s.selectedWeek + 'T00:00:00') : new Date(currentWeekStart);
  const saturday = new Date(monday);
  saturday.setDate(monday.getDate() + 5);

  const headers = ['Guard', ...days.map((dName, index) => {
    const currentDay = new Date(monday);
    currentDay.setDate(monday.getDate() + index);
    return `${dName.charAt(0).toUpperCase() + dName.slice(1)} (${currentDay.getDate()})`;
  })];

  const dayNoteValues = days.map(dName => store.getDayNote(dName, s.selectedWeek) || '');
  const hasDayNotes = dayNoteValues.some(n => n.trim());

  const margin = 8;
  const pageWidth = doc.internal.pageSize.getWidth();
  const usableWidth = pageWidth - margin * 2;
  const guardColWidth = 110;
  const dayColWidth = (usableWidth - guardColWidth) / days.length;

  const sortedGuards = [...s.guards];

  const guardsWithShifts = sortedGuards.filter(g => {
    return days.some(dName => !!store.getShift(g.id, dName, s.selectedWeek));
  });

  const bodyData = guardsWithShifts.map(g => {
    const row = [];
    let totalMinutes = 0;
    
    const dayCols = days.map(dName => {
      const sh = store.getShift(g.id, dName, s.selectedWeek);
      if (sh) {
        const dur = getTimeDuration(sh.startTime, sh.endTime) - (sh.breakMinutes || 0);
        totalMinutes += Math.max(0, dur);
        
        let timeStr = `${formatTime(sh.startTime)}-${formatTime(sh.endTime)}`.replace(/ /g, '');
        let breakStr = sh.breakMinutes > 0 ? `\n(Break: ${sh.breakMinutes}m)` : '';
        let lessonStr = sh.lessonMinutes > 0 ? `\n(Lesson: ${sh.lessonMinutes}m)` : '';
        return `${timeStr}${breakStr}${lessonStr}`;
      } else {
        return '—';
      }
    });

    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    const weeklyHours = totalMinutes === 0 ? '0h' : (m > 0 ? `${h}h ${m}m` : `${h}h`);

    row.push([
      { content: g.name, styles: { fontStyle: 'bold', fontSize: 10 } },
      { content: weeklyHours, styles: { fontStyle: 'normal', fontSize: 8, textColor: [100, 116, 139] } }
    ]);

    row.push(...dayCols);
    return row;
  });

  const monMonth = monday.toLocaleDateString('en-US', { month: 'long' });
  const monDate = monday.getDate();
  const satMonth = saturday.toLocaleDateString('en-US', { month: 'long' });
  const satDate = saturday.getDate();
  const year = monday.getFullYear();
  
  const monMonthShort = monday.toLocaleDateString('en-US', { month: 'short' });
  const satMonthShort = saturday.toLocaleDateString('en-US', { month: 'short' });

  const title = `Lifeguard Schedule: Week of ${monMonth} ${monDate} - ${satMonth} ${satDate}, ${year}`;
  const filename = `schedule-week-of-${monMonthShort} ${monDate}-${satMonthShort} ${satDate}.pdf`;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(15, 23, 42);
  doc.text(title, margin, 24);

  const columnStyles = {
    0: { cellWidth: guardColWidth, halign: 'left' }
  };
  days.forEach((_, idx) => {
    columnStyles[idx + 1] = { cellWidth: dayColWidth };
  });


  doc.autoTable({
    startY: 32,
    margin: { left: margin, right: margin },
    theme: 'plain',
    head: [headers],
    body: bodyData,
    styles: {
      fontSize: 8,
      cellPadding: 6,
      lineColor: [226, 232, 240],
      lineWidth: 0.5,
      halign: 'center',
      valign: 'middle',
      textColor: [30, 41, 59]
    },
    headStyles: {
      fontStyle: 'bold',
      fontSize: 10,
      textColor: [15, 23, 42],
      lineColor: [148, 163, 184],
      lineWidth: 1
    },
    columnStyles: columnStyles,
    didParseCell: function(data) {
      if (data.column.index === 0 && data.section === 'body') {
        const cellData = data.cell.raw;
        if (Array.isArray(cellData) && cellData.length === 2) {
          data.cell.text = [cellData[0].content, cellData[1].content];
        }
      }
      if (data.section === 'head' && hasDayNotes) {
        data.cell.styles.valign = 'top';
        data.cell.styles.minCellHeight = 34;
      }
    },
    didDrawCell: function(data) {
      if (data.section === 'head' && data.column.index >= 1) {
        const note = dayNoteValues[data.column.index - 1];
        if (note && note.trim()) {
          const cx = data.cell.x + data.cell.width / 2;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.setTextColor(220, 38, 38);
          doc.text(note.trim(), cx, data.cell.y + data.cell.height - 6, {
            align: 'center',
            maxWidth: data.cell.width - 6
          });
        }
      }
    }
  });

  // --- Append rich-text notes below the last row ---
  await appendNotesToPdf(doc, margin);

  try {
    doc.setProperties({ title: filename.replace(/\.pdf$/, '') });
  } catch (e) {}
  const blobUrl = doc.output('bloburl');
  const win = window.open(blobUrl, '_blank');
  if (!win) {
    showToast('Please allow pop-ups to open the schedule PDF.', 'warning');
  }
};

// Renders the schedule notes (rich HTML) as an image at the bottom of the PDF,
// preserving font size, color, and bold/italic/underline formatting.
async function appendNotesToPdf(doc, margin) {
  const notesHtml = (store.getState().scheduleNotes || '').trim();
  if (!notesHtml) return;

  // Skip if the notes contain no actual text/content.
  const probe = document.createElement('div');
  probe.innerHTML = notesHtml;
  if (!probe.textContent.trim() && !probe.querySelector('img')) return;
  if (typeof window.html2canvas !== 'function') return;

  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const usableWidth = pageWidth - margin * 2;

  // Off-screen container sized to the PDF's usable width (at ~2x for crisp text).
  const RENDER_SCALE = 2;
  const container = document.createElement('div');
  container.style.cssText = `position:fixed; left:-10000px; top:0; width:${usableWidth * RENDER_SCALE}px; ` +
    `padding:${4 * RENDER_SCALE}px ${10 * RENDER_SCALE}px ${8 * RENDER_SCALE}px; background:#ffffff; color:#1e293b; ` +
    `font-family:Inter, Arial, sans-serif; font-size:${10.5 * RENDER_SCALE}px; line-height:1.5; ` +
    `word-wrap:break-word; box-sizing:border-box;`;
  container.innerHTML = notesHtml;
  document.body.appendChild(container);

  let canvas;
  try {
    canvas = await window.html2canvas(container, { scale: 1, backgroundColor: '#ffffff', useCORS: true });
  } catch (e) {
    document.body.removeChild(container);
    return;
  }
  document.body.removeChild(container);

  const pxPerPt = canvas.width / usableWidth;

  // Start the notes directly below the last table row (no heading).
  let y = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 32) + 6;
  if (y > pageHeight - margin - 40) { doc.addPage(); y = margin + 14; }

  // Draw the notes image, slicing across pages if it is taller than the page.
  let remainingPx = canvas.height;
  let srcY = 0;
  while (remainingPx > 0) {
    const availPt = pageHeight - margin - y;
    const availPx = Math.max(0, Math.floor(availPt * pxPerPt));
    if (availPx < 20) { doc.addPage(); y = margin + 10; continue; }

    const slicePx = Math.min(remainingPx, availPx);
    const slice = document.createElement('canvas');
    slice.width = canvas.width;
    slice.height = slicePx;
    const ctx = slice.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, slice.width, slice.height);
    ctx.drawImage(canvas, 0, srcY, canvas.width, slicePx, 0, 0, canvas.width, slicePx);

    const sliceHeightPt = slicePx / pxPerPt;
    doc.addImage(slice.toDataURL('image/png'), 'PNG', margin, y, usableWidth, sliceHeightPt);

    srcY += slicePx;
    remainingPx -= slicePx;
    if (remainingPx > 0) { doc.addPage(); y = margin + 10; }
  }
}

function renderReadOnlyBlocksGrid(blocks, state) {
  if (blocks.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">🔄</div>
        <h3>No Rotation Blocks</h3>
        <p>There are no rotation blocks configured for ${state.selectedDay} yet.</p>
      </div>
    `;
  }

  return `
    <div class="card">
      <div class="card-header">
        <h3>🔄 All Rotation Blocks — ${state.selectedDay}</h3>
      </div>
      <div class="card-body">
        <div class="block-grid read-only">
          ${blocks.map(block => {
            const stands = block.guardCountOverride ?? state.settings.standCount;
            const isClosed = stands === 0;
            const intervalDisplay = block.interval !== state.settings.rotationIntervalMinutes
              ? `<span class="interval-tag">⏱ ${block.interval}m</span>` : '';

            return `
              <div class="block-row ${isClosed ? 'closed' : ''}">
                <div class="block-time-label">
                  <span class="time-range">${formatTime(block.startTime)} – ${formatTime(block.endTime)}</span>
                  ${intervalDisplay}
                  ${isClosed ? '<span class="status-pill closed">Closed</span>' : ''}
                </div>
                <div class="block-assignments read-only">
                  ${isClosed ? '<span class="text-tertiary text-xs">No guards needed</span>' : 
                    renderReadOnlyBlockAssignments(block, stands, state)}
                </div>
                ${block.note ? `
                  <div class="block-note-badge" title="Note" style="display: inline-block; font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                    📝 <i>${escapeHtml(block.note)}</i>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderReadOnlyBlockAssignments(block, standCount, state) {
  const positions = getPositions(standCount, state.settings?.excludeDoor);
  return positions.map(pos => {
    const guardId = store.getAssignment(block.id, pos, state.selectedWeek);
    const guard = guardId ? store.getGuardById(guardId) : null;
    const posType = isStandPosition(pos) ? 'stand' : 'door';
    return `
      <div class="assignment-slot ${posType} ${guard ? 'filled' : ''} read-only">
        <span class="position-label">${getPositionLabel(pos)}</span>
        <span class="assigned-guard">${guard ? guard.name : '- empty -'}</span>
      </div>
    `;
  }).join('');
}

function renderReadOnlyGuardTimeline(guardId, day, blocks, state) {
  const guard = store.getGuardById(guardId);
  if (!guard) {
    return `<div class="empty-state"><h3>Guard Not Found</h3></div>`;
  }

  const shift = store.getShift(guardId, day, state.selectedWeek);
  const filteredLessons = getFilteredLessonsForWeek(state);
  if (!shift) {
    return `
      <div class="card">
        <div class="card-body">
          <div class="empty-state">
            <div class="empty-icon">🏖️</div>
            <h3>Off Duty</h3>
            <p><strong>${escapeHtml(guard.name)}</strong> has no shift scheduled on ${day}.</p>
          </div>
        </div>
      </div>
    `;
  }

  const timelineEntries = [];
  const shiftStart = timeToMinutes(shift.startTime);
  const shiftEnd = timeToMinutes(shift.endTime);

  blocks.forEach(block => {
    const blockStart = timeToMinutes(block.startTime);
    const blockEnd = timeToMinutes(block.endTime);

    if (blockStart < shiftStart || blockEnd > shiftEnd) {
      return;
    }

    let assignedPos = null;
    const stands = block.guardCountOverride ?? state.settings.standCount;
    if (stands > 0) {
      const positions = getPositions(stands, state.settings?.excludeDoor);
      for (const pos of positions) {
        if (store.getAssignment(block.id, pos, state.selectedWeek) === guardId) {
          assignedPos = pos;
          break;
        }
      }
    }

    let statusLabel = 'Break';
    let statusDesc = 'Implicit break (not on stand or door duty)';
    let badgeClass = 'break';

    if (assignedPos) {
      statusLabel = getPositionLabel(assignedPos);
      statusDesc = isStandPosition(assignedPos) ? 'On active lifeguard stand duty' : 'On door / gate monitoring duty';
      badgeClass = isStandPosition(assignedPos) ? 'stand' : 'door';
    } else if (isGuardTeachingDuringBlock(guardId, block, day, filteredLessons)) {
      statusLabel = '📚 Swim Lessons';
      statusDesc = 'Teaching scheduled lessons';
      badgeClass = 'lessons';
    } else if (stands === 0) {
      statusLabel = 'Break (Facility Closed)';
      statusDesc = 'Time block is configured as closed';
    }

    timelineEntries.push({
      timeRange: `${formatTime(block.startTime)} – ${formatTime(block.endTime)}`,
      label: statusLabel,
      desc: statusDesc,
      badgeClass: badgeClass,
      note: block.note || ''
    });
  });

  const totalMin = getTimeDuration(shift.startTime, shift.endTime) - (shift.breakMinutes || 0);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const shiftDurationStr = m > 0 ? `${h}h ${m}m` : `${h}h`;

  return `
    <div class="card">
      <div class="card-header" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <div class="flex items-center gap-2">
          <div class="guard-avatar ${guard.crewSection.toLowerCase()}" style="width:28px;height:28px;font-size:0.8rem;">
            ${escapeHtml(guard.name.charAt(0).toUpperCase())}
          </div>
          <h2 style="margin:0;">${escapeHtml(guard.name)}'s Timeline</h2>
        </div>
        <span class="text-xs text-tertiary">
          Shift: <b>${formatTime(shift.startTime)} – ${formatTime(shift.endTime)}</b> 
          (${shiftDurationStr} effective after ${shift.breakMinutes || 0}m break)
        </span>
      </div>
      <div class="card-body">
        ${timelineEntries.length === 0 ? `
          <div class="text-xs text-tertiary" style="text-align:center;padding:20px;">
            No rotation blocks available during this shift.
          </div>
        ` : `
          <div class="timeline-list">
            ${timelineEntries.map(entry => `
              <div class="timeline-item ${entry.badgeClass}">
                <div class="timeline-time">${entry.timeRange}</div>
                <div class="timeline-badge-container">
                  <span class="timeline-badge ${entry.badgeClass}">${entry.label}</span>
                </div>
                <div class="timeline-details">
                  <span class="timeline-desc">${entry.desc}</span>
                  ${entry.note ? `<span class="timeline-note">📝 Note: ${entry.note}</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function attachReadOnlyPortalEvents(state) {
  // Day chips
  document.querySelectorAll('.day-chip').forEach(btn => {
    btn.addEventListener('click', () => store.setSelectedDay(btn.dataset.day));
  });

  // Crew toggle buttons
  document.querySelectorAll('.crew-toggle .crew-btn').forEach(btn => {
    btn.addEventListener('click', () => store.setSelectedCrew(btn.dataset.crew));
  });

  // Guard select dropdown
  const select = document.getElementById('read-only-guard-select');
  if (select) {
    select.addEventListener('change', (e) => {
      selectedGuardId = e.target.value;
      render();
    });
  }

  // Import to Editor
  const importBtn = document.getElementById('ro-import-btn');
  if (importBtn) {
    importBtn.addEventListener('click', () => {
      if (confirm('Import this shared schedule into your editor? This will overwrite your currently saved local schedule.')) {
        store.setReadOnly(false);
        state.isReadOnly = false;
        state.lastSaved = new Date().toISOString();
        localStorage.setItem('lifeguard-rotation-store-v1', JSON.stringify(state));
        window.location.hash = '';
        showToast('Schedule successfully imported and saved!', 'success');
      }
    });
  }

  // Exit/Open Editor
  const exitBtn = document.getElementById('ro-exit-btn');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      window.location.hash = '';
      store.exitReadOnly();
      showToast('Loaded local editor schedule', 'info');
    });
  }
}

function renderReadOnlyLessonsPortal(state) {
  const lastSavedStr = state.lastSaved
    ? new Date(state.lastSaved).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : 'Never';

  const { earliest, latest } = getWeeklyTimeRange(state);
  const timeSlots = [];
  for (let cursor = earliest; cursor < latest; cursor += 30) {
    timeSlots.push(minutesToTime(cursor));
  }
  
  const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
  if (!state.settings?.lessonsExcludeSaturday) {
    days.push('Saturday');
  }
  const cellHeight = state.settings?.lessonsSlotHeight || 50;
  
  const filterGuardId = state.selectedFilterGuardId || 'all';
  const allLessons = getFilteredLessonsForWeek(state);
  let lessonsToRender = filterGuardId === 'all'
    ? allLessons
    : allLessons.filter(l => String(l.guardId) === String(filterGuardId));

  if (state.showConflictsOnly) {
    lessonsToRender = lessonsToRender.filter(l => hasLessonConflict(l, state));
  }

  // Guards who teach at least one lesson this week — for the filter strip.
  const teachingGuards = [...new Set(allLessons.map(l => String(l.guardId)))]
    .map(id => store.getGuardById(id))
    .filter(Boolean)
    .sort((a, b) => a.name.localeCompare(b.name));

  let prevDisabled = '';
  let nextDisabled = '';
  if (state.isReadOnly && state.sharedWeek) {
    const sharedWeekDate = new Date(state.sharedWeek + 'T00:00:00');
    const currentWeekDate = new Date(state.selectedWeek + 'T00:00:00');
    const diffTime = currentWeekDate.getTime() - sharedWeekDate.getTime();
    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
    if (diffDays <= -7) prevDisabled = 'disabled';
    if (diffDays >= 7) nextDisabled = 'disabled';
  }

  return `
    <nav class="nav-bar read-only-header">
      <div class="nav-brand">
        <div class="logo-icon">🏊</div>
        <div>
          <h1>Swim Lessons Schedule</h1>
          <span class="view-badge">Lessons View</span>
        </div>
      </div>
      <div class="nav-meta">
        <span>Updated: ${lastSavedStr}</span>
      </div>
    </nav>

    <div class="sub-nav" style="justify-content: space-between; align-items: center; padding: 12px 16px; flex-wrap: wrap; gap: 12px;">
      <div class="flex items-center gap-3" style="flex-wrap: wrap;">
        <div class="week-navigator" style="display:flex; align-items:center; gap:8px;">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="window.__navigateWeek(-7)" title="Previous Week" ${prevDisabled}>◀</button>
          <span class="week-label" id="lessons-week-label" style="font-weight:600; font-size:var(--font-sm);">${formatWeekLabel(currentWeekStart)}</span>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="window.__navigateWeek(7)" title="Next Week" ${nextDisabled}>▶</button>
        </div>
        <div class="show-conflicts-container" style="display:flex; align-items:center; gap:6px; margin-left: 10px; background: rgba(239, 68, 68, 0.1); padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid rgba(239, 68, 68, 0.3);">
          <label style="display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: #ef4444; cursor: pointer; user-select: none; margin: 0;">
            <input type="checkbox" id="read-only-lessons-show-conflicts" ${state.showConflictsOnly ? 'checked' : ''} 
                   onchange="window.__setShowConflictsOnly(this.checked)" />
            Show Conflicts
          </label>
        </div>
      </div>
    </div>

    <div class="main-content read-only-content" style="padding: 16px;">
      <div class="lessons-layout">
        <div class="card">
          <div class="lesson-guard-strip">
            <button class="lesson-guard-chip ${filterGuardId === 'all' ? 'active' : ''}" onclick="window.__setLessonFilter('all')" title="Show all guards">
              <span class="lgc-name">All Guards</span>
              <span class="lgc-pill lgc-pill-all"></span>
            </button>
            ${teachingGuards.map(g => `
              <button class="lesson-guard-chip ${String(filterGuardId) === String(g.id) ? 'active' : ''}" onclick="window.__setLessonFilter('${g.id}')" title="Filter to ${escapeHtml(g.name)}">
                <span class="lgc-name">${escapeHtml(g.name)}</span>
                <span class="lgc-pill" style="background:${safeHexColor(g.color)};"></span>
              </button>
            `).join('')}
          </div>
          <div class="card-body" style="padding:0; overflow-x: auto;">
            <div class="calendar-container" style="min-width: 800px; height: 600px; display: flex; flex-direction: column;">
              
              <!-- Headers row -->
              <div class="calendar-header-row" style="display:flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-strong);">
                <div class="time-axis-header" style="width: 80px; flex-shrink: 0; text-align: center; padding: 10px 0; font-weight: 700; font-size: var(--font-xs); color: var(--text-secondary); border-right: 1px solid var(--border-subtle);">Time</div>
                ${days.map(d => {
                  const dayIndexMap = { 'Monday': 0, 'Tuesday': 1, 'Wednesday': 2, 'Thursday': 3, 'Friday': 4, 'Saturday': 5, 'Sunday': 6 };
                  const dayDate = new Date(currentWeekStart);
                  dayDate.setDate(currentWeekStart.getDate() + dayIndexMap[d]);
                  const dateNum = dayDate.getDate();
                  return `
                    <div class="day-column-header" style="flex: 1; text-align: center; padding: 10px 0; font-weight: 700; font-size: var(--font-xs); color: var(--text-secondary); border-right: 1px solid var(--border-subtle);">
                      <span class="day-name">${d} (${dateNum})</span>
                    </div>
                  `;
                }).join('')}
              </div>

              <!-- Body container -->
              <div class="calendar-body" style="display: flex; flex: 1; overflow-y: auto; position: relative;">
                
                <!-- Left side time axis -->
                <div class="time-axis-column" style="width: 80px; flex-shrink: 0; background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; position: relative; height: ${timeSlots.length * cellHeight}px;">
                  ${timeSlots.map(time => `
                    <div class="time-axis-label" style="height: ${cellHeight}px; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; font-size: 0.75rem; color: var(--text-tertiary); border-bottom: 1px dashed rgba(255,255,255,0.03);">
                      ${formatTime(time)}
                    </div>
                  `).join('')}
                </div>

                <!-- Day Columns -->
                <div class="day-columns-container" style="display: flex; flex: 1; position: relative; height: ${timeSlots.length * cellHeight}px;">
                  ${days.map(day => {
                    const positioned = getPositionedLessons(lessonsToRender, day, earliest, latest);
                    
                    return `
                      <div class="day-column" style="flex: 1; min-width: 100px; position: relative; border-right: 1px solid var(--border-subtle); background: var(--bg-primary); display: flex; flex-direction: column; height: ${timeSlots.length * cellHeight}px;">
                        
                        <!-- Background Grid Slots (No onclick handler for read-only) -->
                        ${timeSlots.map(time => `
                          <div class="calendar-grid-slot read-only" 
                               style="height: ${cellHeight}px; border-bottom: 1px solid var(--border-subtle); transition: background 0.15s;">
                          </div>
                        `).join('')}

                        <!-- Lesson Cards Overlay -->
                        ${positioned.map(({ lesson, top, height, width, left }) => {
                          const guard = store.getGuardById(lesson.guardId);
                          const guardName = guard ? guard.name : 'Unknown Guard';
                          const crewClass = guard ? (guard.crewSection === 'AM' ? 'am-lesson' : 'pm-lesson') : 'neutral-lesson';
                          const cardColor = safeHexColor(guard && guard.color, '');
                          const cardStyle = cardColor
                            ? `background: linear-gradient(135deg, ${hexToRgba(cardColor, 0.35)} 0%, ${hexToRgba(cardColor, 0.15)} 100%) !important; border-left: 3px solid ${cardColor} !important; color: #ffffff !important;`
                            : '';

                          return `
                            <div class="lesson-card ${crewClass} read-only"
                                 onclick="window.__showReadOnlyLessonModal('${lesson.id}')"
                                 onmouseenter="window.__showLessonTip(event, '${lesson.id}')"
                                 onmousemove="window.__moveLessonTip(event)"
                                 onmouseleave="window.__hideLessonTip()"
                                 style="position: absolute; top: ${top}%; height: ${height}%; left: ${left}%; width: ${width}%; padding: 4px 6px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; z-index: 10; pointer-events: auto; cursor: pointer; ${cardStyle}">
                              <span class="lesson-card-name" style="font-weight: 700; font-size: var(--font-xs); line-height: 1.15; color: #ffffff; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;">${escapeHtml(guardName)}</span>
                            </div>
                          `;
                        }).join('')}
                      </div>
                    `;
                  }).join('')}
                </div>

              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="read-only-footer">
      <div class="footer-actions">
        <button class="btn btn-secondary btn-sm" id="ro-import-btn" title="Save this schedule to your local editor">
          📥 Import to Editor
        </button>
        <button class="btn btn-ghost btn-sm" id="ro-exit-btn" title="Open empty local editor">
          ⚙️ Open Editor
        </button>
      </div>
    </div>
  `;
}

function attachReadOnlyLessonsPortalEvents(state) {
  // 1. Guard filter change event
  const filterSelect = document.getElementById('read-only-lessons-guard-filter');
  if (filterSelect) {
    filterSelect.addEventListener('change', (e) => {
      store.setSelectedFilterGuardId(e.target.value);
    });
  }

  // 2. Import to Editor
  const importBtn = document.getElementById('ro-import-btn');
  if (importBtn) {
    importBtn.addEventListener('click', () => {
      if (confirm('Import this shared schedule into your editor? This will overwrite your currently saved local schedule.')) {
        store.setReadOnly(false);
        store.setLessonsOnly(false);
        state.isReadOnly = false;
        state.isLessonsOnly = false;
        state.lastSaved = new Date().toISOString();
        localStorage.setItem('lifeguard-rotation-store-v1', JSON.stringify(state));
        window.location.hash = '';
        showToast('Schedule successfully imported and saved!', 'success');
      }
    });
  }

  // 3. Exit/Open Editor
  const exitBtn = document.getElementById('ro-exit-btn');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      window.location.hash = '';
      store.exitReadOnly();
      store.setLessonsOnly(false);
      showToast('Loaded local editor schedule', 'info');
    });
  }
}


</script>
</body>
</html>
