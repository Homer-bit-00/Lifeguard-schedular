/**
 * Toast notification system — lightweight, no dependencies
 */

let container = null;

function ensureContainer() {
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  return container;
}

/**
 * Show a toast notification
 * @param {string} message - The message to display
 * @param {'success'|'warning'|'error'|'info'} type - Toast type
 * @param {number} duration - Duration in ms (default 4000)
 */
function showToast(message, type = 'info', duration = 4000) {
  const c = ensureContainer();

  const icons = {
    success: '✓',
    warning: '⚠',
    error: '✕',
    info: 'ℹ'
  };

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <span class="toast-icon">${icons[type] || 'ℹ'}</span>
    <span class="toast-message">${message}</span>
  `;

  c.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('exiting');
    setTimeout(() => {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 300);
  }, duration);
}


/**
 * generateBlocks.js
 */

/**
 * generateBlocks.js
 *
 * Auto-generate rotation blocks from shift windows and provide
 * time-conversion utilities used across the application.
 *
 * All time strings use 24-hour 'HH:MM' format internally.
 */

function generateUUID() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

/**
 * Parse a time string 'HH:MM' to minutes since midnight.
 * @param {string} time - Time in 'HH:MM' format (e.g. '09:30')
 * @returns {number} Minutes since midnight (0–1439)
 */
function timeToMinutes(time) {
  const [hours, minutes] = time.split(':').map(Number);
  return hours * 60 + minutes;
}

/**
 * Convert minutes since midnight to 'HH:MM' format.
 * @param {number} minutes - Minutes since midnight
 * @returns {string} Time in 'HH:MM' format
 */
function minutesToTime(minutes) {
  const clamped = ((minutes % 1440) + 1440) % 1440; // handle negatives / overflow
  const h = Math.floor(clamped / 60);
  const m = clamped % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

/**
 * Format a 24-hour 'HH:MM' time string for display (e.g. '2:30 PM').
 * @param {string} time - Time in 'HH:MM' format
 * @returns {string} Human-friendly 12-hour time string
 */
function formatTime(time) {
  const totalMinutes = timeToMinutes(time);
  let hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;

  const period = hours >= 12 ? 'PM' : 'AM';
  if (hours === 0) {
    hours = 12;
  } else if (hours > 12) {
    hours -= 12;
  }

  return `${hours}:${String(minutes).padStart(2, '0')}${period}`;
}

/**
 * Get the duration in minutes between two 'HH:MM' time strings.
 * If end is earlier than start the result will be negative—callers should
 * treat that as crossing midnight if appropriate.
 * @param {string} start - Start time in 'HH:MM' format
 * @param {string} end   - End time in 'HH:MM' format
 * @returns {number} Duration in minutes
 */
function getTimeDuration(start, end) {
  return timeToMinutes(end) - timeToMinutes(start);
}

/**
 * Given a day's shifts, generate rotation blocks by slicing the shift window
 * into fixed-length intervals.
 *
 * The function finds the earliest shift start and the latest shift end among
 * all provided shifts, then creates sequential blocks of `intervalMinutes`
 * length spanning that entire window.
 *
 * @param {Array<{startTime: string, endTime: string}>} shifts
 *   Array of shift objects. Each must have `startTime` and `endTime` in 'HH:MM'.
 * @param {number} [intervalMinutes=30]
 *   Length of each rotation block in minutes.
 * @returns {Array<{id: string, startTime: string, endTime: string, interval: number, guardCountOverride: number, note: string}>}
 *   Ordered array of rotation block objects.
 */
function generateBlocks(shifts, intervalMinutes = 30, config = null) {
  if (!shifts || shifts.length === 0) {
    return [];
  }

  // 1. Calculate shift-based boundaries
  let earliestStart = Infinity;
  let latestEnd = -Infinity;
  for (const shift of shifts) {
    const start = timeToMinutes(shift.startTime);
    const end = timeToMinutes(shift.endTime);
    if (start < earliestStart) earliestStart = start;
    if (end > latestEnd) latestEnd = end;
  }

  // 2. Apply base window restrictions
  if (config) {
    if (config.limitStart && config.startTime) {
      earliestStart = timeToMinutes(config.startTime);
    }
    if (config.limitEnd && config.endTime) {
      latestEnd = timeToMinutes(config.endTime);
    }
  }

  const blocks = [];

  // Generate blocks for the base window (if valid)
  if (earliestStart < latestEnd && intervalMinutes > 0) {
    let cursor = earliestStart;
    while (cursor < latestEnd) {
      const nextBoundary = Math.floor(cursor / intervalMinutes) * intervalMinutes + intervalMinutes;
      const blockEnd = Math.min(nextBoundary, latestEnd);
      const actualInterval = blockEnd - cursor;

      blocks.push({
        id: generateUUID(),
        startTime: minutesToTime(cursor),
        endTime: minutesToTime(blockEnd),
        interval: actualInterval,
        guardCountOverride: null,
        note: '',
      });

      cursor = blockEnd;
    }
  }

  // 3. Generate blocks for any extra windows
  if (config && Array.isArray(config.extraWindows)) {
    for (const extra of config.extraWindows) {
      if (!extra.startTime || !extra.endTime) continue;
      const start = timeToMinutes(extra.startTime);
      const end = timeToMinutes(extra.endTime);
      if (start >= end || intervalMinutes <= 0) continue;

      let cursor = start;
      const align = extra.align ?? true;

      while (cursor < end) {
        let blockEnd;
        if (align) {
          // Align to multiples of intervalMinutes
          const nextBoundary = Math.floor(cursor / intervalMinutes) * intervalMinutes + intervalMinutes;
          blockEnd = Math.min(nextBoundary, end);
        } else {
          // Increment directly from startTime
          blockEnd = Math.min(cursor + intervalMinutes, end);
        }
        
        const actualInterval = blockEnd - cursor;

        blocks.push({
          id: generateUUID(),
          startTime: minutesToTime(cursor),
          endTime: minutesToTime(blockEnd),
          interval: actualInterval,
          guardCountOverride: null,
          note: '',
          isExtra: true,
        });

        cursor = blockEnd;
      }
    }
  }

  // Sort blocks by startTime so they display chronologically
  blocks.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

  // Filter out any blocks that are fully contained within any excluded time slots
  let filteredBlocks = blocks;
  if (config && Array.isArray(config.excludeWindows) && config.excludeWindows.length > 0) {
    filteredBlocks = blocks.filter(block => {
      // Extra custom blocks are never excluded
      if (block.isExtra) return true;

      const bStart = timeToMinutes(block.startTime);
      const bEnd = timeToMinutes(block.endTime);
      
      const isExcluded = config.excludeWindows.some(ex => {
        if (!ex.startTime || !ex.endTime) return false;
        const exStart = timeToMinutes(ex.startTime);
        const exEnd = timeToMinutes(ex.endTime);
        // Exclude block if it is fully contained within the excluded window
        return bStart >= exStart && bEnd <= exEnd;
      });
      
      return !isExcluded;
    });
  }

  // Deduplicate blocks by startTime and endTime
  const uniqueBlocks = [];
  for (const block of filteredBlocks) {
    const key = `${block.startTime}-${block.endTime}`;
    const existingIdx = uniqueBlocks.findIndex(b => `${b.startTime}-${b.endTime}` === key);
    if (existingIdx !== -1) {
      if (block.isExtra) {
        uniqueBlocks[existingIdx] = block;
      }
    } else {
      uniqueBlocks.push(block);
    }
  }

  return uniqueBlocks;
}


/**
 * rotationCycle.js
 */

/**
 * rotationCycle.js
 *
 * Rotation cycle model – defines the ordered set of positions a guard
 * rotates through and provides helpers for cycling, classification,
 * and display labelling.
 *
 * Standard cycle (for N stands):
 *   stand1 → stand2 → … → standN → door → break → stand1 → …
 */

/**
 * Get the ordered array of positions based on the number of stands.
 *
 * The returned array does NOT include `'break'`—break is implicit and
 * always follows `'door'`.  Use {@link getNextPosition} to walk the
 * full cycle including breaks.
 *
 * @param {number} [standCount=2] - Number of stand positions
 * @returns {string[]} e.g. ['stand1', 'stand2', 'door']
 */
function getPositions(standCount = 2, excludeDoor = false) {
  const positions = [];
  for (let i = 1; i <= standCount; i++) {
    positions.push(`stand${i}`);
  }
  if (!excludeDoor) {
    positions.push('door');
  }
  return positions;
}

/**
 * Get the next position in the rotation cycle.
 *
 * Cycle order:
 *   stand1 → stand2 → … → standN → door → break → stand1
 *
 * @param {string} current    - The guard's current position
 * @param {number} [standCount=2] - Number of stand positions
 * @param {boolean} [excludeDoor=false] - Whether to exclude the door position
 * @returns {string} The next position in the cycle
 */
function getNextPosition(current, standCount = 2, excludeDoor = false) {
  // After break the guard loops back to stand1
  if (current === 'break') {
    return 'stand1';
  }

  // After door the guard goes on break
  if (current === 'door') {
    return 'break';
  }

  // If it's a stand position, advance to the next stand or to door
  if (isStandPosition(current)) {
    const standNumber = Number(current.replace('stand', ''));
    if (standNumber < standCount) {
      return `stand${standNumber + 1}`;
    }
    // Last stand → break (if door is excluded) or door
    return excludeDoor ? 'break' : 'door';
  }

  // Fallback for any unrecognised position
  return 'stand1';
}

/**
 * Check whether a position string represents a stand.
 * @param {string} position
 * @returns {boolean}
 */
function isStandPosition(position) {
  return typeof position === 'string' && /^stand\d+$/.test(position);
}

/**
 * Check whether a position string is the door position.
 * @param {string} position
 * @returns {boolean}
 */
function isDoorPosition(position) {
  return position === 'door';
}

/**
 * Get a human-readable display label for a position.
 *
 * Examples:
 *   'stand1' → 'Stand 1'
 *   'stand12' → 'Stand 12'
 *   'door'   → 'Door'
 *   'break'  → 'Break'
 *
 * @param {string} position
 * @returns {string}
 */
function getPositionLabel(position) {
  if (isStandPosition(position)) {
    const num = position.replace('stand', '');
    return `Stand ${num}`;
  }

  if (position === 'door') return 'Door';
  if (position === 'break') return 'Break';

  // Unknown – title-case whatever we got
  return position.charAt(0).toUpperCase() + position.slice(1);
}


/**
 * standTimeCalc.js
 */

/**
 * standTimeCalc.js
 *
 * Calculate a guard's effective stand-time for a given day, factoring in
 * door-credit and lesson-equivalent minutes.
 * 
 * Works with the store's data format:
 * - assignments: flat map { "blockId-position": guardId }
 * - shifts: flat map { "guardId-day": shiftEntry }
 */


/**
 * Calculate a guard's stand time statistics for a single day.
 *
 * @param {string} guardId
 * @param {string} day - Day of the week (e.g. 'Monday')
 * @param {Object} blockAssignments - Store's flat assignment map { "blockId-position": guardId }
 * @param {Array}  blocks - Array of RotationBlock objects for this day
 * @param {Object} shifts - Store's flat shift map { "guardId-day": shiftEntry }
 * @param {Object} settings - { doorCreditPercent, lessonMultiplier, standCount }
 *
 * @returns {{
 *   rawStandMinutes: number,
 *   doorMinutes: number,
 *   lessonEquivMinutes: number,
 *   totalMinutes: number,
 *   shiftDurationMinutes: number,
 *   percentage: number
 * }}
 */
function calcGuardStandTime(guardId, day, blockAssignments, blocks, shifts, settings, lessons, week) {
  const doorCreditMultiplier = settings?.doorCreditMultiplier ?? (settings?.doorCreditPercent !== undefined ? settings.doorCreditPercent / 100 : 0.5);
  const lessonMultiplier = settings?.lessonMultiplier ?? 0.75;
  const standCount = settings?.standCount ?? 2;

  let rawStandMinutes = 0;
  let doorMinutes = 0;

  // Check each block to see if this guard is assigned to any position
  for (const block of blocks) {
    const blockDuration = getTimeDuration(block.startTime, block.endTime);
    if (blockDuration <= 0) continue;

    // Check all possible positions for this block
    const blockStands = block.guardCountOverride ?? standCount;
    const positions = getPositions(blockStands, settings?.excludeDoor);
    const allPositions = [...positions];

    for (const pos of allPositions) {
      const keyWithWeek = week ? `${block.id}-${pos}-${week}` : null;
      const keyLegacy = `${block.id}-${pos}`;
      const assignedGuardId = (blockAssignments && keyWithWeek && blockAssignments[keyWithWeek]) || (blockAssignments && blockAssignments[keyLegacy]) || null;
      if (assignedGuardId === guardId) {
        if (isStandPosition(pos)) {
          rawStandMinutes += blockDuration;
        } else if (isDoorPosition(pos)) {
          doorMinutes += blockDuration;
        }
      }
    }
  }

  // Lesson equivalent minutes
  let lessonEquivMinutes = 0;
  const shiftKeyWithWeek = week ? `${guardId}-${day}-${week}` : null;
  const shiftKeyLegacy = `${guardId}-${day}`;
  const guardShift = (shifts && shiftKeyWithWeek && shifts[shiftKeyWithWeek]) || (shifts && shifts[shiftKeyLegacy]) || null;
  
  if (lessons && Array.isArray(lessons)) {
    const guardLessons = lessons.filter(l => l.guardId === guardId && l.day === day);
    for (const lesson of guardLessons) {
      lessonEquivMinutes += parseInt(lesson.durationMinutes || 0) * lessonMultiplier;
    }
  }

  // Total weighted minutes
  const totalMinutes =
    rawStandMinutes +
    doorMinutes * doorCreditMultiplier +
    lessonEquivMinutes;

  // Shift duration for this guard
  let shiftDurationMinutes = 0;
  if (guardShift) {
    shiftDurationMinutes = getTimeDuration(guardShift.startTime, guardShift.endTime) - (guardShift.breakMinutes || 0);
  }

  // Percentage (0–100)
  const percentage =
    shiftDurationMinutes > 0 ? (totalMinutes / shiftDurationMinutes) * 100 : 0;

  return {
    rawStandMinutes,
    doorMinutes,
    lessonEquivMinutes: Math.round(lessonEquivMinutes * 10) / 10,
    totalMinutes: Math.round(totalMinutes * 10) / 10,
    shiftDurationMinutes,
    percentage: Math.round(percentage * 10) / 10,
  };
}


/**
 * crewStats.js
 */

/**
 * crewStats.js
 *
 * Crew-level stand-time statistics and colour-status helpers.
 * Works with the store's flat-map data format.
 */


/**
 * Get the mean stand-time percentage for all guards in a crew section
 * who are working on a given day.
 *
 * @param {string} crewSection - 'AM' or 'PM'
 * @param {string} day - Day of the week
 * @param {Array}  guards - Array of guard objects { id, crewSection }
 * @param {Object} blockAssignments - Store's flat map { "blockId-position": guardId }
 * @param {Array}  blocks - RotationBlock array for the day
 * @param {Object} shifts - Store's flat map { "guardId-day": shiftEntry }
 * @param {Object} settings - App settings
 * @returns {number} Mean percentage (0–100). Returns 0 if no guards qualify.
 */
function getCrewAverageStandTime(crewSection, day, guards, blockAssignments, blocks, shifts, settings, lessons, week) {
  const workingGuards = guards.filter(guard => {
    if (guard.crewSection !== crewSection) return false;
    const keyWithWeek = week ? `${guard.id}-${day}-${week}` : null;
    const keyLegacy = `${guard.id}-${day}`;
    return (shifts && keyWithWeek && shifts[keyWithWeek] != null) || (shifts && shifts[keyLegacy] != null);
  });

  if (workingGuards.length === 0) return 0;

  let totalPercentage = 0;
  for (const guard of workingGuards) {
    const stats = calcGuardStandTime(guard.id, day, blockAssignments, blocks, shifts, settings, lessons, week);
    totalPercentage += stats.percentage;
  }

  return totalPercentage / workingGuards.length;
}

/**
 * Get a colour status based on a guard's stand-time percentage relative to
 * the crew average.
 *
 * @param {number} guardPercentage - Individual guard's stand-time %
 * @param {number} crewAverage - Crew average stand-time %
 * @returns {'green' | 'amber' | 'blue'}
 */
function getStandTimeStatus(guardPercentage, crewAverage) {
  const diff = guardPercentage - crewAverage;
  if (diff > 5) return 'amber';
  if (diff < -5) return 'blue';
  return 'green';
}


/**
 * guardAvailability.js
 */

/**
 * guardAvailability.js
 *
 * Availability and teaching-conflict checks for guards against
 * individual rotation blocks.
 * 
 * Works with the store's flat-map shift format:
 * shifts: { "guardId-day": { startTime, endTime, hasLessons, lessonMinutes, lessonStart, lessonEnd } }
 */


/**
 * Check if a guard is available for a specific rotation block.
 * Guard's shift must cover the entire block.
 *
 * @param {string} guardId
 * @param {{ startTime: string, endTime: string }} block
 * @param {Object} shifts - Store's flat shift map
 * @param {string} day - Day of the week
 * @returns {boolean}
 */
function isGuardAvailableForBlock(guardId, block, shifts, day, week) {
  const keyWithWeek = (day && week) ? `${guardId}-${day}-${week}` : null;
  const keyWithoutWeek = day ? `${guardId}-${day}` : guardId;
  const guardShift = (shifts && keyWithWeek && shifts[keyWithWeek]) || (shifts && shifts[keyWithoutWeek]) || null;
  if (!guardShift) return false;

  const shiftStart = timeToMinutes(guardShift.startTime);
  const shiftEnd = timeToMinutes(guardShift.endTime);
  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);

  return shiftStart <= blockStart && shiftEnd >= blockEnd;
}

/**
 * Check if a guard is teaching during a block.
 *
 * @param {string} guardId
 * @param {{ startTime: string, endTime: string }} block
 * @param {Object} shifts - Store's flat shift map
 * @param {string} day - Day of the week
 * @returns {boolean}
 */
function isGuardTeachingDuringBlock(guardId, block, day, lessons) {
  if (!lessons || !Array.isArray(lessons)) {
    return false;
  }

  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);

  return lessons.some(lesson => {
    if (lesson.guardId !== guardId || lesson.day !== day) {
      return false;
    }
    const lessonStart = timeToMinutes(lesson.startTime);
    const lessonEnd = timeToMinutes(lesson.endTime);
    return lessonStart < blockEnd && lessonEnd > blockStart;
  });
}

/**
 * Get all guards that are available for a given block and are not teaching.
 *
 * @param {Array<{ id: string }>} guards
 * @param {{ startTime: string, endTime: string }} block
 * @param {Object} shifts
 * @param {string} day
 * @param {Array} lessons
 * @param {string} week
 * @returns {Array<{ id: string }>}
 */
function getAvailableGuards(guards, block, shifts, day, lessons, week) {
  return guards.filter(guard =>
    isGuardAvailableForBlock(guard.id, block, shifts, day, week) &&
    !isGuardTeachingDuringBlock(guard.id, block, day, lessons)
  );
}


/**
 * autoGenerator.js
 */

/**
 * autoGenerator.js
 *
 * Core rotation auto-generation engine.
 * Works with the store's data format:
 * - assignments: flat map { "blockId-position": guardId }
 * - shifts: flat map { "guardId-day": shiftEntry }
 * - rotationBlocks: { day: [blocks] }
 */


/**
 * Check if a guard's shift covers a block.
 */
function isAvailable(guardId, block, shifts, day, week) {
  const keyWithWeek = week ? `${guardId}-${day}-${week}` : null;
  const keyWithoutWeek = `${guardId}-${day}`;
  const shift = (shifts && keyWithWeek && shifts[keyWithWeek]) || (shifts && shifts[keyWithoutWeek]) || null;
  if (!shift) return false;
  const shiftStart = timeToMinutes(shift.startTime);
  const shiftEnd = timeToMinutes(shift.endTime);
  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);
  return shiftStart <= blockStart && shiftEnd >= blockEnd;
}

/**
 * Check if a guard has lessons overlapping a block.
 */
function isTeaching(guardId, block, day, lessons) {
  if (!lessons || !Array.isArray(lessons)) return false;
  
  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);
  
  return lessons.some(lesson => {
    if (lesson.guardId !== guardId || lesson.day !== day) return false;
    const lessonStart = timeToMinutes(lesson.startTime);
    const lessonEnd = timeToMinutes(lesson.endTime);
    return lessonStart < blockEnd && lessonEnd > blockStart;
  });
}

/**
 * Get a guard's current stand time percentage from the working assignments.
 */
function getGuardPercentage(guardId, day, blockAssignments, blocks, shifts, settings, lessons, week) {
  const stats = calcGuardStandTime(guardId, day, blockAssignments, blocks, shifts, settings, lessons, week);
  return stats.percentage;
}

/**
 * Check what position a guard was assigned to in a specific block.
 */
function getGuardPositionInBlock(guardId, blockId, blockAssignments, week) {
  const allPositions = ['stand1', 'stand2', 'stand3', 'stand4', 'stand5', 'stand6', 'door'];
  for (const pos of allPositions) {
    const keyWithWeek = week ? `${blockId}-${pos}-${week}` : null;
    const keyWithoutWeek = `${blockId}-${pos}`;
    const assignedGuard = (blockAssignments && keyWithWeek && blockAssignments[keyWithWeek]) || (blockAssignments && blockAssignments[keyWithoutWeek]) || null;
    if (assignedGuard === guardId) {
      return pos;
    }
  }
  return null;
}

/**
 * Generate rotation assignments for a given day and crew section.
 *
 * @param {string} day - Day of the week
 * @param {string} crewSection - 'AM' or 'PM'
 * @param {Object} state - Full store state
 * @returns {Array<{blockId: string, position: string, guardId: string}>}
 */
function generateRotation(day, crewSection, state) {
  const { guards, shifts, settings, rotationBlocks, blockAssignments, lessons = [], selectedWeek } = state;
  const filteredLessons = selectedWeek ? lessons.filter(l => l.week === selectedWeek) : lessons;
  const standCount = settings.standCount ?? 2;
  const blockKey = selectedWeek ? `${day}-${selectedWeek}` : day;
  const blocks = (rotationBlocks[blockKey] || rotationBlocks[day] || []).slice().sort(
    (a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)
  );

  // Get guards in this crew who are working today
  const crewGuards = guards.filter(g => {
    if (g.crewSection !== crewSection) return false;
    const keyWithWeek = selectedWeek ? `${g.id}-${day}-${selectedWeek}` : null;
    const keyWithoutWeek = `${g.id}-${day}`;
    return !!((shifts && keyWithWeek && shifts[keyWithWeek]) || (shifts && shifts[keyWithoutWeek]));
  });

  if (crewGuards.length === 0 || blocks.length === 0) return [];

  const crewGuardIds = crewGuards.map(g => g.id);
  
  // Working copy of assignments (to track running totals)
  const workingAssignments = { ...blockAssignments };
  const newAssignments = [];
  let previousBlockId = null;

  for (const block of blocks) {
    // Skip closed blocks
    if (block.guardCountOverride === 0) {
      previousBlockId = block.id;
      continue;
    }

    const activeStandCount = block.guardCountOverride !== null ? block.guardCountOverride : standCount;
    const positionsToFill = getPositions(activeStandCount, settings?.excludeDoor);

    // Get eligible guards
    const eligible = crewGuardIds.filter(gid =>
      isAvailable(gid, block, shifts, day, selectedWeek) &&
      !isTeaching(gid, block, day, filteredLessons)
    );



    if (eligible.length === 0) {
      previousBlockId = block.id;
      continue;
    }

    // Get current percentages for sorting
    const pctMap = new Map();
    const allDayBlocks = rotationBlocks[blockKey] || rotationBlocks[day] || [];
    for (const gid of crewGuardIds) {
      pctMap.set(gid, getGuardPercentage(gid, day, workingAssignments, allDayBlocks, shifts, settings, filteredLessons, selectedWeek));
    }

    // Build score matrix for matching
    const scoreMatrix = new Map();
    for (const gid of eligible) {
      const pct = pctMap.get(gid) ?? 0;
      
      // Calculate consecutive on-duty minutes worked leading up to current block
      let consecMinutes = 0;
      let currPrevBlockId = previousBlockId;
      while (currPrevBlockId) {
        const prevBlock = blocks.find(b => b.id === currPrevBlockId);
        if (!prevBlock) break;
        const workedPos = getGuardPositionInBlock(gid, currPrevBlockId, workingAssignments, selectedWeek);
        if (workedPos) {
          consecMinutes += prevBlock.interval;
          const prevIdx = blocks.findIndex(b => b.id === currPrevBlockId);
          currPrevBlockId = prevIdx > 0 ? blocks[prevIdx - 1].id : null;
        } else {
          break;
        }
      }

      // Position in previous block
      const prevPos = previousBlockId ? getGuardPositionInBlock(gid, previousBlockId, workingAssignments, selectedWeek) : null;
      const prevPosName = prevPos || 'break';

      for (const pos of positionsToFill) {
        // Base score: prefer lower percentages to balance stand time
        let score = -pct * 10;

        // 1. Consecutive duty limit penalty (max 1 hour / 60 mins straight)
        if (consecMinutes + block.interval > 60) {
          score -= 500000;
        }

        // 2. Stair step bonus
        let isStairStepMatch = false;
        if (pos.startsWith('stand')) {
          const standNum = parseInt(pos.replace('stand', ''));
          if (standNum > 1) {
            // preceding position is stand(num-1)
            if (prevPosName === `stand${standNum - 1}`) {
              isStairStepMatch = true;
            }
          } else {
            // stand1: preceding is break
            if (prevPosName === 'break') {
              isStairStepMatch = true;
            }
          }
        } else if (pos === 'door') {
          // preceding position is the last stand of the previous block
          let prevStandCount = standCount;
          if (previousBlockId) {
            const prevBlockObj = blocks.find(b => b.id === previousBlockId);
            const prevStands = prevBlockObj && prevBlockObj.guardCountOverride !== null ? prevBlockObj.guardCountOverride : standCount;
            prevStandCount = prevStands;
          }
          if (prevPosName === `stand${prevStandCount}`) {
            isStairStepMatch = true;
          }
        }

        if (isStairStepMatch) {
          score += 500;
        }

        // 3. Door to stand penalty
        if (prevPosName === 'door' && pos.startsWith('stand')) {
          score -= 300;
        }

        // 4. Break to duty bonus (prefer bringing back off-duty guards)
        if (prevPosName === 'break') {
          score += 50;
        }

        scoreMatrix.set(`${gid}-${pos}`, score);

      }
    }

    // Find the best assignment of eligible guards to positionsToFill using backtracking
    let bestScore = -Infinity;
    let bestMatch = [];

    function backtrack(posIdx, currentMatch, currentScore, assignedGuardsSet) {
      if (posIdx === positionsToFill.length) {
        if (currentScore > bestScore) {
          bestScore = currentScore;
          bestMatch = [...currentMatch];
        }
        return;
      }

      const pos = positionsToFill[posIdx];
      // Include null to allow leaving slots empty if there are not enough guards
      const candidates = [...eligible, null];
      for (const gid of candidates) {
        if (gid && assignedGuardsSet.has(gid)) continue;

        if (gid) assignedGuardsSet.add(gid);
        currentMatch.push(gid);
        
        // Give empty slot a penalty of -100000 so real guards are prioritized
        const score = gid ? (scoreMatrix.get(`${gid}-${pos}`) ?? -500000) : -100000;
        
        backtrack(posIdx + 1, currentMatch, currentScore + score, assignedGuardsSet);
        
        currentMatch.pop();
        if (gid) assignedGuardsSet.delete(gid);
      }
    }

    // Run matching
    backtrack(0, [], 0, new Set());



    // Record assignments
    for (let i = 0; i < positionsToFill.length; i++) {
      const position = positionsToFill[i];
      const chosen = bestMatch[i];
      if (chosen) {
        const key = selectedWeek ? `${block.id}-${position}-${selectedWeek}` : `${block.id}-${position}`;
        workingAssignments[key] = chosen;
        newAssignments.push({ blockId: block.id, position, guardId: chosen });
      }
    }

    previousBlockId = block.id;
  }

  return newAssignments;
}

/**
 * Re-balance from a specific block onward.
 * Keeps assignments before startBlockId, regenerates from there.
 * 
 * @param {string} startBlockId
 * @param {string} day
 * @param {string} crewSection
 * @param {Object} state
 * @returns {Array<{blockId: string, position: string, guardId: string}>}
 */
function rebalanceFrom(startBlockId, day, crewSection, state) {
  const { selectedWeek, rotationBlocks } = state;
  const blockKey = selectedWeek ? `${day}-${selectedWeek}` : day;
  const blocks = (rotationBlocks[blockKey] || rotationBlocks[day] || []).slice().sort(
    (a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)
  );

  const startIdx = blocks.findIndex(b => b.id === startBlockId);
  if (startIdx === -1) {
    return generateRotation(day, crewSection, state);
  }

  // Get block IDs after the start point
  const blocksToRegenerate = new Set(blocks.slice(startIdx).map(b => b.id));
  
  // Remove assignments for blocks being regenerated (for this crew's guards only)
  const crewGuardIds = new Set(
    state.guards.filter(g => g.crewSection === crewSection).map(g => g.id)
  );

  const cleanAssignments = { ...state.blockAssignments };
  for (const key of Object.keys(cleanAssignments)) {
    const blockId = extractBlockId(key);
    if (blocksToRegenerate.has(blockId) && crewGuardIds.has(cleanAssignments[key])) {
      delete cleanAssignments[key];
    }
  }

  // Re-generate with cleaned state
  const modifiedState = {
    ...state,
    blockAssignments: cleanAssignments
  };

  return generateRotation(day, crewSection, modifiedState);
}

/**
 * Extract block ID from an assignment key like "uuid-position"
 * UUIDs have format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx (36 chars)
 */
function extractBlockId(key) {
  // UUID is 36 chars, so blockId is key.slice(0, 36)
  return key.slice(0, 36);
}

const app = document.getElementById('app');
let selectedGuardId = 'all';
let selectedReadOnlyTab = 'rotation';
const selectedBlockIds = new Set();
let lastRenderedDay = null;
let lastRenderedTab = null;

function getMonday(d) {
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function extractBlockIdFromAssignmentKey(key) {
  const parts = key.split('-');
  const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(key);
  return isLegacy ? parts.slice(0, -1).join('-') : parts.slice(0, -4).join('-');
}



function getFilteredLessonsForWeek(state) {
  const weekStr = state.selectedWeek;
  return (state.lessons || []).filter(l => l.week === weekStr);
}

const initialWeek = store.getState().selectedWeek;
let currentWeekStart = initialWeek ? new Date(initialWeek + 'T00:00:00') : getMonday(new Date());

function render() {
  const state = store.getState();
  
  // Save scroll positions safely
  const hasQuerySelector = typeof document !== 'undefined' && typeof document.querySelector === 'function';
  const calendarBody = hasQuerySelector ? document.querySelector('.calendar-body') : null;
  const calendarScrollTop = calendarBody ? calendarBody.scrollTop : 0;
  const calendarScrollLeft = calendarBody ? calendarBody.scrollLeft : 0;
  const windowScrollX = typeof window !== 'undefined' ? (window.scrollX || 0) : 0;
  const windowScrollY = typeof window !== 'undefined' ? (window.scrollY || 0) : 0;

  if (state.selectedWeek) {
    currentWeekStart = new Date(state.selectedWeek + 'T00:00:00');
  }
  
  if (state.selectedDay !== lastRenderedDay || state.activeTab !== lastRenderedTab) {
    selectedBlockIds.clear();
    lastRenderedDay = state.selectedDay;
    lastRenderedTab = state.activeTab;
  }

  if (state.isReadOnly) {
    if (state.isLessonsOnly) {
      app.innerHTML = renderReadOnlyLessonsPortal(state);
      attachReadOnlyLessonsPortalEvents(state);
    } else {
      app.innerHTML = renderReadOnlyPortal(state);
      attachReadOnlyPortalEvents(state);
    }
    
    // Restore scroll positions safely
    if (typeof window !== 'undefined' && typeof window.scrollTo === 'function') {
      window.scrollTo(windowScrollX, windowScrollY);
    }
    const newCalendarBody = hasQuerySelector ? document.querySelector('.calendar-body') : null;
    if (newCalendarBody) {
      newCalendarBody.scrollTop = calendarScrollTop;
      newCalendarBody.scrollLeft = calendarScrollLeft;
    }
    return;
  }

  app.innerHTML = `
    ${renderNavBar(state)}
    ${renderSubNav(state)}
    <div class="main-content">
      ${renderActiveTab(state)}
    </div>
  `;
  attachGlobalEvents(state);

  // Restore scroll positions safely
  if (typeof window !== 'undefined' && typeof window.scrollTo === 'function') {
    window.scrollTo(windowScrollX, windowScrollY);
  }
  const newCalendarBody = hasQuerySelector ? document.querySelector('.calendar-body') : null;
  if (newCalendarBody) {
    newCalendarBody.scrollTop = calendarScrollTop;
    newCalendarBody.scrollLeft = calendarScrollLeft;
  }
}

async function handleRouting() {
  const hash = window.location.hash;
  const state = store.getState();
  
  if (hash.startsWith('#/view/')) {
    const payload = hash.substring(7);
    try {
      const json = await store.decompressState(payload);
      const data = JSON.parse(json);
      store.loadReadOnlyState(data);
      store.setLessonsOnly(false);
      selectedReadOnlyTab = 'schedule';
    } catch (e) {
      console.error('Error loading shared schedule', e);
      showToast('Failed to load shared schedule. Using local copy.', 'error');
      window.location.hash = '';
      store.exitReadOnly();
    }
  } else if (hash.startsWith('#/rotation-view/')) {
    const payload = hash.substring(16);
    try {
      const json = await store.decompressState(payload);
      const data = JSON.parse(json);
      store.loadReadOnlyState(data);
      store.setLessonsOnly(false);
      selectedReadOnlyTab = 'rotation';
    } catch (e) {
      console.error('Error loading shared rotation schedule', e);
      showToast('Failed to load shared rotation. Using local copy.', 'error');
      window.location.hash = '';
      store.exitReadOnly();
    }
  } else if (hash.startsWith('#/lessons-view/')) {
    const payload = hash.substring(15);
    try {
      const json = await store.decompressState(payload);
      const data = JSON.parse(json);
      store.loadReadOnlyState(data);
      store.setLessonsOnly(true);
    } catch (e) {
      console.error('Error loading shared lessons', e);
      showToast('Failed to load shared lessons. Using local copy.', 'error');
      window.location.hash = '';
      store.exitReadOnly();
    }
  } else {
    if (state.isReadOnly) {
      store.exitReadOnly();
      store.setLessonsOnly(false);
    }
  }
}

window.addEventListener('hashchange', handleRouting);

// Run routing first, then subscribe and render
handleRouting().finally(() => {
  store.subscribe(render);
  render();
});

    if (shift) {
      const dur = getTimeDuration(shift.startTime, shift.endTime) - (shift.breakMinutes || 0);
      if (dur > 0) total += dur;
    }
  });
  return total;
}

function renderFloatingSelectionBar(state) {
  const day = state.selectedDay;
  const blocks = store.getBlocksForDay(day);
  const selected = blocks.filter(b => selectedBlockIds.has(b.id));
  
  selected.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
  
  let totalDuration = 0;
  let timeRangeStr = '';
  if (selected.length > 0) {
    const earliestStart = selected[0].startTime;
    const latestEnd = selected[selected.length - 1].endTime;
    timeRangeStr = `${formatTime(earliestStart)} – ${formatTime(latestEnd)}`;
    
    for (const b of selected) {
      totalDuration += b.interval;
    }
  }

  return `
    <div class="selection-floating-bar">
      <div class="selection-info">
        <span class="selection-count">💡 <b>${selected.length}</b> block${selected.length > 1 ? 's' : ''} selected</span>
        <span class="selection-details">(${totalDuration} min • ${timeRangeStr})</span>
      </div>
      <div class="selection-actions">
        <button class="btn btn-primary btn-sm" onclick="window.__openDivideModal()">
          ✂️ Re-divide
        </button>
        <button class="btn btn-danger btn-sm" onclick="window.__deleteSelectedBlocks()">
          🗑 Delete
        </button>
        <button class="btn btn-ghost btn-sm" onclick="window.__clearBlockSelection()">
          ✕ Clear
        </button>
      </div>
    </div>
  `;
}


function fTime(time) {
  return formatTime(time).replace(/(AM|PM)/g, '<small style="font-size:0.8em">$1</small>');
}

function renderBlockGrid(blocks, state) {
  return `

        const isClosed = stands === 0;
        const intervalDisplay = block.interval !== state.settings.rotationIntervalMinutes
          ? `<span class="interval-tag">⏱ ${block.interval}m</span>` : '';
        const isChecked = selectedBlockIds.has(block.id);

        return `
          <div class="block-row ${isClosed ? 'closed' : ''} ${isChecked ? 'selected-row' : ''}" id="block-${block.id}">
            <div class="block-select-cell">
              <input type="checkbox" class="block-select-checkbox" 
                     ${isChecked ? 'checked' : ''}
                     onchange="window.__toggleBlockSelection('${block.id}', this.checked)" />
            </div>
            <div class="block-time-label">
              <span class="time-range">${fTime(block.startTime)} – ${fTime(block.endTime)}</span>
              ${intervalDisplay}
              ${isClosed ? '<span class="status-pill closed">Closed</span>' : ''}
              <button class="btn btn-ghost btn-icon btn-sm split-row-btn" title="Split Block"
                      onclick="window.__quickSplitBlock('${block.id}')">
                ✂️

              <button class="btn btn-ghost btn-icon btn-sm clear-row-btn" title="Clear Block Assignments"

                <button onclick="window.__updateBlockGuardCount('${block.id}', ${Math.max(0, stands - 1)})" ${stands <= 0 ? 'disabled' : ''}>−</button>

function renderBlockAssignments(block, standCount, state) {
  const positions = getPositions(standCount, state.settings?.excludeDoor);
  const slots = positions.map(pos => {
    const guardId = store.getAssignment(block.id, pos, state.selectedWeek);
    const guard = guardId ? store.getGuardById(guardId) : null;
    const posType = isStandPosition(pos) ? 'stand' : 'door';
    return `
      <div class="assignment-slot ${posType} ${guard ? 'filled' : ''}"
           data-block-id="${block.id}" data-position="${pos}"
           id="slot-${block.id}-${pos}"
           draggable="${guard ? 'true' : 'false'}"
             onclick="window.__toggleAssignmentDropdown(event, '${block.id}', '${pos}')"
           ondragstart="window.__onDragStart(event, '${block.id}', '${pos}')"
           ondragover="window.__onDragOver(event)"
           ondrop="window.__onDrop(event, '${block.id}', '${pos}')"
           ondragleave="window.__onDragLeave(event)"
           ondragend="window.__onDragEnd(event)">
        <span class="position-label">${getPositionLabel(pos)}</span>
        <span class="assigned-guard">${guard ? guard.name : '- empty -'}</span>

  return slots.join('');
}

function renderTrackerTab(state) {
  return `
    <div class="rotation-layout">
      <div>

          </div>

          </div>
        </div>
      </div>
      <div>
        ${renderDailyTracker(state)}
      </div>
    </div>
  `;
}

function renderDailyTracker(state) {
  const day = state.selectedDay;
  const crew = state.selectedCrew === 'Both' ? null : state.selectedCrew;
  const guardsToday = store.getGuardsWorkingDay(day, crew, state.selectedWeek);
  const blocks = store.getBlocksForDay(day);
  const settings = state.settings;
  const filteredLessons = getFilteredLessonsForWeek(state);

  // Compute crew average
  const crewAvg = {};
  if (guardsToday.length > 0) {
    ['AM', 'PM'].forEach(cs => {
      const crewGuards = guardsToday.filter(g => g.crewSection === cs);
      if (crewGuards.length > 0) {
        const total = crewGuards.reduce((sum, g) => {
          const st = calcGuardStandTime(g.id, day, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);
          return sum + st.percentage;
        }, 0);
        crewAvg[cs] = total / crewGuards.length;
      }
    });
  }

  return `
    <div class="card">
      <div class="card-header">
        <h3>📊 ${day} Tracker</h3>
        <span class="text-xs text-tertiary">${guardsToday.length} guards</span>
      </div>
      <div class="card-body">
        ${guardsToday.length === 0 ? `
          <div class="text-xs text-tertiary" style="text-align:center;padding:20px;">
            No guards working ${day}
          </div>
        ` : `
          <div class="tracker-panel">
            ${guardsToday.map(g => {
              const st = calcGuardStandTime(g.id, day, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);
              const avg = crewAvg[g.crewSection] || 0;
              const status = getStandTimeStatus(st.percentage, avg);
              const pctDisplay = isNaN(st.percentage) ? 0 : Math.round(st.percentage);
              const doorMult = settings.doorCreditMultiplier ?? (settings.doorCreditPercent !== undefined ? settings.doorCreditPercent / 100 : 0.5);

              return `
                <div class="stand-time-bar-container" id="tracker-bar-${g.id}">
                  <div class="stand-time-header">
                    <div class="guard-label flex items-center gap-2">
                      <div class="guard-avatar ${g.crewSection.toLowerCase()}" style="width:20px;height:20px;font-size:0.55rem;">
                        ${g.name.charAt(0)}
                      </div>
                      ${g.name}
                    </div>
                    <span class="percentage-label" style="color: var(--status-${status})">${pctDisplay}%</span>
                  </div>
                  <div class="stand-time-track">
                    <div class="stand-time-fill ${status}" style="width: ${Math.min(100, pctDisplay)}%"></div>
                  </div>
                  <div class="stand-time-detail">
                    Stand: ${st.rawStandMinutes}m • Door: ${st.doorMinutes}m (${Math.round(st.doorMinutes * doorMult)}m credit) • Lessons: ${st.lessonEquivMinutes}m
                    ${st.shiftDurationMinutes > 0 ? ` • Shift: ${formatDuration(st.shiftDurationMinutes)}` : ''}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function renderWeeklyTrackerTable(state) {
  const days = store.getDays();
  const crew = state.selectedCrew === 'Both' ? null : state.selectedCrew;
  const guards = crew ? state.guards.filter(g => g.crewSection === crew) : state.guards;
  const settings = state.settings;
  const filteredLessons = getFilteredLessonsForWeek(state);

  if (guards.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h3>No Data to Display</h3>
        <p>Add guards and create rotation assignments to see stand-time tracking data.</p>
      </div>
    `;
  }

  return `
    <table class="weekly-tracker-table">
      <thead>
        <tr>
          <th style="text-align:left;">Guard</th>
          ${days.map((d, idx) => {
            const dayDate = new Date(currentWeekStart);
            dayDate.setDate(dayDate.getDate() + idx);
            const dateNum = dayDate.getDate();
            return `<th>${d.slice(0, 3)} (${dateNum})</th>`;
          }).join('')}
          <th style="font-weight:700;">Week Avg</th>
        </tr>
      </thead>
      <tbody>
        ${guards.map(g => {
          let totalPct = 0;
          let daysWorked = 0;

          const dayCells = days.map(d => {
            const shift = store.getShift(g.id, d, state.selectedWeek);
            if (!shift) return '<td><span class="percentage-cell none">—</span></td>';

            const blocks = store.getBlocksForDay(d);
            const st = calcGuardStandTime(g.id, d, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);

            // Compute day crew average for color
            const dayGuards = store.getGuardsWorkingDay(d, g.crewSection, state.selectedWeek);
            let dayAvg = 0;
            if (dayGuards.length > 0) {
              dayAvg = dayGuards.reduce((sum, dg) => {
                const dst = calcGuardStandTime(dg.id, d, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);
                return sum + dst.percentage;
              }, 0) / dayGuards.length;
            }

            const status = getStandTimeStatus(st.percentage, dayAvg);
            const pct = isNaN(st.percentage) ? 0 : Math.round(st.percentage);
            totalPct += (isNaN(st.percentage) ? 0 : st.percentage);
            daysWorked++;

            return `<td><span class="percentage-cell ${status}">${pct}%</span></td>`;
          }).join('');

          const weekAvg = daysWorked > 0 ? Math.round(totalPct / daysWorked) : 0;

          return `
            <tr>
              <td class="guard-name">
                <div class="flex items-center gap-2">
                  <div class="guard-avatar ${g.crewSection.toLowerCase()}" style="width:20px;height:20px;font-size:0.55rem;">
                    ${g.name.charAt(0)}
                  </div>
                  ${g.name}
                  <span class="crew-badge ${g.crewSection.toLowerCase()}" style="font-size:0.55rem;">${g.crewSection}</span>
                </div>
              </td>
              ${dayCells}
              <td><span class="percentage-cell ${weekAvg > 0 ? 'green' : 'none'}" style="font-weight:700;">${weekAvg > 0 ? weekAvg + '%' : '—'}</span></td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function showShiftModal(guardId, day) {
  const guard = store.getGuardById(guardId);
  if (!guard) return;

  const shift = store.getShift(guardId, day);
  const state = store.getState();
  const crew = guard.crewSection || 'AM';
  const defaultTimes = state.settings.defaultShiftTimes && state.settings.defaultShiftTimes[crew] && state.settings.defaultShiftTimes[crew][day]
    ? state.settings.defaultShiftTimes[crew][day]
    : { startTime: '09:00', endTime: '17:00' };
  const startTime = shift ? shift.startTime : defaultTimes.startTime;
  const endTime = shift ? shift.endTime : defaultTimes.endTime;
  const breakMinutes = shift ? (shift.breakMinutes || 0) : 0;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'shift-modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${guard.name} — ${day}</h3>
        <button class="btn btn-ghost btn-icon" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label class="form-label">Start Time</label>
            <input type="time" class="form-input" id="modal-start-time" value="${startTime}" />
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">End Time</label>
            <input type="time" class="form-input" id="modal-end-time" value="${endTime}" />
          </div>
        </div>
        <div class="form-row" style="margin-top: 10px;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">Break Duration</label>
            <select class="form-input" id="modal-break-minutes">
              <option value="0" ${breakMinutes === 0 ? 'selected' : ''}>No break</option>
              <option value="30" ${breakMinutes === 30 ? 'selected' : ''}>30 min</option>
              <option value="60" ${breakMinutes === 60 ? 'selected' : ''}>1 hour</option>
            </select>
          </div>
        </div>
        <div class="text-sm text-secondary" id="shift-duration-preview" style="margin-bottom: 10px;">
          Shift duration: ${formatDuration(getTimeDuration(startTime, endTime) - breakMinutes)}
        </div>
        
        <div style="margin-top: 15px; border-top: 1px solid var(--border-subtle); padding-top: 15px;">
          <label class="form-label" style="margin-bottom: 8px; display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);">Copy Shift to:</label>
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
            <div style="display: flex; gap: 6px;" id="modal-day-bubbles">
              ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].map((d, idx) => {
                const char = ['M', 'T', 'W', 'TH', 'F', 'S'][idx];
                const isCurrent = d === day;
                if (isCurrent) {
                  return `
                    <button class="day-bubble current" disabled 
                      style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--primary-600); background: var(--primary-900); color: white; font-weight: bold; font-size: 0.75rem; cursor: not-allowed; display: flex; align-items: center; justify-content: center; opacity: 0.75;">
                      ${char}
                    </button>
                  `;
                }
                return `
                  <button class="day-bubble selectable" data-day="${d}"
                    onclick="this.classList.toggle('selected'); this.style.background = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--bg-tertiary)'; this.style.color = this.classList.contains('selected') ? 'white' : 'var(--text-secondary)'; this.style.borderColor = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--border-default)';"
                    style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-default); background: var(--bg-tertiary); color: var(--text-secondary); font-weight: bold; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);">
                    ${char}
                  </button>
                `;
              }).join('')}
            </div>
            <button class="btn btn-secondary btn-sm" id="modal-copy-to-btn" style="padding: var(--space-1) var(--space-3); font-size: var(--font-xs);">Copy to</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        ${shift ? `<button class="btn btn-danger btn-sm" id="modal-clear-btn">Clear Shift</button>` : ''}
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn">Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  // Update duration preview
  const updatePreview = () => {
    const s = document.getElementById('modal-start-time').value;
    const en = document.getElementById('modal-end-time').value;
    const bm = parseInt(document.getElementById('modal-break-minutes').value) || 0;
    if (s && en) {
      document.getElementById('shift-duration-preview').textContent =
        `Shift duration: ${formatDuration(getTimeDuration(s, en) - bm)}`;
    }
  };
  document.getElementById('modal-start-time').addEventListener('change', updatePreview);
  document.getElementById('modal-end-time').addEventListener('change', updatePreview);
  document.getElementById('modal-break-minutes').addEventListener('change', updatePreview);

  // Save
  document.getElementById('modal-save-btn').addEventListener('click', () => {
    const st = document.getElementById('modal-start-time').value;
    const et = document.getElementById('modal-end-time').value;
    const bm = parseInt(document.getElementById('modal-break-minutes').value) || 0;

    if (!st || !et) {
      showToast('Please enter start and end times', 'warning');
      return;
    }

    // Save current day
    store.setShiftEntry(guardId, day, {
      startTime: st,
      endTime: et,
      breakMinutes: bm
    });

    // Also copy to selected days if any are selected
    const selectedBubbles = overlay.querySelectorAll('.day-bubble.selected');
    const selectedDays = Array.from(selectedBubbles).map(b => b.dataset.day);
    selectedDays.forEach(selectedDay => {
      store.setShiftEntry(guardId, selectedDay, {
        startTime: st,
        endTime: et,
        breakMinutes: bm
      });
    });

    if (selectedDays.length > 0) {
      showToast(`Shift saved and copied to ${selectedDays.join(', ')}`, 'success');
    } else {
      showToast(`Shift saved for ${guard.name} on ${day}`, 'success');
    }
    overlay.remove();
  });

  // Copy to button
  const copyToBtn = document.getElementById('modal-copy-to-btn');
  if (copyToBtn) {
    copyToBtn.addEventListener('click', () => {
      const st = document.getElementById('modal-start-time').value;
      const et = document.getElementById('modal-end-time').value;
      const bm = parseInt(document.getElementById('modal-break-minutes').value) || 0;

      if (!st || !et) {
        showToast('Please enter start and end times', 'warning');
        return;
      }

      const selectedBubbles = overlay.querySelectorAll('.day-bubble.selected');
      if (selectedBubbles.length === 0) {
        showToast('Please select at least one day to copy to', 'warning');
        return;
      }

      const selectedDays = Array.from(selectedBubbles).map(b => b.dataset.day);

      // Save current day
      store.setShiftEntry(guardId, day, {
        startTime: st,
        endTime: et,
        breakMinutes: bm
      });

      // Copy and overwrite selected days
      selectedDays.forEach(selectedDay => {
        store.setShiftEntry(guardId, selectedDay, {
          startTime: st,
          endTime: et,
          breakMinutes: bm
        });
      });

      showToast(`Shift copied to ${selectedDays.join(', ')}`, 'success');
      overlay.remove();
    });
  }

  // Clear
  const clearBtn = document.getElementById('modal-clear-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (confirm(`Remove shift on ${day}?`)) {
        store.removeShiftEntry(guardId, day);
        showToast('Shift cleared', 'info');
        overlay.remove();
      }
    });
  }
}

// ─── Lessons Calendar Tab Helpers & Modal ────────────────

function formatWeekLabel(startDate) {
  const start = new Date(startDate);
  const end = new Date(startDate);
  end.setDate(start.getDate() + 5);
  
  const startMonth = start.toLocaleDateString('en-US', { month: 'short' });
  const startDateNum = start.getDate();
  const endMonth = end.toLocaleDateString('en-US', { month: 'short' });
  const endDateNum = end.getDate();
  
  if (startMonth === endMonth) {
    return `Week of ${startMonth} ${startDateNum} – ${endDateNum}`;
  } else {
    return `Week of ${startMonth} ${startDateNum} – ${endMonth} ${endDateNum}`;
  }
}

function getWeeklyTimeRange(state) {
  const startStr = state.settings?.lessonsStartTime || '08:00';
  const endStr = state.settings?.lessonsEndTime || '18:00';
  let earliest = timeToMinutes(startStr);
  let latest = timeToMinutes(endStr);

  if (earliest >= latest) {
    earliest = 480;
    latest = 1080;
  }

  return { earliest, latest };
}

function getPositionedLessons(lessons, day, earliest, latest) {
  const dayLessons = lessons.filter(l => l.day === day);
  
  // Sort by startTime
  dayLessons.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
  
  const columns = [];
  for (const lesson of dayLessons) {
    let placed = false;
    const start = timeToMinutes(lesson.startTime);
    const end = timeToMinutes(lesson.endTime);
    
    for (let cIdx = 0; cIdx < columns.length; cIdx++) {
      const overlaps = columns[cIdx].some(other => {
        const oStart = timeToMinutes(other.startTime);
        const oEnd = timeToMinutes(other.endTime);
        return start < oEnd && end > oStart;
      });
      
      if (!overlaps) {
        columns[cIdx].push(lesson);
        lesson.colIdx = cIdx;
        placed = true;
        break;
      }
    }
    
    if (!placed) {
      columns.push([lesson]);
      lesson.colIdx = columns.length - 1;
    }
  }
  
  const totalDuration = latest - earliest;
  return dayLessons.map(lesson => {
    const start = timeToMinutes(lesson.startTime);
    const duration = parseInt(lesson.durationMinutes);
    const top = ((start - earliest) / totalDuration) * 100;
    const height = (duration / totalDuration) * 100;
    
    const width = 100 / columns.length;
    const left = lesson.colIdx * width;
    
    return {
      lesson,
      top,
      height,
      width,
      left
    };
  });
}

function parseTimeInput(timeStr) {
  if (/^\d{2}:\d{2}$/.test(timeStr.trim())) {
    return timeStr.trim();
  }
  const match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!match) return null;
  let hours = parseInt(match[1]);
  const minutes = parseInt(match[2]);
  const ampm = match[3].toUpperCase();
  
  if (ampm === 'PM' && hours < 12) hours += 12;
  if (ampm === 'AM' && hours === 12) hours = 0;
  
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
}
