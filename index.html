// Detect GitHub rate-limiting from a non-OK response. A bare 403 is NOT always
// rate-limiting (GitHub also uses it for missing token scopes), so we only treat
// 403 as rate-limit when remaining quota is 0 or a Retry-After header is present.
// 429 is always rate-limiting. Returns a typed Error (err.isRateLimit = true,
// err.retryAfter = seconds) or null if the response isn't a rate-limit.
function rateLimitErrorFromResponse(response) {
  const remaining = response.headers.get('X-RateLimit-Remaining');
  const retryAfter = response.headers.get('Retry-After');
  const isRateLimit =
    response.status === 429 ||
    (response.status === 403 && (remaining === '0' || retryAfter != null));
  if (!isRateLimit) return null;

  let waitSec = 0;
  if (retryAfter != null) {
    const parsed = parseInt(retryAfter, 10);
    if (!isNaN(parsed)) waitSec = parsed;
  } else {
    const reset = response.headers.get('X-RateLimit-Reset');
    if (reset != null) {
      const resetMs = parseInt(reset, 10) * 1000;
      if (!isNaN(resetMs)) waitSec = Math.max(0, Math.ceil((resetMs - Date.now()) / 1000));
    }
  }
  const err = new Error('GitHub API rate limit reached. Sync will resume automatically.');
  err.isRateLimit = true;
  err.retryAfter = waitSec;
  return err;
}

async function fetchGistAPI(token, gistId) {
  const headers = {
    'Authorization': `token ${token}`,
    'Accept': 'application/vnd.github.v3+json'
  };
  const response = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
  if (!response.ok) {
    const rlErr = rateLimitErrorFromResponse(response);
    if (rlErr) throw rlErr;
    if (response.status === 404) throw new Error('Gist not found. Check your Gist ID.');
    if (response.status === 401) throw new Error('Unauthorized token. Check your GitHub Token.');
    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
  }
  return await response.json();
}

async function createGistAPI(token, filename, content) {
  const headers = {
    'Authorization': `token ${token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  const body = JSON.stringify({
    description: "Lifeguard Rotation Schedule Data",
    public: false, // Secret gist
    files: {
      [filename]: {
        content: content
      }
    }
  });
  const response = await fetch(`https://api.github.com/gists`, {
    method: 'POST',
    headers,
    body
  });
  if (!response.ok) {
    const rlErr = rateLimitErrorFromResponse(response);
    if (rlErr) throw rlErr;
    if (response.status === 401) throw new Error('Unauthorized token. Check your GitHub Token.');
    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
  }
  return await response.json();
}

async function updateGistAPI(token, gistId, filename, content) {
  const headers = {
    'Authorization': `token ${token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  const body = JSON.stringify({
    files: {
      [filename]: {
        content: content
      }
    }
  });
  const response = await fetch(`https://api.github.com/gists/${gistId}`, {
    method: 'PATCH',
    headers,
    body
  });
  if (!response.ok) {
    const rlErr = rateLimitErrorFromResponse(response);
    if (rlErr) throw rlErr;
    if (response.status === 401) throw new Error('Unauthorized token. Check your GitHub Token.');
    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
  }
  return await response.json();
}

let lastVisibilityCheckTime = 0;
let lastUserActivityTime = Date.now();

if (typeof window !== 'undefined') {
  const updateActivity = () => { lastUserActivityTime = Date.now(); };
  window.addEventListener('mousemove', updateActivity, { passive: true });
  window.addEventListener('keydown', updateActivity, { passive: true });
  window.addEventListener('mousedown', updateActivity, { passive: true });
  window.addEventListener('touchstart', updateActivity, { passive: true });
}

// Read a gist file's full content. GitHub truncates file bodies over ~1 MB,
// setting `truncated: true` and exposing the full body only at `raw_url`.
// Secret-gist raw_urls carry their own capability hash and need no auth header.
async function getGistFileContent(gist, filename) {
  const file = gist && gist.files ? gist.files[filename] : null;
  if (!file) return null;
  if (file.truncated && file.raw_url) {
    const response = await fetch(file.raw_url);
    if (!response.ok) {
      throw new Error(`Failed to fetch full gist content: HTTP ${response.status}`);
    }
    return await response.text();
  }
  return file.content != null ? file.content : null;
}

async function isCloudVersionNewer(gist, cloudUpdatedAt) {
  const { gistFilename, syncRevision, lastGistSyncTime } = syncConfig;
  let content = null;
  try {
    content = await getGistFileContent(gist, gistFilename);
  } catch (e) {
    console.warn('Failed to read cloud content for revision check:', e);
  }
  if (content) {
    try {
      const cloudData = JSON.parse(content);
      const cloudRevision = cloudData._syncRevision || 0;
      const localRevision = syncRevision || 0;

      if (cloudRevision > localRevision) {
        return true;
      }
      // NOTE: We intentionally do NOT return false on revision equality.
      // Each device increments its own counter, so two devices can both go
      // 5 → 6 independently and reach the same revision with DIFFERENT content
      // (e.g. after a forced-push conflict resolution). Declaring "in sync" on
      // the counter alone would hide that divergence permanently. Instead we
      // fall through to the timestamp comparison below: lastGistSyncTime is set
      // to the cloud's exact updated_at after every push/pull, so equal
      // revisions with identical content give cloudTime === localTime (not
      // newer), while genuine divergence gives cloudTime > localTime.
    } catch (e) {
      console.warn('Failed to parse cloud content for revision check:', e);
    }
  }

  if (lastGistSyncTime) {
    const cloudTime = new Date(cloudUpdatedAt).getTime();
    const localTime = new Date(lastGistSyncTime).getTime();
    return cloudTime > localTime;
  }
  return true;
}

// Check if any popup, dropdown, or modal is currently open.
// A re-render while one of these is open would destroy it.
function hasOpenPopup() {
  if (typeof document === 'undefined') return false;
  return document.querySelector(
    '.modal-overlay, .assignment-dropdown, .sync-dropdown, .guard-dropdown-list'
  ) !== null;
}

// Full interaction check for background pulls: returns true if the user
// touched/moved/typed within the last 15 seconds OR has a popup open.
// Background pulls import foreign data and cause a full re-render,
// so we want a wide safety margin.
function isUserInteracting() {
  const isRecentlyActive = (Date.now() - lastUserActivityTime) < 15000;
  return isRecentlyActive || hasOpenPopup();
}

// Is it safe to apply a background pull right now? A pull re-renders the whole
// app, so we must never do it while a dropdown/modal is open or a drag is in
// progress — that would destroy the UI the user is working in. Outside those
// hard blockers we normally wait for a brief lull in activity, but once remote
// changes have been pending past the staleness threshold we pull at the next
// non-destructive moment regardless of recent typing/mouse movement.
// Update only the sync badge, not the whole app. Used for background status
// changes that may occur while the user is editing — a full notify()/render
// would rebuild app.innerHTML and destroy their in-progress input or dropdown.
function notifyBadgeOnly() {
  if (typeof window !== 'undefined' && typeof window.__refreshSyncBadge === 'function') {
    window.__refreshSyncBadge();
  }
}

function isSafeToPullNow() {
  if (hasOpenPopup()) return false;
  if (typeof document !== 'undefined' &&
      document.querySelector('.dragging, .dragging-guard')) {
    return false;
  }
  const pendingLongEnough =
    remoteChangesPendingSince &&
    (Date.now() - remoteChangesPendingSince) >= stalePullThresholdMs();
  if (pendingLongEnough) return true;
  return (Date.now() - lastUserActivityTime) >= 15000;
}

function handleVisibilityChange() {
  if (document.visibilityState === 'visible') {
    const now = Date.now();
    // Throttle: only check if at least 2 seconds since last check
    if (now - lastVisibilityCheckTime < 2000) return;
    lastVisibilityCheckTime = now;
    syncManager.checkSync();
  }
}

// Cross-tab coordination: when another tab in this browser changes the sync
// config or the synced baseline, the `storage` event fires in THIS tab.
// We reload the persisted values into memory (free, no API call) and then
// debounce + jitter a single cloud check so that N tabs don't stampede the
// GitHub API at the same instant when one tab pushes.
let storageSyncTimer = null;
function handleStorageChange(e) {
  if (!e || (e.key !== SYNC_CONFIG_KEY && e.key !== LAST_SYNCED_JSON_KEY)) return;
  if (e.key === SYNC_CONFIG_KEY) {
    syncConfig = loadSyncConfig();
  } else if (e.key === LAST_SYNCED_JSON_KEY) {
    lastSyncedJSON = loadLastSyncedJSON();
  }
  if (storageSyncTimer) clearTimeout(storageSyncTimer);
  storageSyncTimer = setTimeout(() => {
    storageSyncTimer = null;
    if (
      syncConfig.provider === 'github_gist' && syncConfig.githubToken &&
      document.visibilityState === 'visible' &&
      syncStatus !== 'syncing' && syncStatus !== 'conflict'
    ) {
      syncManager.checkSync();
    }
  }, 1000 + Math.floor(Math.random() * 2000));
}

// Increase the poll delay after a rate-limit error (exponential, capped),
// honoring Retry-After when GitHub provides it. Toast once per backoff episode.
function noteRateLimit(err) {
  let next = Math.max(currentPollDelay * 2, basePollDelayMs() * 2);
  if (err && err.retryAfter) {
    next = Math.max(next, err.retryAfter * 1000);
  }
  currentPollDelay = Math.min(MAX_POLL_DELAY, next);
  if (!rateLimitNotified) {
    rateLimitNotified = true;
    if (typeof showToast === 'function') {
      showToast('GitHub rate limit reached — syncing less frequently until it clears.', 'info');
    }
  }
}

// Reset to the normal cadence after a successful API call.
function clearRateLimitBackoff() {
  const base = basePollDelayMs();
  if (currentPollDelay !== base || rateLimitNotified) {
    currentPollDelay = base;
    rateLimitNotified = false;
  }
}

function schedulePoll(delay) {
  if (syncPollTimeout) clearTimeout(syncPollTimeout);
  syncPollTimeout = setTimeout(runPollCycle, delay);
}

async function runPollCycle() {
  syncPollTimeout = null;
  // Stop the loop if sync was turned off (reinitialize restarts it).
  if (!(syncConfig.provider === 'github_gist' && syncConfig.githubToken)) return;
  try {
    // We always run the lightweight check (even while the user is interacting)
    // so newer cloud changes are detected promptly. checkSync itself decides
    // whether it is safe to apply a pull now or whether to defer it and surface
    // an "update available" badge instead. Skip only when hidden or mid-op.
    // (Rate-limit backoff is handled by checkSync adjusting currentPollDelay.)
    if (
      document.visibilityState === 'visible' &&
      syncStatus !== 'syncing' && syncStatus !== 'conflict'
    ) {
      await syncManager.checkSync();
    }
  } finally {
    // Re-arm only if still enabled.
    if (syncConfig.provider === 'github_gist' && syncConfig.githubToken) {
      schedulePoll(currentPollDelay);
    }
  }
}

const syncManager = {
  getConfig() {
    return syncConfig;
  },

  getStatus() {
    if (syncConfig.provider === 'none') return 'disabled';
    // Provider is selected but credentials are missing — not actually syncing.
    // Report this explicitly so the badge never misleadingly shows "Synced"
    // (e.g. if the token/Gist ID were ever cleared).
    if (syncConfig.provider === 'github_gist' &&
        (!syncConfig.githubToken || !syncConfig.gistId)) {
      return 'unconfigured';
    }
    if (syncStatus === 'conflict') return 'conflict';
    if (syncStatus === 'available') return 'available';
    if (syncStatus === 'error') return 'error';
    if (syncStatus === 'syncing') return 'syncing';
    
    // Check if dirty relative to last cloud sync
    const currentJSON = store.exportSyncData();
    const isDirty = lastSyncedJSON !== null && currentJSON !== lastSyncedJSON;
    return isDirty ? 'dirty' : 'synced';
  },

  getLastError() {
    return syncLastError;
  },

  // Timestamp (ms) of the next scheduled auto-push, or null if none pending.
  getNextAutoPushAt() {
    return nextAutoPushAt;
  },

  // Upper-bound timestamp (ms) by which a deferred "update available" pull will
  // auto-apply (the staleness cap). It may apply sooner if the user pauses, and
  // is gated on a safe moment. Returns null when no remote changes are pending.
  getUpdateAutoLoadAt() {
    return remoteChangesPendingSince
      ? remoteChangesPendingSince + stalePullThresholdMs()
      : null;
  },

  getLastLocalEditTime() {
    return lastLocalEditTime;
  },

  getConflictCloudTime() {
    return conflictCloudTime;
  },

  setConflictResolved() {
    syncStatus = 'idle';
    conflictCloudTime = null;
    remoteChangesPendingSince = null;
  },

  updateConfig(updates) {
    syncConfig = { ...syncConfig, ...updates };
    saveSyncConfig();
    this.reinitialize();
    // Notify UI without triggering sync (we just reinitialized)
    isSyncLoading = true;
    notify();
    isSyncLoading = false;
  },

  async testConnection() {
    const { provider, githubToken, gistId, gistFilename } = syncConfig;
    if (!githubToken) {
      return { success: false, error: 'GitHub Personal Access Token is required.' };
    }
    if (!gistId) {
      return { success: false, error: 'Gist ID is required.' };
    }

    try {
      if (provider === 'github_gist') {
        const gist = await fetchGistAPI(githubToken, gistId);
        const file = gist.files[gistFilename];
        if (!file) {
          return { success: true, warning: `Connected successfully! However, file "${gistFilename}" was not found in the Gist. It will be created on the first push.` };
        }
        return { success: true, message: 'Successfully connected to GitHub Gist!' };
      }
      return { success: false, error: 'Invalid sync provider selected.' };
    } catch (e) {
      return { success: false, error: `Connection failed: ${e.message}` };
    }
  },

  initialize() {
    this.reinitialize();
  },

  reinitialize() {
    // Only restore a persisted baseline — never capture a fresh one here.
    // If there is no persisted baseline (first connection), leave it null
    // so checkSync() can detect the first-connection case and handle it
    // appropriately (prompt if local has data, auto-pull if empty).
    lastSyncedJSON = loadLastSyncedJSON();

    if (syncDebounceTimer) {
      clearTimeout(syncDebounceTimer);
      syncDebounceTimer = null;
    }
    if (syncPollTimeout) {
      clearTimeout(syncPollTimeout);
      syncPollTimeout = null;
    }
    // Reset poll cadence/backoff on every reinit.
    currentPollDelay = basePollDelayMs();
    rateLimitNotified = false;

    // Reset busy/pending state on reinit
    syncStatus = 'idle';
    isSyncBusy = false;
    remoteChangesPendingSince = null;
    nextAutoPushAt = null;

    if (syncConfig.provider === 'github_gist' && syncConfig.githubToken) {
      // Start background polling. Uses a self-scheduling setTimeout (not a fixed
      // interval) so the delay can back off when GitHub rate-limits us.
      schedulePoll(currentPollDelay);

      // Only listen for visibility change (not raw focus, which fires too often)
      if (typeof document !== 'undefined' && typeof document.removeEventListener === 'function') {
        document.removeEventListener('visibilitychange', handleVisibilityChange);
      }
      if (typeof document !== 'undefined' && typeof document.addEventListener === 'function') {
        document.addEventListener('visibilitychange', handleVisibilityChange);
      }

      // Cross-tab listener (remove-before-add to avoid stacking duplicates
      // across repeated reinitialize() calls).
      if (typeof window !== 'undefined' && typeof window.addEventListener === 'function') {
        window.removeEventListener('storage', handleStorageChange);
        window.addEventListener('storage', handleStorageChange);
      }

      // Perform initial check/pull
      this.checkSync();
    } else {
      if (typeof document !== 'undefined' && typeof document.removeEventListener === 'function') {
        document.removeEventListener('visibilitychange', handleVisibilityChange);
      }
      if (typeof window !== 'undefined' && typeof window.removeEventListener === 'function') {
        window.removeEventListener('storage', handleStorageChange);
      }
      lastSyncedJSON = null;
      saveLastSyncedJSON(null);
      // Reset sync bookkeeping so re-enabling later (possibly to a different
      // Gist) doesn't carry a stale revision/timestamp into conflict checks.
      syncConfig.syncRevision = 0;
      syncConfig.lastGistSyncTime = null;
      syncConfig.lastSyncedAt = null;
      saveSyncConfig();
      syncStatus = 'idle';
    }
  },

  handleStoreUpdate() {
    // Guard: skip if we are in the middle of any sync operation
    if (isSyncLoading) return;
    if (syncStatus === 'syncing') return;
    if (syncConfig.provider === 'none' || !syncConfig.githubToken) return;

    if (syncConfig.autoSync) {
      // Cancel any pending debounce and restart
      if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
      const delayMs = (syncConfig.autoPushDelay ?? 25) * 1000;
      // Record when the push is expected to fire so the badge can show a
      // live countdown. (Only displayed while there are unsaved changes.)
      nextAutoPushAt = Date.now() + delayMs;
      syncDebounceTimer = setTimeout(() => {
        syncDebounceTimer = null;
        // Only defer if a dropdown/modal is literally open — a re-render would
        // destroy it. We do NOT check general mouse/keyboard activity here,
        // because the user expects the push to happen after N seconds of their
        // last edit, not N seconds of total inactivity.
        if (hasOpenPopup()) {
          this.handleStoreUpdate(); // reschedule (resets nextAutoPushAt)
          return;
        }
        nextAutoPushAt = null;
        this.autoPush();
      }, delayMs);
    }
  },

  async checkSync() {
    if (syncConfig.provider === 'none' || !syncConfig.githubToken || !syncConfig.gistId) return;
    // Concurrency guard: don't overlap with any running operation
    if (syncStatus === 'syncing' || syncStatus === 'conflict') return;
    if (isSyncBusy) return;
    isSyncBusy = true;

    const { githubToken, gistId, gistFilename } = syncConfig;

    try {
      syncLastError = null;
      const gist = await fetchGistAPI(githubToken, gistId);
      // Reached the API successfully — restore the normal poll cadence.
      clearRateLimitBackoff();
      const cloudUpdatedAt = gist.updated_at;

      // Determine if cloud is newer
      const cloudIsNewer = await isCloudVersionNewer(gist, cloudUpdatedAt);

      if (!cloudIsNewer) {
        // Cloud is older or same as local — no pull needed. Clear any prior
        // transient error or pending "update available" state, since we are
        // now in sync with the cloud.
        if (syncStatus === 'error' || syncStatus === 'available') {
          syncStatus = 'idle';
          syncLastError = null;
          remoteChangesPendingSince = null;
          // Badge-only update so we don't re-render over an in-progress edit.
          notifyBadgeOnly();
        }
        isSyncBusy = false;
        return;
      }

      // Cloud IS newer — decide how to handle it.
      // Use (content || truncated) so a >1 MB file (whose inline content is
      // empty) is still recognized as existing; pull() fetches the full body.
      const file = gist.files[gistFilename];
      if (file && (file.content || file.truncated)) {
        const currentJSON = store.exportSyncData();
        const isDirty = lastSyncedJSON !== null && currentJSON !== lastSyncedJSON;

        if (lastSyncedJSON === null) {
          // First connection — no prior baseline exists.
          // Check if the user has any meaningful local data.
          const hasLocalData = 
            (state.guards && state.guards.length > 0) ||
            (state.lessons && state.lessons.length > 0) ||
            (state.shifts && Object.keys(state.shifts).length > 0) ||
            (state.rotationBlocks && Object.keys(state.rotationBlocks).length > 0) ||
            (state.blockAssignments && Object.keys(state.blockAssignments).length > 0);
          if (hasLocalData) {
            // User has local work — show conflict prompt so they can choose
            syncStatus = 'conflict';
            conflictCloudTime = cloudUpdatedAt;
            isSyncLoading = true;
            notify();
            isSyncLoading = false;
            if (typeof window.__showConflictModal === 'function') {
              if (!document.getElementById('sync-conflict-overlay')) {
                window.__showConflictModal(cloudUpdatedAt, lastLocalEditTime, syncConfig.lastGistSyncTime);
              }
            }
          } else {
            // No local data — safe to auto-pull
            if (typeof showToast === 'function') {
              showToast('Loading schedule from cloud (first connection)...', 'info');
            }
            // Release isSyncBusy before calling pull() — pull() acquires it.
            // JS is single-threaded so no race between release and re-acquire.
            isSyncBusy = false;
            await this.pull(gist);
            return; // pull() already released isSyncBusy
          }
        } else if (!isDirty) {
          // Local is clean and cloud is newer. Pull only if it's safe to
          // re-render right now (option 1: detect-but-defer). If the user is
          // mid-edit, mark the changes as "available" and surface a badge they
          // can click; the staleness cap inside isSafeToPullNow() will let a
          // pull through automatically once it's safe (option 2).
          if (isSafeToPullNow()) {
            remoteChangesPendingSince = null;
            // Release isSyncBusy before calling pull() — pull() acquires it.
            isSyncBusy = false;
            await this.pull(gist);
            return; // pull() already released isSyncBusy
          }
          if (!remoteChangesPendingSince) remoteChangesPendingSince = Date.now();
          if (syncStatus !== 'available') {
            syncStatus = 'available';
            // Badge-only update — a full re-render here would disrupt the very
            // edit that made it unsafe to pull in the first place.
            notifyBadgeOnly();
          }
        } else {
          // Both sides changed — flag a conflict (only if not already showing).
          if (syncStatus !== 'conflict') {
            syncStatus = 'conflict';
            conflictCloudTime = cloudUpdatedAt;
            // Badge-only update; the conflict badge is clickable to open the
            // resolution modal. Auto-open the modal only when it's safe — i.e.
            // not while the user is mid-edit — so we don't steal focus or
            // re-render over their work. If deferred, the staleness/poll cycle
            // will open it once safe.
            notifyBadgeOnly();
            if (isSafeToPullNow() && typeof window.__showConflictModal === 'function') {
              if (!document.getElementById('sync-conflict-overlay')) {
                window.__showConflictModal(cloudUpdatedAt, lastLocalEditTime, syncConfig.lastGistSyncTime);
              }
            }
          }
        }
      } else {
        // File doesn't exist in Gist yet, update our timestamp
        syncConfig.lastGistSyncTime = cloudUpdatedAt;
        saveSyncConfig();
      }
    } catch (e) {
      console.error('Sync check failed:', e);
      if (e && e.isRateLimit) noteRateLimit(e);
      syncStatus = 'error';
      syncLastError = e.message;
      // Notify UI without triggering sync
      isSyncLoading = true;
      notify();
      isSyncLoading = false;
    }
    isSyncBusy = false;
  },

  async pull(fetchedGist = null) {
    if (syncConfig.provider === 'none' || !syncConfig.githubToken || !syncConfig.gistId) return;
    // Concurrency guard: don't overlap with checkSync or push
    if (isSyncBusy) return;
    isSyncBusy = true;

    const { githubToken, gistId, gistFilename } = syncConfig;
    syncStatus = 'syncing';
    // Keep isSyncLoading=true for the ENTIRE pull operation (including final notify)
    // to prevent handleStoreUpdate from scheduling any autoPush
    isSyncLoading = true;
    notify();

    try {
      syncLastError = null;
      const gist = fetchedGist || await fetchGistAPI(githubToken, gistId);
      // getGistFileContent handles >1 MB truncated files by fetching raw_url.
      const content = await getGistFileContent(gist, gistFilename);

      if (content) {
        // isSyncLoading stays true during import — importData calls notify()
        // internally, and handleStoreUpdate must be blocked
        const result = store.importData(content);

        if (result.success) {
          syncConfig.lastSyncedAt = new Date().toISOString();
          syncConfig.lastGistSyncTime = gist.updated_at;
          saveSyncConfig();
          syncStatus = 'idle';
          // We've applied the cloud version — no changes are pending anymore.
          remoteChangesPendingSince = null;
          if (typeof showToast === 'function') showToast('Schedule synced from cloud!', 'success');
        } else {
          throw new Error(`Import failed: ${result.error}`);
        }
      } else {
        throw new Error(`File "${gistFilename}" not found in Gist.`);
      }
    } catch (e) {
      console.error('Sync pull failed:', e);
      if (e && e.isRateLimit) noteRateLimit(e);
      syncStatus = 'error';
      syncLastError = e.message;
      if (typeof showToast === 'function') showToast(`Pull failed: ${e.message}`, 'error');
    }

    // Capture the baseline BEFORE the final UI notify so that getStatus()
    // sees the correct baseline during render and shows 'synced' instead of 'dirty'.
    // This is safe because importData() already called notify() (which runs saveState()
    // and all listeners synchronously), so the state is fully settled by now.
    if (syncStatus === 'idle') {
      lastSyncedJSON = store.exportSyncData();
      saveLastSyncedJSON(lastSyncedJSON);
    }

    // Final UI update — isSyncLoading stays true to block handleStoreUpdate
    notify();

    // Cancel any debounce timer that might have been set before the pull started
    if (syncDebounceTimer) {
      clearTimeout(syncDebounceTimer);
      syncDebounceTimer = null;
    }

    // Record pull time for cooldown
    lastPullTime = Date.now();

    // Release both guards
    isSyncLoading = false;
    isSyncBusy = false;
  },

  async push(force = false) {
    if (syncConfig.provider === 'none' || !syncConfig.githubToken || !syncConfig.gistId) return;
    // Concurrency guard: don't overlap with checkSync or pull
    if (syncStatus === 'syncing') return;
    if (syncStatus === 'conflict' && !force) return;
    if (isSyncBusy) return;
    isSyncBusy = true;

    const { githubToken, gistId, gistFilename } = syncConfig;

    // A push is starting — no countdown to show anymore.
    nextAutoPushAt = null;
    syncStatus = 'syncing';
    isSyncLoading = true;
    notify();

    try {
      syncLastError = null;
      const content = store.exportSyncData();
      // Embed the revision counter inside the pushed JSON
      const parsed = JSON.parse(content);
      syncConfig.syncRevision = (syncConfig.syncRevision || 0) + 1;
      parsed._syncRevision = syncConfig.syncRevision;
      const contentWithRevision = JSON.stringify(parsed);
      const result = await updateGistAPI(githubToken, gistId, gistFilename, contentWithRevision);
      
      lastSyncedJSON = content; // baseline uses the clean version (without _syncRevision)
      saveLastSyncedJSON(content);
      syncConfig.lastSyncedAt = new Date().toISOString();
      syncConfig.lastGistSyncTime = result.updated_at;
      saveSyncConfig();
      
      syncStatus = 'idle';
      if (typeof showToast === 'function') showToast('Schedule saved to cloud!', 'success');
    } catch (e) {
      console.error('Sync push failed:', e);
      if (e && e.isRateLimit) noteRateLimit(e);
      syncStatus = 'error';
      syncLastError = e.message;
      if (typeof showToast === 'function') showToast(`Push failed: ${e.message}`, 'error');
    }
    // Final UI update — isSyncLoading stays true to block handleStoreUpdate
    notify();
    isSyncLoading = false;
    isSyncBusy = false;
  },

  async autoPush() {
    if (syncStatus === 'conflict' || syncStatus === 'syncing') return;
    if (isSyncBusy) return;

    // Post-pull cooldown: don't push within 5 seconds of a pull.
    // This prevents a device from immediately re-pushing data it just pulled.
    if (Date.now() - lastPullTime < 5000) return;

    const currentJSON = store.exportSyncData();
    const isDirty = lastSyncedJSON !== null && currentJSON !== lastSyncedJSON;
    if (!isDirty) return;

    // Before pushing, check if the cloud has been updated by another device.
    // This catches the common case of another device having pushed since our
    // last sync. NOTE: a residual cross-device race remains and cannot be
    // closed on the client — between this freshness check and the PATCH in
    // push(), another device could write the gist, and GitHub's gist PATCH has
    // no If-Match/etag optimistic-concurrency support, so it is last-write-wins.
    // Truly eliminating this needs a server-side store with conditional writes.
    isSyncBusy = true;
    try {
      const { githubToken, gistId } = syncConfig;
      const gist = await fetchGistAPI(githubToken, gistId);
      clearRateLimitBackoff();
      const cloudUpdatedAt = gist.updated_at;

      const cloudIsNewer = await isCloudVersionNewer(gist, cloudUpdatedAt);
      if (cloudIsNewer) {
        isSyncBusy = false;
        syncStatus = 'conflict';
        conflictCloudTime = cloudUpdatedAt;
        isSyncLoading = true;
        notify();
        isSyncLoading = false;
        if (typeof window.__showConflictModal === 'function') {
          if (!document.getElementById('sync-conflict-overlay')) {
            window.__showConflictModal(cloudUpdatedAt, lastLocalEditTime, syncConfig.lastGistSyncTime);
          }
        }
        return;
      }
    } catch (e) {
      console.error('Pre-push cloud check failed:', e);
      if (e && e.isRateLimit) noteRateLimit(e);
      isSyncBusy = false;
      // If we can't verify the cloud state, skip this push attempt.
      // The next poll cycle will handle it.
      return;
    }
    isSyncBusy = false;

    // Cloud is not newer — safe to push our local changes
    await this.push(false);
  },

  async createGistAutomatically() {
    const { githubToken, gistFilename } = syncConfig;
    if (!githubToken) {
      if (typeof showToast === 'function') showToast('GitHub Token is required.', 'error');
      return;
    }

    syncStatus = 'syncing';
    isSyncLoading = true;
    notify();

    try {
      syncLastError = null;
      const content = store.exportSyncData();
      // Embed revision counter in the initial Gist, matching push() behavior
      const parsed = JSON.parse(content);
      syncConfig.syncRevision = 1;
      parsed._syncRevision = syncConfig.syncRevision;
      const contentWithRevision = JSON.stringify(parsed);
      const filename = gistFilename || 'lifeguard_schedule.json';
      const gist = await createGistAPI(githubToken, filename, contentWithRevision);

      syncConfig.gistId = gist.id;
      syncConfig.lastGistSyncTime = gist.updated_at;
      syncConfig.lastSyncedAt = new Date().toISOString();
      lastSyncedJSON = content; // baseline uses the clean version (without _syncRevision)
      saveLastSyncedJSON(content);
      saveSyncConfig();

      syncStatus = 'idle';
      if (typeof showToast === 'function') showToast('Secret Gist created and connected!', 'success');
    } catch (e) {
      console.error('Failed to create Gist:', e);
      syncStatus = 'error';
      syncLastError = e.message;
      if (typeof showToast === 'function') showToast(`Failed to create Gist: ${e.message}`, 'error');
    }
    isSyncLoading = false;
    // Final UI update
    isSyncLoading = true;
    notify();
    isSyncLoading = false;
  }
};

/**
 * Toast notification system — lightweight, no dependencies
 */

let container = null;

function ensureContainer() {
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  return container;
}

/**
 * Show a toast notification
 * @param {string} message - The message to display
 * @param {'success'|'warning'|'error'|'info'} type - Toast type
 * @param {number} duration - Duration in ms (default 4000)
 */
function showToast(message, type = 'info', duration = 4000) {
  const c = ensureContainer();

  const icons = {
    success: '✓',
    warning: '⚠',
    error: '✕',
    info: 'ℹ'
  };

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  // Build with textContent (not innerHTML) so a message containing user data
  // (guard names, notes, etc.) can never inject markup. This protects every
  // showToast() call site at once.
  const iconSpan = document.createElement('span');
  iconSpan.className = 'toast-icon';
  iconSpan.textContent = icons[type] || 'ℹ';
  const messageSpan = document.createElement('span');
  messageSpan.className = 'toast-message';
  messageSpan.textContent = message;
  toast.appendChild(iconSpan);
  toast.appendChild(messageSpan);

  c.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('exiting');
    setTimeout(() => {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 300);
  }, duration);
}


/**
 * generateBlocks.js
 */

/**
 * generateBlocks.js
 *
 * Auto-generate rotation blocks from shift windows and provide
 * time-conversion utilities used across the application.
 *
 * All time strings use 24-hour 'HH:MM' format internally.
 */

function generateUUID() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

/**
 * Parse a time string 'HH:MM' to minutes since midnight.
 * @param {string} time - Time in 'HH:MM' format (e.g. '09:30')
 * @returns {number} Minutes since midnight (0–1439)
 */
function timeToMinutes(time) {
  const [hours, minutes] = time.split(':').map(Number);
  return hours * 60 + minutes;
}

/**
 * Convert minutes since midnight to 'HH:MM' format.
 * @param {number} minutes - Minutes since midnight
 * @returns {string} Time in 'HH:MM' format
 */
function minutesToTime(minutes) {
  const clamped = ((minutes % 1440) + 1440) % 1440; // handle negatives / overflow
  const h = Math.floor(clamped / 60);
  const m = clamped % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

/**
 * Format a 24-hour 'HH:MM' time string for display (e.g. '2:30 PM').
 * @param {string} time - Time in 'HH:MM' format
 * @returns {string} Human-friendly 12-hour time string
 */
function formatTime(time) {
  const totalMinutes = timeToMinutes(time);
  let hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;

  const period = hours >= 12 ? 'PM' : 'AM';
  if (hours === 0) {
    hours = 12;
  } else if (hours > 12) {
    hours -= 12;
  }

  return `${hours}:${String(minutes).padStart(2, '0')}${period}`;
}

/**
 * Get the duration in minutes between two 'HH:MM' time strings.
 * If end is earlier than start the result will be negative—callers should
 * treat that as crossing midnight if appropriate.
 * @param {string} start - Start time in 'HH:MM' format
 * @param {string} end   - End time in 'HH:MM' format
 * @returns {number} Duration in minutes
 */
function getTimeDuration(start, end) {
  return timeToMinutes(end) - timeToMinutes(start);
}

/**
 * Given a day's shifts, generate rotation blocks by slicing the shift window
 * into fixed-length intervals.
 *
 * The function finds the earliest shift start and the latest shift end among
 * all provided shifts, then creates sequential blocks of `intervalMinutes`
 * length spanning that entire window.
 *
 * @param {Array<{startTime: string, endTime: string}>} shifts
 *   Array of shift objects. Each must have `startTime` and `endTime` in 'HH:MM'.
 * @param {number} [intervalMinutes=30]
 *   Length of each rotation block in minutes.
 * @returns {Array<{id: string, startTime: string, endTime: string, interval: number, guardCountOverride: number, note: string}>}
 *   Ordered array of rotation block objects.
 */
function generateBlocks(shifts, intervalMinutes = 30, config = null) {
  if (!shifts || shifts.length === 0) {
    return [];
  }

  // 1. Calculate shift-based boundaries
  let earliestStart = Infinity;
  let latestEnd = -Infinity;
  for (const shift of shifts) {
    const start = timeToMinutes(shift.startTime);
    const end = timeToMinutes(shift.endTime);
    if (start < earliestStart) earliestStart = start;
    if (end > latestEnd) latestEnd = end;
  }

  // 2. Apply base window restrictions
  if (config) {
    if (config.limitStart && config.startTime) {
      earliestStart = timeToMinutes(config.startTime);
    }
    if (config.limitEnd && config.endTime) {
      latestEnd = timeToMinutes(config.endTime);
    }
  }

  const blocks = [];

  // Generate blocks for the base window (if valid)
  if (earliestStart < latestEnd && intervalMinutes > 0) {
    let cursor = earliestStart;
    while (cursor < latestEnd) {
      const nextBoundary = Math.floor(cursor / intervalMinutes) * intervalMinutes + intervalMinutes;
      const blockEnd = Math.min(nextBoundary, latestEnd);
      const actualInterval = blockEnd - cursor;

      blocks.push({
        id: generateUUID(),
        startTime: minutesToTime(cursor),
        endTime: minutesToTime(blockEnd),
        interval: actualInterval,
        guardCountOverride: null,
        note: '',
      });

      cursor = blockEnd;
    }
  }

  // 3. Generate blocks for any extra windows
  if (config && Array.isArray(config.extraWindows)) {
    for (const extra of config.extraWindows) {
      if (!extra.startTime || !extra.endTime) continue;
      const start = timeToMinutes(extra.startTime);
      const end = timeToMinutes(extra.endTime);
      if (start >= end || intervalMinutes <= 0) continue;

      let cursor = start;
      const align = extra.align ?? true;

      while (cursor < end) {
        let blockEnd;
        if (align) {
          // Align to multiples of intervalMinutes
          const nextBoundary = Math.floor(cursor / intervalMinutes) * intervalMinutes + intervalMinutes;
          blockEnd = Math.min(nextBoundary, end);
        } else {
          // Increment directly from startTime
          blockEnd = Math.min(cursor + intervalMinutes, end);
        }
        
        const actualInterval = blockEnd - cursor;

        blocks.push({
          id: generateUUID(),
          startTime: minutesToTime(cursor),
          endTime: minutesToTime(blockEnd),
          interval: actualInterval,
          guardCountOverride: null,
          note: '',
          isExtra: true,
        });

        cursor = blockEnd;
      }
    }
  }

  // Sort blocks by startTime so they display chronologically
  blocks.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

  // Filter out any blocks that are fully contained within any excluded time slots
  let filteredBlocks = blocks;
  if (config && Array.isArray(config.excludeWindows) && config.excludeWindows.length > 0) {
    filteredBlocks = blocks.filter(block => {
      // Extra custom blocks are never excluded
      if (block.isExtra) return true;

      const bStart = timeToMinutes(block.startTime);
      const bEnd = timeToMinutes(block.endTime);
      
      const isExcluded = config.excludeWindows.some(ex => {
        if (!ex.startTime || !ex.endTime) return false;
        const exStart = timeToMinutes(ex.startTime);
        const exEnd = timeToMinutes(ex.endTime);
        // Exclude block if it is fully contained within the excluded window
        return bStart >= exStart && bEnd <= exEnd;
      });
      
      return !isExcluded;
    });
  }

  // Deduplicate blocks by startTime and endTime
  const uniqueBlocks = [];
  for (const block of filteredBlocks) {
    const key = `${block.startTime}-${block.endTime}`;
    const existingIdx = uniqueBlocks.findIndex(b => `${b.startTime}-${b.endTime}` === key);
    if (existingIdx !== -1) {
      if (block.isExtra) {
        uniqueBlocks[existingIdx] = block;
      }
    } else {
      uniqueBlocks.push(block);
    }
  }

  // Apply default overrides (stands, notes) if defined
  if (config && Array.isArray(config.defaultBlocks) && config.defaultBlocks.length > 0) {
    for (const block of uniqueBlocks) {
      const bStart = timeToMinutes(block.startTime);
      const bEnd = timeToMinutes(block.endTime);

      for (const rule of config.defaultBlocks) {
        if (!rule.startTime || !rule.endTime) continue;
        const ruleStart = timeToMinutes(rule.startTime);
        const ruleEnd = timeToMinutes(rule.endTime);

        // Check if block overlaps with default block rule
        if (bStart < ruleEnd && bEnd > ruleStart) {
          if (rule.stands !== undefined && rule.stands !== null) {
            block.guardCountOverride = rule.stands;
          }
          if (rule.note !== undefined && rule.note !== null && rule.note.trim() !== '') {
            block.note = rule.note.trim();
          }
          break; // Apply first matching rule
        }
      }
    }
  }

  return uniqueBlocks;
}


/**
 * rotationCycle.js
 */

/**
 * rotationCycle.js
 *
 * Rotation cycle model – defines the ordered set of positions a guard
 * rotates through and provides helpers for cycling, classification,
 * and display labelling.
 *
 * Standard cycle (for N stands):
 *   stand1 → stand2 → … → standN → door → break → stand1 → …
 */

/**
 * Get the ordered array of positions based on the number of stands.
 *
 * The returned array does NOT include `'break'`—break is implicit and
 * always follows `'door'`.  Use {@link getNextPosition} to walk the
 * full cycle including breaks.
 *
 * @param {number} [standCount=2] - Number of stand positions
 * @returns {string[]} e.g. ['stand1', 'stand2', 'door']
 */
function getPositions(standCount = 2, excludeDoor = false) {
  const positions = [];
  for (let i = 1; i <= standCount; i++) {
    positions.push(`stand${i}`);
  }
  if (!excludeDoor) {
    positions.push('door');
  }
  return positions;
}

/**
 * Get the next position in the rotation cycle.
 *
 * Cycle order:
 *   stand1 → stand2 → … → standN → door → break → stand1
 *
 * @param {string} current    - The guard's current position
 * @param {number} [standCount=2] - Number of stand positions
 * @param {boolean} [excludeDoor=false] - Whether to exclude the door position
 * @returns {string} The next position in the cycle
 */
function getNextPosition(current, standCount = 2, excludeDoor = false) {
  // After break the guard loops back to stand1
  if (current === 'break') {
    return 'stand1';
  }

  // After door the guard goes on break
  if (current === 'door') {
    return 'break';
  }

  // If it's a stand position, advance to the next stand or to door
  if (isStandPosition(current)) {
    const standNumber = Number(current.replace('stand', ''));
    if (standNumber < standCount) {
      return `stand${standNumber + 1}`;
    }
    // Last stand → break (if door is excluded) or door
    return excludeDoor ? 'break' : 'door';
  }

  // Fallback for any unrecognised position
  return 'stand1';
}

/**
 * Check whether a position string represents a stand.
 * @param {string} position
 * @returns {boolean}
 */
function isStandPosition(position) {
  return typeof position === 'string' && /^stand\d+$/.test(position);
}

/**
 * Check whether a position string is the door position.
 * @param {string} position
 * @returns {boolean}
 */
function isDoorPosition(position) {
  return position === 'door';
}

/**
 * Get a human-readable display label for a position.
 *
 * Examples:
 *   'stand1' → 'Stand 1'
 *   'stand12' → 'Stand 12'
 *   'door'   → 'Door'
 *   'break'  → 'Break'
 *
 * @param {string} position
 * @returns {string}
 */
function getPositionLabel(position) {
  if (isStandPosition(position)) {
    const num = position.replace('stand', '');
    return `Stand ${num}`;
  }

  if (position === 'door') return 'Door';
  if (position === 'break') return 'Break';

  // Unknown – title-case whatever we got
  return position.charAt(0).toUpperCase() + position.slice(1);
}


/**
 * standTimeCalc.js
 */

/**
 * standTimeCalc.js
 *
 * Calculate a guard's effective stand-time for a given day, factoring in
 * door-credit and lesson-equivalent minutes.
 * 
 * Works with the store's data format:
 * - assignments: flat map { "blockId-position": guardId }
 * - shifts: flat map { "guardId-day": shiftEntry }
 */


/**
 * Calculate a guard's stand time statistics for a single day.
 *
 * @param {string} guardId
 * @param {string} day - Day of the week (e.g. 'Monday')
 * @param {Object} blockAssignments - Store's flat assignment map { "blockId-position": guardId }
 * @param {Array}  blocks - Array of RotationBlock objects for this day
 * @param {Object} shifts - Store's flat shift map { "guardId-day": shiftEntry }
 * @param {Object} settings - { doorCreditPercent, lessonMultiplier, standCount }
 *
 * @returns {{
 *   rawStandMinutes: number,
 *   doorMinutes: number,
 *   lessonEquivMinutes: number,
 *   totalMinutes: number,
 *   shiftDurationMinutes: number,
 *   percentage: number
 * }}
 */
function calcGuardStandTime(guardId, day, blockAssignments, blocks, shifts, settings, lessons, week) {
  const doorCreditMultiplier = settings?.doorCreditMultiplier ?? (settings?.doorCreditPercent !== undefined ? settings.doorCreditPercent / 100 : 0.5);
  const lessonMultiplier = settings?.lessonMultiplier ?? 0.75;
  const standCount = settings?.standCount ?? 2;

  let rawStandMinutes = 0;
  let doorMinutes = 0;

  // Check each block to see if this guard is assigned to any position
  for (const block of blocks) {
    const blockDuration = getTimeDuration(block.startTime, block.endTime);
    if (blockDuration <= 0) continue;

    // Check all possible positions for this block
    const blockStands = block.guardCountOverride ?? standCount;
    const positions = getPositions(blockStands, settings?.excludeDoor);
    const allPositions = [...positions];

    for (const pos of allPositions) {
      const keyWithWeek = week ? `${block.id}-${pos}-${week}` : null;
      const keyLegacy = `${block.id}-${pos}`;
      const assignedGuardId = (blockAssignments && keyWithWeek && blockAssignments[keyWithWeek]) || (blockAssignments && blockAssignments[keyLegacy]) || null;
      if (assignedGuardId === guardId) {
        if (isStandPosition(pos)) {
          rawStandMinutes += blockDuration;
        } else if (isDoorPosition(pos)) {
          doorMinutes += blockDuration;
        }
      }
    }
  }

  // Lesson equivalent minutes
  let lessonEquivMinutes = 0;
  let rawLessonMinutes = 0;
  const shiftKeyWithWeek = week ? `${guardId}-${day}-${week}` : null;
  const shiftKeyLegacy = `${guardId}-${day}`;
  const guardShift = (shifts && shiftKeyWithWeek && shifts[shiftKeyWithWeek]) || (shifts && shifts[shiftKeyLegacy]) || null;
  
  if (lessons && Array.isArray(lessons)) {
    const guardLessons = lessons.filter(l => l.guardId === guardId && l.day === day);
    for (const lesson of guardLessons) {
      const dur = parseInt(lesson.durationMinutes || 0);
      rawLessonMinutes += dur;
      lessonEquivMinutes += dur * lessonMultiplier;
    }
  }

  // Shift duration for this guard
  let shiftDurationMinutes = 0;
  if (guardShift) {
    shiftDurationMinutes = getTimeDuration(guardShift.startTime, guardShift.endTime) - (guardShift.breakMinutes || 0);
  }

  // Total weighted minutes
  const totalMinutes =
    rawStandMinutes +
    doorMinutes * doorCreditMultiplier +
    lessonEquivMinutes;

  // Apply shift-length scaler if configured
  const scalerBaseHours = settings?.shiftLengthScalerBaseHours ?? 4;
  const scalerFactor = settings?.shiftLengthScalerFactor ?? 0.0;
  let scalerMultiplier = 1.0;
  if (scalerFactor > 0 && shiftDurationMinutes > 0) {
    const shiftHours = shiftDurationMinutes / 60;
    const excessHours = Math.max(0, shiftHours - scalerBaseHours);
    scalerMultiplier = 1.0 + scalerFactor * excessHours;
  }
  const finalTotalMinutes = totalMinutes * scalerMultiplier;

  // Percentage (0–100)
  const percentage =
    shiftDurationMinutes > 0 ? (finalTotalMinutes / shiftDurationMinutes) * 100 : 0;

  return {
    rawStandMinutes,
    doorMinutes,
    rawLessonMinutes,
    lessonEquivMinutes: Math.round(lessonEquivMinutes * 10) / 10,
    totalMinutes: Math.round(finalTotalMinutes * 10) / 10,
    shiftDurationMinutes,
    percentage: Math.round(percentage * 10) / 10,
    scalerMultiplier, // long-shift multiplier actually applied (1.0 if none)
  };
}


/**
 * crewStats.js
 */

/**
 * crewStats.js
 *
 * Crew-level stand-time statistics and colour-status helpers.
 * Works with the store's flat-map data format.
 */


/**
 * Get the mean stand-time percentage for all guards in a crew section
 * who are working on a given day.
 *
 * @param {string} crewSection - 'AM' or 'PM'
 * @param {string} day - Day of the week
 * @param {Array}  guards - Array of guard objects { id, crewSection }
 * @param {Object} blockAssignments - Store's flat map { "blockId-position": guardId }
 * @param {Array}  blocks - RotationBlock array for the day
 * @param {Object} shifts - Store's flat map { "guardId-day": shiftEntry }
 * @param {Object} settings - App settings
 * @returns {number} Mean percentage (0–100). Returns 0 if no guards qualify.
 */
function getCrewAverageStandTime(crewSection, day, guards, blockAssignments, blocks, shifts, settings, lessons, week) {
  const workingGuards = guards.filter(guard => {
    if (guard.crewSection !== crewSection) return false;
    const keyWithWeek = week ? `${guard.id}-${day}-${week}` : null;
    const keyLegacy = `${guard.id}-${day}`;
    return (shifts && keyWithWeek && shifts[keyWithWeek] != null) || (shifts && shifts[keyLegacy] != null);
  });

  if (workingGuards.length === 0) return 0;

  let totalPercentage = 0;
  for (const guard of workingGuards) {
    const stats = calcGuardStandTime(guard.id, day, blockAssignments, blocks, shifts, settings, lessons, week);
    totalPercentage += stats.percentage;
  }

  return totalPercentage / workingGuards.length;
}

/**
 * Get a colour status based on a guard's stand-time percentage relative to
 * the crew average.
 *
 * Traffic-light colouring by how the guard's percentage compares to the others
 * scheduled that day: notably higher than peers → green, around the middle →
 * amber (yellow), notably lower → red.
 *
 * @param {number} guardPercentage - Individual guard's stand-time %
 * @param {number} crewAverage - Crew average stand-time %
 * @returns {'green' | 'amber' | 'red'}
 */
function getStandTimeStatus(guardPercentage, crewAverage) {
  const diff = guardPercentage - crewAverage;
  if (diff > 5) return 'green';
  if (diff < -5) return 'red';
  return 'amber';
}


/**
 * guardAvailability.js
 */

/**
 * guardAvailability.js
 *
 * Availability and teaching-conflict checks for guards against
 * individual rotation blocks.
 * 
 * Works with the store's flat-map shift format:
 * shifts: { "guardId-day": { startTime, endTime, hasLessons, lessonMinutes, lessonStart, lessonEnd } }
 */


/**
 * Check if a guard is available for a specific rotation block.
 * Guard's shift must cover the entire block.
 *
 * @param {string} guardId
 * @param {{ startTime: string, endTime: string }} block
 * @param {Object} shifts - Store's flat shift map
 * @param {string} day - Day of the week
 * @returns {boolean}
 */
function isGuardAvailableForBlock(guardId, block, shifts, day, week) {
  const keyWithWeek = (day && week) ? `${guardId}-${day}-${week}` : null;
  const keyWithoutWeek = day ? `${guardId}-${day}` : guardId;
  const guardShift = (shifts && keyWithWeek && shifts[keyWithWeek]) || (shifts && shifts[keyWithoutWeek]) || null;
  if (!guardShift) return false;

  const shiftStart = timeToMinutes(guardShift.startTime);
  const shiftEnd = timeToMinutes(guardShift.endTime);
  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);

  return shiftStart <= blockStart && shiftEnd >= blockEnd;
}

/**
 * Check if a guard is teaching during a block.
 *
 * @param {string} guardId
 * @param {{ startTime: string, endTime: string }} block
 * @param {Object} shifts - Store's flat shift map
 * @param {string} day - Day of the week
 * @returns {boolean}
 */
function isGuardTeachingDuringBlock(guardId, block, day, lessons) {
  if (!lessons || !Array.isArray(lessons)) {
    return false;
  }

  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);

  return lessons.some(lesson => {
    if (String(lesson.guardId) !== String(guardId) || lesson.day !== day) {
      return false;
    }
    const lessonStart = timeToMinutes(lesson.startTime);
    const lessonEnd = timeToMinutes(lesson.endTime);
    return lessonStart < blockEnd && lessonEnd > blockStart;
  });
}

/**
 * Get all guards that are available for a given block and are not teaching.
 *
 * @param {Array<{ id: string }>} guards
 * @param {{ startTime: string, endTime: string }} block
 * @param {Object} shifts
 * @param {string} day
 * @param {Array} lessons
 * @param {string} week
 * @returns {Array<{ id: string }>}
 */
function getAvailableGuards(guards, block, shifts, day, lessons, week) {
  return guards.filter(guard =>
    isGuardAvailableForBlock(guard.id, block, shifts, day, week) &&
    !isGuardTeachingDuringBlock(guard.id, block, day, lessons)
  );
}


/**
 * autoGenerator.js
 */

/**
 * autoGenerator.js
 *
 * Core rotation auto-generation engine.
 * Works with the store's data format:
 * - assignments: flat map { "blockId-position": guardId }
 * - shifts: flat map { "guardId-day": shiftEntry }
 * - rotationBlocks: { day: [blocks] }
 */


/**
 * Check if a guard's shift covers a block.
 */
function isAvailable(guardId, block, shifts, day, week) {
  const keyWithWeek = week ? `${guardId}-${day}-${week}` : null;
  const keyWithoutWeek = `${guardId}-${day}`;
  const shift = (shifts && keyWithWeek && shifts[keyWithWeek]) || (shifts && shifts[keyWithoutWeek]) || null;
  if (!shift) return false;
  const shiftStart = timeToMinutes(shift.startTime);
  const shiftEnd = timeToMinutes(shift.endTime);
  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);
  return shiftStart <= blockStart && shiftEnd >= blockEnd;
}

/**
 * Check if a guard has lessons overlapping a block.
 */
function isTeaching(guardId, block, day, lessons) {
  if (!lessons || !Array.isArray(lessons)) return false;
  
  const blockStart = timeToMinutes(block.startTime);
  const blockEnd = timeToMinutes(block.endTime);
  
  return lessons.some(lesson => {
    if (lesson.guardId !== guardId || lesson.day !== day) return false;
    const lessonStart = timeToMinutes(lesson.startTime);
    const lessonEnd = timeToMinutes(lesson.endTime);
    return lessonStart < blockEnd && lessonEnd > blockStart;
  });
}

/**
 * Get a guard's current stand time percentage from the working assignments.
 */
function getGuardPercentage(guardId, day, blockAssignments, blocks, shifts, settings, lessons, week) {
  const stats = calcGuardStandTime(guardId, day, blockAssignments, blocks, shifts, settings, lessons, week);
  return stats.percentage;
}

// Maximum consecutive minutes a guard may spend on STANDS or at the DOOR.
// These two caps are tracked SEPARATELY (not added together), so a guard may
// do up to an hour on stands then up to an hour at the door before a break.
const MAX_STREAK_MINUTES = 60;

// Scoring philosophy: BALANCE is the primary driver — duty goes to whoever is
// furthest behind on credited percentage so the totals even out (this is what
// compensates guards who have few/no lessons). The stair-step pattern is only a
// tiebreak that decides WHICH position among guards who are within ~a couple
// percent of each other; once guards drift further apart, balance dominates.
const BALANCE_WEIGHT = 1000; // score per percentage-point behind
const FORBID = -1e9;         // would break a duty cap (only used as a last resort)
const DESIRE_STRONG = 2000;  // natural next position in the cycle (~2% pattern band)
const DESIRE_OK = 0;         // an acceptable but non-ideal position
const DISCOURAGE = -2000;    // breaks the pattern (e.g. door → stand)
// Random tie-breaker so clicking Auto Assign again yields a different valid
// arrangement. Sized to shuffle guards who are within ~a couple % of each other
// (fairness-neutral) while never overriding the caps or real balance gaps.
const JITTER = 2000;
const jitter = () => (Math.random() - 0.5) * JITTER;

/** Minutes a block spans (prefer the stored interval, fall back to its span). */
function blockMinutes(block, fallback) {
  if (typeof block.interval === 'number' && block.interval > 0) return block.interval;
  const span = getTimeDuration(block.startTime, block.endTime);
  return span > 0 ? span : (fallback || 0);
}

/**
 * Generate rotation assignments for a given day and crew section.
 *
 * Model: walk the day's blocks left-to-right keeping, per guard, how long
 * they've been continuously on stands / at the door and what they did last
 * block. Each open position is filled by the eligible guard whose natural next
 * step in the cycle (break → stand1 → … → standN → door → break) it is, with
 * a separate 60-minute cap on stands and on the door, and ties broken by who
 * has the lowest credited percentage so far (to even everyone out). Manual
 * (user-locked) picks are never moved — the generator works around them.
 *
 * @param {string} day
 * @param {string} crewSection - 'AM' or 'PM'
 * @param {Object} state - Full store state
 * @returns {Array<{blockId: string, position: string, guardId: string}>}
 */
function generateRotation(day, crewSection, state) {
  const { guards, shifts, settings, rotationBlocks, blockAssignments, manualAssignments = {}, lessons = [], selectedWeek } = state;
  const filteredLessons = selectedWeek ? lessons.filter(l => l.week === selectedWeek) : lessons;
  const standCount = settings.standCount ?? 2;
  const excludeDoor = !!settings?.excludeDoor;
  const defaultInterval = settings.rotationIntervalMinutes ?? 30;
  const blockKey = selectedWeek ? `${day}-${selectedWeek}` : day;
  const allDayBlocks = rotationBlocks[blockKey] || rotationBlocks[day] || [];
  const blocks = allDayBlocks.slice().sort(
    (a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)
  );

  // Guards working today. When crewSection is 'Both' (or omitted) we pool ALL
  // working guards into one rotation — the crews share the same physical
  // positions each block, so generating them separately would make the second
  // crew overwrite the first wherever their shifts overlap.
  const allCrews = !crewSection || crewSection === 'Both';
  const crewGuards = guards.filter(g => {
    if (!allCrews && g.crewSection !== crewSection) return false;
    const keyWithWeek = selectedWeek ? `${g.id}-${day}-${selectedWeek}` : null;
    const keyWithoutWeek = `${g.id}-${day}`;
    return !!((shifts && keyWithWeek && shifts[keyWithWeek]) || (shifts && shifts[keyWithoutWeek]));
  });
  if (crewGuards.length === 0 || blocks.length === 0) return [];
  const crewGuardIds = crewGuards.map(g => g.id);

  // Working copy; drop this crew's existing NON-manual assignments so we can
  // regenerate them while leaving manual locks (and the other crew) intact.
  const workingAssignments = { ...blockAssignments };
  const blockIds = new Set(blocks.map(b => b.id));
  for (const key of Object.keys(workingAssignments)) {
    if (blockIds.has(extractBlockId(key)) &&
        crewGuardIds.includes(workingAssignments[key]) &&
        !manualAssignments[key]) {
      delete workingAssignments[key];
    }
  }

  const keyFor = (blockId, pos) => selectedWeek ? `${blockId}-${pos}-${selectedWeek}` : `${blockId}-${pos}`;

  // Per-guard rolling state across blocks.
  const gstate = new Map();
  for (const gid of crewGuardIds) {
    gstate.set(gid, { lastCategory: 'break', lastStandNum: 0, standStreak: 0, doorStreak: 0, doorMinutesTotal: 0 });
  }

  const newAssignments = [];
  let prevBlockEnd = null;

  for (const block of blocks) {
    const interval = blockMinutes(block, defaultInterval);

    // A time gap between blocks (or a closed block) is a break for everyone:
    // reset all streaks so the next on-duty stint starts fresh.
    const gapBefore = prevBlockEnd !== null && timeToMinutes(block.startTime) > prevBlockEnd;
    if (gapBefore) {
      for (const s of gstate.values()) { s.lastCategory = 'break'; s.standStreak = 0; s.doorStreak = 0; }
    }

    const override = block.guardCountOverride;
    const activeStandCount = (override === null || override === undefined) ? standCount : override;
    prevBlockEnd = timeToMinutes(block.endTime);

    if (activeStandCount === 0) {
      // Closed block — everyone on break.
      for (const s of gstate.values()) { s.lastCategory = 'break'; s.standStreak = 0; s.doorStreak = 0; }
      continue;
    }

    const positionsToFill = getPositions(activeStandCount, excludeDoor);

    // What's already locked (manual) for this block.
    const assignedThisBlock = {}; // pos -> gid
    const usedGuards = new Set();
    for (const pos of positionsToFill) {
      const k = keyFor(block.id, pos);
      const legacy = `${block.id}-${pos}`;
      const locked = (manualAssignments[k] && workingAssignments[k]) ||
                     (manualAssignments[legacy] && workingAssignments[legacy]) || null;
      if (locked) { assignedThisBlock[pos] = locked; usedGuards.add(locked); }
    }

    // Eligible guards for this block (on shift, not teaching).
    const eligible = crewGuardIds.filter(gid =>
      isAvailable(gid, block, shifts, day, selectedWeek) &&
      !isTeaching(gid, block, day, filteredLessons)
    );

    // Current credited percentages (from assignments decided so far) for balance.
    const pctMap = new Map();
    for (const gid of crewGuardIds) {
      pctMap.set(gid, getGuardPercentage(gid, day, workingAssignments, allDayBlocks, shifts, settings, filteredLessons, selectedWeek));
    }

    // Score a (guard, position) placement for THIS block.
    const placementScore = (gid, pos) => {
      const s = gstate.get(gid);
      const isStand = isStandPosition(pos);
      const standNum = isStand ? parseInt(pos.replace('stand', ''), 10) : 0;
      const pct = pctMap.get(gid) ?? 0;

      if (isStand) {
        // Hard cap on consecutive stand time (still selectable as a last resort).
        if (s.standStreak + interval > MAX_STREAK_MINUTES) return FORBID - pct * BALANCE_WEIGHT;
        // Stands give full credit → the furthest-BEHIND guard (lowest %) wins,
        // which is what actually pulls low guards' numbers up.
        const balance = -pct * BALANCE_WEIGHT;
        let tier;
        if (s.lastCategory === 'break') {
          tier = standNum === 1 ? DESIRE_STRONG : DESIRE_OK; // enter at stand1
        } else if (s.lastCategory === 'stand') {
          const preferredStand = Math.min(s.lastStandNum + 1, activeStandCount);
          tier = standNum === preferredStand ? DESIRE_STRONG : DESIRE_OK; // step up / hold top
        } else {
          tier = DISCOURAGE; // door → stand should be a break instead
        }
        return balance + tier + jitter();
      }

      // DOOR — pattern-driven, NOT percentage-driven. The door multiplier can be
      // 0, so credited % gives no signal there and would just pile the door onto
      // whichever guard is lowest. Instead the door follows the rotation: a guard
      // takes it right AFTER finishing their stands, and it's spread evenly by
      // who has spent the least time at the door so far.
      if (s.doorStreak + interval > MAX_STREAK_MINUTES) return FORBID - s.doorMinutesTotal;
      let tier;
      if (s.lastCategory === 'stand') {
        const standCapReached = s.standStreak + interval > MAX_STREAK_MINUTES;
        tier = standCapReached ? DESIRE_STRONG   // just finished stands → rotate to the door
                               : DISCOURAGE;     // still has stand time → keep them on stands
      } else if (s.lastCategory === 'door') {
        tier = DESIRE_OK; // was at the door; can continue but yield to a fresh stand-finisher
      } else {
        tier = DESIRE_OK - 1000; // break/entering: only cover the door if nobody else can
      }
      // Even distribution: fewer prior door minutes → preferred; tiny % nudge
      // keeps ties leaning toward lower-percentage guards.
      return tier - s.doorMinutesTotal * 5 - pct + jitter();
    };

    // Fill open positions in cycle order so stair-stepping resolves cleanly.
    const openPositions = positionsToFill.filter(p => !assignedThisBlock[p]);
    for (const pos of openPositions) {
      let bestGid = null, bestScore = -Infinity;
      for (const gid of eligible) {
        if (usedGuards.has(gid)) continue;
        const sc = placementScore(gid, pos);
        if (sc > bestScore) { bestScore = sc; bestGid = gid; }
      }
      if (bestGid) {
        assignedThisBlock[pos] = bestGid;
        usedGuards.add(bestGid);
        workingAssignments[keyFor(block.id, pos)] = bestGid;
        newAssignments.push({ blockId: block.id, position: pos, guardId: bestGid });
      }
    }

    // Advance every crew guard's streak state based on what they did this block.
    for (const gid of crewGuardIds) {
      const s = gstate.get(gid);
      let pos = null;
      for (const p of positionsToFill) { if (assignedThisBlock[p] === gid) { pos = p; break; } }
      if (pos && isStandPosition(pos)) {
        s.standStreak += interval; s.doorStreak = 0;
        s.lastCategory = 'stand'; s.lastStandNum = parseInt(pos.replace('stand', ''), 10);
      } else if (pos && isDoorPosition(pos)) {
        s.doorStreak += interval; s.standStreak = 0;
        s.doorMinutesTotal += interval; // cumulative, for even door distribution
        s.lastCategory = 'door';
      } else {
        s.standStreak = 0; s.doorStreak = 0; s.lastCategory = 'break';
      }
    }
  }

  return newAssignments;
}

/**
 * Re-balance from a specific block onward.
 * Keeps assignments before startBlockId, regenerates from there.
 * 
 * @param {string} startBlockId
 * @param {string} day
 * @param {string} crewSection
 * @param {Object} state
 * @returns {Array<{blockId: string, position: string, guardId: string}>}
 */
function rebalanceFrom(startBlockId, day, crewSection, state) {
  const { selectedWeek, rotationBlocks, manualAssignments = {} } = state;
  const blockKey = selectedWeek ? `${day}-${selectedWeek}` : day;
  const blocks = (rotationBlocks[blockKey] || rotationBlocks[day] || []).slice().sort(
    (a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)
  );

  const startIdx = blocks.findIndex(b => b.id === startBlockId);
  if (startIdx === -1) {
    return generateRotation(day, crewSection, state);
  }

  // Get block IDs after the start point
  const blocksToRegenerate = new Set(blocks.slice(startIdx).map(b => b.id));
  
  // Remove assignments for blocks being regenerated (for this crew's guards only)
  const crewGuardIds = new Set(
    state.guards.filter(g => g.crewSection === crewSection).map(g => g.id)
  );

  const cleanAssignments = { ...state.blockAssignments };
  for (const key of Object.keys(cleanAssignments)) {
    const blockId = extractBlockId(key);
    if (blocksToRegenerate.has(blockId) && crewGuardIds.has(cleanAssignments[key])) {
      if (!manualAssignments[key]) {
        delete cleanAssignments[key];
      }
    }
  }

  // Re-generate with cleaned state
  const modifiedState = {
    ...state,
    blockAssignments: cleanAssignments
  };

  return generateRotation(day, crewSection, modifiedState);
}

/**
 * Extract block ID from an assignment key like "uuid-position"
 * UUIDs have format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx (36 chars)
 */
function extractBlockId(key) {
  // UUID is 36 chars, so blockId is key.slice(0, 36)
  return key.slice(0, 36);
}

/**
 * CSV Parser Utility for TeamUp exports
 */

function cleanHtml(html) {
  if (!html) return '';
  // Replace <br> and variants with newline
  let text = html.replace(/<br\s*\/?>/gi, '\n');
  // Replace </p><p> with newline
  text = text.replace(/<\/p>\s*<p>/gi, '\n');
  // Strip any remaining HTML tags
  text = text.replace(/<[^>]*>/g, '');
  // Decode basic HTML entities
  text = text
    .replace(/&amp;/gi, '&')
    .replace(/&lt;/gi, '<')
    .replace(/&gt;/gi, '>')
    .replace(/&nbsp;/gi, ' ')
    .replace(/&quot;/gi, '"')
    .replace(/&#39;/g, "'");
  return text.trim();
}

function parseCSV(text) {
  const lines = [];
  let row = [""];
  let insideQuote = false;
  
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];
    
    if (char === '"') {
      if (insideQuote && nextChar === '"') {
        row[row.length - 1] += '"';
        i++;
      } else {
        insideQuote = !insideQuote;
      }
    } else if (char === ',' && !insideQuote) {
      row.push('');
    } else if ((char === '\r' || char === '\n') && !insideQuote) {
      if (char === '\r' && nextChar === '\n') {
        i++;
      }
      lines.push(row);
      row = [''];
    } else {
      row[row.length - 1] += char;
    }
  }
  if (row.length > 1 || row[0] !== '') {
    lines.push(row);
  }
  return lines;
}

function parse12HourTo24Hour(timeStr) {
  const parts = timeStr.trim().toLowerCase().match(/^(\d+):(\d+)\s*(am|pm)$/);
  if (!parts) return null;
  let hours = parseInt(parts[1], 10);
  const minutes = parts[2];
  const ampm = parts[3];
  
  if (ampm === 'pm' && hours < 12) hours += 12;
  if (ampm === 'am' && hours === 12) hours = 0;
  
  return `${String(hours).padStart(2, '0')}:${minutes}`;
}

function timeToMinutes(timeStr) {
  let parsed = timeStr;
  if (timeStr.toLowerCase().includes('am') || timeStr.toLowerCase().includes('pm')) {
    parsed = parse12HourTo24Hour(timeStr);
  }
  if (!parsed) return 0;
  const [h, m] = parsed.split(':').map(Number);
  return h * 60 + m;
}

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(date.setDate(diff));
}

function getWeekStr(date) {
  const d = new Date(date);
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function findGuardMatch(name, guards) {
  const cleanName = name.trim().toLowerCase();
  if (!cleanName) return null;

  // 1. Exact match (case insensitive)
  let match = guards.find(g => g.name.trim().toLowerCase() === cleanName);
  if (match) return match;

  // 2. First name match (if guard has first and last name, e.g., "Ian Gomez" -> "Ian")
  match = guards.find(g => {
    const firstName = g.name.trim().split(/\s+/)[0].toLowerCase();
    return firstName === cleanName;
  });
  if (match) return match;

  // 3. Substring match (e.g. guard name is "Sydney" and CSV calendar is "SYD")
  match = guards.find(g => {
    const gn = g.name.trim().toLowerCase();
    return gn.includes(cleanName) || cleanName.includes(gn);
  });
  if (match) return match;

  return null;
}

function parseDateString(dateStr, selectedWeek) {
  // Try to parse YYYY-MM-DD or YYYY/MM/DD
  let match = dateStr.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
  if (match) {
    const y = parseInt(match[1], 10);
    const m = parseInt(match[2], 10);
    const d = parseInt(match[3], 10);
    return new Date(y, m - 1, d);
  }

  // Try to parse M/D/Y or D/M/Y with separator '/' or '-'
  match = dateStr.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2}|\d{4})$/);
  if (match) {
    const val1 = parseInt(match[1], 10);
    const val2 = parseInt(match[2], 10);
    let y = parseInt(match[3], 10);
    if (y < 100) y += 2000;

    // Heuristics to determine which is month and which is day:
    // 1. If val1 > 12, it must be day, so format is D/M/Y
    if (val1 > 12) {
      return new Date(y, val2 - 1, val1);
    }
    // 2. If val2 > 12, it must be day, so format is M/D/Y
    if (val2 > 12) {
      return new Date(y, val1 - 1, val2);
    }

    // 3. If both are <= 12, check which one matches the selectedWeek!
    // Try M/D/Y first:
    const dateMDY = new Date(y, val1 - 1, val2);
    const weekMDY = getWeekStr(getMonday(dateMDY));
    if (weekMDY === selectedWeek) {
      return dateMDY;
    }

    // Try D/M/Y:
    const dateDMY = new Date(y, val2 - 1, val1);
    const weekDMY = getWeekStr(getMonday(dateDMY));
    if (weekDMY === selectedWeek) {
      return dateDMY;
    }

    // Default to M/D/Y if neither (or both) match
    return dateMDY;
  }

  // Fallback to standard JS parsing
  const d = new Date(dateStr);
  return isNaN(d.getTime()) ? null : d;
}

function parseTeamUpCSV(text, state) {
  const lines = parseCSV(text);
  if (lines.length === 0) {
    throw new Error("CSV file is empty.");
  }
  
  const headers = lines[0].map(h => h.trim().replace(/^"|"$/g, ''));
  const subjectIdx = headers.indexOf('Subject');
  const startDateIdx = headers.indexOf('Start Date');
  const startTimeIdx = headers.indexOf('Start Time');
  const endTimeIdx = headers.indexOf('End Time');
  const calendarNameIdx = headers.indexOf('Calendar Name');
  const descriptionIdx = headers.indexOf('Description');
  
  if (subjectIdx === -1 || startDateIdx === -1 || startTimeIdx === -1 || endTimeIdx === -1 || calendarNameIdx === -1) {
    throw new Error("Missing required CSV columns. Make sure Subject, Start Date, Start Time, End Time, and Calendar Name are present.");
  }
  
  const lessons = [];
  const unmatched = new Set();
  const rawEvents = [];
  let skippedCount = 0;
  
  const selectedWeek = state.selectedWeek;
  
  for (let i = 1; i < lines.length; i++) {
    const row = lines[i];
    if (row.length < headers.length) continue; // Skip malformed rows
    
    const subject = cleanHtml(row[subjectIdx].trim());
    if (!subject) continue;
    
    // Check if subject is off-duty
    const subLower = subject.toLowerCase();
    if (subLower === 'off' || subLower === 'lunch break' || subLower === 'break' || subLower.startsWith('off ') || subLower === 'off-duty') {
      continue;
    }
    
    const startDateStr = row[startDateIdx].trim();
    if (!startDateStr) continue;
    
    // Parse Date to check if in selectedWeek
    const eventDate = parseDateString(startDateStr, selectedWeek);
    if (!eventDate) continue;
    const eventWeek = getWeekStr(getMonday(eventDate));
    
    if (eventWeek !== selectedWeek) {
      skippedCount++;
      continue;
    }
    
    const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const weekday = daysOfWeek[eventDate.getDay()];
    
    const startTimeStr = row[startTimeIdx].trim();
    const endTimeStr = row[endTimeIdx].trim();
    
    const startTime24 = parse12HourTo24Hour(startTimeStr);
    const endTime24 = parse12HourTo24Hour(endTimeStr);
    
    if (!startTime24 || !endTime24) continue;
    
    const startMin = timeToMinutes(startTime24);
    const endMin = timeToMinutes(endTime24);
    const durationMinutes = endMin - startMin;
    if (durationMinutes <= 0) continue;
    
    const description = descriptionIdx !== -1 ? row[descriptionIdx].trim() : '';
    const notes = cleanHtml(description);
    
    const calendarNames = row[calendarNameIdx].split('|').map(n => n.trim()).filter(Boolean);
    
    for (const calendarName of calendarNames) {
      const matchedGuard = findGuardMatch(calendarName, state.guards);
      
      const rawEvent = {
        calendarName,
        day: weekday,
        startTime: startTime24,
        durationMinutes,
        subject,
        notes,
        week: selectedWeek
      };
      
      rawEvents.push(rawEvent);
      
      if (matchedGuard) {
        lessons.push({
          guardId: matchedGuard.id,
          day: weekday,
          startTime: startTime24,
          durationMinutes,
          subject,
          notes,
          week: selectedWeek
        });
      } else {
        unmatched.add(calendarName);
      }
    }
  }
  
  return {
    lessons,
    unmatched: Array.from(unmatched),
    rawEvents,
    skippedCount
  };
}

};
