function renderSettingsTab(state) {
  const s = state.settings;
  const syncConfig = typeof syncManager !== 'undefined' ? syncManager.getConfig() : {};
  window.__settingsActiveDay = window.__settingsActiveDay || 'Monday';
  const activeDay = window.__settingsActiveDay;
  const activeWin = s.blockCreationWindows && s.blockCreationWindows[activeDay]
    ? s.blockCreationWindows[activeDay]
    : { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [] };

  return `
    <div class="page-title">⚙️ Settings</div>
    <div class="settings-grid">
      <div class="settings-section">
        <div class="card">
          <div class="card-header"><h3>Rotation Configuration</h3></div>
          <div class="card-body">
            <div class="setting-item">
              <label>Rotation Interval (minutes)</label>
              <input type="number" class="form-input" value="${s.rotationIntervalMinutes}"
                     min="5" max="120" step="5" id="setting-interval"
                     onchange="window.__updateSetting('rotationIntervalMinutes', parseInt(this.value))" />
              <span class="setting-description">How often guards rotate positions</span>
            </div>

            <div class="setting-item mt-4">
              <label>Stand Count</label>
              <input type="number" class="form-input" value="${s.standCount}"
                     min="1" max="6" id="setting-stand-count"
                     onchange="window.__updateSetting('standCount', parseInt(this.value))" />
              <span class="setting-description">Number of lifeguard stand positions (1–6)</span>
            </div>

            <div class="setting-item mt-4">
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer; user-select: none;">
                <input type="checkbox" id="setting-exclude-door" ${s.excludeDoor ? 'checked' : ''}
                       onchange="window.__updateSetting('excludeDoor', this.checked)" />
                Exclude Door from Rotation
              </label>
              <span class="setting-description">Remove the door duty position from rotation blocks and cycling</span>
            </div>

            <div class="setting-item mt-4">
              <label>Door Credit Multiplier</label>
              <input type="number" class="form-input" value="${s.doorCreditMultiplier ?? 0.5}"
                     min="0" max="2" step="0.05" id="setting-door-mult"
                     onchange="window.__updateSetting('doorCreditMultiplier', parseFloat(this.value))" />
              <span class="setting-description">Door duty time × this value = stand-time equivalent (0–2)</span>
            </div>

            <div class="setting-item mt-4">
              <label>Lesson Multiplier</label>
              <input type="number" class="form-input" value="${s.lessonMultiplier}"
                     min="0" max="2" step="0.05" id="setting-lesson-mult"
                     onchange="window.__updateSetting('lessonMultiplier', parseFloat(this.value))" />
              <span class="setting-description">Lesson time × this value = stand-time equivalent (0–2)</span>
            </div>

            <div class="setting-item mt-4">
              <label>Long-Shift Scaler Base (hours)</label>
              <input type="number" class="form-input" value="${s.shiftLengthScalerBaseHours ?? 4}"
                     min="0" max="12" step="0.5" id="setting-scaler-base"
                     onchange="window.__updateSetting('shiftLengthScalerBaseHours', parseFloat(this.value))" />
              <span class="setting-description">Base hours before multiplier starts to scale (e.g. 4 hours)</span>
            </div>

            <div class="setting-item mt-4">
              <label>Long-Shift Scaler Factor (per hour)</label>
              <input type="number" class="form-input" value="${s.shiftLengthScalerFactor ?? 0.0}"
                     min="0" max="1" step="0.01" id="setting-scaler-factor"
                     onchange="window.__updateSetting('shiftLengthScalerFactor', parseFloat(this.value))" />
              <span class="setting-description">Multiplier increase per hour beyond base (e.g. 0.05 is 5%/hr). Set to 0 to disable.</span>
            </div>
          </div>
        </div>



        <div class="card mt-4">
          <div class="card-header"><h3>Default Shift Times</h3></div>
          <div class="card-body">
            <div style="display: flex; font-weight: 600; margin-bottom: 12px; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border-subtle); padding-bottom: 6px;">
              <div style="flex: 0.8;">Day</div>
              <div style="flex: 2.2; padding-left: 4px;">AM Crew</div>
              <div style="flex: 2.2; padding-left: 4px;">PM Crew</div>
            </div>
            <div class="default-shift-times-list">
              ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].map(day => {
                const amSetting = s.defaultShiftTimes && s.defaultShiftTimes.AM && s.defaultShiftTimes.AM[day]
                  ? s.defaultShiftTimes.AM[day]
                  : { startTime: '09:00', endTime: '17:00' };
                const pmSetting = s.defaultShiftTimes && s.defaultShiftTimes.PM && s.defaultShiftTimes.PM[day]
                  ? s.defaultShiftTimes.PM[day]
                  : { startTime: '09:00', endTime: '17:00' };
                return `
                  <div class="default-shift-day-row" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; padding-bottom: 8px; border-bottom: ${day === 'Saturday' ? 'none' : '1px solid var(--border-subtle)'};">
                    <div style="flex: 0.8; font-weight: 500; font-size: 0.85rem; color: var(--text-primary);">${day.slice(0, 3)}</div>
                    
                    <div style="display: flex; align-items: center; gap: 4px; flex: 2.2;">
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                             value="${amSetting.startTime}" 
                             onchange="window.__updateDefaultShiftTime('AM', '${day}', 'startTime', this.value)" />
                      <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                             value="${amSetting.endTime}" 
                             onchange="window.__updateDefaultShiftTime('AM', '${day}', 'endTime', this.value)" />
                    </div>

                    <div style="display: flex; align-items: center; gap: 4px; flex: 2.2;">
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                             value="${pmSetting.startTime}" 
                             onchange="window.__updateDefaultShiftTime('PM', '${day}', 'startTime', this.value)" />
                      <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                             value="${pmSetting.endTime}" 
                             onchange="window.__updateDefaultShiftTime('PM', '${day}', 'endTime', this.value)" />
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
            </span>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="card">
          <div class="card-header"><h3>Default Block Generation Windows</h3></div>
          <div class="card-body">
            <!-- Day selector tabs -->
            <div style="display: flex; gap: 4px; margin-bottom: 16px; justify-content: space-between;">
              ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].map(d => `
                <button class="btn btn-sm ${activeDay === d ? 'btn-primary' : 'btn-secondary'}" 
                        style="flex: 1; padding: 4px 2px; font-size: 0.8rem;" 
                        onclick="window.__settingsActiveDay = '${d}'; store.updateSettings({});">
                  ${d.slice(0,3)}
                </button>
              `).join('')}
            </div>

            <!-- Copy Settings Panel -->
            <div style="margin-bottom: 16px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px dashed var(--border-subtle); border-radius: 6px;">
              <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                <span style="font-size: 0.75rem; font-weight: 500; color: var(--text-secondary);">
                  Copy <strong>${activeDay}</strong>'s settings to other days:
                </span>
                <div style="display: flex; gap: 4px; align-items: center; flex-wrap: wrap;">
                  ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']
                    .filter(d => d !== activeDay)
                    .map(d => `
                      <label style="display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem; cursor: pointer; user-select: none; padding: 3px 6px; border: 1px solid var(--border-subtle); border-radius: 4px; background: var(--bg-primary);">
                        <input type="checkbox" class="copy-to-day-checkbox" value="${d}" style="margin: 0; width: 13px; height: 13px; cursor: pointer;" />
                        <span>${d.slice(0,3)}</span>
                      </label>
                    `).join('')}
                  <button class="btn btn-secondary btn-sm" style="padding: 3px 8px; font-size: 0.75rem; font-weight: 500; border-radius: 4px; margin-left: 6px; background: transparent; border: 1px solid var(--border-subtle);" onclick="window.__toggleAllCopyDays(this)">
                    Select All
                  </button>
                  <button class="btn btn-primary btn-sm" style="padding: 3px 8px; font-size: 0.75rem; font-weight: 500; border-radius: 4px;" onclick="window.__copySettingsToSelected('${activeDay}')">
                    Apply Copy
                  </button>
                </div>
              </div>
            </div>

            <!-- Base Window Limits -->
            <div style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px; margin-bottom: 16px;">
              <h4 style="margin: 0 0 10px 0; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Base Window (Shift-Based)</h4>
              
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 500; cursor: pointer; user-select: none;">
                  <input type="checkbox" ${activeWin.limitStart ? 'checked' : ''} 
                         onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'limitStart', this.checked)" />
                  Limit Start Time
                </label>
                <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                       value="${activeWin.startTime}" 
                       ${activeWin.limitStart ? '' : 'disabled'}
                       onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'startTime', this.value)" />
              </div>

              <div style="display: flex; align-items: center; justify-content: space-between;">
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 500; cursor: pointer; user-select: none;">
                  <input type="checkbox" ${activeWin.limitEnd ? 'checked' : ''} 
                         onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'limitEnd', this.checked)" />
                  Limit End Time
                </label>
                <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                       value="${activeWin.endTime}" 
                       ${activeWin.limitEnd ? '' : 'disabled'}
                       onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'endTime', this.value)" />
              </div>
            </div>

            <!-- Opening & Closing Shift Windows -->
            <div style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px; margin-bottom: 16px;">
              <h4 style="margin: 0 0 10px 0; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Opening & Closing Periods</h4>
              
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                <span style="font-size: 0.8rem; font-weight: 500; color: var(--text-primary);">Opening Window</span>
                <div style="display: flex; align-items: center; gap: 4px;">
                  <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                         value="${activeWin.openingStart || '09:00'}" 
                         onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'openingStart', this.value)" />
                  <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                  <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                         value="${activeWin.openingEnd || '10:00'}" 
                         onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'openingEnd', this.value)" />
                </div>
              </div>

              <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 0.8rem; font-weight: 500; color: var(--text-primary);">Closing Window</span>
                <div style="display: flex; align-items: center; gap: 4px;">
                  <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                         value="${activeWin.closingStart || '16:00'}" 
                         onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'closingStart', this.value)" />
                  <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                  <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 95px; height: auto;" 
                         value="${activeWin.closingEnd || '17:00'}" 
                         onchange="window.__updateBlockCreationWindowConfig('${activeDay}', 'closingEnd', this.value)" />
                </div>
              </div>
            </div>

            <!-- Extra Windows (Reopen / Custom times) -->
            <div style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                <h4 style="margin: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Extra Custom Windows</h4>
                <button class="btn btn-secondary btn-sm" style="padding: 2px 6px; font-size: 0.75rem; height: auto;" 
                        onclick="window.__addExtraBlockWindow('${activeDay}')">
                  ➕ Add
                </button>
              </div>

              <div class="extra-windows-list">
                ${(activeWin.extraWindows || []).length === 0 ? `
                  <div style="font-size: 0.75rem; color: var(--text-tertiary); text-align: center; padding: 8px 0;">No extra custom windows defined.</div>
                ` : activeWin.extraWindows.map((win, idx) => `
                  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; padding-bottom: 8px; border-bottom: ${idx === activeWin.extraWindows.length - 1 ? 'none' : '1px solid var(--border-subtle)'};">
                    <div style="display: flex; align-items: center; gap: 4px;">
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 90px; height: auto;" 
                             value="${win.startTime}" 
                             onchange="window.__updateExtraBlockWindow('${activeDay}', ${idx}, 'startTime', this.value)" />
                      <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 90px; height: auto;" 
                             value="${win.endTime}" 
                             onchange="window.__updateExtraBlockWindow('${activeDay}', ${idx}, 'endTime', this.value)" />
                    </div>

                    <label style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 500; cursor: pointer; user-select: none;"
                           title="Align blocks to standard rotation interval boundaries (e.g. xx:00, xx:30). If unchecked, blocks increment directly from the start time.">
                      <input type="checkbox" ${win.align ? 'checked' : ''} 
                             onchange="window.__updateExtraBlockWindow('${activeDay}', ${idx}, 'align', this.checked)" />
                      Align
                    </label>

                    <button class="btn btn-danger btn-sm" style="padding: 2px 4px; line-height: 1; height: auto;" 
                            onclick="window.__removeExtraBlockWindow('${activeDay}', ${idx})">
                      🗑
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Excluded Time Slots (Blocks to prevent) -->
            <div style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px; margin-top: 16px;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                <h4 style="margin: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Excluded Time Slots</h4>
                <button class="btn btn-secondary btn-sm" style="padding: 2px 6px; font-size: 0.75rem; height: auto;" 
                        onclick="window.__addExcludeBlockWindow('${activeDay}')">
                  ➕ Add
                </button>
              </div>

              <div class="exclude-windows-list">
                ${(activeWin.excludeWindows || []).length === 0 ? `
                  <div style="font-size: 0.75rem; color: var(--text-tertiary); text-align: center; padding: 8px 0;">No excluded time slots defined.</div>
                ` : activeWin.excludeWindows.map((win, idx) => `
                  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; padding-bottom: 8px; border-bottom: ${idx === activeWin.excludeWindows.length - 1 ? 'none' : '1px solid var(--border-subtle)'};">
                    <div style="display: flex; align-items: center; gap: 4px;">
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 90px; height: auto;" 
                             value="${win.startTime}" 
                             onchange="window.__updateExcludeBlockWindow('${activeDay}', ${idx}, 'startTime', this.value)" />
                      <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                      <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 90px; height: auto;" 
                             value="${win.endTime}" 
                             onchange="window.__updateExcludeBlockWindow('${activeDay}', ${idx}, 'endTime', this.value)" />
                    </div>

                    <button class="btn btn-danger btn-sm" style="padding: 2px 4px; line-height: 1; height: auto;" 
                            onclick="window.__removeExcludeBlockWindow('${activeDay}', ${idx})">
                      🗑
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Default Block Configurations (Default overrides) -->
            <div style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px; margin-top: 16px;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                <h4 style="margin: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Default Block Defaults</h4>
                <button class="btn btn-secondary btn-sm" style="padding: 2px 6px; font-size: 0.75rem; height: auto;" 
                        onclick="window.__addDefaultBlockRule('${activeDay}')">
                  ➕ Add Override
                </button>
              </div>

              <div class="default-blocks-list">
                ${(activeWin.defaultBlocks || []).length === 0 ? `
                  <div style="font-size: 0.75rem; color: var(--text-tertiary); text-align: center; padding: 8px 0;">No default block configurations defined.</div>
                ` : activeWin.defaultBlocks.map((win, idx) => `
                  <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: ${idx === activeWin.defaultBlocks.length - 1 ? 'none' : '1px solid var(--border-subtle)'};">
                    <div style="display: flex; align-items: center; justify-content: space-between; gap: 6px;">
                      <div style="display: flex; align-items: center; gap: 4px;">
                        <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 90px; height: auto;" 
                               value="${win.startTime || '09:00'}" 
                               onchange="window.__updateDefaultBlockRule('${activeDay}', ${idx}, 'startTime', this.value)" />
                        <span style="font-size: 0.7rem; color: var(--text-tertiary);">-</span>
                        <input type="time" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 90px; height: auto;" 
                               value="${win.endTime || '17:00'}" 
                               onchange="window.__updateDefaultBlockRule('${activeDay}', ${idx}, 'endTime', this.value)" />
                      </div>

                      <button class="btn btn-danger btn-sm" style="padding: 2px 4px; line-height: 1; height: auto;" 
                              onclick="window.__removeDefaultBlockRule('${activeDay}', ${idx})">
                        🗑
                      </button>
                    </div>

                    <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
                      <div style="display: flex; align-items: center; gap: 4px; flex-shrink: 0;">
                        <span style="font-size: 0.7rem; color: var(--text-secondary);">Stands:</span>
                        <input type="number" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; width: 50px; height: auto;" 
                               value="${win.stands !== undefined ? win.stands : 2}" min="0" max="6"
                               onchange="window.__updateDefaultBlockRule('${activeDay}', ${idx}, 'stands', parseInt(this.value) ?? 2)" />
                      </div>
                      <div style="display: flex; align-items: center; gap: 4px; flex-grow: 1;">
                        <span style="font-size: 0.7rem; color: var(--text-secondary);">Note:</span>
                        <input type="text" class="form-input" style="padding: 2px 4px; font-size: 0.75rem; flex-grow: 1; height: auto;" 
                               placeholder="Default note..." value="${escapeHtml(win.note || '')}"
                               onchange="window.__updateDefaultBlockRule('${activeDay}', ${idx}, 'note', this.value)" />
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>

            <span class="setting-description" style="margin-top: 12px; display: block; font-size: 0.75rem; color: var(--text-tertiary);">
              Restricts generated rotation blocks to these daily windows. If disabled, blocks are generated spanning the earliest shift start to the latest shift end.
            </span>
          </div>
        </div>

        <div class="card mt-4">
          <div class="card-header"><h3>Data Management</h3></div>
          <div class="card-body">
            <div class="setting-item">
              <label>Export Schedule</label>
              <button class="btn btn-secondary" id="export-btn" onclick="window.__exportData()">
                📥 Export as JSON
              </button>
              <span class="setting-description">Download your complete schedule as a JSON file</span>
            </div>

            <div class="setting-item mt-4">
              <label>Import Schedule</label>
              <input type="file" accept=".json" id="import-input" class="form-input" style="padding:8px;" />
              <span class="setting-description">Load a previously exported schedule file</span>
            </div>



            <div class="setting-item mt-4">
              <label style="color: var(--status-red);">Danger Zone</label>
              <button class="btn btn-danger" id="reset-btn" onclick="window.__resetAll()">
                🗑 Reset All Data
              </button>
              <span class="setting-description">Permanently delete all guards, schedules, and rotations</span>
            </div>
          </div>
        </div>

        <div class="card mt-4">
          <div class="card-header"><h3>Swim Lessons Configuration</h3></div>
          <div class="card-body">
            <div class="setting-item">
              <label>Lessons Start Time</label>
              <input type="time" class="form-input" value="${s.lessonsStartTime || '08:00'}"
                     id="setting-lessons-start"
                     onchange="window.__updateSetting('lessonsStartTime', this.value)" />
              <span class="setting-description">Start hour boundary for the Swim Lessons calendar</span>
            </div>

            <div class="setting-item mt-4">
              <label>Lessons End Time</label>
              <input type="time" class="form-input" value="${s.lessonsEndTime || '18:00'}"
                     id="setting-lessons-end"
                     onchange="window.__updateSetting('lessonsEndTime', this.value)" />
              <span class="setting-description">End hour boundary for the Swim Lessons calendar</span>
            </div>

            <div class="setting-item mt-4">
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer; user-select: none;">
                <input type="checkbox" id="setting-lessons-exclude-saturday" ${s.lessonsExcludeSaturday ? 'checked' : ''}
                       onchange="window.__updateSetting('lessonsExcludeSaturday', this.checked)" />
                Exclude Saturday
              </label>
              <span class="setting-description">Hide Saturday from the Swim Lessons calendar and stretch Monday–Friday</span>
            </div>

            <div class="setting-item mt-4">
              <label>Lessons Slot Height (px)</label>
              <input type="number" class="form-input" value="${s.lessonsSlotHeight || 50}"
                     min="30" max="150" step="5" id="setting-lessons-slot-height"
                     onchange="window.__updateSetting('lessonsSlotHeight', parseInt(this.value))" />
              <span class="setting-description">Vertical height of each 30-minute block on the calendar (30px–150px)</span>
            </div>
          </div>
        </div>

        <div class="card mt-4">
          <div class="card-header">
            <h3>☁️ Cloud Sync (Multi-Device Sync)</h3>
          </div>
          <div class="card-body">
            <div class="setting-item">
              <label>Sync Provider</label>
              <select class="form-input" id="sync-provider" onchange="window.__updateSyncConfig('provider', this.value)">
                <option value="none" ${syncConfig.provider === 'none' ? 'selected' : ''}>Disabled (Local Storage Only)</option>
                <option value="github_gist" ${syncConfig.provider === 'github_gist' ? 'selected' : ''}>GitHub Gist (Recommended)</option>
              </select>
              <span class="setting-description">Sync schedule data between multiple devices using a secret GitHub Gist.</span>
            </div>

            <div id="sync-setup-fields" style="display: ${syncConfig.provider === 'github_gist' ? 'block' : 'none'}; border-top: 1px solid var(--border-subtle); padding-top: 16px; margin-top: 16px;">
              
              <!-- Detailed PAT step-by-step guide -->
              <div class="pat-guide-box" style="margin-bottom: 16px;">
                <h4>🔑 How to setup GitHub Sync:</h4>
                <ol class="pat-guide-list">
                  <li><strong>Create a GitHub Account:</strong> If you don't have one, sign up for free at <a href="https://github.com" target="_blank" style="color: var(--primary-400); text-decoration: underline;">github.com</a>.</li>
                  <li><strong>Generate a Personal Access Token (PAT):</strong> 
                    <a href="https://github.com/settings/tokens/new?description=Lifeguard%20Schedule%20Sync&scopes=gist" target="_blank" style="color: var(--primary-400); text-decoration: underline; font-weight: 500;">Click this direct link</a> to open GitHub's Token Generation page.

function showShiftModal(guardId, day) {
  const guard = store.getGuardById(guardId);
  if (!guard) return;

  const shift = store.getShift(guardId, day);
  const state = store.getState();
  const crew = guard.crewSection || 'AM';
  const defaultTimes = state.settings.defaultShiftTimes && state.settings.defaultShiftTimes[crew] && state.settings.defaultShiftTimes[crew][day]
    ? state.settings.defaultShiftTimes[crew][day]
    : { startTime: '09:00', endTime: '17:00' };
  const startTime = shift ? shift.startTime : defaultTimes.startTime;
  const endTime = shift ? shift.endTime : defaultTimes.endTime;
  const breakMinutes = shift ? (shift.breakMinutes || 0) : 0;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'shift-modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${escapeHtml(guard.name)} — ${day}</h3>
        <button class="btn btn-ghost btn-icon" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label class="form-label">Start Time</label>
            <input type="time" class="form-input" id="modal-start-time" value="${startTime}" />
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">End Time</label>
            <input type="time" class="form-input" id="modal-end-time" value="${endTime}" />
          </div>
        </div>
        <div class="form-row" style="margin-top: 10px;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">Break Duration</label>
            <select class="form-input" id="modal-break-minutes">
              <option value="0" ${breakMinutes === 0 ? 'selected' : ''}>No break</option>
              <option value="30" ${breakMinutes === 30 ? 'selected' : ''}>30 min</option>
              <option value="60" ${breakMinutes === 60 ? 'selected' : ''}>1 hour</option>
            </select>
          </div>
        </div>
        <div class="text-sm text-secondary" id="shift-duration-preview" style="margin-bottom: 10px;">
          Shift duration: ${formatDuration(getTimeDuration(startTime, endTime) - breakMinutes)}
        </div>
        
        <div style="margin-top: 15px; border-top: 1px solid var(--border-subtle); padding-top: 15px;">
          <label class="form-label" style="margin-bottom: 8px; display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);">Copy Shift to:</label>
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
            <div style="display: flex; gap: 6px;" id="modal-day-bubbles">
              ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].map((d, idx) => {
                const char = ['M', 'T', 'W', 'TH', 'F', 'S'][idx];
                const isCurrent = d === day;
                if (isCurrent) {
                  return `
                    <button class="day-bubble current" disabled 
                      style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--primary-600); background: var(--primary-900); color: white; font-weight: bold; font-size: 0.75rem; cursor: not-allowed; display: flex; align-items: center; justify-content: center; opacity: 0.75;">
                      ${char}
                    </button>
                  `;
                }
                return `
                  <button class="day-bubble selectable" data-day="${d}"
                    onclick="this.classList.toggle('selected'); this.style.background = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--bg-tertiary)'; this.style.color = this.classList.contains('selected') ? 'white' : 'var(--text-secondary)'; this.style.borderColor = this.classList.contains('selected') ? 'var(--primary-600)' : 'var(--border-default)';"
                    style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-default); background: var(--bg-tertiary); color: var(--text-secondary); font-weight: bold; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);">
                    ${char}
                  </button>
                `;
              }).join('')}
            </div>
            <button class="btn btn-secondary btn-sm" id="modal-copy-to-btn" style="padding: var(--space-1) var(--space-3); font-size: var(--font-xs);">Copy to</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        ${shift ? `<button class="btn btn-danger btn-sm" id="modal-clear-btn">Clear Shift</button>` : ''}
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn">Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  // Update duration preview
  const updatePreview = () => {
    const s = document.getElementById('modal-start-time').value;
    const en = document.getElementById('modal-end-time').value;
    const bm = parseInt(document.getElementById('modal-break-minutes').value) || 0;
    if (s && en) {
      document.getElementById('shift-duration-preview').textContent =
        `Shift duration: ${formatDuration(getTimeDuration(s, en) - bm)}`;
    }
  };
  document.getElementById('modal-start-time').addEventListener('change', updatePreview);
  document.getElementById('modal-end-time').addEventListener('change', updatePreview);
  document.getElementById('modal-break-minutes').addEventListener('change', updatePreview);

  // Save
  document.getElementById('modal-save-btn').addEventListener('click', () => {
    const st = document.getElementById('modal-start-time').value;
    const et = document.getElementById('modal-end-time').value;
    const bm = parseInt(document.getElementById('modal-break-minutes').value) || 0;

    if (!st || !et) {
      showToast('Please enter start and end times', 'warning');
      return;
    }

    // Save current day
    store.setShiftEntry(guardId, day, {
      startTime: st,
      endTime: et,
      breakMinutes: bm
    });

    // Also copy to selected days if any are selected
    const selectedBubbles = overlay.querySelectorAll('.day-bubble.selected');
    const selectedDays = Array.from(selectedBubbles).map(b => b.dataset.day);
    selectedDays.forEach(selectedDay => {
      store.setShiftEntry(guardId, selectedDay, {
        startTime: st,
        endTime: et,
        breakMinutes: bm
      });
    });

    if (selectedDays.length > 0) {
      showToast(`Shift saved and copied to ${selectedDays.join(', ')}`, 'success');
    } else {
      showToast(`Shift saved for ${guard.name} on ${day}`, 'success');
    }
    overlay.remove();
  });

  // Copy to button
  const copyToBtn = document.getElementById('modal-copy-to-btn');
  if (copyToBtn) {
    copyToBtn.addEventListener('click', () => {
      const st = document.getElementById('modal-start-time').value;
      const et = document.getElementById('modal-end-time').value;
      const bm = parseInt(document.getElementById('modal-break-minutes').value) || 0;

      if (!st || !et) {
        showToast('Please enter start and end times', 'warning');
        return;
      }

      const selectedBubbles = overlay.querySelectorAll('.day-bubble.selected');
      if (selectedBubbles.length === 0) {
        showToast('Please select at least one day to copy to', 'warning');
        return;
      }

      const selectedDays = Array.from(selectedBubbles).map(b => b.dataset.day);

      // Save current day
      store.setShiftEntry(guardId, day, {
        startTime: st,
        endTime: et,
        breakMinutes: bm
      });

      // Copy and overwrite selected days
      selectedDays.forEach(selectedDay => {
        store.setShiftEntry(guardId, selectedDay, {
          startTime: st,
          endTime: et,
          breakMinutes: bm
        });
      });

      showToast(`Shift copied to ${selectedDays.join(', ')}`, 'success');
      overlay.remove();
    });
  }

  // Clear
  const clearBtn = document.getElementById('modal-clear-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (confirm(`Remove shift on ${day}?`)) {
        store.removeShiftEntry(guardId, day);
        showToast('Shift cleared', 'info');
        overlay.remove();
      }
    });
  }
}

// ─── Lessons Calendar Tab Helpers & Modal ────────────────

function formatWeekLabel(startDate) {
  const start = new Date(startDate);
  const end = new Date(startDate);
  end.setDate(start.getDate() + 5);
  
  const startMonth = start.toLocaleDateString('en-US', { month: 'short' });
  const startDateNum = start.getDate();
  const endMonth = end.toLocaleDateString('en-US', { month: 'short' });
  const endDateNum = end.getDate();
  
  if (startMonth === endMonth) {
    return `Week of ${startMonth} ${startDateNum} – ${endDateNum}`;
  } else {
    return `Week of ${startMonth} ${startDateNum} – ${endMonth} ${endDateNum}`;
  }
}

function getWeeklyTimeRange(state) {
  const startStr = state.settings?.lessonsStartTime || '08:00';
  const endStr = state.settings?.lessonsEndTime || '18:00';
  let earliest = timeToMinutes(startStr);
  let latest = timeToMinutes(endStr);

  if (earliest >= latest) {
    earliest = 480;
    latest = 1080;
  }

  return { earliest, latest };
}

function getPositionedLessons(lessons, day, earliest, latest) {
  const dayLessons = lessons.filter(l => l.day === day);
  
  // Sort by startTime
  dayLessons.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
  
  const columns = [];
  for (const lesson of dayLessons) {
    let placed = false;
    const start = timeToMinutes(lesson.startTime);
    const end = timeToMinutes(lesson.endTime);
    
    for (let cIdx = 0; cIdx < columns.length; cIdx++) {
      const overlaps = columns[cIdx].some(other => {
        const oStart = timeToMinutes(other.startTime);
        const oEnd = timeToMinutes(other.endTime);
        return start < oEnd && end > oStart;
      });
      
      if (!overlaps) {
        columns[cIdx].push(lesson);
        lesson.colIdx = cIdx;
        placed = true;
        break;
      }
    }
    
    if (!placed) {
      columns.push([lesson]);
      lesson.colIdx = columns.length - 1;
    }
  }
  
  const totalDuration = latest - earliest;
  return dayLessons.map(lesson => {
    const start = timeToMinutes(lesson.startTime);
    const duration = parseInt(lesson.durationMinutes);
    const top = ((start - earliest) / totalDuration) * 100;
    const height = (duration / totalDuration) * 100;
    
    const width = 100 / columns.length;
    const left = lesson.colIdx * width;
    
    return {
      lesson,
      top,
      height,
      width,
      left
    };
  });
}

function parseTimeInput(timeStr) {
  if (/^\d{2}:\d{2}$/.test(timeStr.trim())) {
    return timeStr.trim();
  }
  const match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!match) return null;
  let hours = parseInt(match[1]);
  const minutes = parseInt(match[2]);
  const ampm = match[3].toUpperCase();
  
  if (ampm === 'PM' && hours < 12) hours += 12;
  if (ampm === 'AM' && hours === 12) hours = 0;
  
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
}
