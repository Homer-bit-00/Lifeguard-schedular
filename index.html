/* ═══════════════════════════════════════════════════════════════════
   Lifeguard Rotation Scheduler — Design System
   A premium, modern dark-mode interface with glassmorphism effects
   ═══════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

/* ─── Design Tokens ───────────────────────────────────────────── */
:root {
  /* Primary palette — ocean blues */
  --primary-50: #e8f4fd;
  --primary-100: #b8ddf7;
  --primary-200: #89c7f1;
  --primary-300: #5ab0eb;
  --primary-400: #2b9ae5;
  --primary-500: #0d84d0;
  --primary-600: #0a6aa8;
  --primary-700: #074f7e;
  --primary-800: #043555;
  --primary-900: #021a2b;

  /* Accent — warm sunset coral */
  --accent-400: #ff7b72;
  --accent-500: #f85149;
  --accent-600: #da3633;

  /* AM crew — sunrise gold */
  --am-50: #fef9e7;
  --am-100: #fcefc3;
  --am-200: #f9e08e;
  --am-300: #f6d055;
  --am-400: #f2c029;
  --am-500: #e6a817;
  --am-600: #c28512;
  --am-700: #9a630e;

  /* PM crew — twilight purple */
  --pm-50: #f3e8ff;
  --pm-100: #e4ccff;
  --pm-200: #c99eff;
  --pm-300: #b07aff;
  --pm-400: #9656ff;
  --pm-500: #7c3aed;
  --pm-600: #6326c9;
  --pm-700: #4b1d97;

  /* Status colors */
  --status-green: #2dd4a8;
  --status-green-bg: rgba(45, 212, 168, 0.12);
  --status-amber: #f59e0b;
  --status-amber-bg: rgba(245, 158, 11, 0.12);
  --status-blue: #38bdf8;
  --status-blue-bg: rgba(56, 189, 248, 0.12);
  --status-red: #f87171;
  --status-red-bg: rgba(248, 113, 113, 0.12);
  --status-purple: #c084fc;
  --status-purple-bg: rgba(192, 132, 252, 0.12);

  /* Neutral — slate */
  --bg-primary: #0f1117;
  --bg-secondary: #161822;
  --bg-tertiary: #1e2030;
  --bg-elevated: #252840;
  --bg-hover: #2a2d45;
  --bg-active: #32365a;

  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-default: rgba(255, 255, 255, 0.1);
  --border-strong: rgba(255, 255, 255, 0.18);

  --text-primary: #e8eaf0;
  --text-secondary: #9ba1b0;
  --text-tertiary: #6b7185;
  --text-inverse: #0f1117;

  /* Glass */
  --glass-bg: rgba(30, 32, 48, 0.75);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Typography */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-xs: 0.7rem;
  --font-sm: 0.8rem;
  --font-base: 0.9rem;
  --font-lg: 1.05rem;
  --font-xl: 1.25rem;
  --font-2xl: 1.5rem;
  --font-3xl: 1.875rem;

  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle background gradient */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(13, 132, 208, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(45, 212, 168, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
}

/* ─── Nav Bar ──────────────────────────────────────────── */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.nav-brand .logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary-500), var(--pm-500));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 2px 12px rgba(13, 132, 208, 0.3);
}

.nav-brand h1 {
  font-size: var(--font-lg);
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-300), var(--pm-300));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-tabs {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: var(--space-1);
  border-radius: var(--radius-lg);
}

.nav-tab {
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-md);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.nav-tab:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}

.nav-tab.active {
  color: var(--text-primary);
  background: var(--primary-600);
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.3);
}

.nav-tab .tab-icon {
  font-size: var(--font-base);
}

.nav-meta {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  color: var(--text-tertiary);
  font-size: var(--font-xs);
}

/* ─── Sub Nav (Day Selector + Crew Toggle) ───────────────── */
.sub-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
}

.day-selector {
  display: flex;
  gap: var(--space-1);
}

.day-chip {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 52px;
}

.day-chip:hover {
  border-color: var(--primary-500);
  color: var(--text-primary);
  background: var(--bg-hover);
}

.day-chip.active {
  background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
  border-color: var(--primary-500);
  color: white;
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.25);
}

.day-chip .day-badge {
  font-size: 0.6rem;
  background: rgba(255, 255, 255, 0.15);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-weight: 600;
}

.day-chip.active .day-badge {
  background: rgba(255, 255, 255, 0.25);
}

.crew-toggle {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: 3px;
  border-radius: var(--radius-md);
}

.crew-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.crew-btn:hover { color: var(--text-primary); }

.crew-btn.active.am {
  background: linear-gradient(135deg, var(--am-500), var(--am-600));
  color: white;
  box-shadow: 0 2px 8px rgba(230, 168, 23, 0.25);
}

.crew-btn.active.pm {
  background: linear-gradient(135deg, var(--pm-500), var(--pm-600));
  color: white;
  box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
}

.crew-btn.active.both {
  background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
  color: white;
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.25);
}

/* ─── Main Content ──────────────────────────────────────── */
.main-content {
  padding: var(--space-6);
  max-width: 1400px;
  margin: 0 auto;
}

.page-title {
  font-size: var(--font-2xl);
  font-weight: 700;
  margin-bottom: var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

/* ─── Cards ────────────────────────────────────────────── */
.card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--glass-shadow);
  overflow: hidden;
}

.card-header {
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-header h2 {
  font-size: var(--font-lg);
  font-weight: 600;
}

.card-header h3 {
  font-size: var(--font-base);
  font-weight: 600;
}

.card-body {
  padding: var(--space-5);
}

.card-footer {
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: flex-end;
  gap: var(--space-3);
}

/* ─── Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  font-family: var(--font-family);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
  color: white;
  box-shadow: 0 2px 8px rgba(13, 132, 208, 0.3);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-400), var(--primary-500));
  box-shadow: 0 4px 12px rgba(13, 132, 208, 0.4);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-tertiary);
  border-color: var(--border-default);
  color: var(--text-primary);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--border-strong);
}

.btn-danger {
  background: rgba(248, 113, 113, 0.1);
  border-color: rgba(248, 113, 113, 0.2);
  color: var(--status-red);
}

.btn-danger:hover {
  background: rgba(248, 113, 113, 0.2);
  border-color: rgba(248, 113, 113, 0.4);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn-sm {
  padding: var(--space-1) var(--space-3);
  font-size: var(--font-xs);
}

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}

.btn-am {
  background: linear-gradient(135deg, var(--am-500), var(--am-600));
  color: white;
}

.btn-pm {
  background: linear-gradient(135deg, var(--pm-500), var(--pm-600));
  color: white;
}

.btn-success {
  background: linear-gradient(135deg, var(--status-green), #1ba885);
  color: white;
}

.btn:disabled, button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}


/* ─── Form Controls ────────────────────────────────────── */
.form-group {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.form-label {
  font-size: var(--font-sm);
  font-weight: 500;
  color: var(--text-secondary);
}

.form-input,
.form-select {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--font-sm);
  transition: all var(--transition-fast);
  outline: none;
}

.form-input:focus,
.form-select:focus {
  border-color: var(--primary-500);
  box-shadow: 0 0 0 3px rgba(13, 132, 208, 0.15);
}

.form-input::placeholder {
  color: var(--text-tertiary);
}

.form-row {
  display: flex;
  gap: var(--space-3);
  align-items: flex-end;
}

.form-inline {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

/* ─── Radio/Toggle group ─────────────────────────────── */
.radio-group {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: 3px;
  border-radius: var(--radius-sm);
}

.radio-option {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-xs);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.radio-option:hover { color: var(--text-primary); }

.radio-option.active {
  background: var(--primary-600);
  color: white;
}

.radio-option.active.am {
  background: var(--am-600);
}

.radio-option.active.pm {
  background: var(--pm-600);
}

/* ─── Weekly Grid (Schedule Tab) ───────────────────────── */
.schedule-layout {
  display: flex;
  gap: var(--space-6);
}

.schedule-grid-container {
  flex: 1;
  overflow-x: auto;
}

.guard-roster-panel {
  width: 280px;
  flex-shrink: 0;
}

.weekly-grid {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

.weekly-grid th {
  padding: var(--space-3);
  font-size: var(--font-xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-align: center;
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 2;
}

.weekly-grid td {
  padding: var(--space-1);
  vertical-align: top;
}

.weekly-grid .guard-name-cell {
  padding: var(--space-3);
  font-size: var(--font-sm);
  font-weight: 500;
  white-space: nowrap;
  position: sticky;
  left: 0;
  background: var(--bg-secondary);
  z-index: 1;
  min-width: 120px;
}

.crew-section-header {
  padding: var(--space-2) var(--space-3);
  font-size: var(--font-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 2px solid;
}

.crew-section-header.am {
  color: var(--am-400);
  border-color: var(--am-500);
  background: rgba(230, 168, 23, 0.05);
}

.crew-section-header.pm {
  color: var(--pm-400);
  border-color: var(--pm-500);
  background: rgba(124, 58, 237, 0.05);
}

.shift-cell {
  min-width: 90px;
  min-height: 48px;
  padding: var(--space-2);
  border: 1px dashed var(--border-subtle);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: var(--font-xs);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.shift-cell:hover {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.05);
}

.shift-cell.has-shift {
  border-style: solid;
  border-color: var(--border-default);
  background: var(--bg-tertiary);
}

.shift-cell .shift-time {
  font-weight: 600;
  color: var(--text-primary);
  font-size: var(--font-xs);
}

.shift-cell .shift-duration {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--status-purple-bg);
  color: var(--status-purple);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 600;
}

.shift-cell .lesson-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--status-amber-bg);
  color: var(--status-amber);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 600;
}

.shift-cell .break-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--status-blue-bg);
  color: var(--status-blue);
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 600;
}

/* ─── Guard Roster ─────────────────────────────────────── */
.guard-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-2);
  transition: all var(--transition-fast);
}

.guard-chip:hover {
  border-color: var(--border-default);
  background: var(--bg-hover);
}

.guard-chip .guard-info {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.guard-chip .guard-avatar {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-xs);
  font-weight: 700;
  color: white;
}

.guard-chip .guard-avatar.am {
  background: linear-gradient(135deg, var(--am-500), var(--am-600));
}

.guard-chip .guard-avatar.pm {
  background: linear-gradient(135deg, var(--pm-500), var(--pm-600));
}

.guard-chip .guard-name {
  font-size: var(--font-sm);
  font-weight: 500;
}

.guard-chip 
.total-hours-badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  font-size: 0.65rem;
  font-weight: 600;
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border-default);
  width: fit-content;
}

.total-hours-badge.empty {
  background: transparent;
  color: var(--text-tertiary);
  border: 1px dashed var(--border-subtle);
}

.crew-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  text-transform: uppercase;
}

.crew-badge.am {
  background: var(--am-600);
  color: white;
}

.crew-badge.pm {
  background: var(--pm-600);
  color: white;
}

.guard-chip .guard-actions {
  display: flex;
  gap: var(--space-1);
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.guard-chip:hover .guard-actions {
  opacity: 1;
}

/* ─── Rotation Block Grid ──────────────────────────────── */
.rotation-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: var(--space-6);
}

.block-grid {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.block-row {
  display: grid;
  grid-template-columns: 28px 165px 1fr auto;
  gap: var(--space-3);
  align-items: center;
  padding: var(--space-3) var(--space-4);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
}

.block-row:hover {
  border-color: var(--border-default);
}

.block-row.selected-row {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.06);
}

.block-select-cell {
  display: flex;
  align-items: center;
  justify-content: center;
}

.block-select-checkbox {
  width: 16px;
  height: 16px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-color: transparent;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.block-select-checkbox:checked {
  background-color: var(--primary-500);
  border-color: var(--primary-500);
}

.block-select-checkbox:checked::after {
  content: "✓";
  color: var(--text-primary);
  font-size: 10px;
  font-weight: bold;
}

.block-select-checkbox:hover {
  border-color: var(--primary-400);
  background-color: rgba(255, 255, 255, 0.05);
}

.block-row.closed {
  opacity: 0.4;
  background: var(--bg-secondary);
}

.block-row.double {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.05);
}

.block-time-label {
  font-size: var(--font-xs);
  font-weight: 600;
  color: var(--text-secondary);
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
  padding-right: 28px;
}

.split-row-btn {
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0;
  transition: opacity var(--transition-fast);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 2px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
}

.block-row:hover .split-row-btn {
  opacity: 0.6;
}

.block-row:hover .split-row-btn:hover {
  opacity: 1;
  background: rgba(255, 255, 255, 0.08);
}

.block-time-label .time-range {
  color: var(--text-primary);
  font-size: var(--font-sm);
}

.block-time-label .interval-tag {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 0.6rem;
  color: var(--primary-400);
}

.block-assignments {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.assignment-slot {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2px;
  padding: 6px 4px;
  background: var(--bg-elevated);
  border: 1px dashed var(--border-default);
  border-radius: var(--radius-sm);
  min-width: 100px;
  min-height: 48px;
  font-size: var(--font-xs);
  position: relative;
  text-align: center;
}

.assignment-slot:hover {
  border-color: var(--primary-500);
  background: rgba(13, 132, 208, 0.08);
}

.assignment-slot.filled {
  border-style: solid;
  background: var(--bg-elevated);
}

.assignment-slot .position-label {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-tertiary);
  /* min-width removed */
}

.assignment-slot .assigned-guard {
  font-weight: 500;
  color: var(--text-primary);
}

.assignment-slot.stand .position-label { color: var(--status-green); }
.assignment-slot.door .position-label { color: var(--status-amber); }
.assignment-slot.break-slot .position-label { color: var(--text-tertiary); }

.block-controls {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.guard-count-stepper {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  padding: 2px;
}

.guard-count-stepper button {
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 4px;
  font-size: var(--font-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.guard-count-stepper button:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.guard-count-stepper .count {
  min-width: 20px;
  text-align: center;
  font-size: var(--font-sm);
  font-weight: 700;
}

.block-note {
  padding: var(--space-1) var(--space-2);
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
  font-family: var(--font-family);
  font-size: 0.7rem;
  font-style: italic;
  outline: none;
  width: 100%;
  transition: all var(--transition-fast);
}

.block-note:focus {
  background: var(--bg-tertiary);
  border-color: var(--border-default);
  color: var(--text-primary);
}

/* ─── Stand Time Tracker ───────────────────────────────── */
.tracker-panel {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.stand-time-bar-container {
  padding: var(--space-3) var(--space-4);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.stand-time-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stand-time-header .guard-label {
  font-size: var(--font-sm);
  font-weight: 500;
}

.stand-time-header .percentage-label {
  font-size: var(--font-sm);
  font-weight: 700;
}

.stand-time-track {
  height: 8px;
  background: var(--bg-elevated);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.stand-time-fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width var(--transition-slow);
  min-width: 2px;
}

.stand-time-fill.green {
  background: linear-gradient(90deg, var(--status-green), #1ba885);
}

.stand-time-fill.amber {
  background: linear-gradient(90deg, var(--status-amber), #d97706);
}

.stand-time-fill.blue {
  background: linear-gradient(90deg, var(--status-blue), #0ea5e9);
}

.stand-time-detail {
  font-size: 0.65rem;
  color: var(--text-tertiary);
}

/* ─── Weekly Tracker Table ─────────────────────────────── */
.weekly-tracker-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: var(--font-xs);
}

.weekly-tracker-table th {
  padding: var(--space-2) var(--space-3);
  text-align: center;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-subtle);
}

.weekly-tracker-table td {
  padding: var(--space-2) var(--space-3);
  text-align: center;
  border-bottom: 1px solid var(--border-subtle);
}

.weekly-tracker-table td.guard-name {
  text-align: left;
  font-weight: 500;
}

.percentage-cell {
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.7rem;
}

.percentage-cell.green { background: var(--status-green-bg); color: var(--status-green); }
.percentage-cell.amber { background: var(--status-amber-bg); color: var(--status-amber); }
.percentage-cell.blue { background: var(--status-blue-bg); color: var(--status-blue); }
.percentage-cell.none { color: var(--text-tertiary); }

/* ─── Settings Panel ───────────────────────────────────── */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-6);
}

.settings-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.setting-item {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.setting-item label {
  font-size: var(--font-sm);
  font-weight: 500;
  color: var(--text-secondary);
}

.setting-item .setting-description {
  font-size: var(--font-xs);
  color: var(--text-tertiary);
}

.segmented-control {
  display: flex;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}

.segmented-control button {
  flex: 1;
  padding: var(--space-2);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  border-radius: 4px;
  transition: all var(--transition-fast);
}

.segmented-control button:hover { color: var(--text-primary); }

.segmented-control button.active {
  background: var(--primary-600);
  color: white;
}

.note-template-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.note-template-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  font-size: var(--font-xs);
  color: var(--text-secondary);
}

.note-template-chip .remove-btn {
  width: 16px;
  height: 16px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  transition: all var(--transition-fast);
}

.note-template-chip .remove-btn:hover {
  background: var(--status-red-bg);
  color: var(--status-red);
}

/* ─── Modal ────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  min-width: 380px;
  max-width: 500px;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-header {
  padding: var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 {
  font-size: var(--font-lg);
  font-weight: 600;
}

.modal-body {
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.modal-footer {
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: flex-end;
  gap: var(--space-3);
}

/* ─── Toast ────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: var(--space-6);
  right: var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  z-index: 300;
}

.toast {
  padding: var(--space-3) var(--space-5);
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  font-size: var(--font-sm);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  max-width: 400px;
}

.toast.success { border-left: 3px solid var(--status-green); }
.toast.warning { border-left: 3px solid var(--status-amber); }
.toast.error { border-left: 3px solid var(--status-red); }
.toast.info { border-left: 3px solid var(--primary-400); }

.toast.exiting {
  animation: slideOutRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* ─── Closed/Break pill ────────────────────────────────── */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 0.65rem;
  font-weight: 600;
}

.status-pill.closed {
  background: var(--status-red-bg);
  color: var(--status-red);
}

.status-pill.double {
  background: var(--status-blue-bg);
  color: var(--status-blue);
}

.status-pill.break {
  background: var(--bg-elevated);
  color: var(--text-tertiary);
}

/* ─── Empty States ────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-12);
  text-align: center;
  color: var(--text-tertiary);
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: var(--space-4);
  opacity: 0.5;
}

.empty-state h3 {
  font-size: var(--font-lg);
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
}

.empty-state p {
  font-size: var(--font-sm);
  max-width: 400px;
}

/* ─── Animations ───────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(100px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideOutRight {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(100px); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ─── Drag and Drop ────────────────────────────────────── */
.dragging {
  opacity: 0.5;
  cursor: grabbing;
}

.drop-target {
  outline: 2px dashed var(--primary-500);
  outline-offset: 2px;
}

.drop-target.over {
  background: rgba(13, 132, 208, 0.1);
}

/* ─── Print Styles ─────────────────────────────────────── */
@media print {
  body::before { display: none; }
  .nav-bar, .sub-nav, .toast-container, .btn, .form-input { display: none !important; }

  body {
    background: white;
    color: black;
    font-size: 10pt;
  }

  .card {
    background: white;
    border: 1px solid #ccc;
    box-shadow: none;
    backdrop-filter: none;
  }

  .block-row {
    background: white;
    border: 1px solid #ddd;
  }

  .main-content {
    padding: 0;
    max-width: none;
  }
}

/* ─── Responsive ───────────────────────────────────────── */
@media (max-width: 1023px) {
  .rotation-layout {
    grid-template-columns: 1fr;
  }

  .schedule-layout {
    flex-direction: column-reverse;
  }

  .guard-roster-panel {
    width: 100%;
  }

  .settings-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 767px) {
  .nav-bar {
    flex-wrap: wrap;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
  }

  .nav-tabs {
    order: 3;
    width: 100%;
    overflow-x: auto;
  }

  .nav-meta { display: none; }

  .sub-nav {
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-3);
  }

  .day-selector {
    width: 100%;
    overflow-x: auto;
  }

  .main-content {
    padding: var(--space-3);
  }

  .modal {
    min-width: auto;
    margin: var(--space-3);
    max-width: calc(100vw - var(--space-6));
  }

  .schedule-grid-container {
    overflow-x: auto;
  }

  .block-row {
    grid-template-columns: 1fr;
    gap: var(--space-2);
  }
}

/* ─── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--bg-hover);
  border-radius: var(--radius-full);
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}

/* ─── Utility Classes ──────────────────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: var(--space-1); }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.gap-4 { gap: var(--space-4); }
.gap-6 { gap: var(--space-6); }
.mt-2 { margin-top: var(--space-2); }
.mt-4 { margin-top: var(--space-4); }
.mb-2 { margin-bottom: var(--space-2); }
.mb-4 { margin-bottom: var(--space-4); }
.text-sm { font-size: var(--font-sm); }
.text-xs { font-size: var(--font-xs); }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.font-semibold { font-weight: 600; }
.w-full { width: 100%; }
.hidden { display: none !important; }

/* --- LESSONS CALENDAR ------------------------------------------ */

.lessons-calendar-wrapper {
  display: flex;
  overflow-x: auto;
  min-height: 400px;
  background: var(--surface-200);
}

.lesson-time-axis {
  width: 60px;
  flex-shrink: 0;
  border-right: 1px solid var(--border-light);
  background: var(--surface-100);
  display: flex;
  flex-direction: column;
}

.lesson-time-header {
  height: 40px;
  border-bottom: 1px solid var(--border-light);
}

.time-axis-slot {
  height: 48px;
  box-sizing: border-box;
  text-align: right;
  padding-right: 8px;
  font-size: 0.75rem;
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.lesson-days-container {
  display: flex;
  flex: 1;
}

.lesson-day-col {
  flex: 1;
  min-width: 120px;
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
}

.lesson-day-header {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  border-bottom: 1px solid var(--border-light);
  background: var(--surface-100);
  position: sticky;
  top: 0;
  z-index: 10;
}

.lesson-day-grid {
  position: relative;
  flex: 1;
}

.lesson-grid-slot {
  height: 48px;
  box-sizing: border-box;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.2s;
}
.lesson-grid-slot:hover {
  background: rgba(255,255,255,0.05);
}

.lesson-card {
  position: absolute;
  left: 4px;
  right: 4px;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.75rem;
  color: #000;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  z-index: 5;
}

.lesson-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  margin-bottom: 2px;
}

.lesson-sync-status {
  font-size: 10px;
}

.lesson-card-time {
  opacity: 0.8;
}

.lesson-card-notes {
  margin-top: 4px;
  font-style: italic;
  opacity: 0.8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}


/* --- PRINT / PDF EXPORT ------------------------------------------ */
@media print {
  @page {
    size: landscape;
    margin: 8pt;
  }
  body {
    background: #fff !important;
    color: #000 !important;
  }
  .nav-tabs, .btn, .card-header span, .card-header button, .guard-roster-panel {
    display: none !important;
  }
  .main-content {
    padding: 0 !important;
    margin: 0 !important;
  }
  .card {
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    margin: 0 !important;
    padding: 0 !important;
  }
  .schedule-layout {
    display: block !important;
  }
  .weekly-grid-table {
    width: 100% !important;
    border-collapse: collapse !important;
    table-layout: fixed !important;
  }
  .weekly-grid-table th, .weekly-grid-table td {
    border: 1px solid #000 !important;
    padding: 4px !important;
    background: transparent !important;
    color: #000 !important;
  }
  .weekly-grid-table th {
    font-size: 10pt !important;
    font-weight: bold !important;
    background: #f0f0f0 !important;
  }
  /* The first column is Guard Name */
  .weekly-grid-table th:first-child,
  .weekly-grid-table td:first-child {
    width: 25mm !important;
  }
  /* The rest 6 day columns */
  .weekly-grid-table th:not(:first-child),
  .weekly-grid-table td:not(:first-child) {
    width: 44.4mm !important;
  }

<script>

/**
 * scheduleStore.js
 */

/**
 * Schedule Store — Central state management for the Lifeguard Rotation Scheduler
 * Uses a simple reactive store pattern with localStorage persistence.
 */


function calculateEndTime(startTime, durationMinutes) {
  const startMin = timeToMinutes(startTime);
  const endMin = startMin + parseInt(durationMinutes);
  return minutesToTime(endMin);
}

function generateUUID() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

function extractBlockIdFromAssignmentKey(key) {
  const parts = key.split('-');
  const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(key);
  return isLegacy ? parts.slice(0, -1).join('-') : parts.slice(0, -4).join('-');
}

const STORE_KEY = 'lifeguard-rotation-store-v1';

/** @type {Set<Function>} */
const listeners = new Set();

const defaultSettings = {
  rotationIntervalMinutes: 30,
  standCount: 2,
  excludeDoor: false,
  doorCreditMultiplier: 0.5,
  doorCreditPercent: 50,
  lessonMultiplier: 0.75,
  lessonsStartTime: '08:00',
  lessonsEndTime: '18:00',
  lessonsExcludeSaturday: false,
  lessonsSlotHeight: 50,
  noteTemplates: ['Swim lesson', 'Adult lap swim', 'Birthday party', 'Swim meet'],
  defaultShiftTimes: {
    AM: {
      Monday: { startTime: '09:00', endTime: '17:00' },
      Tuesday: { startTime: '09:00', endTime: '17:00' },
      Wednesday: { startTime: '09:00', endTime: '17:00' },
      Thursday: { startTime: '09:00', endTime: '17:00' },
      Friday: { startTime: '09:00', endTime: '17:00' },
      Saturday: { startTime: '09:00', endTime: '17:00' }
    },
    PM: {
      Monday: { startTime: '09:00', endTime: '17:00' },
      Tuesday: { startTime: '09:00', endTime: '17:00' },
      Wednesday: { startTime: '09:00', endTime: '17:00' },
      Thursday: { startTime: '09:00', endTime: '17:00' },
      Friday: { startTime: '09:00', endTime: '17:00' },
      Saturday: { startTime: '09:00', endTime: '17:00' }
    }
  },
  blockCreationWindows: {
    Monday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [] },
    Tuesday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [] },
    Wednesday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [] },
    Thursday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [] },
    Friday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [] },
    Saturday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [] }
  }
};

function getWeekStr(date) {
  const d = new Date(date);
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(date.setDate(diff));
}

const defaultState = {
  guards: [],
  shifts: {},        // key: `${guardId}-${day}` → ShiftEntry
  rotationBlocks: {}, // key: day → RotationBlock[]
  blockAssignments: {}, // key: `${blockId}-${position}` → guardId
  lessons: [],        // lesson entries
  settings: { ...defaultSettings },
  selectedDay: 'Monday',
  selectedCrew: 'Both',
  activeTab: 'schedule',
  undoStack: [],
  lastSaved: null,
  isReadOnly: false,
  selectedFilterGuardId: 'all',
  isLessonsOnly: false,
  selectedWeek: getWeekStr(getMonday(new Date())),
  sharedWeek: null,
  manualMode: false
};

let state = loadState();

function migrateBlockCreationWindows(win) {
  const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const migrated = {};
  for (const day of days) {
    const dWin = (win && win[day]) || {};
    if ('enabled' in dWin) {
      migrated[day] = {
        limitStart: dWin.enabled,
        startTime: dWin.startTime || '09:00',
        limitEnd: dWin.enabled,
        endTime: dWin.endTime || '17:00',
        extraWindows: dWin.extraWindows || [],
        excludeWindows: dWin.excludeWindows || []
      };
    } else {
      migrated[day] = {
        limitStart: dWin.limitStart ?? false,
        startTime: dWin.startTime || '09:00',
        limitEnd: dWin.limitEnd ?? false,
        endTime: dWin.endTime || '17:00',
        extraWindows: Array.isArray(dWin.extraWindows) ? dWin.extraWindows.map(w => ({
          startTime: w.startTime || '09:00',
          endTime: w.endTime || '17:00',
          align: w.align ?? true
        })) : [],
        excludeWindows: Array.isArray(dWin.excludeWindows) ? dWin.excludeWindows.map(w => ({
          startTime: w.startTime || '09:00',
          endTime: w.endTime || '17:00'
        })) : []
      };
    }
  }
  return migrated;
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      const mergedSettings = { ...defaultSettings, ...parsed.settings };
      if (parsed.settings && parsed.settings.doorCreditPercent !== undefined && parsed.settings.doorCreditMultiplier === undefined) {
        mergedSettings.doorCreditMultiplier = parsed.settings.doorCreditPercent / 100;
      }
      if (parsed.settings && parsed.settings.defaultShiftTimes) {
        mergedSettings.defaultShiftTimes = {
          AM: { ...defaultSettings.defaultShiftTimes.AM, ...(parsed.settings.defaultShiftTimes.AM || {}) },
          PM: { ...defaultSettings.defaultShiftTimes.PM, ...(parsed.settings.defaultShiftTimes.PM || {}) }
        };
      }
      mergedSettings.blockCreationWindows = migrateBlockCreationWindows(parsed.settings && parsed.settings.blockCreationWindows);
      return { 
        ...defaultState, 
        ...parsed, 
        settings: mergedSettings, 
        lessons: parsed.lessons || [],
        isReadOnly: false,
        selectedFilterGuardId: parsed.selectedFilterGuardId || 'all',
        selectedWeek: parsed.selectedWeek || getWeekStr(getMonday(new Date())),
        isLessonsOnly: false,
        sharedWeek: null
      };
    }
  } catch (e) {
    console.warn('Failed to load state from localStorage', e);
  }
  return { ...defaultState };
}

function saveState() {
  if (state.isReadOnly) return; // Do not persist shared read-only states to localStorage
  try {
    state.lastSaved = new Date().toISOString();
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Failed to save state to localStorage', e);
  }
}

function notify() {
  saveState();
  listeners.forEach(fn => fn(state));
}

function pushUndo() {
  const undoEntry = {
    blockAssignments: JSON.parse(JSON.stringify(state.blockAssignments)),
    rotationBlocks: JSON.parse(JSON.stringify(state.rotationBlocks))
  };
  state = {
    ...state,
    undoStack: [...state.undoStack, undoEntry].slice(-10)
  };
}

// ─── Public API ────────────────────────────────────────

const store = {
  getState() {
    return state;
  },

  subscribe(fn) {
    listeners.add(fn);
    return () => listeners.delete(fn);
  },

  // ─── Guards ───────────────────────────────────────────
  addGuard(name, crewSection) {
    const guard = {
      id: generateUUID(),
      name: name.trim(),
      crewSection
    };
    state = { ...state, guards: [...state.guards, guard] };
    notify();
    return guard;
  },

  updateGuard(id, updates) {
    state = {
      ...state,
      guards: state.guards.map(g => g.id === id ? { ...g, ...updates } : g)
    };
    notify();
  },

  removeGuard(id) {
    state = {
      ...state,
      guards: state.guards.filter(g => g.id !== id),
      shifts: Object.fromEntries(
        Object.entries(state.shifts).filter(([key]) => !key.startsWith(id))
      ),
      lessons: (state.lessons || []).filter(l => l.guardId !== id)
    };
    // Also clean up assignments
    const newAssignments = { ...state.blockAssignments };
    for (const [key, guardId] of Object.entries(newAssignments)) {
      if (guardId === id) delete newAssignments[key];
    }
    state.blockAssignments = newAssignments;
    notify();
  },

  // ─── Shifts ───────────────────────────────────────────
  setShiftEntry(guardId, day, shiftData, week) {
    const w = week || state.selectedWeek;
    const key = `${guardId}-${day}-${w}`;
    state = {
      ...state,
      shifts: { ...state.shifts, [key]: { guardId, day, week: w, ...shiftData } }
    };
    notify();
  },

  removeShiftEntry(guardId, day, week) {
    const w = week || state.selectedWeek;
    const key = `${guardId}-${day}-${w}`;
    const newShifts = { ...state.shifts };
    delete newShifts[key];
    delete newShifts[`${guardId}-${day}`]; // clean up legacy
    state = { ...state, shifts: newShifts };
    notify();
  },

  getShift(guardId, day, week) {
    const w = week || state.selectedWeek;
    return state.shifts[`${guardId}-${day}-${w}`] || state.shifts[`${guardId}-${day}`] || null;
  },

  getGuardShiftsForDay(day, week) {
    const w = week || state.selectedWeek;
    return Object.values(state.shifts).filter(s => {
      if (s.day !== day) return false;
      if (s.week) return s.week === w;
      // legacy fallback
      const hasWeekSpecific = !!state.shifts[`${s.guardId}-${day}-${w}`];
      return !hasWeekSpecific;
    });
  },

  // ─── Rotation Blocks ─────────────────────────────────
  setRotationBlocks(day, blocks, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [`${day}-${w}`]: blocks }
    };
    notify();
  },

  deleteRotationBlocks(day, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    pushUndo();
    
    // Clear assignments for these blocks
    const blocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blockIds = new Set(blocks.map(b => b.id));
    const newAssignments = { ...state.blockAssignments };

    for (const k of Object.keys(newAssignments)) {
      const blockId = extractBlockIdFromAssignmentKey(k);
      if (blockIds.has(blockId)) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          delete newAssignments[k];
        }
      }
    }

    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: [] },
      blockAssignments: newAssignments
    };
    notify();
  },

  deleteSpecificBlocks(day, blockIds, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    pushUndo();

    const existingBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const remainingBlocks = existingBlocks.filter(b => !blockIds.includes(b.id));

    // Clear assignments for these blocks
    const deletedBlockIds = new Set(blockIds);
    const newAssignments = { ...state.blockAssignments };

    for (const k of Object.keys(newAssignments)) {
      const parts = k.split('-');
      const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(k);
      const blockId = isLegacy ? parts.slice(0, -1).join('-') : parts.slice(0, -4).join('-');
      if (deletedBlockIds.has(blockId)) {
        const isTargetWeek = k.endsWith(w) || isLegacy;
        if (isTargetWeek) {
          delete newAssignments[k];
        }
      }
    }

    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: remainingBlocks },
      blockAssignments: newAssignments
    };
    notify();
  },

  updateBlock(day, blockId, updates, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const existingBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blocks = existingBlocks.map(b =>
      b.id === blockId ? { ...b, ...updates } : b
    );
    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: blocks }
    };
    notify();
  },

  updateBlockGuardCount(day, blockId, count, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const existingBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blocks = existingBlocks.map(b =>
      b.id === blockId ? { ...b, guardCountOverride: count } : b
    );
    const activePositions = count > 0 ? getPositions(count, state.settings?.excludeDoor) : [];
    const newAssignments = { ...state.blockAssignments };
    for (const k of Object.keys(newAssignments)) {
      const bId = extractBlockIdFromAssignmentKey(k);
      if (bId === blockId) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          const parts = k.split('-');
          const pos = !/\d{4}-\d{2}-\d{2}$/.test(k) ? parts[parts.length - 1] : parts[parts.length - 4];
          if (count === 0 || !activePositions.includes(pos)) {
            delete newAssignments[k];
          }
        }
      }
    }
    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: blocks },
      blockAssignments: newAssignments
    };
    notify();
  },

  getBlocksForDay(day, week) {
    const w = week || state.selectedWeek;
    return state.rotationBlocks[`${day}-${w}`] || state.rotationBlocks[day] || [];
  },

  divideBlocks(day, blockIds, newIntervalMinutes, copyAssignments, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const dayBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const selectedBlocks = dayBlocks.filter(b => blockIds.includes(b.id));
    if (selectedBlocks.length === 0) {
      throw new Error("No blocks selected.");
    }

    // Sort selected blocks by startTime
    selectedBlocks.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

    // Validate contiguity
    for (let i = 0; i < selectedBlocks.length - 1; i++) {
      const currentEnd = timeToMinutes(selectedBlocks[i].endTime);
      const nextStart = timeToMinutes(selectedBlocks[i + 1].startTime);
      if (currentEnd !== nextStart) {
        throw new Error("Selected blocks must be contiguous (no gaps in time).");
      }
    }

    const overallStart = timeToMinutes(selectedBlocks[0].startTime);
    const overallEnd = timeToMinutes(selectedBlocks[selectedBlocks.length - 1].endTime);

    if (newIntervalMinutes <= 0) {
      throw new Error("Interval must be greater than 0.");
    }

    // Generate new sub-blocks
    const newBlocks = [];
    let cursor = overallStart;
    while (cursor < overallEnd) {
      const nextEnd = Math.min(cursor + newIntervalMinutes, overallEnd);
      newBlocks.push({
        id: generateUUID(),
        startTime: minutesToTime(cursor),
        endTime: minutesToTime(nextEnd),
        interval: nextEnd - cursor,
        guardCountOverride: null,
        note: ''
      });
      cursor = nextEnd;
    }

    const newAssignments = { ...state.blockAssignments };
    const deletedBlockIds = new Set(blockIds);

    if (copyAssignments) {
      // Find all positions that were assigned in any of the deleted blocks for the target week
      const originalPositions = new Set();
      for (const k of Object.keys(state.blockAssignments)) {
        const bId = extractBlockIdFromAssignmentKey(k);
        if (deletedBlockIds.has(bId)) {
          const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
          if (isTargetWeek) {
            const parts = k.split('-');
            const pos = !/\d{4}-\d{2}-\d{2}$/.test(k) ? parts[parts.length - 1] : parts[parts.length - 4];
            originalPositions.add(pos);
          }
        }
      }

      for (const newBlock of newBlocks) {
        const newStart = timeToMinutes(newBlock.startTime);
        const newEnd = timeToMinutes(newBlock.endTime);

        for (const pos of originalPositions) {
          let maxOverlap = 0;
          let bestOrigBlock = null;

          for (const origBlock of selectedBlocks) {
            const origStart = timeToMinutes(origBlock.startTime);
            const origEnd = timeToMinutes(origBlock.endTime);
            const overlap = Math.max(0, Math.min(newEnd, origEnd) - Math.max(newStart, origStart));

            if (overlap > maxOverlap) {
              maxOverlap = overlap;
              bestOrigBlock = origBlock;
            }
          }

          if (bestOrigBlock) {
            const origKeyWithWeek = `${bestOrigBlock.id}-${pos}-${w}`;
            const origKeyLegacy = `${bestOrigBlock.id}-${pos}`;
            const assignedGuardId = state.blockAssignments[origKeyWithWeek] || state.blockAssignments[`${bestOrigBlock.id}-${pos}`];
            if (assignedGuardId) {
              newAssignments[`${newBlock.id}-${pos}-${w}`] = assignedGuardId;
            }
          }
        }
      }
    }

    // Remove old assignments
    for (const k of Object.keys(newAssignments)) {
      const bId = extractBlockIdFromAssignmentKey(k);
      if (deletedBlockIds.has(bId)) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          delete newAssignments[k];
        }
      }
    }

    // Update undoStack
    pushUndo();

    const remainingBlocks = dayBlocks.filter(b => !deletedBlockIds.has(b.id));
    const updatedBlocks = [...remainingBlocks, ...newBlocks];
    updatedBlocks.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

    state = {
      ...state,
      rotationBlocks: {
        ...state.rotationBlocks,
        [key]: updatedBlocks
      },
      blockAssignments: newAssignments
    };

    notify();
  },

  // ─── Block Assignments ────────────────────────────────
  setBlockAssignment(blockId, position, guardId, week) {
    const w = week || state.selectedWeek;
    const key = `${blockId}-${position}-${w}`;
    state = {
      ...state,
      blockAssignments: { ...state.blockAssignments, [key]: guardId }
    };
    notify();
  },

  removeBlockAssignment(blockId, position, week) {
    const w = week || state.selectedWeek;
    const key = `${blockId}-${position}-${w}`;
    const newAssignments = { ...state.blockAssignments };
    delete newAssignments[key];
    delete newAssignments[`${blockId}-${position}`]; // clean up legacy
    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  clearBlockAssignments(blockId, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    for (const k of Object.keys(newAssignments)) {
      const bId = extractBlockIdFromAssignmentKey(k);
      if (bId === blockId) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          delete newAssignments[k];
        }
      }
    }
    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  getAssignment(blockId, position, week) {
    const w = week || state.selectedWeek;
    return state.blockAssignments[`${blockId}-${position}-${w}`] || state.blockAssignments[`${blockId}-${position}`] || null;
  },

  setAllAssignments(assignments, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    for (const a of assignments) {
      newAssignments[`${a.blockId}-${a.position}-${w}`] = a.guardId;
    }
    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  clearAssignments(day, crewSection, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const blocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blockIds = new Set(blocks.map(b => b.id));
    pushUndo();
    const newAssignments = { ...state.blockAssignments };

    for (const k of Object.keys(newAssignments)) {
      const blockId = extractBlockIdFromAssignmentKey(k);
      if (blockIds.has(blockId)) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          if (!crewSection || crewSection === 'Both') {
            delete newAssignments[k];
          } else {
            // Only clear for guards in the specified crew
            const guardId = newAssignments[k];
            const guard = state.guards.find(g => g.id === guardId);
            if (guard && guard.crewSection === crewSection) {
              delete newAssignments[k];
            }
          }
        }
      }
    }
    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  undoAssignments() {
    if (state.undoStack.length === 0) return false;
    const previous = state.undoStack[state.undoStack.length - 1];
    state = {
      ...state,
      blockAssignments: previous.blockAssignments || {},
      rotationBlocks: previous.rotationBlocks || {},
      undoStack: state.undoStack.slice(0, -1)
    };
    notify();
    return true;
  },

  swapBlockAssignment(blockId, fromPosition, toPosition, week) {
    const w = week || state.selectedWeek;
    const fromKey = `${blockId}-${fromPosition}-${w}`;
    const toKey = `${blockId}-${toPosition}-${w}`;
    const fromGuard = state.blockAssignments[fromKey] || state.blockAssignments[`${blockId}-${fromPosition}`] || null;
    const toGuard = state.blockAssignments[toKey] || state.blockAssignments[`${blockId}-${toPosition}`] || null;

    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    if (fromGuard) newAssignments[toKey] = fromGuard; else delete newAssignments[toKey];
    if (toGuard) newAssignments[fromKey] = toGuard; else delete newAssignments[fromKey];
    delete newAssignments[`${blockId}-${fromPosition}`]; // cleanup legacy
    delete newAssignments[`${blockId}-${toPosition}`]; // cleanup legacy

    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  swapInterBlockAssignment(blockId1, position1, blockId2, position2, week) {
    const w = week || state.selectedWeek;
    const key1 = `${blockId1}-${position1}-${w}`;
    const key2 = `${blockId2}-${position2}-${w}`;
    const guard1 = state.blockAssignments[key1] || state.blockAssignments[`${blockId1}-${position1}`] || null;
    const guard2 = state.blockAssignments[key2] || state.blockAssignments[`${blockId2}-${position2}`] || null;

    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    if (guard1) newAssignments[key2] = guard1; else delete newAssignments[key2];
    if (guard2) newAssignments[key1] = guard2; else delete newAssignments[key1];

    delete newAssignments[`${blockId1}-${position1}`];
    delete newAssignments[`${blockId2}-${position2}`];

    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  // ─── Export/Import ────────────────────────────────────
  exportData() {
    const { undoStack, activeTab, selectedDay, selectedCrew, lastSaved, ...data } = state;
    return JSON.stringify(data, null, 2);
  },

  exportSharedData(targetWeek) {
    const w = targetWeek || state.selectedWeek;
    const currentDate = new Date(w + 'T00:00:00');
    
    const datePrev = new Date(currentDate);
    datePrev.setDate(currentDate.getDate() - 7);
    const prevWeek = getWeekStr(datePrev);
    
    const dateNext = new Date(currentDate);
    dateNext.setDate(currentDate.getDate() + 7);
    const nextWeek = getWeekStr(dateNext);
    
    const allowedWeeks = [w, prevWeek, nextWeek];
    
    const filteredShifts = {};
    for (const [key, shift] of Object.entries(state.shifts)) {
      if (!shift.week || allowedWeeks.includes(shift.week)) {
        filteredShifts[key] = shift;
      }
    }
    
    const filteredAssignments = {};
    const weekPattern = /\d{4}-\d{2}-\d{2}$/;
    for (const [key, guardId] of Object.entries(state.blockAssignments)) {
      if (weekPattern.test(key)) {
        const isAllowed = allowedWeeks.some(weekStr => key.endsWith(weekStr));
        if (isAllowed) {
          filteredAssignments[key] = guardId;
        }
      } else {
        filteredAssignments[key] = guardId;
      }
    }
    
    const filteredLessons = (state.lessons || []).filter(l => {
      return !l.week || allowedWeeks.includes(l.week);
    });

    const filteredRotationBlocks = {};
    for (const [key, blocks] of Object.entries(state.rotationBlocks)) {
      const parts = key.split('-');
      if (parts.length > 1) {
        const weekStr = parts.slice(1).join('-');
        if (allowedWeeks.includes(weekStr)) {
          filteredRotationBlocks[key] = blocks;
        }
      } else {
        filteredRotationBlocks[key] = blocks;
      }
    }
    
    const { undoStack, activeTab, selectedCrew, lastSaved, ...data } = state;
    const sharedData = {
      ...data,
      rotationBlocks: filteredRotationBlocks,
      shifts: filteredShifts,
      blockAssignments: filteredAssignments,
      lessons: filteredLessons
    };
    
    return JSON.stringify(sharedData);
  },

  importData(jsonString) {
    try {
      const data = JSON.parse(jsonString);
      if (!data.guards || !data.settings) {
        throw new Error('Invalid data format');
      }
      const mergedSettings = { ...defaultSettings, ...data.settings };
      if (data.settings && data.settings.doorCreditPercent !== undefined && data.settings.doorCreditMultiplier === undefined) {
        mergedSettings.doorCreditMultiplier = data.settings.doorCreditPercent / 100;
      }
      if (data.settings && data.settings.defaultShiftTimes) {
        mergedSettings.defaultShiftTimes = {
          AM: { ...defaultSettings.defaultShiftTimes.AM, ...(data.settings.defaultShiftTimes.AM || {}) },
          PM: { ...defaultSettings.defaultShiftTimes.PM, ...(data.settings.defaultShiftTimes.PM || {}) }
        };
      }
      mergedSettings.blockCreationWindows = migrateBlockCreationWindows(data.settings && data.settings.blockCreationWindows);
      state = {
        ...defaultState,
        ...data,
        settings: mergedSettings,
        undoStack: [],
        lastSaved: new Date().toISOString()
      };
      notify();
      return { success: true, guardCount: state.guards.length };
    } catch (e) {
      return { success: false, error: e.message };
    }
  },

  // ─── Read Only / Sharing Actions ──────────────────────
  setReadOnly(isReadOnly) {
    state = { ...state, isReadOnly };
    notify();
  },

  loadReadOnlyState(data) {
    const mergedSettings = { ...defaultSettings, ...data.settings };
    if (data.settings && data.settings.doorCreditPercent !== undefined && data.settings.doorCreditMultiplier === undefined) {
      mergedSettings.doorCreditMultiplier = data.settings.doorCreditPercent / 100;
    }
    if (data.settings && data.settings.defaultShiftTimes) {
      mergedSettings.defaultShiftTimes = {
        AM: { ...defaultSettings.defaultShiftTimes.AM, ...(data.settings.defaultShiftTimes.AM || {}) },
        PM: { ...defaultSettings.defaultShiftTimes.PM, ...(data.settings.defaultShiftTimes.PM || {}) }
      };
    }
    mergedSettings.blockCreationWindows = migrateBlockCreationWindows(data.settings && data.settings.blockCreationWindows);
    state = {
      ...defaultState,
      ...data,
      settings: mergedSettings,
      isReadOnly: true,
      sharedWeek: data.selectedWeek,
      undoStack: [],
      lastSaved: data.lastSaved || new Date().toISOString()
    };
    notify();
  },

  async compressState(jsonString) {
    const stream = new Blob([jsonString], { type: 'text/plain' }).stream();
    const compressedStream = stream.pipeThrough(new CompressionStream('gzip'));
    const response = new Response(compressedStream);
    const buffer = await response.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    let binary = '';
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      const chunk = bytes.subarray(i, i + chunkSize);
      binary += String.fromCharCode.apply(null, chunk);
    }
    const base64 = btoa(binary);
    return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  },

  async decompressState(urlSafeBase64) {
    let base64 = urlSafeBase64.replace(/-/g, '+').replace(/_/g, '/');
    while (base64.length % 4) {
      base64 += '=';
    }
    const binaryString = atob(base64);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    const stream = new Blob([bytes]).stream();
    const decompressedStream = stream.pipeThrough(new DecompressionStream('gzip'));
    const response = new Response(decompressedStream);
    return await response.text();
  },

  exitReadOnly() {
    state = loadState();
    notify();
  },

  // ─── Lessons Actions ──────────────────────────────────
  addLesson(guardId, day, startTime, durationMinutes, notes, week) {
    const lesson = {
      id: generateUUID(),
      guardId,
      day,
      startTime,
      durationMinutes,
      endTime: calculateEndTime(startTime, durationMinutes),
      notes: notes || '',
      week: week || state.selectedWeek
    };
    state = { ...state, lessons: [...state.lessons, lesson] };
    notify();
    return lesson;
  },

  addOrOverwriteLesson(guardId, day, startTime, durationMinutes, notes, week) {
    const w = week || state.selectedWeek;
    const startMin = timeToMinutes(startTime);
    const endMin = startMin + parseInt(durationMinutes);

    // Remove overlapping lessons for this guard on this day in this week
    const filteredLessons = state.lessons.filter(l => {
      if (l.guardId !== guardId || l.day !== day || l.week !== w) return true;
      const lStart = timeToMinutes(l.startTime);
      const lEnd = timeToMinutes(l.endTime);
      const overlaps = lStart < endMin && lEnd > startMin;
      return !overlaps;
    });

    const newLesson = {
      id: generateUUID(),
      guardId,
      day,
      startTime,
      durationMinutes,
      endTime: calculateEndTime(startTime, durationMinutes),
      notes: notes || '',
      week: w
    };

    state = { ...state, lessons: [...filteredLessons, newLesson] };
    notify();
    return newLesson;
  },

  updateLesson(id, updates) {
    const lessons = state.lessons.map(l => {
      if (l.id !== id) return l;
      const merged = { ...l, ...updates };
      if (updates.startTime || updates.durationMinutes) {
        merged.endTime = calculateEndTime(merged.startTime, merged.durationMinutes);
      }
      return merged;
    });
    state = { ...state, lessons };
    notify();
  },

  removeLesson(id) {
    state = { ...state, lessons: state.lessons.filter(l => l.id !== id) };
    notify();
  },

  // ─── Reset ────────────────────────────────────────────
  resetAll() {
    state = { ...defaultState };
    notify();
  },

  copyShiftsFromPreviousWeek(currentWeek) {
    const w = currentWeek || state.selectedWeek;
    const currentDate = new Date(w + 'T00:00:00');
    currentDate.setDate(currentDate.getDate() - 7);
    const prevWeek = getWeekStr(currentDate);

    let copyCount = 0;
    const newShifts = { ...state.shifts };
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

    for (const guard of state.guards) {
      for (const day of days) {
        const prevKeyWithWeek = `${guard.id}-${day}-${prevWeek}`;
        const prevKeyLegacy = `${guard.id}-${day}`;
        const prevShift = state.shifts[prevKeyWithWeek] || state.shifts[prevKeyLegacy];

        if (prevShift) {
          const targetKey = `${guard.id}-${day}-${w}`;
          newShifts[targetKey] = {
            ...prevShift,
            week: w
          };
          copyCount++;
        }
      }
    }

    if (copyCount > 0) {
      state = { ...state, shifts: newShifts };
      notify();
    }
    return copyCount;
  },

  clearGuardWeekShifts(guardId, week) {
    const w = week || state.selectedWeek;
    const newShifts = { ...state.shifts };
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    let clearedCount = 0;

    for (const day of days) {
      const keyWithWeek = `${guardId}-${day}-${w}`;
      const keyLegacy = `${guardId}-${day}`;
      if (newShifts[keyWithWeek]) {
        delete newShifts[keyWithWeek];
        clearedCount++;
      }
      if (newShifts[keyLegacy]) {
        delete newShifts[keyLegacy];
        clearedCount++;
      }
    }

    if (clearedCount > 0) {
      state = { ...state, shifts: newShifts };
      notify();
    }
    return clearedCount;
  },

  // ─── Helpers ──────────────────────────────────────────
  getGuardById(id) {
    return state.guards.find(g => g.id === id) || null;
  },

  getGuardsByCrewSection(section) {
    if (section === 'Both') return state.guards;
    return state.guards.filter(g => g.crewSection === section);
  },

  getGuardsWorkingDay(day, crewSection, week) {
    const w = week || state.selectedWeek;
    return state.guards.filter(g => {
      if (crewSection && crewSection !== 'Both' && g.crewSection !== crewSection) return false;
      const keyWithWeek = `${g.id}-${day}-${w}`;
      const keyLegacy = `${g.id}-${day}`;
      return !!(state.shifts[keyWithWeek] || state.shifts[keyLegacy]);
    });
  },

  getDays() {
    return ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  },

  getGuardCountForDay(day, week) {
    const w = week || state.selectedWeek;
    const guardIds = new Set();
    for (const [key, shift] of Object.entries(state.shifts)) {
      if (shift.day === day) {
        if (shift.week) {
          if (shift.week === w) {
            guardIds.add(shift.guardId);
          }
        } else {
          // Legacy shift. Only include it if there is no week-specific shift for this guard and day
          const hasWeekSpecific = !!state.shifts[`${shift.guardId}-${day}-${w}`];
          if (!hasWeekSpecific) {
            guardIds.add(shift.guardId);
          }
        }
      }
    }
    return guardIds.size;
  }
};
