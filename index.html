<body>
<div id="app"></div>

<script>

/**
 * scheduleStore.js
 */

/**
 * Schedule Store — Central state management for the Lifeguard Rotation Scheduler
 * Uses a simple reactive store pattern with localStorage persistence.
 */


function calculateEndTime(startTime, durationMinutes) {
  const startMin = timeToMinutes(startTime);
  const endMin = startMin + parseInt(durationMinutes);
  return minutesToTime(endMin);
}

function generateUUID() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

function extractBlockIdFromAssignmentKey(key) {
  const parts = key.split('-');
  const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(key);
  return isLegacy ? parts.slice(0, -1).join('-') : parts.slice(0, -4).join('-');
}

const STORE_KEY = 'lifeguard-rotation-store-v1';

/** @type {Set<Function>} */
const listeners = new Set();

const defaultSettings = {
  rotationIntervalMinutes: 30,
  standCount: 2,
  excludeDoor: false,
  doorCreditMultiplier: 0.5,
  doorCreditPercent: 50,
  lessonMultiplier: 0.75,
  shiftLengthScalerBaseHours: 4,
  shiftLengthScalerFactor: 0.0,
  lessonsStartTime: '08:00',
  lessonsEndTime: '18:00',
  lessonsExcludeSaturday: false,
  lessonsSlotHeight: 50,
  teamupApiKey: '',
  teamupCalendarKey: '',
  noteTemplates: ['Swim lesson', 'Adult lap swim', 'Birthday party', 'Swim meet'],
  defaultShiftTimes: {
    AM: {
      Monday: { startTime: '09:00', endTime: '17:00' },
      Tuesday: { startTime: '09:00', endTime: '17:00' },
      Wednesday: { startTime: '09:00', endTime: '17:00' },
      Thursday: { startTime: '09:00', endTime: '17:00' },
      Friday: { startTime: '09:00', endTime: '17:00' },
      Saturday: { startTime: '09:00', endTime: '17:00' }
    },
    PM: {
      Monday: { startTime: '09:00', endTime: '17:00' },
      Tuesday: { startTime: '09:00', endTime: '17:00' },
      Wednesday: { startTime: '09:00', endTime: '17:00' },
      Thursday: { startTime: '09:00', endTime: '17:00' },
      Friday: { startTime: '09:00', endTime: '17:00' },
      Saturday: { startTime: '09:00', endTime: '17:00' }
    }
  },
  blockCreationWindows: {
    Monday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [], defaultBlocks: [], openingStart: '09:00', openingEnd: '10:00', closingStart: '16:00', closingEnd: '17:00' },
    Tuesday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [], defaultBlocks: [], openingStart: '09:00', openingEnd: '10:00', closingStart: '16:00', closingEnd: '17:00' },
    Wednesday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [], defaultBlocks: [], openingStart: '09:00', openingEnd: '10:00', closingStart: '16:00', closingEnd: '17:00' },
    Thursday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [], defaultBlocks: [], openingStart: '09:00', openingEnd: '10:00', closingStart: '16:00', closingEnd: '17:00' },
    Friday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [], defaultBlocks: [], openingStart: '09:00', openingEnd: '10:00', closingStart: '16:00', closingEnd: '17:00' },
    Saturday: { limitStart: false, startTime: '09:00', limitEnd: false, endTime: '17:00', extraWindows: [], excludeWindows: [], defaultBlocks: [], openingStart: '09:00', openingEnd: '10:00', closingStart: '16:00', closingEnd: '17:00' }
  }
};

function getWeekStr(date) {
  const d = new Date(date);
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(date.setDate(diff));
}

const defaultState = {
  guards: [],
  shifts: {},        // key: `${guardId}-${day}` → ShiftEntry
  rotationBlocks: {}, // key: day → RotationBlock[]
  blockAssignments: {}, // key: `${blockId}-${position}` → guardId
  manualAssignments: {}, // key: `${blockId}-${position}` → true/false
  lessons: [],        // lesson entries
  scheduleNotes: '',  // HTML string of rich-text notes shown below the schedule & appended to the exported PDF
  dayNotes: {},       // per-day notes keyed by `${day}-${week}`, shown under the day in the exported PDF
  settings: { ...defaultSettings },
  selectedDay: 'Monday',
  selectedCrew: 'Both',
  activeTab: 'schedule',
  undoStack: [],
  redoStack: [],
  lastSaved: null,
  isReadOnly: false,
  selectedFilterGuardId: 'all',
  isLessonsOnly: false,
  selectedWeek: getWeekStr(getMonday(new Date())),
  sharedWeek: null,
  manualMode: false,
  showConflictsOnly: false
};

let state = loadState();

// In-memory clipboards for copy/paste of a whole week or a single shift.
let weekClipboard = null;
let shiftClipboard = null;
let guardWeekClipboard = null;

function migrateBlockCreationWindows(win) {
  const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const migrated = {};
  for (const day of days) {
    const dWin = (win && win[day]) || {};
    if ('enabled' in dWin) {
      migrated[day] = {
        limitStart: dWin.enabled,
        startTime: dWin.startTime || '09:00',
        limitEnd: dWin.enabled,
        endTime: dWin.endTime || '17:00',
        extraWindows: dWin.extraWindows || [],
        excludeWindows: dWin.excludeWindows || [],
        defaultBlocks: dWin.defaultBlocks || [],
        openingStart: dWin.openingStart || '09:00',
        openingEnd: dWin.openingEnd || '10:00',
        closingStart: dWin.closingStart || '16:00',
        closingEnd: dWin.closingEnd || '17:00'
      };
    } else {
      migrated[day] = {
        limitStart: dWin.limitStart ?? false,
        startTime: dWin.startTime || '09:00',
        limitEnd: dWin.limitEnd ?? false,
        endTime: dWin.endTime || '17:00',
        extraWindows: Array.isArray(dWin.extraWindows) ? dWin.extraWindows.map(w => ({
          startTime: w.startTime || '09:00',
          endTime: w.endTime || '17:00',
          align: w.align ?? true
        })) : [],
        excludeWindows: Array.isArray(dWin.excludeWindows) ? dWin.excludeWindows.map(w => ({
          startTime: w.startTime || '09:00',
          endTime: w.endTime || '17:00'
        })) : [],
        defaultBlocks: Array.isArray(dWin.defaultBlocks) ? dWin.defaultBlocks.map(b => ({
          startTime: b.startTime || '09:00',
          endTime: b.endTime || '17:00',
          stands: b.stands !== undefined ? b.stands : 2,
          note: b.note || ''
        })) : [],
        openingStart: dWin.openingStart || '09:00',
        openingEnd: dWin.openingEnd || '10:00',
        closingStart: dWin.closingStart || '16:00',
        closingEnd: dWin.closingEnd || '17:00'
      };
    }
  }
  return migrated;
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      const mergedSettings = { ...defaultSettings, ...parsed.settings };
      if (parsed.settings && parsed.settings.doorCreditPercent !== undefined && parsed.settings.doorCreditMultiplier === undefined) {
        mergedSettings.doorCreditMultiplier = parsed.settings.doorCreditPercent / 100;
      }
      if (parsed.settings && parsed.settings.defaultShiftTimes) {
        mergedSettings.defaultShiftTimes = {
          AM: { ...defaultSettings.defaultShiftTimes.AM, ...(parsed.settings.defaultShiftTimes.AM || {}) },
          PM: { ...defaultSettings.defaultShiftTimes.PM, ...(parsed.settings.defaultShiftTimes.PM || {}) }
        };
      }
      mergedSettings.blockCreationWindows = migrateBlockCreationWindows(parsed.settings && parsed.settings.blockCreationWindows);
      return { 
        ...defaultState, 
        ...parsed, 
        settings: mergedSettings, 
        lessons: parsed.lessons || [],
        manualAssignments: parsed.manualAssignments || {},
        isReadOnly: false,
        selectedFilterGuardId: parsed.selectedFilterGuardId || 'all',
        selectedWeek: parsed.selectedWeek || getWeekStr(getMonday(new Date())),
        isLessonsOnly: false,
        sharedWeek: null
      };
    }
  } catch (e) {
    console.warn('Failed to load state from localStorage', e);
  }
  return { ...defaultState };
}

// Migrate TeamUp credentials from the main state settings into the separate
// sync config storage. This must run AFTER both `state` and `syncConfig` are
// initialised (they live far apart in the file). The credentials in
// state.settings are intentionally preserved — they are never deleted.
function migrateTeamUpCredentials() {
  try {
    if (state.settings) {
      let syncChanged = false;
      if (state.settings.teamupApiKey && !syncConfig.teamupApiKey) {
        syncConfig.teamupApiKey = state.settings.teamupApiKey;
        syncChanged = true;
      }
      if (state.settings.teamupCalendarKey && !syncConfig.teamupCalendarKey) {
        syncConfig.teamupCalendarKey = state.settings.teamupCalendarKey;
        syncChanged = true;
      }
      if (syncChanged) {
        saveSyncConfig();
      }
    }
  } catch (e) {
    console.warn('Failed to migrate TeamUp credentials', e);
  }
}

function saveState() {
  if (state.isReadOnly) return; // Do not persist shared read-only states to localStorage
  try {
    state.lastSaved = new Date().toISOString();
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Failed to save state to localStorage', e);
  }
}

function notify() {
  saveState();
  if (typeof isSyncLoading !== 'undefined' && !isSyncLoading) {
    lastLocalEditTime = new Date().toISOString();
    try {
      localStorage.setItem('lifeguard_last_local_edit_time', lastLocalEditTime);
    } catch (e) {}
  }
  listeners.forEach(fn => fn(state));
  if (typeof syncManager !== 'undefined') {
    syncManager.handleStoreUpdate();
  }
}

function historySnapshot() {
  return {
    blockAssignments: JSON.parse(JSON.stringify(state.blockAssignments)),
    manualAssignments: JSON.parse(JSON.stringify(state.manualAssignments || {})),
    rotationBlocks: JSON.parse(JSON.stringify(state.rotationBlocks)),
    lessons: JSON.parse(JSON.stringify(state.lessons || [])),
    shifts: JSON.parse(JSON.stringify(state.shifts || {}))
  };
}

function pushUndo() {
  state = {
    ...state,
    undoStack: [...state.undoStack, historySnapshot()].slice(-10),
    redoStack: []
  };
}

// ─── Public API ────────────────────────────────────────

const store = {
  getState() {
    return state;
  },

  subscribe(fn) {
    listeners.add(fn);
    return () => listeners.delete(fn);
  },

  // ─── Guards ───────────────────────────────────────────
  addGuard(name, crewSection) {
    const guard = {
      id: generateUUID(),
      name: name.trim(),
      crewSection
    };
    state = { ...state, guards: [...state.guards, guard] };
    notify();
    return guard;
  },

  updateGuard(id, updates) {
    state = {
      ...state,
      guards: state.guards.map(g => g.id === id ? { ...g, ...updates } : g)
    };
    notify();
  },

  reorderGuards(reorderedGuards) {
    state = {
      ...state,
      guards: reorderedGuards
    };
    notify();
  },

  removeGuard(id) {
    state = {
      ...state,
      guards: state.guards.filter(g => g.id !== id),
      shifts: Object.fromEntries(
        Object.entries(state.shifts).filter(([key]) => !key.startsWith(id))
      ),
      lessons: (state.lessons || []).filter(l => l.guardId !== id)
    };
    // Also clean up assignments
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };
    for (const [key, guardId] of Object.entries(newAssignments)) {
      if (guardId === id) {
        delete newAssignments[key];
        delete newManual[key];
      }
    }
    state.blockAssignments = newAssignments;
    state.manualAssignments = newManual;
    notify();
  },

  // ─── Shifts ───────────────────────────────────────────
  setShiftEntry(guardId, day, shiftData, week) {
    const w = week || state.selectedWeek;
    const key = `${guardId}-${day}-${w}`;
    pushUndo();
    state = {
      ...state,
      shifts: { ...state.shifts, [key]: { guardId, day, week: w, ...shiftData } }
    };
    notify();
  },

  removeShiftEntry(guardId, day, week) {
    const w = week || state.selectedWeek;
    const key = `${guardId}-${day}-${w}`;
    pushUndo();
    const newShifts = { ...state.shifts };
    delete newShifts[key];
    delete newShifts[`${guardId}-${day}`]; // clean up legacy
    state = { ...state, shifts: newShifts };
    notify();
  },

  getShift(guardId, day, week) {
    const w = week || state.selectedWeek;
    return state.shifts[`${guardId}-${day}-${w}`] || state.shifts[`${guardId}-${day}`] || null;
  },

  getGuardShiftsForDay(day, week) {
    const w = week || state.selectedWeek;
    return Object.values(state.shifts).filter(s => {
      if (s.day !== day) return false;
      if (s.week) return s.week === w;
      // legacy fallback
      const hasWeekSpecific = !!state.shifts[`${s.guardId}-${day}-${w}`];
      return !hasWeekSpecific;
    });
  },

  // ─── Rotation Blocks ─────────────────────────────────
  setRotationBlocks(day, blocks, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [`${day}-${w}`]: blocks }
    };
    notify();
  },

  deleteRotationBlocks(day, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    pushUndo();
    
    // Clear assignments for these blocks
    const blocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blockIds = new Set(blocks.map(b => b.id));
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };

    for (const k of Object.keys(newAssignments)) {
      const blockId = extractBlockIdFromAssignmentKey(k);
      if (blockIds.has(blockId)) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          delete newAssignments[k];
          delete newManual[k];
        }
      }
    }

    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: [] },
      blockAssignments: newAssignments,
      manualAssignments: newManual
    };
    notify();
  },

  deleteSpecificBlocks(day, blockIds, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    pushUndo();

    const existingBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const remainingBlocks = existingBlocks.filter(b => !blockIds.includes(b.id));

    // Clear assignments for these blocks
    const deletedBlockIds = new Set(blockIds);
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };

    for (const k of Object.keys(newAssignments)) {
      const parts = k.split('-');
      const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(k);
      const blockId = isLegacy ? parts.slice(0, -1).join('-') : parts.slice(0, -4).join('-');
      if (deletedBlockIds.has(blockId)) {
        const isTargetWeek = k.endsWith(w) || isLegacy;
        if (isTargetWeek) {
          delete newAssignments[k];
          delete newManual[k];
        }
      }
    }

    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: remainingBlocks },
      blockAssignments: newAssignments,
      manualAssignments: newManual
    };
    notify();
  },

  updateBlock(day, blockId, updates, week) {
    pushUndo();
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const existingBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blocks = existingBlocks.map(b =>
      b.id === blockId ? { ...b, ...updates } : b
    );
    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: blocks }
    };
    notify();
  },

  updateBlockGuardCount(day, blockId, count, week) {
    pushUndo();
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const existingBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blocks = existingBlocks.map(b =>
      b.id === blockId ? { ...b, guardCountOverride: count } : b
    );
    const activePositions = count > 0 ? getPositions(count, state.settings?.excludeDoor) : [];
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };
    for (const k of Object.keys(newAssignments)) {
      const bId = extractBlockIdFromAssignmentKey(k);
      if (bId === blockId) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          const parts = k.split('-');
          const pos = !/\d{4}-\d{2}-\d{2}$/.test(k) ? parts[parts.length - 1] : parts[parts.length - 4];
          if (count === 0 || !activePositions.includes(pos)) {
            delete newAssignments[k];
            delete newManual[k];
          }
        }
      }
    }
    state = {
      ...state,
      rotationBlocks: { ...state.rotationBlocks, [key]: blocks },
      blockAssignments: newAssignments,
      manualAssignments: newManual
    };
    notify();
  },

  getBlocksForDay(day, week) {
    const w = week || state.selectedWeek;
    return state.rotationBlocks[`${day}-${w}`] || state.rotationBlocks[day] || [];
  },

  divideBlocks(day, blockIds, newIntervalMinutes, copyAssignments, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const dayBlocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const selectedBlocks = dayBlocks.filter(b => blockIds.includes(b.id));
    if (selectedBlocks.length === 0) {
      throw new Error("No blocks selected.");
    }

    // Sort selected blocks by startTime
    selectedBlocks.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

    // Validate contiguity
    for (let i = 0; i < selectedBlocks.length - 1; i++) {
      const currentEnd = timeToMinutes(selectedBlocks[i].endTime);
      const nextStart = timeToMinutes(selectedBlocks[i + 1].startTime);
      if (currentEnd !== nextStart) {
        throw new Error("Selected blocks must be contiguous (no gaps in time).");
      }
    }

    const overallStart = timeToMinutes(selectedBlocks[0].startTime);
    const overallEnd = timeToMinutes(selectedBlocks[selectedBlocks.length - 1].endTime);

    if (newIntervalMinutes <= 0) {
      throw new Error("Interval must be greater than 0.");
    }

    // Generate new sub-blocks
    const newBlocks = [];
    let cursor = overallStart;
    while (cursor < overallEnd) {
      const nextEnd = Math.min(cursor + newIntervalMinutes, overallEnd);
      newBlocks.push({
        id: generateUUID(),
        startTime: minutesToTime(cursor),
        endTime: minutesToTime(nextEnd),
        interval: nextEnd - cursor,
        guardCountOverride: null,
        note: ''
      });
      cursor = nextEnd;
    }

    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };
    const deletedBlockIds = new Set(blockIds);

    if (copyAssignments) {
      // Find all positions that were assigned in any of the deleted blocks for the target week
      const originalPositions = new Set();
      for (const k of Object.keys(state.blockAssignments)) {
        const bId = extractBlockIdFromAssignmentKey(k);
        if (deletedBlockIds.has(bId)) {
          const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
          if (isTargetWeek) {
            const parts = k.split('-');
            const pos = !/\d{4}-\d{2}-\d{2}$/.test(k) ? parts[parts.length - 1] : parts[parts.length - 4];
            originalPositions.add(pos);
          }
        }
      }

      for (const newBlock of newBlocks) {
        const newStart = timeToMinutes(newBlock.startTime);
        const newEnd = timeToMinutes(newBlock.endTime);

        for (const pos of originalPositions) {
          let maxOverlap = 0;
          let bestOrigBlock = null;

          for (const origBlock of selectedBlocks) {
            const origStart = timeToMinutes(origBlock.startTime);
            const origEnd = timeToMinutes(origBlock.endTime);
            const overlap = Math.max(0, Math.min(newEnd, origEnd) - Math.max(newStart, origStart));

            if (overlap > maxOverlap) {
              maxOverlap = overlap;
              bestOrigBlock = origBlock;
            }
          }

          if (bestOrigBlock) {
            const origKeyWithWeek = `${bestOrigBlock.id}-${pos}-${w}`;
            const origKeyLegacy = `${bestOrigBlock.id}-${pos}`;
            const assignedGuardId = state.blockAssignments[origKeyWithWeek] || state.blockAssignments[`${bestOrigBlock.id}-${pos}`];
            if (assignedGuardId) {
              newAssignments[`${newBlock.id}-${pos}-${w}`] = assignedGuardId;
              if (state.manualAssignments[origKeyWithWeek] || state.manualAssignments[origKeyLegacy]) {
                newManual[`${newBlock.id}-${pos}-${w}`] = true;
              }
            }
          }
        }
      }
    }

    // Remove old assignments
    for (const k of Object.keys(newAssignments)) {
      const bId = extractBlockIdFromAssignmentKey(k);
      if (deletedBlockIds.has(bId)) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          delete newAssignments[k];
          delete newManual[k];
        }
      }
    }

    // Update undoStack
    pushUndo();

    const remainingBlocks = dayBlocks.filter(b => !deletedBlockIds.has(b.id));
    const updatedBlocks = [...remainingBlocks, ...newBlocks];
    updatedBlocks.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

    state = {
      ...state,
      rotationBlocks: {
        ...state.rotationBlocks,
        [key]: updatedBlocks
      },
      blockAssignments: newAssignments,
      manualAssignments: newManual
    };

    notify();
  },

  // ─── Block Assignments ────────────────────────────────
  setBlockAssignment(blockId, position, guardId, week) {
    pushUndo();
    const w = week || state.selectedWeek;
    const key = `${blockId}-${position}-${w}`;
    state = {
      ...state,
      blockAssignments: { ...state.blockAssignments, [key]: guardId },
      manualAssignments: { ...state.manualAssignments, [key]: true }
    };
    notify();
  },

  removeBlockAssignment(blockId, position, week) {
    pushUndo();
    const w = week || state.selectedWeek;
    const key = `${blockId}-${position}-${w}`;
    const newAssignments = { ...state.blockAssignments };
    delete newAssignments[key];
    delete newAssignments[`${blockId}-${position}`]; // clean up legacy
    const newManual = { ...state.manualAssignments || {} };
    delete newManual[key];
    delete newManual[`${blockId}-${position}`]; // clean up legacy
    state = { ...state, blockAssignments: newAssignments, manualAssignments: newManual };
    notify();
  },

  clearBlockAssignments(blockId, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };
    for (const k of Object.keys(newAssignments)) {
      const bId = extractBlockIdFromAssignmentKey(k);
      if (bId === blockId) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          delete newAssignments[k];
          delete newManual[k];
        }
      }
    }
    state = { ...state, blockAssignments: newAssignments, manualAssignments: newManual };
    notify();
  },

  getAssignment(blockId, position, week) {
    const w = week || state.selectedWeek;
    return state.blockAssignments[`${blockId}-${position}-${w}`] || state.blockAssignments[`${blockId}-${position}`] || null;
  },

  // Clear a crew's AUTO (non-manual) assignments for a day, leaving user-locked
  // picks untouched. Used before auto-assign so a freshly generated rotation
  // fully replaces the old one (no stale assignment lingering on a position the
  // new run left empty). crewSection null/'Both' clears all crews.
  clearNonManualAssignments(day, crewSection, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const blocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blockIds = new Set(blocks.map(b => b.id));
    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    for (const k of Object.keys(newAssignments)) {
      if (!blockIds.has(extractBlockIdFromAssignmentKey(k))) continue;
      const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
      if (!isTargetWeek) continue;
      if (state.manualAssignments[k]) continue; // keep manual locks
      if (crewSection && crewSection !== 'Both') {
        const guard = state.guards.find(g => g.id === newAssignments[k]);
        if (!guard || guard.crewSection !== crewSection) continue;
      }
      delete newAssignments[k];
    }
    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  setAllAssignments(assignments, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    for (const a of assignments) {
      newAssignments[`${a.blockId}-${a.position}-${w}`] = a.guardId;
    }
    state = { ...state, blockAssignments: newAssignments };
    notify();
  },

  clearAssignments(day, crewSection, week) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const blocks = state.rotationBlocks[key] || state.rotationBlocks[day] || [];
    const blockIds = new Set(blocks.map(b => b.id));
    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };

    for (const k of Object.keys(newAssignments)) {
      const blockId = extractBlockIdFromAssignmentKey(k);
      if (blockIds.has(blockId)) {
        const isTargetWeek = k.endsWith(w) || !/\d{4}-\d{2}-\d{2}$/.test(k);
        if (isTargetWeek) {
          if (!crewSection || crewSection === 'Both') {
            delete newAssignments[k];
            delete newManual[k];
          } else {
            // Only clear for guards in the specified crew
            const guardId = newAssignments[k];
            const guard = state.guards.find(g => g.id === guardId);
            if (guard && guard.crewSection === crewSection) {
              delete newAssignments[k];
              delete newManual[k];
            }
          }
        }
      }
    }
    state = { ...state, blockAssignments: newAssignments, manualAssignments: newManual };
    notify();
  },

  undoAssignments() {
    if (state.undoStack.length === 0) return false;
    const previous = state.undoStack[state.undoStack.length - 1];
    const current = historySnapshot();
    state = {
      ...state,
      blockAssignments: previous.blockAssignments || {},
      manualAssignments: previous.manualAssignments || {},
      rotationBlocks: previous.rotationBlocks || {},
      lessons: previous.lessons || state.lessons || [],
      shifts: previous.shifts || state.shifts || {},
      undoStack: state.undoStack.slice(0, -1),
      redoStack: [...(state.redoStack || []), current].slice(-10)
    };
    notify();
    return true;
  },

  redoAssignments() {
    if (!state.redoStack || state.redoStack.length === 0) return false;
    const next = state.redoStack[state.redoStack.length - 1];
    const current = historySnapshot();
    state = {
      ...state,
      blockAssignments: next.blockAssignments || {},
      manualAssignments: next.manualAssignments || {},
      rotationBlocks: next.rotationBlocks || {},
      lessons: next.lessons || state.lessons || [],
      shifts: next.shifts || state.shifts || {},
      redoStack: state.redoStack.slice(0, -1),
      undoStack: [...state.undoStack, current].slice(-10)
    };
    notify();
    return true;
  },

  swapBlockAssignment(blockId, fromPosition, toPosition, week) {
    const w = week || state.selectedWeek;
    const fromKey = `${blockId}-${fromPosition}-${w}`;
    const toKey = `${blockId}-${toPosition}-${w}`;
    const fromGuard = state.blockAssignments[fromKey] || state.blockAssignments[`${blockId}-${fromPosition}`] || null;
    const toGuard = state.blockAssignments[toKey] || state.blockAssignments[`${blockId}-${toPosition}`] || null;

    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };
    
    if (fromGuard) newAssignments[toKey] = fromGuard; else delete newAssignments[toKey];
    if (toGuard) newAssignments[fromKey] = toGuard; else delete newAssignments[fromKey];
    delete newAssignments[`${blockId}-${fromPosition}`]; // cleanup legacy
    delete newAssignments[`${blockId}-${toPosition}`]; // cleanup legacy

    // Keep manual status in sync
    const wasFromManual = state.manualAssignments[fromKey] || state.manualAssignments[`${blockId}-${fromPosition}`];
    const wasToManual = state.manualAssignments[toKey] || state.manualAssignments[`${blockId}-${toPosition}`];
    
    if (fromGuard && wasFromManual) newManual[toKey] = true; else delete newManual[toKey];
    if (toGuard && wasToManual) newManual[fromKey] = true; else delete newManual[fromKey];
    delete newManual[`${blockId}-${fromPosition}`]; // cleanup legacy
    delete newManual[`${blockId}-${toPosition}`]; // cleanup legacy

    state = { ...state, blockAssignments: newAssignments, manualAssignments: newManual };
    notify();
  },

  swapInterBlockAssignment(blockId1, position1, blockId2, position2, week) {
    const w = week || state.selectedWeek;
    const key1 = `${blockId1}-${position1}-${w}`;
    const key2 = `${blockId2}-${position2}-${w}`;
    const guard1 = state.blockAssignments[key1] || state.blockAssignments[`${blockId1}-${position1}`] || null;
    const guard2 = state.blockAssignments[key2] || state.blockAssignments[`${blockId2}-${position2}`] || null;

    pushUndo();
    const newAssignments = { ...state.blockAssignments };
    const newManual = { ...state.manualAssignments || {} };
    
    if (guard1) newAssignments[key2] = guard1; else delete newAssignments[key2];
    if (guard2) newAssignments[key1] = guard2; else delete newAssignments[key1];

    delete newAssignments[`${blockId1}-${position1}`];
    delete newAssignments[`${blockId2}-${position2}`];

    // Keep manual status in sync
    const was1Manual = state.manualAssignments[key1] || state.manualAssignments[`${blockId1}-${position1}`];
    const was2Manual = state.manualAssignments[key2] || state.manualAssignments[`${blockId2}-${position2}`];

    if (guard1 && was1Manual) newManual[key2] = true; else delete newManual[key2];
    if (guard2 && was2Manual) newManual[key1] = true; else delete newManual[key1];

    delete newManual[`${blockId1}-${position1}`];
    delete newManual[`${blockId2}-${position2}`];

    state = { ...state, blockAssignments: newAssignments, manualAssignments: newManual };
    notify();
  },

  // ─── Settings ─────────────────────────────────────────
  updateSettings(updates) {
    state = {
      ...state,
      settings: { ...state.settings, ...updates }
    };
    notify();
  },

  addNoteTemplate(template) {
    const templates = [...state.settings.noteTemplates, template];
    state = {
      ...state,
      settings: { ...state.settings, noteTemplates: templates }
    };
    notify();
  },

  removeNoteTemplate(index) {
    const templates = state.settings.noteTemplates.filter((_, i) => i !== index);
    state = {
      ...state,
      settings: { ...state.settings, noteTemplates: templates }
    };
    notify();
  },

  // ─── UI State ─────────────────────────────────────────
  setSelectedDay(day) {
    state = { ...state, selectedDay: day };
    notify();
  },

  setSelectedCrew(crew) {
    state = { ...state, selectedCrew: crew };
    notify();
  },

  setActiveTab(tab) {
    state = { ...state, activeTab: tab };
    notify();
  },

  // Persist rich-text schedule notes WITHOUT notifying listeners, so the live
  // contenteditable editor is not destroyed/re-rendered while the user types.
  // We still mark a local edit and queue a (debounced) cloud-sync push so the
  // notes propagate to the Gist/other devices without disrupting typing.
  setScheduleNotes(html) {
    state.scheduleNotes = html;
    saveState();
    if (typeof isSyncLoading !== 'undefined' && !isSyncLoading) {
      lastLocalEditTime = new Date().toISOString();
      try { localStorage.setItem('lifeguard_last_local_edit_time', lastLocalEditTime); } catch (e) {}
    }
    if (typeof syncManager !== 'undefined') {
      syncManager.handleStoreUpdate();
    }
  },

  getDayNote(day, week) {
    const w = week || state.selectedWeek;
    return (state.dayNotes && state.dayNotes[`${day}-${w}`]) || '';
  },

  setDayNote(day, week, text) {
    const w = week || state.selectedWeek;
    const key = `${day}-${w}`;
    const newDayNotes = { ...(state.dayNotes || {}) };
    if (text && text.trim()) {
      newDayNotes[key] = text.trim();
    } else {
      delete newDayNotes[key];
    }
    state = { ...state, dayNotes: newDayNotes };
    notify();
  },

  setSelectedFilterGuardId(guardId) {
    state = { ...state, selectedFilterGuardId: guardId };
    notify();
  },

  setSelectedWeek(week) {
    state = { ...state, selectedWeek: week };
    notify();
  },

  setLessonsOnly(val) {
    state = { ...state, isLessonsOnly: val };
    notify();
  },

  setManualMode(val) {
    state = { ...state, manualMode: val };
    notify();
  },

  setShowConflictsOnly(val) {
    state = { ...state, showConflictsOnly: val };
    notify();
  },

  // ─── Export/Import ────────────────────────────────────
  exportData() {
    const { undoStack, redoStack, activeTab, selectedDay, selectedCrew, lastSaved, ...data } = state;
    const cleanSettings = { ...data.settings };
    delete cleanSettings.teamupApiKey;
    delete cleanSettings.teamupCalendarKey;
    return JSON.stringify({ ...data, settings: cleanSettings }, null, 2);
  },

  exportSyncData() {
    const {
      guards,
      shifts,
      rotationBlocks,
      blockAssignments,
      lessons,
      settings,
      manualMode,
      scheduleNotes,
      dayNotes
    } = state;
    const cleanSettings = { ...settings };
    delete cleanSettings.teamupApiKey;
    delete cleanSettings.teamupCalendarKey;
    return JSON.stringify({
      guards,
      shifts,
      rotationBlocks,
      blockAssignments,
      lessons,
      settings: cleanSettings,
      manualMode,
      scheduleNotes,
      dayNotes
    });
  },

  exportSharedData(targetWeek) {
    const w = targetWeek || state.selectedWeek;
    const currentDate = new Date(w + 'T00:00:00');
    
    const datePrev = new Date(currentDate);
    datePrev.setDate(currentDate.getDate() - 7);
    const prevWeek = getWeekStr(datePrev);
    
    const dateNext = new Date(currentDate);
    dateNext.setDate(currentDate.getDate() + 7);
    const nextWeek = getWeekStr(dateNext);
    
    const allowedWeeks = [w, prevWeek, nextWeek];
    
    const filteredShifts = {};
    for (const [key, shift] of Object.entries(state.shifts)) {
      if (!shift.week || allowedWeeks.includes(shift.week)) {
        filteredShifts[key] = shift;
      }
    }
    
    const filteredAssignments = {};
    const weekPattern = /\d{4}-\d{2}-\d{2}$/;
    for (const [key, guardId] of Object.entries(state.blockAssignments)) {
      if (weekPattern.test(key)) {
        const isAllowed = allowedWeeks.some(weekStr => key.endsWith(weekStr));
        if (isAllowed) {
          filteredAssignments[key] = guardId;
        }
      } else {
        filteredAssignments[key] = guardId;
      }
    }
    
    const filteredLessons = (state.lessons || []).filter(l => {
      return !l.week || allowedWeeks.includes(l.week);
    });

    const filteredRotationBlocks = {};
    for (const [key, blocks] of Object.entries(state.rotationBlocks)) {
      const parts = key.split('-');
      if (parts.length > 1) {
        const weekStr = parts.slice(1).join('-');
        if (allowedWeeks.includes(weekStr)) {
          filteredRotationBlocks[key] = blocks;
        }
      } else {
        filteredRotationBlocks[key] = blocks;
      }
    }
    
    const { undoStack, redoStack, activeTab, selectedCrew, lastSaved, ...data } = state;
    const cleanSettings = { ...data.settings };
    delete cleanSettings.teamupApiKey;
    delete cleanSettings.teamupCalendarKey;

    const sharedData = {
      ...data,
      settings: cleanSettings,
      rotationBlocks: filteredRotationBlocks,
      shifts: filteredShifts,
      blockAssignments: filteredAssignments,
      lessons: filteredLessons
    };
    
    return JSON.stringify(sharedData);
  },

  importData(jsonString) {
    try {
      const data = JSON.parse(jsonString);
      if (!data.guards || !data.settings) {
        throw new Error('Invalid data format');
      }
      // Extract and remove the sync revision counter from imported data
      // so it doesn't pollute the local state. Update our local revision
      // to match the cloud's so future conflict checks work correctly.
      if (data._syncRevision !== undefined) {
        if (typeof syncConfig !== 'undefined') {
          syncConfig.syncRevision = data._syncRevision;
          saveSyncConfig();
        }
        delete data._syncRevision;
      }
      const mergedSettings = { ...defaultSettings, ...data.settings };
      if (data.settings && data.settings.doorCreditPercent !== undefined && data.settings.doorCreditMultiplier === undefined) {
        mergedSettings.doorCreditMultiplier = data.settings.doorCreditPercent / 100;
      }
      if (data.settings && data.settings.defaultShiftTimes) {
        mergedSettings.defaultShiftTimes = {
          AM: { ...defaultSettings.defaultShiftTimes.AM, ...(data.settings.defaultShiftTimes.AM || {}) },
          PM: { ...defaultSettings.defaultShiftTimes.PM, ...(data.settings.defaultShiftTimes.PM || {}) }
        };
      }
      mergedSettings.blockCreationWindows = migrateBlockCreationWindows(data.settings && data.settings.blockCreationWindows);
      state = {
        ...defaultState,
        ...data,
        selectedWeek: state.selectedWeek,
        selectedDay: state.selectedDay,
        selectedCrew: state.selectedCrew,
        activeTab: state.activeTab,
        selectedFilterGuardId: state.selectedFilterGuardId,
        isLessonsOnly: state.isLessonsOnly,
        isReadOnly: state.isReadOnly,
        sharedWeek: state.sharedWeek,
        settings: mergedSettings,
        undoStack: [],
        redoStack: [],
        lastSaved: new Date().toISOString()
      };
      notify();
      return { success: true, guardCount: state.guards.length };
    } catch (e) {
      return { success: false, error: e.message };
    }
  },

  // ─── Read Only / Sharing Actions ──────────────────────
  setReadOnly(isReadOnly) {
    state = { ...state, isReadOnly };
    notify();
  },

  loadReadOnlyState(data) {
    const mergedSettings = { ...defaultSettings, ...data.settings };
    if (data.settings && data.settings.doorCreditPercent !== undefined && data.settings.doorCreditMultiplier === undefined) {
      mergedSettings.doorCreditMultiplier = data.settings.doorCreditPercent / 100;
    }
    if (data.settings && data.settings.defaultShiftTimes) {
      mergedSettings.defaultShiftTimes = {
        AM: { ...defaultSettings.defaultShiftTimes.AM, ...(data.settings.defaultShiftTimes.AM || {}) },
        PM: { ...defaultSettings.defaultShiftTimes.PM, ...(data.settings.defaultShiftTimes.PM || {}) }
      };
    }
    mergedSettings.blockCreationWindows = migrateBlockCreationWindows(data.settings && data.settings.blockCreationWindows);
    state = {
      ...defaultState,
      ...data,
      settings: mergedSettings,
      isReadOnly: true,
      sharedWeek: data.selectedWeek,
      undoStack: [],
      redoStack: [],
      lastSaved: data.lastSaved || new Date().toISOString()
    };
    notify();
  },

  async compressState(jsonString) {
    const stream = new Blob([jsonString], { type: 'text/plain' }).stream();
    const compressedStream = stream.pipeThrough(new CompressionStream('gzip'));
    const response = new Response(compressedStream);
    const buffer = await response.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    let binary = '';
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      const chunk = bytes.subarray(i, i + chunkSize);
      binary += String.fromCharCode.apply(null, chunk);
    }
    const base64 = btoa(binary);
    return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  },

  async decompressState(urlSafeBase64) {
    let base64 = urlSafeBase64.replace(/-/g, '+').replace(/_/g, '/');
    while (base64.length % 4) {
      base64 += '=';
    }
    const binaryString = atob(base64);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    const stream = new Blob([bytes]).stream();
    const decompressedStream = stream.pipeThrough(new DecompressionStream('gzip'));
    const response = new Response(decompressedStream);
    return await response.text();
  },

  exitReadOnly() {
    state = loadState();
    notify();
  },

  // ─── Lessons Actions ──────────────────────────────────
  addLesson(guardId, day, startTime, durationMinutes, notes, week, subject) {
    pushUndo();
    const lesson = {
      id: generateUUID(),
      guardId,
      day,
      startTime,
      durationMinutes,
      endTime: calculateEndTime(startTime, durationMinutes),
      subject: subject || '',
      notes: notes || '',
      week: week || state.selectedWeek
    };
    state = { ...state, lessons: [...state.lessons, lesson] };
    notify();
    return lesson;
  },

  addOrOverwriteLesson(guardId, day, startTime, durationMinutes, notes, week, subject) {
    pushUndo();
    const w = week || state.selectedWeek;
    const startMin = timeToMinutes(startTime);
    const endMin = startMin + parseInt(durationMinutes);

    // Remove overlapping lessons for this guard on this day in this week
    const filteredLessons = state.lessons.filter(l => {
      if (l.guardId !== guardId || l.day !== day || l.week !== w) return true;
      const lStart = timeToMinutes(l.startTime);
      const lEnd = timeToMinutes(l.endTime);
      const overlaps = lStart < endMin && lEnd > startMin;
      return !overlaps;
    });

    const newLesson = {
      id: generateUUID(),
      guardId,
      day,
      startTime,
      durationMinutes,
      endTime: calculateEndTime(startTime, durationMinutes),
      subject: subject || '',
      notes: notes || '',
      week: w
    };

    state = { ...state, lessons: [...filteredLessons, newLesson] };
    notify();
    return newLesson;
  },

  updateLesson(id, updates) {
    pushUndo();
    const lessons = state.lessons.map(l => {
      if (l.id !== id) return l;
      const merged = { ...l, ...updates };
      if (updates.startTime || updates.durationMinutes) {
        merged.endTime = calculateEndTime(merged.startTime, merged.durationMinutes);
      }
      return merged;
    });
    state = { ...state, lessons };
    notify();
  },

  removeLesson(id) {
    pushUndo();
    state = { ...state, lessons: state.lessons.filter(l => l.id !== id) };
    notify();
  },

  importLessons(lessonsList, week) {
    const w = week || state.selectedWeek;
    pushUndo();
    const newLessons = [...state.lessons];
    for (const l of lessonsList) {
      const lesson = {
        id: l.id || generateUUID(),
        guardId: l.guardId,
        day: l.day,
        startTime: l.startTime,
        durationMinutes: l.durationMinutes,
        endTime: calculateEndTime(l.startTime, l.durationMinutes),
        subject: l.subject || '',
        notes: l.notes || '',
        week: l.week || w
      };
      newLessons.push(lesson);
    }
    state = { ...state, lessons: newLessons };
    notify();
  },

  clearLessonsForWeek(week) {
    const w = week || state.selectedWeek;
    pushUndo();
    state = {
      ...state,
      lessons: state.lessons.filter(l => l.week !== w)
    };
    notify();
  },

  clearLessons(lessonIds) {
    pushUndo();
    const idsSet = new Set((lessonIds || []).map(id => String(id)));
    state = {
      ...state,
      lessons: state.lessons.filter(l => !idsSet.has(String(l.id)))
    };
    notify();
  },

  // ─── Reset ────────────────────────────────────────────
  resetAll() {
    state = {
      ...defaultState,
      settings: { ...state.settings }
    };
    notify();
  },

  copyShiftsFromPreviousWeek(currentWeek) {
    const w = currentWeek || state.selectedWeek;
    const currentDate = new Date(w + 'T00:00:00');
    currentDate.setDate(currentDate.getDate() - 7);
    const prevWeek = getWeekStr(currentDate);

    let copyCount = 0;
    const newShifts = { ...state.shifts };
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

    for (const guard of state.guards) {
      for (const day of days) {
        const prevKeyWithWeek = `${guard.id}-${day}-${prevWeek}`;
        const prevKeyLegacy = `${guard.id}-${day}`;
        const prevShift = state.shifts[prevKeyWithWeek] || state.shifts[prevKeyLegacy];

        if (prevShift) {
          const targetKey = `${guard.id}-${day}-${w}`;
          newShifts[targetKey] = {
            ...prevShift,
            week: w
          };
          copyCount++;
        }
      }
    }

    if (copyCount > 0) {
      pushUndo();
      state = { ...state, shifts: newShifts };
      notify();
    }
    return copyCount;
  },

  copyWeek(week) {
    const w = week || state.selectedWeek;
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const copied = {};
    let count = 0;
    for (const guard of state.guards) {
      for (const day of days) {
        const sh = state.shifts[`${guard.id}-${day}-${w}`] || state.shifts[`${guard.id}-${day}`];
        if (sh) { copied[`${guard.id}-${day}`] = { ...sh }; count++; }
      }
    }
    weekClipboard = count > 0 ? { shifts: copied, sourceWeek: w } : null;
    return count;
  },

  hasWeekClipboard() { return !!weekClipboard; },

  pasteWeek(targetWeek) {
    if (!weekClipboard) return 0;
    const w = targetWeek || state.selectedWeek;
    const newShifts = { ...state.shifts };
    let count = 0;
    for (const [gd, sh] of Object.entries(weekClipboard.shifts)) {
      newShifts[`${gd}-${w}`] = { ...sh, week: w };
      count++;
    }
    if (count > 0) { pushUndo(); state = { ...state, shifts: newShifts }; notify(); }
    return count;
  },

  copyShift(guardId, day, week) {
    const w = week || state.selectedWeek;
    const sh = state.shifts[`${guardId}-${day}-${w}`] || state.shifts[`${guardId}-${day}`] || null;
    if (!sh) return false;
    const { guardId: _g, day: _d, week: _w, ...shiftData } = sh;
    shiftClipboard = shiftData;
    return true;
  },

  hasShiftClipboard() { return !!shiftClipboard; },

  pasteShift(guardId, day, week) {
    if (!shiftClipboard) return false;
    const w = week || state.selectedWeek;
    const key = `${guardId}-${day}-${w}`;
    pushUndo();
    state = { ...state, shifts: { ...state.shifts, [key]: { guardId, day, week: w, ...shiftClipboard } } };
    notify();
    return true;
  },

  copyGuardWeek(guardId, week) {
    const w = week || state.selectedWeek;
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const copied = {};
    let count = 0;
    for (const day of days) {
      const sh = state.shifts[`${guardId}-${day}-${w}`] || state.shifts[`${guardId}-${day}`];
      if (sh) {
        const { guardId: _g, day: _d, week: _w, ...shiftData } = sh;
        copied[day] = shiftData;
        count++;
      }
    }
    guardWeekClipboard = count > 0 ? { shifts: copied } : null;
    return count;
  },

  hasGuardWeekClipboard() { return !!guardWeekClipboard; },

  pasteGuardWeek(targetGuardId, targetWeek) {
    if (!guardWeekClipboard) return 0;
    const w = targetWeek || state.selectedWeek;
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    pushUndo();
    const newShifts = { ...state.shifts };
    for (const day of days) {
      delete newShifts[`${targetGuardId}-${day}-${w}`];
      delete newShifts[`${targetGuardId}-${day}`];
    }
    let count = 0;
    for (const [day, shiftData] of Object.entries(guardWeekClipboard.shifts)) {
      newShifts[`${targetGuardId}-${day}-${w}`] = { guardId: targetGuardId, day, week: w, ...shiftData };
      count++;
    }
    state = { ...state, shifts: newShifts };
    notify();
    return count;
  },

  clearGuardWeekShifts(guardId, week) {
    const w = week || state.selectedWeek;
    const newShifts = { ...state.shifts };
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    let clearedCount = 0;

    for (const day of days) {
      const keyWithWeek = `${guardId}-${day}-${w}`;
      const keyLegacy = `${guardId}-${day}`;
      if (newShifts[keyWithWeek]) {
        delete newShifts[keyWithWeek];
        clearedCount++;
      }
      if (newShifts[keyLegacy]) {
        delete newShifts[keyLegacy];
        clearedCount++;
      }
    }

    if (clearedCount > 0) {
      state = { ...state, shifts: newShifts };
      notify();
    }
    return clearedCount;
  },

  // ─── Helpers ──────────────────────────────────────────
  getGuardById(id) {
    return state.guards.find(g => g.id === id) || null;
  },

  getGuardsByCrewSection(section) {
    if (section === 'Both') return state.guards;
    return state.guards.filter(g => g.crewSection === section);
  },

  getGuardsWorkingDay(day, crewSection, week) {
    const w = week || state.selectedWeek;
    return state.guards.filter(g => {
      if (crewSection && crewSection !== 'Both' && g.crewSection !== crewSection) return false;
      const keyWithWeek = `${g.id}-${day}-${w}`;
      const keyLegacy = `${g.id}-${day}`;
      return !!(state.shifts[keyWithWeek] || state.shifts[keyLegacy]);
    });
  },

  getDays() {
    return ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  },

  getGuardCountForDay(day, week) {
    const w = week || state.selectedWeek;
    const guardIds = new Set();
    for (const [key, shift] of Object.entries(state.shifts)) {
      if (shift.day === day) {
        if (shift.week) {
          if (shift.week === w) {
            guardIds.add(shift.guardId);
          }
        } else {
          // Legacy shift. Only include it if there is no week-specific shift for this guard and day
          const hasWeekSpecific = !!state.shifts[`${shift.guardId}-${day}-${w}`];
          if (!hasWeekSpecific) {
            guardIds.add(shift.guardId);
          }
        }
      }
    }
    return guardIds.size;
  },

  getOpenCloseGuardCountForDay(day, week) {
    const w = week || state.selectedWeek;
    
    // Get opening and closing windows for this day from settings
    const dayConfig = state.settings.blockCreationWindows?.[day] || {};
    const openStartMin = timeToMinutes(dayConfig.openingStart || '09:00');
    const openEndMin = timeToMinutes(dayConfig.openingEnd || '10:00');
    const closeStartMin = timeToMinutes(dayConfig.closingStart || '16:00');
    const closeEndMin = timeToMinutes(dayConfig.closingEnd || '17:00');
    
    let openCount = 0;
    let closeCount = 0;
    
    // Iterate through shifts for this day in this week
    for (const [key, shift] of Object.entries(state.shifts)) {
      if (shift.day === day) {
        // Resolve week
        let isTargetWeek = false;
        if (shift.week) {
          isTargetWeek = (shift.week === w);
        } else {
          // Legacy shift fallback
          const hasWeekSpecific = !!state.shifts[`${shift.guardId}-${day}-${w}`];
          isTargetWeek = !hasWeekSpecific;
        }
        
        if (isTargetWeek) {
          const sStart = timeToMinutes(shift.startTime);
          const sEnd = timeToMinutes(shift.endTime);
          
          // Overlap check for opening period
          if (sStart < openEndMin && sEnd > openStartMin) {
            openCount++;
          }
          // Overlap check for closing period
          if (sStart < closeEndMin && sEnd > closeStartMin) {
            closeCount++;
          }
        }
      }
    }
    
    return { open: openCount, close: closeCount };
  }
};
