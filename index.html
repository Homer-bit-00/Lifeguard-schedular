/**
 * Fetches all subcalendars for a given TeamUp calendar.
 * @param {string} apiKey - The TeamUp API token.
 * @param {string} calendarKey - The TeamUp calendar key.
 * @returns {Promise<Object>} Map of subcalendar ID to name and color, e.g. { 12345: { name: 'Elena', color: '#88b347' } }
 */
async function fetchSubcalendars(apiKey, calendarKey) {
  const url = `https://api.teamup.com/${calendarKey}/subcalendars`;
  let response;
  try {
    response = await fetch(url, {
      headers: { 'Teamup-Token': apiKey }
    });
  } catch (err) {
    throw new Error(`Failed to fetch subcalendars: ${err.message}`);
  }

  if (!response.ok) {
    throw new Error(`Failed to fetch subcalendars: HTTP ${response.status} ${response.statusText}`);
  }

  const data = await response.json();
  const map = {};
  for (const sub of data.subcalendars) {
    const colorId = sub.color;
    const hex = TEAMUP_COLORS[colorId] || '#668cb3';
    map[sub.id] = { name: sub.name, color: hex };
  }
  return map;
}

/**
 * Fetches events from a TeamUp calendar within a date range.
 * @param {string} apiKey - The TeamUp API token.
 * @param {string} calendarKey - The TeamUp calendar key.
 * @param {string} startDate - Start date in YYYY-MM-DD format.
 * @param {string} endDate - End date in YYYY-MM-DD format.
 * @returns {Promise<Array>} Array of event objects from TeamUp.
 */
async function fetchTeamUpEvents(apiKey, calendarKey, startDate, endDate) {
  const url = `https://api.teamup.com/${calendarKey}/events?startDate=${startDate}&endDate=${endDate}`;
  let response;
  try {
    response = await fetch(url, {
      headers: { 'Teamup-Token': apiKey }
    });
  } catch (err) {
    throw new Error(`Failed to fetch TeamUp events: ${err.message}`);
  }

  if (!response.ok) {
    throw new Error(`Failed to fetch TeamUp events: HTTP ${response.status} ${response.statusText}`);
  }

  const data = await response.json();
  return data.events;
}

/**
 * Synchronizes TeamUp events with the guard roster for a given week.
 * @param {string} apiKey - The TeamUp API token.
 * @param {string} calendarKey - The TeamUp calendar key.
 * @param {string} selectedWeek - The Monday of the target week in YYYY-MM-DD format.
 * @param {Array} guards - Array of guard objects from the roster.
 * @returns {Promise<Object>} { lessons, unmatched, rawEvents, skippedCount }
 */
async function syncTeamUpEvents(apiKey, calendarKey, selectedWeek, guards) {
  // Calculate start and end dates (Monday through Sunday)
  const startDate = selectedWeek;
  const parts = selectedWeek.split('-');
  const mondayDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  const sundayDate = new Date(mondayDate);
  sundayDate.setDate(sundayDate.getDate() + 6);
  const endDate = sundayDate.getFullYear() + '-' +
    String(sundayDate.getMonth() + 1).padStart(2, '0') + '-' +
    String(sundayDate.getDate()).padStart(2, '0');

  // Fetch subcalendars and events in parallel
  const [subcalendarMap, events] = await Promise.all([
    fetchSubcalendars(apiKey, calendarKey),
    fetchTeamUpEvents(apiKey, calendarKey, startDate, endDate)
  ]);

  const lessons = [];
  const rawEvents = [];
  const unmatchedSet = new Set();
  let skippedCount = 0;

  for (const event of events) {
    const title = event.title || '';
    const titleLower = title.toLowerCase().trim();

    // Filter out off-duty subjects
    if (
      titleLower === 'off' ||
      titleLower === 'lunch break' ||
      titleLower === 'break' ||
      titleLower.startsWith('off ') ||
      titleLower === 'off-duty'
    ) {
      skippedCount++;
      continue;
    }

    // Parse start_dt and end_dt using string parsing to avoid timezone issues
    const startDt = event.start_dt || '';
    const endDt = event.end_dt || '';

    // Extract date and time from the ISO string (e.g. "2026-06-03T10:00:00+05:00")
    const startDatePart = startDt.split('T')[0];
    const startTimePart = startDt.split('T')[1] || '00:00:00';

    const endTimePart = endDt.split('T')[1] || '00:00:00';

    // Parse the date components for day-of-week
    const dateParts = startDatePart.split('-');
    const year = parseInt(dateParts[0]);
    const month = parseInt(dateParts[1]);
    const dayNum = parseInt(dateParts[2]);
    const dateObj = new Date(year, month - 1, dayNum);
    const day = daysOfWeek[dateObj.getDay()];

    // Extract HH:MM from time part (strip timezone offset if present)
    const startHours = startTimePart.substring(0, 2);
    const startMins = startTimePart.substring(3, 5);
    const startTime = `${startHours}:${startMins}`;

    const endHours = endTimePart.substring(0, 2);
    const endMins = endTimePart.substring(3, 5);

    // Calculate duration in minutes
    const startTotalMinutes = timeToMinutes(startTime);
    const endTotalMinutes = parseInt(endHours) * 60 + parseInt(endMins);
    const durationMinutes = endTotalMinutes - startTotalMinutes;
    if (durationMinutes <= 0) continue;

    // Build subject and notes
    const subject = cleanHtml(title);
    const notes = cleanHtml(event.notes || '');

    // Resolve subcalendar IDs to names
    const subcalendarIds = event.subcalendar_ids || [];
    const guardColors = {};

    for (const subId of subcalendarIds) {
      const subInfo = subcalendarMap[subId];
      const calendarName = subInfo ? subInfo.name : `Unknown (${subId})`;
      const calendarColor = subInfo ? subInfo.color : '#668cb3';

      const rawEvent = {
        calendarName,
        color: calendarColor,
        day,
        startTime,
        durationMinutes,
        subject,
        notes,
        week: selectedWeek
      };
      rawEvents.push(rawEvent);

      const matchedGuard = findGuardMatch(calendarName, guards);
      if (matchedGuard) {
        guardColors[matchedGuard.id] = calendarColor;
        lessons.push({
          guardId: matchedGuard.id,
          day,
          startTime,
          durationMinutes,
          subject,
          notes,
          week: selectedWeek
        });
      } else {
        unmatchedSet.add(calendarName);
      }
    }
  }

  // Accumulate all auto-matched colors
  const finalGuardColors = {};
  for (const event of events) {
    const subcalendarIds = event.subcalendar_ids || [];
    for (const subId of subcalendarIds) {
      const subInfo = subcalendarMap[subId];
      if (subInfo) {
        const matchedGuard = findGuardMatch(subInfo.name, guards);
        if (matchedGuard) {
          finalGuardColors[matchedGuard.id] = subInfo.color;
        }
      }
    }
  }

  return {
    lessons,
    unmatched: Array.from(unmatchedSet),
    rawEvents,
    skippedCount,
    guardColors: finalGuardColors
  };
}

const app = document.getElementById('app');

// Escape user-controlled text before interpolating it into HTML strings that
// are assigned via innerHTML. Covers both element-content and quoted-attribute
// contexts (escapes & < > " '). Use this for any value that originates from
// user input (guard names, lesson/block notes, imported CSV names, etc.).
function escapeHtml(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let selectedGuardId = 'all';
let selectedReadOnlyTab = 'rotation';
const selectedBlockIds = new Set();
let lastRenderedDay = null;
let lastRenderedTab = null;
let trackerSort = 'start'; // daily tracker sort: 'start' (shift start time) | 'percent' (lowest first)

window.__setTrackerSort = (mode) => {
  trackerSort = mode;
  if (typeof render === 'function') render();
};

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(date.setDate(diff));
}

function hexToRgba(hex, alpha) {
  if (!hex || !hex.startsWith('#')) return `rgba(255, 255, 255, ${alpha})`;
  const cleanHex = hex.replace('#', '');
  const r = parseInt(cleanHex.substring(0, 2), 16);
  const g = parseInt(cleanHex.substring(2, 4), 16);
  const b = parseInt(cleanHex.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// Return the value only if it's a valid hex color (so a TeamUp-imported color
// can't inject CSS when interpolated into an inline style); otherwise fallback.
function safeHexColor(c, fallback = 'var(--border-default)') {
  return (typeof c === 'string' && /^#[0-9a-fA-F]{3,8}$/.test(c)) ? c : fallback;
}

function extractBlockIdFromAssignmentKey(key) {
  const parts = key.split('-');
  const isLegacy = !/\d{4}-\d{2}-\d{2}$/.test(key);
  return isLegacy ? parts.slice(0, -1).join('-') : parts.slice(0, -4).join('-');
}



function getFilteredLessonsForWeek(state) {
  const weekStr = state.selectedWeek;
  return (state.lessons || []).filter(l => l.week === weekStr);
}

function hasLessonConflict(lesson, state) {
  const gId = lesson.guardId;
  const currentDay = lesson.day;
  const w = lesson.week;
  const startMin = timeToMinutes(lesson.startTime);
  const endMin = startMin + parseInt(lesson.durationMinutes);

  // 1. Shift check
  const shift = store.getShift(gId, currentDay, w);
  if (!shift) return true;
  const shiftStart = shift.startTime ? timeToMinutes(shift.startTime) : 0;
  const shiftEnd = shift.endTime ? timeToMinutes(shift.endTime) : 0;
  if (startMin < shiftStart || endMin > shiftEnd) return true;

  // 2. Lesson overlap check
  const hasLessonOverlap = (state.lessons || []).some(l => {
    if (l.id === lesson.id) return false;
    if (String(l.guardId) !== String(gId) || l.day !== currentDay || l.week !== w) return false;
    const lStart = timeToMinutes(l.startTime);
    const lEnd = timeToMinutes(l.endTime);
    return startMin < lEnd && endMin > lStart;
  });
  if (hasLessonOverlap) return true;

  // 3. Rotation block assignment check
  const blocks = store.getBlocksForDay(currentDay, w);
  let hasAssignmentOverlap = false;
  blocks.forEach(block => {
    const blockStart = timeToMinutes(block.startTime);
    const blockEnd = timeToMinutes(block.endTime);
    if (startMin < blockEnd && endMin > blockStart) {
      Object.entries(state.blockAssignments).forEach(([key, assignedGuardId]) => {
        if (String(assignedGuardId) === String(gId)) {
          const bId = extractBlockIdFromAssignmentKey(key);
          if (bId === block.id) {
            const hasWeekSuffix = /\d{4}-\d{2}-\d{2}$/.test(key);
            const matchesWeek = hasWeekSuffix ? key.endsWith(`-${w}`) : (w === state.selectedWeek);
            if (matchesWeek) {
              hasAssignmentOverlap = true;
            }
          }
        }
      });
    }
  });

  if (hasAssignmentOverlap) return true;

  return false;
}

const initialWeek = store.getState().selectedWeek;
let currentWeekStart = initialWeek ? new Date(initialWeek + 'T00:00:00') : getMonday(new Date());

// "Universal emoji" is a DEVICE-LOCAL preference (not part of synced settings),
// so a Win7 machine can opt in without the choice syncing to or being
// overwritten by other devices. Stored under its own localStorage key.
const UNIVERSAL_EMOJI_KEY = 'lifeguard-universal-emoji';

function isUniversalEmojiOn() {
  try {
    return localStorage.getItem(UNIVERSAL_EMOJI_KEY) === '1';
  } catch (e) {
    return false;
  }
}

// Apply the universal-emoji preference: toggle a body class (which swaps in an
// emoji webfont via --font-family) and lazily load the font the first time it's
// enabled. Idempotent, so it's safe to call on every render.
function applyEmojiMode() {
  if (typeof document === 'undefined' || !document.body) return;
  const on = isUniversalEmojiOn();
  document.body.classList.toggle('universal-emoji', on);
  if (on && !document.getElementById('universal-emoji-font')) {
    const link = document.createElement('link');
    link.id = 'universal-emoji-font';
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap';
    document.head.appendChild(link);
  }
}

window.__toggleUniversalEmoji = (on) => {
  try {
    localStorage.setItem(UNIVERSAL_EMOJI_KEY, on ? '1' : '0');
  } catch (e) { /* ignore storage errors */ }
  applyEmojiMode();
};

function render() {
  const state = store.getState();
  applyEmojiMode();

  // Save scroll positions safely
  const hasQuerySelector = typeof document !== 'undefined' && typeof document.querySelector === 'function';
  const calendarBody = hasQuerySelector ? document.querySelector('.calendar-body') : null;
  const calendarScrollTop = calendarBody ? calendarBody.scrollTop : 0;
  const calendarScrollLeft = calendarBody ? calendarBody.scrollLeft : 0;
  const windowScrollX = typeof window !== 'undefined' ? (window.scrollX || 0) : 0;
  const windowScrollY = typeof window !== 'undefined' ? (window.scrollY || 0) : 0;

  if (state.selectedWeek) {
    currentWeekStart = new Date(state.selectedWeek + 'T00:00:00');
  }
  
  if (state.selectedDay !== lastRenderedDay || state.activeTab !== lastRenderedTab) {
    selectedBlockIds.clear();
    lastRenderedDay = state.selectedDay;
    lastRenderedTab = state.activeTab;
  }

  if (state.isReadOnly) {
    if (state.isLessonsOnly) {
      app.innerHTML = renderReadOnlyLessonsPortal(state);
      attachReadOnlyLessonsPortalEvents(state);
    } else {
      app.innerHTML = renderReadOnlyPortal(state);
      attachReadOnlyPortalEvents(state);
    }
    
    // Restore scroll positions safely
    if (typeof window !== 'undefined' && typeof window.scrollTo === 'function') {
      window.scrollTo(windowScrollX, windowScrollY);
    }
    const newCalendarBody = hasQuerySelector ? document.querySelector('.calendar-body') : null;
    if (newCalendarBody) {
      newCalendarBody.scrollTop = calendarScrollTop;
      newCalendarBody.scrollLeft = calendarScrollLeft;
    }
    return;
  }

  app.innerHTML = `
    ${renderNavBar(state)}
    ${renderSubNav(state)}
    <div class="main-content">
      ${renderActiveTab(state)}
    </div>
    ${state.activeTab === 'rotation' && selectedBlockIds.size > 0 ? renderFloatingSelectionBar(state) : ''}
  `;
  attachGlobalEvents(state);

  // Restore scroll positions safely
  if (typeof window !== 'undefined' && typeof window.scrollTo === 'function') {
    window.scrollTo(windowScrollX, windowScrollY);
  }
  const newCalendarBody = hasQuerySelector ? document.querySelector('.calendar-body') : null;
  if (newCalendarBody) {
    newCalendarBody.scrollTop = calendarScrollTop;
    newCalendarBody.scrollLeft = calendarScrollLeft;
  }
}

async function handleRouting() {
  const hash = window.location.hash;
  const state = store.getState();
  
  if (hash.startsWith('#/view/')) {
    const payload = hash.substring(7);
    try {
      const json = await store.decompressState(payload);
      const data = JSON.parse(json);
      store.loadReadOnlyState(data);
      store.setLessonsOnly(false);
      selectedReadOnlyTab = 'schedule';
    } catch (e) {
      console.error('Error loading shared schedule', e);
      showToast('Failed to load shared schedule. Using local copy.', 'error');
      window.location.hash = '';
      store.exitReadOnly();
    }
  } else if (hash.startsWith('#/rotation-view/')) {
    const payload = hash.substring(16);
    try {
      const json = await store.decompressState(payload);
      const data = JSON.parse(json);
      store.loadReadOnlyState(data);
      store.setLessonsOnly(false);
      selectedReadOnlyTab = 'rotation';
    } catch (e) {
      console.error('Error loading shared rotation schedule', e);
      showToast('Failed to load shared rotation. Using local copy.', 'error');
      window.location.hash = '';
      store.exitReadOnly();
    }
  } else if (hash.startsWith('#/lessons-view/')) {
    const payload = hash.substring(15);
    try {
      const json = await store.decompressState(payload);
      const data = JSON.parse(json);
      store.loadReadOnlyState(data);
      store.setLessonsOnly(true);
    } catch (e) {
      console.error('Error loading shared lessons', e);
      showToast('Failed to load shared lessons. Using local copy.', 'error');
      window.location.hash = '';
      store.exitReadOnly();
    }
  } else {
    if (state.isReadOnly) {
      store.exitReadOnly();
      store.setLessonsOnly(false);
    }
  }
}

window.addEventListener('hashchange', handleRouting);

// Run routing first, then subscribe and render
handleRouting().finally(() => {
  store.subscribe(render);
  if (typeof syncManager !== 'undefined') {
    syncManager.initialize();
  }
  render();
});

function renderSyncBadge(state) {
  if (typeof syncManager === 'undefined') return '';
  const status = syncManager.getStatus();
  if (status === 'disabled') return '';

  const config = syncManager.getConfig();
  let badgeClass = 'sync-disabled';
  let icon = '☁️';
  let label = 'Sync';
  let tooltip = 'Sync is disabled';

  if (status === 'synced') {
    badgeClass = 'sync-success';
    icon = '🟢';
    label = 'Synced';
    tooltip = `Synced with GitHub Gist. Last check: ${config.lastSyncedAt ? new Date(config.lastSyncedAt).toLocaleTimeString() : 'N/A'}`;
  } else if (status === 'syncing') {
    badgeClass = 'sync-pending';
    icon = '<span class="icon">🔄</span>';
    label = 'Syncing...';
    tooltip = 'Syncing schedule with GitHub Gist...';
  } else if (status === 'dirty') {
    badgeClass = 'sync-dirty';
    icon = '🔵';
    label = 'Unsaved Changes';
    tooltip = 'Local edits will be saved to the cloud automatically.';
    const nextAt = typeof syncManager.getNextAutoPushAt === 'function' ? syncManager.getNextAutoPushAt() : null;
    if (nextAt) {
      const remaining = Math.max(0, Math.ceil((nextAt - Date.now()) / 1000));
      if (remaining > 0) {
        const mm = Math.floor(remaining / 60);
        const ss = remaining % 60;
        const t = mm > 0 ? `${mm}:${String(ss).padStart(2, '0')}` : `${ss}s`;
        label = `Saving in ${t}`;
      } else {
        label = 'Saving...';
      }
    }
  } else if (status === 'error') {
    badgeClass = 'sync-error';
    icon = '🔴';
    label = 'Sync Error';
    tooltip = `Error during last sync: ${syncManager.getLastError() || 'Unknown error'}`;
  } else if (status === 'available') {
    badgeClass = 'sync-available';
    icon = '⬇️';
    label = 'Update Available';
    tooltip = 'Newer changes are available in the cloud. They will load automatically at the next safe moment, or click to load them now.';
    const loadAt = typeof syncManager.getUpdateAutoLoadAt === 'function' ? syncManager.getUpdateAutoLoadAt() : null;
    if (loadAt) {
      const remaining = Math.max(0, Math.ceil((loadAt - Date.now()) / 1000));
      if (remaining > 0) {
        const mm = Math.floor(remaining / 60);
        const ss = remaining % 60;
        const t = mm > 0 ? `${mm}:${String(ss).padStart(2, '0')}` : `${ss}s`;
        label = `Update in ${t}`;
      }
    }
  } else if (status === 'conflict') {
    badgeClass = 'sync-conflict';
    icon = '⚠️';
    label = 'Conflict';
    tooltip = 'Sync Conflict! Cloud version is newer. Click to resolve.';
  } else if (status === 'unconfigured') {
    badgeClass = 'sync-unconfigured';
    icon = '⚠️';
    label = 'Sync Not Configured';
    tooltip = 'GitHub Gist sync is selected but the Personal Access Token and/or Gist ID are missing. Click to open sync settings.';
  }

  return `
    <div class="sync-badge-container">
      <span class="sync-badge ${badgeClass}" title="${tooltip}" onclick="window.__handleSyncBadgeClick(event)">
        ${icon} ${label}
      </span>
    </div>
  `;
}

// Surgically update ONLY the sync badge without a full re-render. The store
// calls this when a background poll changes sync status (e.g. "update
// available") so the badge can refresh while the user is mid-edit, without
// app.innerHTML rebuilding the page and destroying their input or dropdown.
window.__refreshSyncBadge = () => {
  if (typeof document === 'undefined') return;
  // The sync dropdown is rendered as a child of the badge container, so
  // replacing the container would destroy an open dropdown (closing it on every
  // countdown tick). Skip the refresh while the dropdown is open; the next tick
  // resumes once it's closed.
  if (document.querySelector('.sync-dropdown')) return;
  const container = document.querySelector('.sync-badge-container');
  if (!container) return;
  const html = renderSyncBadge(store.getState());
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const fresh = tmp.firstElementChild;
  if (fresh) {
    container.replaceWith(fresh);
  } else {
    container.remove();
  }
};

// Tick the sync badge once per second so the "Saving in Ns" / "Update in Ns"
// countdowns stay live, updating only the badge (no full re-render that would
// disrupt editing).
if (typeof window !== 'undefined' && typeof window.setInterval === 'function') {
  window.setInterval(() => {
    if (typeof syncManager === 'undefined') return;
    const status = syncManager.getStatus();
    const counting =
      (status === 'dirty' &&
        typeof syncManager.getNextAutoPushAt === 'function' &&
        syncManager.getNextAutoPushAt()) ||
      (status === 'available' &&
        typeof syncManager.getUpdateAutoLoadAt === 'function' &&
        syncManager.getUpdateAutoLoadAt());
    if (counting && window.__refreshSyncBadge) {
      window.__refreshSyncBadge();
    }
  }, 1000);
}

function renderNavBar(state) {

  const lastSaved = state.lastSaved

  return `

        <h1>Lifeguard Rotation</h1>
      </div>
      <div class="nav-tabs">
        ${tabs.map(t => `

          <button class="btn btn-ghost btn-icon btn-sm" onclick="window.__redoAction()" title="Redo" ${(!state.redoStack || state.redoStack.length === 0) ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>↪️</button>
        </div>

}

function renderSubNav(state) {
  const days = store.getDays();
  const crewOptions = ['AM', 'PM', 'Both'];
  const daySelectorDisabled = state.activeTab === 'schedule' || state.activeTab === 'lessons';

  return `
    <div class="sub-nav">

        <div class="day-selector">
          ${days.map(d => {

            const hasCounts = open > 0 || close > 0;

function attachScheduleNotesEvents() {
  const editor = document.getElementById('schedule-notes-editor');
  if (!editor) return;

  let savedRange = null;
  const saveSelection = () => {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
      savedRange = sel.getRangeAt(0).cloneRange();
    }
  };
  const restoreSelection = () => {
    editor.focus();
    if (savedRange) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedRange);
    }
  };

  let saveTimer = null;
  const persist = () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => store.setScheduleNotes(editor.innerHTML), 300);
  };

  const updateActiveStates = () => {
    document.querySelectorAll('.notes-tool-btn[data-notes-cmd]').forEach(btn => {
      const cmd = btn.dataset.notesCmd;
      if (['bold', 'italic', 'underline', 'justifyLeft', 'justifyCenter', 'justifyRight'].includes(cmd)) {
        let on = false;
        try { on = document.queryCommandState(cmd); } catch (e) {}
        btn.classList.toggle('active', on);
      }
    });
  };

  // Track selection so toolbar controls (which steal focus) can restore it.
  editor.addEventListener('keyup', () => { saveSelection(); updateActiveStates(); });
  editor.addEventListener('mouseup', () => { saveSelection(); updateActiveStates(); });
  editor.addEventListener('input', () => { saveSelection(); persist(); });
  editor.addEventListener('blur', saveSelection);

  // Formatting buttons (bold / italic / underline / clear)
  document.querySelectorAll('.notes-tool-btn[data-notes-cmd]').forEach(btn => {
    // Keep the editor's selection when the button is pressed.
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => {
      restoreSelection();
      try { document.execCommand(btn.dataset.notesCmd, false, null); } catch (e) {}
      saveSelection();
      updateActiveStates();
      persist();
    });
  });

  // Font size
  const sizeSelect = document.getElementById('notes-fontsize');
  if (sizeSelect) {
    sizeSelect.addEventListener('mousedown', saveSelection);
    sizeSelect.addEventListener('change', () => {
      restoreSelection();
      try { document.execCommand('fontSize', false, sizeSelect.value); } catch (e) {}
      saveSelection();
      persist();
    });
  }

  // Text color
  const colorInput = document.getElementById('notes-color');
  if (colorInput) {
    colorInput.addEventListener('mousedown', saveSelection);
    const applyColor = () => {
      restoreSelection();
      try { document.execCommand('foreColor', false, colorInput.value); } catch (e) {}
      saveSelection();
      persist();
    };
    colorInput.addEventListener('input', applyColor);
    colorInput.addEventListener('change', applyColor);
  }
}

function getGuardTotalMinutes(guardId, state) {
  const days = store.getDays();
  let total = 0;
  const w = state?.selectedWeek || store.getState().selectedWeek;
  days.forEach(d => {
    const shift = store.getShift(guardId, d, w);
    if (shift) {
      const dur = getTimeDuration(shift.startTime, shift.endTime) - (shift.breakMinutes || 0);
      if (dur > 0) total += dur;
    }
  });
  return total;
}

function renderTotalHoursBadge(guardId, state) {
  const totalMin = getGuardTotalMinutes(guardId, state);
  if (totalMin === 0) {
    return `<span class="total-hours-badge empty">0h</span>`;
  }
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const text = m > 0 ? `${h}h ${m}m` : `${h}h`;
  return `<span class="total-hours-badge">${text}</span>`;
}

function renderGuardRow(guard, days, state) {
  const isReadOnly = state.isReadOnly;
  return `

          </div>
          ${renderTotalHoursBadge(guard.id, state)}
          ${!isReadOnly ? `<div style="display:flex; align-items:center; gap:6px; margin-top:3px;">
            <button class="btn btn-ghost btn-icon btn-sm" title="Copy this guard's whole week" onclick="window.__copyGuardWeek('${guard.id}')" style="width:22px;height:22px;font-size:0.8rem;padding:0;display:inline-flex;align-items:center;justify-content:center;">📋</button>
            ${store.hasGuardWeekClipboard() ? `<button class="btn btn-ghost btn-icon btn-sm" title="Paste copied week here (clears this guard's week first)" onclick="window.__pasteGuardWeek('${guard.id}')" style="width:22px;height:22px;font-size:0.8rem;padding:0;display:inline-flex;align-items:center;justify-content:center;">📥</button>` : ''}
          </div>` : ''}
        </div>
      </td>
      ${days.map(d => {
        const shift = store.getShift(guard.id, d, state.selectedWeek);
        
        const cellClass = `shift-cell ${shift ? 'has-shift' : ''} ${isReadOnly ? 'read-only' : ''}`;
        const onclickAttr = isReadOnly ? '' : `onclick="window.__openShiftModal('${guard.id}', '${d}')"`;
        
        let cellContent = '';
        let openerIndicator = '';
        let closerIndicator = '';
        if (shift) {
          const dayConfig = state.settings.blockCreationWindows?.[d] || {};
          const openStartMin = timeToMinutes(dayConfig.openingStart || '09:00');
          const openEndMin = timeToMinutes(dayConfig.openingEnd || '10:00');
          const closeStartMin = timeToMinutes(dayConfig.closingStart || '16:00');
          const closeEndMin = timeToMinutes(dayConfig.closingEnd || '17:00');
          
          const sStart = timeToMinutes(shift.startTime);
          const sEnd = timeToMinutes(shift.endTime);
          
          const isOpener = sStart < openEndMin && sEnd > openStartMin;
          const isCloser = sStart < closeEndMin && sEnd > closeStartMin;

          if (!isReadOnly && isOpener) {
            openerIndicator = `<span style="position: absolute; top: 6px; left: 6px; width: 8px; height: 8px; border-radius: 50%; background-color: var(--am-300); border: 1px solid rgba(230, 168, 23, 0.3); box-shadow: 0 0 2px var(--am-300);" title="Opening Shift"></span>`;
          }
          if (!isReadOnly && isCloser) {
            closerIndicator = `<span style="position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background-color: var(--pm-300); border: 1px solid rgba(124, 58, 237, 0.3); box-shadow: 0 0 2px var(--pm-300);" title="Closing Shift"></span>`;
          }

          cellContent = `
            ${openerIndicator}
            ${closerIndicator}
            <span class="shift-time">${fTime(shift.startTime)}–${fTime(shift.endTime)}</span>
            <div style="display:flex; align-items:center; gap:4px; justify-content:center; flex-wrap:wrap;">
              <span class="shift-duration">🕒 ${formatDuration(getTimeDuration(shift.startTime, shift.endTime) - (shift.breakMinutes || 0))}</span>
              ${shift.breakMinutes > 0 ? `<span class="break-badge">☕ ${shift.breakMinutes}m</span>` : ''}
            </div>
            ${shift.hasLessons ? `<span class="lesson-badge">📚 ${shift.lessonMinutes}m</span>` : ''}
          `;
          if (!isReadOnly) {
            cellContent += `
              <div class="shift-copy-actions" style="display:flex;gap:4px;justify-content:center;" onclick="event.stopPropagation()">
                <button class="btn btn-ghost btn-icon btn-sm" title="Copy this shift" onclick="window.__copyShift('${guard.id}', '${d}')" style="width:20px;height:20px;font-size:0.7rem;">📋</button>
                <button class="btn btn-ghost btn-icon btn-sm" title="Delete shift" onclick="window.__deleteShift('${guard.id}', '${d}')" style="width:20px;height:20px;font-size:0.7rem;color:var(--status-red);">🗑️</button>
              </div>
            `;
          }
        } else {
          if (isReadOnly) {
            cellContent = `<span class="text-tertiary" style="font-size:0.7rem;">—</span>`;
          } else if (store.hasShiftClipboard()) {
            cellContent = `<div style="display:flex; align-items:stretch; width:100%; flex:1; align-self:stretch;">
              <span class="text-tertiary" style="flex:1; display:flex; align-items:center; justify-content:center; font-size:0.8rem;">+ Add</span>
              <button class="btn btn-ghost" title="Paste copied shift here" onclick="event.stopPropagation(); window.__pasteShift('${guard.id}', '${d}')" style="flex:1; display:flex; align-items:center; justify-content:flex-start; gap:5px; font-size:0.8rem; padding:0 6px; border-radius:var(--radius-sm);">📥 Paste</button>
            </div>`;
          } else {
            cellContent = `<span class="text-tertiary" style="font-size:0.65rem;">+ Add</span>`;
          }
        }

        return `
          <td>
            <div class="${cellClass}" data-guard-id="${guard.id}" data-day="${d}" id="shift-${guard.id}-${d}" ${onclickAttr} style="position: relative;">
              ${cellContent}
            </div>
          </td>
        `;
      }).join('')}
    </tr>
  `;
}

  const selected = blocks.filter(b => selectedBlockIds.has(b.id));
  
  selected.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
  
  let totalDuration = 0;
  let timeRangeStr = '';
  if (selected.length > 0) {
    const earliestStart = selected[0].startTime;
    const latestEnd = selected[selected.length - 1].endTime;
    timeRangeStr = `${formatTime(earliestStart)} – ${formatTime(latestEnd)}`;
    
    for (const b of selected) {
      totalDuration += b.interval;
    }
  }

  return `
    <div class="selection-floating-bar">
      <div class="selection-info">
        <span class="selection-count">💡 <b>${selected.length}</b> block${selected.length > 1 ? 's' : ''} selected</span>
        <span class="selection-details">(${totalDuration} min • ${timeRangeStr})</span>
      </div>
      <div class="selection-actions">
        <button class="btn btn-primary btn-sm" onclick="window.__openDivideModal()">
          ✂️ Re-divide
        </button>
        <button class="btn btn-warning btn-sm" onclick="window.__clearSelectedBlockAssignments()">
          🧹 Clear
        </button>
        <button class="btn btn-danger btn-sm" onclick="window.__deleteSelectedBlocks()">
          🗑️ Delete
        </button>
        <button class="btn btn-ghost btn-sm" onclick="window.__clearBlockSelection()">
          ✕ Cancel
        </button>
      </div>
    </div>
  `;
}


function fTime(time) {
  return formatTime(time).replace(/(AM|PM)/g, '<small style="font-size:0.8em">$1</small>');
}

function renderBlockGrid(blocks, state) {
  const day = state.selectedDay;
  const filteredLessons = getFilteredLessonsForWeek(state);
  const dayLessons = filteredLessons.filter(l => l.day === day);

  return `
    <div class="block-grid">
      ${blocks.map((block, idx) => {
        const stands = block.guardCountOverride ?? state.settings.standCount;
        const isClosed = stands === 0;
        const intervalDisplay = block.interval !== state.settings.rotationIntervalMinutes
          ? `<span class="interval-tag">⏱ ${block.interval}m</span>` : '';
        const isChecked = selectedBlockIds.has(block.id);

        const bStart = timeToMinutes(block.startTime);
        const bEnd = timeToMinutes(block.endTime);
        const overlappingLessons = dayLessons.filter(l => {
          const lStart = timeToMinutes(l.startTime);
          const lEnd = lStart + parseInt(l.durationMinutes);
          return bStart < lEnd && bEnd > lStart;
        });

        let lessonIndicatorHTML = '';
        if (overlappingLessons.length > 0) {
          lessonIndicatorHTML = `
            <div class="block-lesson-indicator-wrapper" onclick="window.__toggleLessonTooltip(event, '${block.id}')">
              <span class="block-lesson-indicator">📚 ${overlappingLessons.length} ${overlappingLessons.length === 1 ? 'lesson' : 'lessons'}</span>
              <div class="block-lesson-tooltip" onclick="event.stopPropagation()">
                <div class="tooltip-header">Lessons during this block:</div>
                ${overlappingLessons.map(l => {
                  const guard = state.guards.find(g => g.id === l.guardId);
                  const guardName = guard ? guard.name : 'Unknown';
                  const lEndEnd = timeToMinutes(l.startTime) + parseInt(l.durationMinutes);
                  const timeStr = `${formatTime(l.startTime)} – ${formatTime(minutesToTime(lEndEnd))}`;
                  return `
                    <div class="tooltip-item">
                      <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 8px;">
                        <span class="tooltip-guard">${escapeHtml(guardName)}</span>
                        <span class="tooltip-time">${timeStr}</span>
                      </div>
                      ${l.subject ? `<span class="tooltip-subject">${l.subject}</span>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }

        return `
          <div class="block-row ${isClosed ? 'closed' : ''} ${isChecked ? 'selected-row' : ''}" id="block-${block.id}">
            <div class="block-select-cell">
              <input type="checkbox" class="block-select-checkbox" 
                     ${isChecked ? 'checked' : ''}
                     onchange="window.__toggleBlockSelection('${block.id}', this.checked)" />
            </div>
            <div class="block-time-label">
              <span class="time-range">${fTime(block.startTime)} – ${fTime(block.endTime)}</span>
              <div style="display:flex; align-items:center; gap:6px; margin-top:2px; flex-wrap:wrap;">
                ${intervalDisplay}
                ${lessonIndicatorHTML}
              </div>
              ${isClosed ? '<span class="status-pill closed">Closed</span>' : ''}
            </div>
            <div class="block-assignments">
              ${isClosed ? '<span class="text-tertiary text-xs">No guards needed</span>' : 
                renderBlockAssignments(block, stands, state)}
            </div>
            <div class="block-controls">
              <div class="guard-count-stepper">
                <button onclick="window.__updateBlockGuardCount('${block.id}', ${Math.max(0, stands - 1)})" ${stands <= 0 ? 'disabled' : ''}>−</button>
                <span class="count">${stands}</span>
                <button onclick="window.__updateBlockGuardCount('${block.id}', ${Math.min(6, stands + 1)})" ${stands >= 6 ? 'disabled' : ''}>+</button>
              </div>
              <input type="text" class="block-note" placeholder="Add note..."
                     value="${escapeHtml(block.note || '')}"
                     onchange="window.__updateBlockNote('${block.id}', this.value)"
                     id="block-note-${block.id}" />
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderBlockAssignments(block, standCount, state) {
  const positions = getPositions(standCount, state.settings?.excludeDoor);
  const slots = positions.map(pos => {
    const guardId = store.getAssignment(block.id, pos, state.selectedWeek);
    const guard = guardId ? store.getGuardById(guardId) : null;
    const posType = isStandPosition(pos) ? 'stand' : 'door';
    return `
      <div class="assignment-slot ${posType} ${guard ? 'filled' : ''}"
           data-block-id="${block.id}" data-position="${pos}"
           id="slot-${block.id}-${pos}"
           draggable="${guard ? 'true' : 'false'}"
             onclick="window.__toggleAssignmentDropdown(event, '${block.id}', '${pos}')"
           ondragstart="window.__onDragStart(event, '${block.id}', '${pos}')"
           ondragover="window.__onDragOver(event)"
           ondrop="window.__onDrop(event, '${block.id}', '${pos}')"
           ondragleave="window.__onDragLeave(event)"
           ondragend="window.__onDragEnd(event)">
        <span class="position-label">${getPositionLabel(pos)}</span>
        <span class="assigned-guard">${guard ? guard.name : '- empty -'}</span>
      </div>
    `;
  });
  return slots.join('');
}

function renderTrackerTab(state) {
  return `
    <div class="rotation-layout">
      <div>
        <div class="card">
          <div class="card-header">
            <h2>📊 Weekly Stand-Time Overview</h2>
          </div>
          <div class="card-body" style="overflow-x:auto;">
            ${renderWeeklyTrackerTable(state)}
          </div>
        </div>

        <div class="card mt-6">
          <div class="card-header">
            <h2>⏱️ Weekly Raw Time Details (Stand / Door / Lessons)</h2>
          </div>
          <div class="card-body" style="overflow-x:auto;">
            ${renderWeeklyRawTrackerTable(state)}
          </div>
        </div>
      </div>
      <div>
        ${renderDailyTracker(state)}
      </div>
    </div>
  `;
}

function renderDailyTracker(state) {
  const day = state.selectedDay;
  const crew = state.selectedCrew === 'Both' ? null : state.selectedCrew;
  const guardsToday = store.getGuardsWorkingDay(day, crew, state.selectedWeek);
  const blocks = store.getBlocksForDay(day);
  const settings = state.settings;
  const filteredLessons = getFilteredLessonsForWeek(state);

  // Compute each guard's stats once, then sort per the selected mode.
  const entries = guardsToday.map(g => ({
    g,
    st: calcGuardStandTime(g.id, day, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek),
    shift: store.getShift(g.id, day, state.selectedWeek),
  }));

  // Average across EVERYONE working today (not per crew) — the traffic-light
  // color compares each guard to the whole group, matching the combined rotation.
  let dayAvg = 0;
  if (entries.length > 0) {
    dayAvg = entries.reduce((sum, e) => sum + (e.st.percentage || 0), 0) / entries.length;
  }

  entries.sort((a, b) => {
    if (trackerSort === 'percent') {
      return (a.st.percentage || 0) - (b.st.percentage || 0); // lowest first
    }
    // 'start' — by shift start time; guards without a shift sort last.
    const aStart = a.shift ? timeToMinutes(a.shift.startTime) : Infinity;
    const bStart = b.shift ? timeToMinutes(b.shift.startTime) : Infinity;
    return aStart - bStart;
  });

  return `
    <div class="card daily-tracker-card">
      <div class="card-header">
        <h3>📊 ${day} Tracker</h3>
        <span class="text-xs text-tertiary">${guardsToday.length} guards</span>
      </div>
      <div class="card-body">
        ${guardsToday.length === 0 ? `
          <div class="text-xs text-tertiary" style="text-align:center;padding:20px;">
            No guards working ${day}
          </div>
        ` : `
          <div class="tracker-sort">
            <button class="tracker-sort-btn ${trackerSort === 'start' ? 'active' : ''}" onclick="window.__setTrackerSort('start')">🕒 Start time</button>
            <button class="tracker-sort-btn ${trackerSort === 'percent' ? 'active' : ''}" onclick="window.__setTrackerSort('percent')">⬇️ Lowest %</button>
          </div>
          <div class="tracker-panel">
            ${entries.map(({ g, st, shift }) => {
              const status = getStandTimeStatus(st.percentage, dayAvg);
              const pctDisplay = isNaN(st.percentage) ? 0 : Math.round(st.percentage);
              const doorMult = settings.doorCreditMultiplier ?? (settings.doorCreditPercent !== undefined ? settings.doorCreditPercent / 100 : 0.5);
              const lessonMult = settings.lessonMultiplier ?? 0.75;
              const scalerMult = st.scalerMultiplier ?? 1;
              const scalerActive = scalerMult !== 1;
              // Darker traffic-light green for the percentage number so it reads
              // distinct from the turquoise lesson segment in the bar.
              const pctColor = status === 'green' ? '#16a34a'
                : status === 'red' ? 'var(--status-red)'
                : 'var(--status-amber)';

              // The BAR shows RAW assigned time as a fraction of the shift, so
              // door time fills its share too (blue=stand, turquoise=lesson,
              // brown=door); the unassigned remainder stays dark. The big
              // PERCENTAGE number is the credited figure (multipliers applied).
              const shiftMin = st.shiftDurationMinutes;
              let standW = shiftMin > 0 ? (st.rawStandMinutes / shiftMin) * 100 : 0;
              let lessonW = shiftMin > 0 ? (st.rawLessonMinutes / shiftMin) * 100 : 0;
              let doorW = shiftMin > 0 ? (st.doorMinutes / shiftMin) * 100 : 0;
              const totalW = standW + lessonW + doorW;
              if (totalW > 100) { const k = 100 / totalW; standW *= k; lessonW *= k; doorW *= k; }

              // Build the "raw × mult% × long-shift% = credit" explanation shown
              // on hover. Stand passes catMult = 1 (no per-category multiplier).
              const catCalc = (rawMin, catMult, catLabel) => {
                const credit = rawMin * catMult * scalerMult;
                let text = formatDuration(rawMin);
                // Every multiplier is shown as a signed delta from 100%
                // (e.g. 1.2 → +20%, 0.5 → −50%, 0 → −100%).
                const fmtDelta = (m) => `${m - 1 >= 0 ? '+' : '−'}${Math.round(Math.abs(m - 1) * 100)}%`;
                if (catMult !== 1) text += ` ${fmtDelta(catMult)} (${catLabel})`;
                if (scalerActive) text += ` ${fmtDelta(scalerMult)} (long shift)`;
                text += ` = ${formatDuration(Math.round(credit))} credit`;
                return { credit, text };
              };
              const standCalc = catCalc(st.rawStandMinutes, 1, 'stand');
              const lessonCalc = catCalc(st.rawLessonMinutes, lessonMult, 'lesson');
              const doorCalc = catCalc(st.doorMinutes, doorMult, 'door');

              return `
                <div class="stand-time-bar-container" id="tracker-bar-${g.id}">
                  <div class="stand-time-header">
                    <div class="guard-label" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; min-width:0;">
                      <span>${escapeHtml(g.name)}</span>
                      ${st.shiftDurationMinutes > 0 ? `<span class="shift-duration">🕒 ${formatDuration(st.shiftDurationMinutes)}</span>` : ''}
                    </div>
                    ${shift ? `<span style="font-size:0.65rem; color:var(--text-tertiary); font-weight:500;">${formatTime(shift.startTime)} – ${formatTime(shift.endTime)}</span>` : ''}
                  </div>
                  <div style="display:flex; align-items:center; gap:10px;">
                    <div class="stand-time-track" style="display:flex; flex:1; min-width:0;">
                      <div style="width:${standW}%; background:#3b82f6; flex-shrink:0;"></div>
                      <div style="width:${lessonW}%; background:#2dd4a8; flex-shrink:0;"></div>
                      <div style="width:${doorW}%; background:#9a6a3a; flex-shrink:0;"></div>
                    </div>
                    <span class="credit-tip credit-tip-right" tabindex="0" style="flex-shrink:0; width:58px; justify-content:flex-end;">
                      <span class="percentage-label" style="color:${pctColor}">${pctDisplay}%</span>
                      <span class="credit-pop">
                        <div>🏖️ ${standCalc.text}</div>
                        <div>📚 ${lessonCalc.text}</div>
                        <div>🚪 ${doorCalc.text}</div>
                        <div class="credit-pop-total">${formatDuration(Math.round(st.totalMinutes))} total credit · ${pctDisplay}% of ${formatDuration(st.shiftDurationMinutes)} shift</div>
                      </span>
                    </span>
                  </div>
                  <div class="stand-time-detail" style="display:flex; gap:16px; flex-wrap:wrap;">
                    <span class="credit-tip" tabindex="0">🏖️ ${formatDuration(st.rawStandMinutes)}<span class="credit-pop">${standCalc.text}</span></span>
                    <span class="credit-tip" tabindex="0">📚 ${formatDuration(st.rawLessonMinutes)}<span class="credit-pop">${lessonCalc.text}</span></span>
                    <span class="credit-tip" tabindex="0">🚪 ${formatDuration(st.doorMinutes)}<span class="credit-pop">${doorCalc.text}</span></span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function renderWeeklyTrackerTable(state) {
  const days = store.getDays();
  const crew = state.selectedCrew === 'Both' ? null : state.selectedCrew;
  const guards = crew ? state.guards.filter(g => g.crewSection === crew) : state.guards;
  const settings = state.settings;
  const filteredLessons = getFilteredLessonsForWeek(state);

  if (guards.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h3>No Data to Display</h3>
        <p>Add guards and create rotation assignments to see stand-time tracking data.</p>
      </div>
    `;
  }

  return `
    <table class="weekly-tracker-table">
      <thead>
        <tr>
          <th style="text-align:left;">Guard</th>
          ${days.map((d, idx) => {
            const dayDate = new Date(currentWeekStart);
            dayDate.setDate(dayDate.getDate() + idx);
            const dateNum = dayDate.getDate();
            return `<th>${d.slice(0, 3)} (${dateNum})</th>`;
          }).join('')}
          <th style="font-weight:700;">Week Avg</th>
        </tr>
      </thead>
      <tbody>
        ${guards.map(g => {
          let totalPct = 0;
          let daysWorked = 0;

          const dayCells = days.map(d => {
            const shift = store.getShift(g.id, d, state.selectedWeek);
            if (!shift) return '<td><span class="percentage-cell none">—</span></td>';

            const blocks = store.getBlocksForDay(d);
            const st = calcGuardStandTime(g.id, d, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);

            // Compute day crew average for color
            const dayGuards = store.getGuardsWorkingDay(d, g.crewSection, state.selectedWeek);
            let dayAvg = 0;
            if (dayGuards.length > 0) {
              dayAvg = dayGuards.reduce((sum, dg) => {
                const dst = calcGuardStandTime(dg.id, d, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);
                return sum + dst.percentage;
              }, 0) / dayGuards.length;
            }

            const status = getStandTimeStatus(st.percentage, dayAvg);
            const pct = isNaN(st.percentage) ? 0 : Math.round(st.percentage);
            totalPct += (isNaN(st.percentage) ? 0 : st.percentage);
            daysWorked++;

            return `<td><span class="percentage-cell ${status}">${pct}%</span></td>`;
          }).join('');

          const weekAvg = daysWorked > 0 ? Math.round(totalPct / daysWorked) : 0;

          return `
            <tr>
              <td class="guard-name">
                <div class="flex items-center gap-2">
                  <div class="guard-avatar ${escapeHtml(g.crewSection.toLowerCase())}" style="width:20px;height:20px;font-size:0.55rem;">
                    ${escapeHtml(g.name.charAt(0))}
                  </div>
                  ${escapeHtml(g.name)}
                  <span class="crew-badge ${escapeHtml(g.crewSection.toLowerCase())}" style="font-size:0.55rem;">${escapeHtml(g.crewSection)}</span>
                </div>
              </td>
              ${dayCells}
              <td><span class="percentage-cell ${weekAvg > 0 ? 'green' : 'none'}" style="font-weight:700;">${weekAvg > 0 ? weekAvg + '%' : '—'}</span></td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderWeeklyRawTrackerTable(state) {
  const days = store.getDays();
  const crew = state.selectedCrew === 'Both' ? null : state.selectedCrew;
  const guards = crew ? state.guards.filter(g => g.crewSection === crew) : state.guards;
  const settings = state.settings;
  const filteredLessons = getFilteredLessonsForWeek(state);

  if (guards.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h3>No Data to Display</h3>
        <p>Add guards and create rotation assignments to see stand-time tracking data.</p>
      </div>
    `;
  }

  return `
    <table class="weekly-raw-tracker-table">
      <thead>
        <tr>
          <th style="text-align:left;">Guard</th>
          ${days.map((d, idx) => {
            const dayDate = new Date(currentWeekStart);
            dayDate.setDate(dayDate.getDate() + idx);
            const dateNum = dayDate.getDate();
            return `<th>${d.slice(0, 3)} (${dateNum})</th>`;
          }).join('')}
          <th style="font-weight:700;">Week Totals</th>
        </tr>
      </thead>
      <tbody>
        ${guards.map(g => {
          let totalStand = 0;
          let totalDoor = 0;
          let totalLessons = 0;
          let hasAnyShift = false;

          const dayCells = days.map(d => {
            const shift = store.getShift(g.id, d, state.selectedWeek);
            if (!shift) return '<td><span class="percentage-cell none">—</span></td>';

            hasAnyShift = true;
            const blocks = store.getBlocksForDay(d);
            const st = calcGuardStandTime(g.id, d, state.blockAssignments, blocks, state.shifts, settings, filteredLessons, state.selectedWeek);

            totalStand += st.rawStandMinutes || 0;
            totalDoor += st.doorMinutes || 0;
            totalLessons += st.rawLessonMinutes || 0;

            const standFaded = !st.rawStandMinutes ? 'faded' : '';
            const doorFaded = !st.doorMinutes ? 'faded' : '';
            const lessonsFaded = !st.rawLessonMinutes ? 'faded' : '';

            return `
              <td>
                <div class="raw-time-grid">
                  <div class="raw-time-item stand ${standFaded}" title="Stand: ${formatDuration(st.rawStandMinutes)}">
                    <span class="icon">🏖️</span>
                    <span class="value">${formatDuration(st.rawStandMinutes)}</span>
                  </div>
                  <div class="raw-time-item door ${doorFaded}" title="Door: ${formatDuration(st.doorMinutes)}">
                    <span class="icon">🚪</span>
                    <span class="value">${formatDuration(st.doorMinutes)}</span>
                  </div>
                  <div class="raw-time-item lessons ${lessonsFaded}" title="Lessons: ${formatDuration(st.rawLessonMinutes)}">
                    <span class="icon">📚</span>
                    <span class="value">${formatDuration(st.rawLessonMinutes)}</span>
                  </div>
                </div>
              </td>
            `;
          }).join('');

          const standTotalFaded = !totalStand ? 'faded' : '';
          const doorTotalFaded = !totalDoor ? 'faded' : '';
          const lessonsTotalFaded = !totalLessons ? 'faded' : '';

          return `
            <tr>
              <td class="guard-name">
                <div class="flex items-center gap-2">
                  <div class="guard-avatar ${escapeHtml(g.crewSection.toLowerCase())}" style="width:20px;height:20px;font-size:0.55rem;">
                    ${escapeHtml(g.name.charAt(0))}
                  </div>
                  ${escapeHtml(g.name)}
                  <span class="crew-badge ${escapeHtml(g.crewSection.toLowerCase())}" style="font-size:0.55rem;">${escapeHtml(g.crewSection)}</span>
                </div>
              </td>
              ${dayCells}
              <td>
                ${hasAnyShift ? `
                  <div class="raw-time-grid" style="background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.12);">
                    <div class="raw-time-item stand ${standTotalFaded}" title="Total Stand: ${formatDuration(totalStand)}">
                      <span class="icon">🏖️</span>
                      <span class="value">${formatDuration(totalStand)}</span>
                    </div>
                    <div class="raw-time-item door ${doorTotalFaded}" title="Total Door: ${formatDuration(totalDoor)}">
                      <span class="icon">🚪</span>
                      <span class="value">${formatDuration(totalDoor)}</span>
                    </div>
                    <div class="raw-time-item lessons ${lessonsTotalFaded}" title="Total Lessons: ${formatDuration(totalLessons)}">
                      <span class="icon">📚</span>
                      <span class="value">${formatDuration(totalLessons)}</span>
                    </div>
                  </div>
                ` : '<span class="percentage-cell none">—</span>'}
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}
